 ROC_CHI.31.a: "按最坏情况部署"

 ROC_CHI.32.t: "紧急动员"
 ROC_CHI.32.d: "西线的火光尚未熄灭，战线却已被撕开数道缺口。沿海登陆与内陆穿插同时推进，使原本尚能维持的防御体系迅速变得支离破碎。就在这种几近崩塌的边缘，零散而急促的集结开始出现。\n\n一支由各地临时编组的志愿民兵，从被轰毁的乡道与田野间赶来。带队的是周岭，她脸上沾着未干的烟灰，背包里除了急救物资，只剩零散弹药。赵闻川紧跟其后，步伐略显急促，却始终没有回头。他们没有统一的装备，也没有完整的编制，更多时候只能依靠口头指令与彼此默契维持队形。\n\n“前面就是断线的位置。”周岭压低声音，指向远处被炮火削平的堤岸。那里原本是防线的一段，现在只剩断裂的混凝土与翻覆的铁丝网。几名守军残部正在撤离，神情麻木而疲惫。\n\n没有交接，也没有多余的说明，志愿者们直接接替了阵地。赵闻川将仅有的弹匣分发出去，又把水壶递给一名还在发抖的新兵。沈知夏蹲在破损的掩体后，用简陋电台重新建立联络，一段段断续的回音在耳机里反复跳动。她报出坐标时，声音有一瞬间的迟滞，却很快恢复稳定。\n\n顾承野则在阵地间来回穿梭，把零散的人员重新组织成几个火力点。他的动作不算熟练，却带着一种近乎固执的专注，像是在强行把混乱压回秩序之中。\n\n远处传来履带碾压的低沉声响。还未完全冷却的地面再次震动，烟雾中隐约浮现出推进的装甲轮廓。林语棠伏在壕沟边缘，呼吸贴着泥土，她没有等命令，只是微微调整姿势，将枪口对准侧翼最薄弱的部分。\n\n第一声枪响之后，阵地迅速被拉回战斗节奏。简易机枪断断续续地压制前方推进路线，手雷在残墙间爆开，掀起碎石与泥土。补员并未改变火力对比，却让原本即将崩溃的防线重新有了“形”。\n\n炮火再度覆盖下来，壕沟里泥水四溅。有人被震得耳鸣失声，也有人在黑暗中死死抓住身边同伴的衣袖。周岭靠在土壁上，短暂闭上眼，又很快睁开，重新举起手臂示意分散。\n\n当第二轮冲击逼近，阵地已经不再完整，却仍然存在。那些仓促拼凑起来的人影，在烟尘与火光之间稳住了位置，像一条被不断撕裂却始终未断的线。"
 ROC_CHI.32.a: "补上去，哪怕只多撑一分钟"

 ROC_CHI.33.t: "胜利的预兆"
 ROC_CHI.33.d: "【中华民国战时广播系统特别新闻】\n\n“这里是[CHI.GetName]战时临时广播系统，现在为您插播一则重大突发新闻。”\n\n主播沈亦岚坐在临时搭建的播报台前，神情克制，手中的稿件边缘微微卷起。\n\n“根据多方独立情报来源与现场画面交叉确认，中国内陆局势已出现剧烈变化。数日前，南京发生大规模武力清场行动。执法与武装力量对集结人群实施强制驱散，过程中造成严重伤亡。”\n\n画面切换至模糊影像，火光与人群奔散的轮廓交织。\n\n“该事件迅速引发连锁反应。包括华东、华中在内的多个地区，相继出现抗议升级与武装对峙迹象。部分城市交通节点被占据，铁路运输受阻，地方行政系统运作出现明显中断。”\n\n副主播顾行之接替播报，语速平稳却压低音量。\n\n“更引人关注的是军方内部的异常动向。南京方向所属部队在执行后续命令时出现分裂。根据目前掌握的信息，部分单位拒绝继续参与镇压行动，并与上级指挥系统产生对抗。”\n\n画面再次切换，出现疑似军车调动与路障对峙的片段。\n\n“个别建制部队已脱离原有指挥链，控制驻地与周边区域。这一情况被外界普遍视为南京军区内部出现兵变迹象。与此同时，其余战区部队正向相关区域机动，试图重新建立控制。”\n\n沈亦岚重新出现在画面中央，语气更为凝重。\n\n“目前，各地局势仍在快速变化之中。武装对立呈现多点扩散趋势，部分区域已出现交火与临时武装重组的情况。由于信息封锁与通信干扰，实际规模仍难以完全确认。”\n\n她短暂停顿，低头确认稿件后继续。\n\n“可以确定的是，南京清场事件已成为当前局势的关键转折点，其影响正沿着交通与指挥体系迅速扩散，对整体稳定构成持续冲击。”"
 ROC_CHI.33.a: "我们要赢了!"

 ROC_CHI.34.t: "解放军开始撤军"
 ROC_CHI.34.d: "经过数月的惨烈激战，面对解放军潮水般的攻势，台湾守军与人民以血肉之躯筑起防线。无数城市在炮火中化为焦土，解放军的全面进攻最终受阻，其迅速击溃我政府与军队、实现“统一”的作战目标彻底宣告失败。\n\n近日情报显示，解放军已开始从前线各占领区悄然撤离。为了避免刺激对方反扑，我方暂未大肆宣扬。直到日、澳等多国情报机构证实，共军正从金门、马祖以及西部各主要战线全面后撤，总统府才在黎明时分正式宣布：这场保卫民主的战争，我们活了下来。\n\n伴随地面入侵部队的撤退，解放军的空军与海军也停止了一切军事行动。曾经硝烟弥漫的天空与海域，终于重新安静下来。满目疮痍的码头和机场，开始勉强接收来自全球各地和盟友的人道主义援助。残破的街道上，偶尔能看见幸存的民众拖着疲惫的身躯，寻找还能住人的地方。\n\n然而，胜利的喜悦却如此苍白。\n\n我们的城市已成废墟。高楼只剩下扭曲的钢筋骨架，曾经繁华的街道如今堆满瓦砾与焦黑的残骸。工厂被彻底摧毁，铁路与公路系统瘫痪，连接南北的交通要道断裂成无数段。那个曾被誉为“皇冠明珠”的半导体产业，更是在战火中被连根拔起，全球供应链的震动至今仍在持续。\n\n站在断壁残垣之间，看着昔日熟悉的家园如今只剩下一片死寂的废墟，许多人甚至连哭的力气都没有了。劫后余生的疲惫与麻木深深地刻在每一个人的脸上。重建的路途如此漫长而艰巨，而更令人感到无力的是——\n\n情报显示，这次惨败极有可能在大陆内部引发剧烈的政治动荡。未来，或许会出现一个比现在更加激进、更加不惜代价的领导层。那时候，台湾将再次面对更凶狠的威胁。\n\n我们活下来了，却不知道下一次……还能不能撑过去。"
 ROC_CHI.34.a: "我们赢了……却几乎失去了一切"
 
 ROC.67.d: "随着中国向朝鲜派遣部队支援，朝鲜半岛已成为亚洲更广泛冲突的关键战场。为更好地协调多国行动，朝鲜宣布正式加入东协，并与东协部队展开联合行动。\n\n东协介入的消息提升了整个同盟的士气，但朝鲜军方领导层很快发现，缺乏统一指挥和后勤混乱是严重的隐患。为此，朝鲜开始着手接受中国军队援助，以便在亚洲主要战区实现多国军事协调的高效化。\n\n朝鲜官方媒体宣称，其军队将在领袖与人民意志的指引下，发动对南方资本主义傀儡政权的最后总攻，旨在将半岛从叛徒与帝国主义走狗的压迫统治下解放出来。"

 ROC.68.d: "随着朝鲜加入东协，朝鲜半岛局势迅速升温，促使韩国选择与日本结盟，并正式加入太约。\n\n尽管长期拒绝半岛外部势力的介入，但冲突加剧使双方都急于寻求外部支持，从而使东协与太约的对抗公开化。随着朝鲜正式倒向东协，这一赤裸的挑衅也使韩国加入太约成为必然。\n\nn在随后的记者会上，韩国发言人感谢各国的支持，并表达了对盟友团结一致取得正义胜利的信心。"

 ROC.75.t: "台海战争期间各国的援助程度"
 ROC.75.d: "可以选择让自由世界的国家在台海期间帮忙抗中保台了，真是神奇"
 ROC.75.a: "让所有社民政府的人来"
 ROC.75.b: "让所有社自政府的人来"
 ROC.75.c: "让所有市自政府的人来"
 ROC.75.e: "让所有保守政府的人来"
 ROC.75.f: "让他们全部都来"

 ROC.76.t: "中国爆发反习抗议"
 ROC.76.a: "有人要倒霉咯"
 ROC.77.t: "黑鷹直升機在烏來山區墜毀"
 ROC.77.d: "2020 年 1 月 2 日上午，中華民國空軍一架 UH-60M「黑鷹」直升機自新北市新店區直潭營區起飛，執行例行春節慰勉行程，原定前往宜蘭東澳嶺雷達站進行視導與勉勵官兵。機上共 13 人，包含時任參謀總長沈一鳴上將及多名高階將領與隨行人員\n\n直升機於飛行途中進入新北市烏來山區上空時，因天候不佳、能見度低，飛機在雷達上訊號消失。國防部隨即啟動緊急搜救機制，出動空中與地面搜救部隊展開搜尋。經數小時搜索，搜救人員於烏來桶後溪上游山區發現失事殘骸。\n\n5名生還者則在搜救人員協助下送醫治療。後續調查指出，事故與當時山區天候惡劣、雲霧濃厚、飛行環境能見度不佳，以及飛行決策判斷等因素相關，並非機械故障所致。國軍隨後全面檢討高階軍官搭乘同一航空器的風險管理與飛安程序，強化相關規範。"
 ROC.77.a: "沉痛哀悼"
 ROC_77_tt: "§Y事故共造成 8 人罹難、5 人生還。罹難者包含：§!\n\n參謀總長 §Y沈一鳴§! 上將\n政戰局副局長 §Y于親文§! 少將\n情次室助次 §Y洪鴻鈞§! 少將\n作計室處長 §Y劉鎮富§! 少將\n參謀總長室參謀官 §Y黃聖航§! 中校\n空軍作計室參謀官 §Y韓正宏§! 中校\n空勤組員 §Y許鴻彬§! 上士\n空勤組員 §Y張志光§! 士官長§!"

 ROC.78.t: "中國暫停台灣鳳梨輸入"
 ROC.78.d: "2021 年 3 月，中國海關總署宣布自 3 月 1 日起暫停台灣鳳梨輸入，理由為多次檢出介殼蟲等有害生物。由於中國長期為台灣鳳梨最大外銷市場，此舉立即對鳳梨產業與農民生計造成衝擊，也迅速升高為政治與經貿議題。\n\n台灣政府隨即啟動因應措施，包含加強檢疫與品質管理、協助外銷市場轉移、啟動內銷促銷與加工收購機制。同時，民間企業、電商平台、餐飲業者與地方政府紛紛響應採購與行銷，社群媒體掀起「挺鳳梨」熱潮，大量民眾以實際購買行動支持農民，鳳梨入菜、鳳梨加工品與創意行銷在短時間內蔚為風潮。\n\n政府表示台灣鳳梨外銷市場將逐步分散至日本、香港、新加坡與中東等地，對單一市場依賴的問題也再次成為社會與政策討論焦點。"
 ROC.78.a: "這對它們沒好處!"

 ROC.79.t: "太魯閣號列車出軌事故"
 ROC.79.d: "2021年4月2日上午9時28分，位於台灣花蓮縣秀林鄉的台灣鐵路北迴線清水隧道北口，一列載有498人的TEMU1000型列車在行逕隧道前，因撞擊滑落邊坡侵入路線的工程車造成出軌，列車因慣性持續往前滑行撞進隧道內，車廂嚴重損毀，造成49人罹難和309人輕重傷\n\n儘管中華民國相關部門在事故發生後第一時間就發起救援及搶修工作，但是由於狹長的隧道與滑坡災害使得救援工作異常困難，造成49人罹難和309人輕重傷害的嚴重後果\n\n"
 ROC.79.a: "徹查事故原因，避免悲劇重演。"

 ROC.80.t: "花蓮 7.2 強震"
 ROC.80.d: "2024 年 4 月 3 日凌晨，台灣花蓮縣發生 芮氏規模 7.2 的強烈地震，震央位於花蓮近海，震源深度約 20 公里。此次地震是近年東台灣地區最嚴重的天然災害之一，對花蓮及鄰近縣市造成重大破壞。\n\n地震發生後，建築物倒塌、道路裂縫、橋樑受損，並引發多起土石流與山崩，導致交通中斷、供電中斷與水電設施損壞。初步統計，共造成 數十人死亡、數百人受傷，多處民宅與公共設施嚴重損毀，居民緊急疏散。"
 ROC.80.a: "向罹難者家屬表達哀悼"

 ROC.81.t: "颱風「丹娜絲」登陸嘉義"
 ROC.81.d: "2025 年 7 月 6 日，颱風 「丹娜絲」由南海北上，於下午登陸嘉義縣布袋鎮，造成台灣中南部地區出現 豪雨、強風與山洪暴發。颱風來勢強勁，最大風速達每秒 45 公尺，降雨量在部分山區累積超過 500 毫米，帶來大規模水患風險。颱風登陸後，中南部多地發生嚴重淹水，沿海地區出現風災與海水倒灌。嘉義、台南與雲林地區交通癱瘓，高速公路與省道多處中斷。初步統計，颱風造成至少 2 人死亡、數十人受傷，部分農作物及民房遭受損毀，民眾緊急撤離至避難所。\n\n在花蓮、台東等東部山區，由於連日豪雨與地形陡峭，部分河川如馬太鞍溪、秀林溪等 發生山崩與土石流，形成多處堰塞湖。部分堰塞湖水位快速上升，水壩潰堤風險極高。地方政府與水利單位立即展開疏散與搶險，強制疏散附近居民，防止次生災害造成重大傷亡。\n\n堰塞湖事件導致道路中斷，部分山區村落與農田被淹沒或受損，民生供水與電力一度中斷。中央與地方政府協調空勤、消防與工務單位，派遣挖掘機與搶險設備進行堰塞湖排水作業，並設置臨時安全通道。"
 ROC.81.a: "派遣救援部隊!"

 ROC.82.t: "清明"
 ROC.82.d: "四月的雨丝丝点点，郁郁葱葱地笼成一片蒙蒙的烟。\n\n老夏头少年时见惯了这雨，那时候，他仔细地去看那些弄影的青柳枝间隙时，还能见到细密的银针穿过去，缝在苍郁的地上，不像如今模糊。老夏头踩在着松软的春泥里，细密的雨丝穿过那些弄影的青柳枝，也穿过他的身子，把他缝在地上，弄得他身上痒丝丝的。他没带伞，这样的雨没必要带伞，一如他年少时在那片白云乡中自由的时光。\n\n今天清明节，他正去拜会几个经久不见的老友。几个小丘此起彼伏，几条小路弯弯绕绕，放在曾经，轻鞭快马，回眼望去，浅浅的草痕没不过他的足迹，只留下一串响在四面里欢畅的笑声。现在他正一步一步，踏踏实实地踩在这样松软的泥土上，相较曾经，他的脚步更沉稳了，也更能感受到这土地是何等的坚实——竟足以托起一副干枯的躯体，一个垂老下坠的心。"
 ROC.82.a: "物是人非事事休"

 ROC.83.t: "缘丘而上"
 ROC.83.d: "朦胧的视野里出现几个漆绿的点，渐而是团，最后是柱。那些是柳树，它们立在老夏头远远的视野里，柳丝轻抚，春风得意。柳下是更多的，凹凸不平的小土包，像许多倒着的大斗，前面树着几方缠着苔痕的碑。\n\n老夏头的脚步快了些，丘面并不陂陀，老夏头很顺利地下去了，点散在野的柳树也好像聚拢了一些。他提了酒，还有卤牛肉，他小时候作佃，只见东家吃过。东家的嘴巴一张一合，一盘卤牛肉就干净了大半，随之而来的是酒的臭味和一阵阵欢声笑语。他还记得那时东家心情好，给他赏了几片肉，最后他才知道，那不是卤牛肉，但往后的日子里他一直把那几片肉当卤牛肉。\n\n他立在那些静静地立在雨中，脚底下舒张的生命力蔓延到到他的头顶去。这滋味很令人怀念。这是年少的滋味。有温热从他脸上划过。他想家了。"
 ROC.83.a: "半晌"

 ROC.84.t: "欲语泪先流"
 ROC.84.d: "老夏头颤巍巍地从口袋里掏出几个白净的小瓷盏，一一放在自己眼前，贴着那些小土包，好像立了一堵透明的墙，墙外只留他孤身一人，墙里是众人的沉默；又像一条路，从记忆深处延伸到这些小土包里，横在老夏头身子前面。他斟酒的动作很慢，却很稳。他想起来还在军队的日子，那些抽中敢死签的大头兵，有些很豪气，有些哆哆嗦嗦，结果一碗酒干尽，都叫嚷着要和敌人拼个命，好像死这件事，在酒面前不值一提。\n\n他径自喝了一盏，辛、辣，而后是冲鼻子，他忍着咽下去，眼泪都憋了出来。他一向不喝酒，也不明白这东西是为何有如此大的魔力，但他仿着记忆里那些穿着军装的灰色的人影，一盏接着一盏，直到眼前天花乱坠，头脑发胀发昏才停下来。\n\n他端起那些斟满的酒盏，又摇摇晃晃地起身，一盏接着一盏地浇在那些小土包边上。雨丝跌在盏中，荡起淡淡的涟漪。做完这一切，他跪下去，重重磕了几个头，声音颤抖，几个不成音节的字从他嘴里蹦出来："
 ROC.84.a: "“弟兄们……小弟无能……还没替你们回大陆……替你们回家……”"

 ROC.85.t: "相见欢"
 ROC.85.d: "“……来了？”\n\n“……来了。”\n\n病房里苍白的墙面覆住无力远望的视线，外面的声音也被这墙涂上了马赛克，模糊不清——静极了。\n\n老夏头抽出那把病床旁的凳子坐下去，动作很轻，只牵动几缕和风惹得衣角骚动。老夏头听到心跳和沉重的呼吸声，但不知是自己还是床上人的。他展眼和床上人对视，却发现他的眼睛几乎眯成一条缝。印象里，他的眼睛不是这样的。\n\n“…你眼睛怎么了？”\n\n“我看不清你的样子了，人老了。”\n\n床上人的声音沉重，喉头似乎被什么堵住了，咬字时的发音连带着牙齿的颤动声。老夏头握住了床上人搭在白被上的手。他的手很凉，还粗糙，大小不一的茧子错落在宽厚的手上。手掌很厚实，老夏头得用两只手才能紧紧握住。\n\n老夏头喉头哽咽，眼眶里忽得温热起来，但他控制住了，只让泪水在心里划出伤痕。\n\n“你说这人，怎么说有事，他就有事了？我前几天走台北时你精神头还足，怎么这一回宜兰，就成这模样了…”\n\n"
 ROC.85.a: "十年生死两茫茫……"

 ROC.86.t: "……不思量"
 ROC.86.d: "他的声音颤抖起来。老张的另一只手搭过去，按在老夏头手上。他摇了摇头，似乎并不认可老夏头的悲伤。\n\n“人老了就是这样，身子弱，骨头脆，就算万千当心也会有这么一遭，不过有些人来得晚，有些人来得早罢了，这是小事。”\n\n“我活了这么大，仗，大大小小打了几百场，人，不三不四杀了几十个，死，我不怕，人总有一死…”\n\n老张眼睛瞥到别处，不去看老夏头。\n\n“只是，我没死到家里，没死到大陆，没再见我娘一面，没给她和我老爹尽孝，这真是我最大的遗憾…”\n\n老张声音渐渐弱下去，隐隐抽泣。他慢慢转过头看向老夏头，眼皮跳动，眼睛晃动。他正打量着老夏头。\n\n“…就这几天的事情了…老夏，我恐怕回不去了…”\n\n老张的声音有些颤抖，他的手紧紧按在老夏头的手上，额上挤出深深的沟壑，呼吸声愈来愈沉重。\n\n“但我不想埋在这里，我不想埋在台湾，老夏，这里不是我家，等我死后，我想求你把我的骨灰带回家里去，埋在那里，不要立碑，我没脸见后辈们……”"
 ROC.86.a: "更没脸见我爹娘在天之灵…”"

 ROC.87.t: "自難忘"
 ROC.87.d: "老张双眼眼角扯起来，嘴角下垂，呜呜地哭出来，好像一阵迅疾的风疯狂地吹打沙漠里一棵干枯到树。\n\n“老夏…我求你…兄弟就这一个愿望…”\n\n老夏头咬住嘴唇，舌头触到几丝腥味。他重重点头，握紧了老张的手，喉头紧缩，话到嘴边却说不出来，只能沉默地看着老张。\n\n“这就好…这就好…”\n\n老张慢慢抽开自己的手，脸上溢出幸福的笑，嘴里嘟囔着什么，声音越来越小，老夏听不清楚，只能紧紧握住他的手。过去一阵，病房里渐渐安静下来，和他刚进来时没有两样。\n\n他听见心跳声。他知道，这心跳声只能是自己的了。”"
 ROC.87.a: "老张咽气了"

 ROC.88.t: "青天濁"
 ROC.88.d: "黃先任眼神複雜的看著螢幕上傳來的倖存國軍將士們登上撤離載具的畫面。他知道，這一天終於是到來了，看來他不得不離開金門，這片他守護了不知歲月的國土，中華民國長達七十餘年的統治即將結束，對於金門國民的撤離已經先一步完成，還有部門國民不願離開故土，拒絕撤離，願與金門共存亡。\n\n“報告，金門留守國民，他們自發……”\n\n“自發什麼？”黃先任轉過頭來看著負責撤離的將官前來報告。\n\n“他們自發舉行了升旗儀式，並手舉國旗送別國軍同志們。”\n\n“讓他們送吧，金門經歷了共軍登陸，八二三砲戰，一直作為反共第一線，金門的歷史是曲折但光榮的，也許，這一次……”\n\n黃先任終是沒有說出口，也許這次撤離，是永別金門，中華民國也許自此與大陸完全劃分開來，血緣親情為紐帶的兩岸關係，已經隨共軍的炮火硝煙中化為無限的仇恨。\n\n“他們，他們把國旗倒掛過來了！”\n\n“什麼？！”"
 ROC.88.a: "白日降…"

 ROC.89.t: "政治禁令"
 ROC.89.d: "戰火甫起，島嶼迅速進入全面動員狀態。隨著飛彈威脅與登陸風險同時升高，政府高層開始關注另一條看不見的戰線——內部的政治穩定與安全風險。\n\n情報單位在戰前即已警告，極端意識形態組織可能在戰時環境中被激化，甚至成為滲透、煽動與破壞的潛在節點。無論是鼓吹極端民族主義與威權統治的法西斯主義團體，還是與對岸政權存在意識形態連結的共產主義組織，都被視為可能影響戰時團結與國家安全的不穩定因素。\n\n即日起，暫時查禁所有具有法西斯主義與共產主義性質之政黨與政治組織活動。"
 ROC.89.a: "...掃清叛徒"

 ROC.90.t: "動員預備役"
 ROC.90.d: "警報來得毫無預兆。\n\n在短時間內，大量飛彈自對岸升空，精準打擊港口、機場、鐵路樞紐與主要工業設施。爆炸與停電幾乎同時席捲全島，交通網絡陷入癱瘓，部分地區通訊中斷，工廠被迫停擺。\n\n恐慌與不安在初期蔓延，但也有越來越多人意識到，這不再是單純的威嚇行動。街頭出現協助指引交通的志工，企業開始配合政府調度，民間力量自發填補制度尚未恢復的空隙。\n\n盟友方面亦密切關注局勢。情報交換頻率顯著提升，區域內軍事動態急遽升溫。所有跡象都顯示，這場衝突正朝著無法逆轉的方向發展。\n\n中國的行動已經遠遠超出了軍事演習的範圍，現在全臺灣無論誰都知道:\n\n戰爭已經不遠了"
 ROC.90.a: "風暴將至..."

 ROC.91.t: "左翼的命运"
 ROC.91.d: ""
 ROC.91.a: "再来次412吧！"
 ROC.91.b: "吸纳他们"

 ROC.92.t: "右翼的命运"
 ROC.92.d: ""
 ROC.92.a: "你们谁啊？"
 ROC.92.b: "吸纳他们"
