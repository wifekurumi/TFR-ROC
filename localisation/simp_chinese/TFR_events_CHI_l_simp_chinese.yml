 taiwan.25.t: "美國第七艦隊留守台灣"
 taiwan.25.d: "隨著美國本土爆發內戰，外界廣泛關注美國海外軍事部署動向。近日，美國第七艦隊部分艦只繼續在台灣海峽附近活動，引發區域局勢進一步覆雜化。\n\n中國國防部發言人指出，美國國內局勢混亂，卻仍在台灣問題上制造事端，嚴重違反一個中國原則，幹涉中國內政，破壞地區和平穩定。發言人重申，台灣是中國領土神聖不可分割的一部分，解放軍保持高度戒備，堅決回擊任何挑釁行徑，維護國家主權和領土完整。\n\n第七艦隊方面則發布簡短聲明，稱其在印太地區的行動將\"維持常態\"，強調航行自由，並宣稱將繼續在國際法允許的水域開展活動。美國國防部強調，第七艦隊的任務\"不受國內局勢影響\"。\n\n專業人士批評第七艦隊繼續在台海周邊維持存在，增加了局勢的不確定性與誤判風險。"
 taiwan.25.a: "舊習難改"
 
 taiwan.26.t: "美國第七艦隊留守台灣"
 taiwan.26.d: "隨著美國本土爆發內戰，外界廣泛關注美國海外軍事部署動向。近日，美國第七艦隊部分艦只繼續在台灣海峽附近活動，引發區域局勢進一步覆雜化。\n\n中國國防部發言人指出，美國國內局勢混亂，卻仍在台灣問題上制造事端，嚴重違反一個中國原則，幹涉中國內政，破壞地區和平穩定。發言人重申，台灣是中國領土神聖不可分割的一部分，解放軍保持高度戒備，堅決回擊任何挑釁行徑，維護國家主權和領土完整。\n\n第七艦隊方面則發布簡短聲明，稱其在印太地區的行動將\"維持常態\"，強調航行自由，並宣稱將繼續在國際法允許的水域開展活動。美國國防部強調，第七艦隊的任務\"不受國內局勢影響\"。\n\n專業人士批評第七艦隊繼續在台海周邊維持存在，增加了局勢的不確定性與誤判風險。"
 taiwan.26.a: "舊習難改"
 
 taiwan.27.t: "台海緊張局勢升溫"
 taiwan.27.d: "今日沈寂已久的台海再度成為國際焦點。在蔡英文於2020年成功連任台灣地區領導人之後，解放軍迅速加強對台軍事壓力，並於2月9日至10日展開大規模繞台行動。據台方通報，解放軍出動近40架戰機進行編隊巡航，甚至有部分軍機短暫跨越台海中線，引發海峽兩岸高度戒備。\n\n此次軍事行動被廣泛解讀為蔡英文政府\"拒絕九二共識\"與堅持\"台灣主體性\"立場的強烈回應。台灣國防部第一時間出動戰機升空監控、驅離外機，國安系統進入高度戒備狀態。與此同時，台北當局呼籲北京方面應停止挑釁，恢覆兩岸和平對話機制。\n\n中國大陸則表示，這是對\"台獨活動\"與外部勢力幹涉的必要反制措施，旨在捍衛國家主權與領土完整。然而，這一舉動已在國際社會引發廣泛關注與不安。專家警告，若缺乏對話機制與危機管控路徑，台海地區將面臨長期不穩定的嚴重風險。\n\n"
 taiwan.27.a: "1962曾是古巴，2020則是台灣。"
 
 taiwan.28.t: "台海緊張局勢緩和"
 taiwan.28.d: "台灣2020年大選爆出冷門，國民黨候選人韓國瑜擊敗原被廣泛看好的現任領導人蔡英文，以些微優勢贏得勝選，成為新任台灣地區領導人。選舉結果一經公布，立即在島內外引發高度關注與震動。\n\n此次勝選被外界視為台灣民意劇烈波動的體現。經由專家分析指出，經濟民生困境、政治對立加劇及對現任政府兩岸政策的不滿，成為選民轉向保守勢力的關鍵原因。韓國瑜陣營則稱，此次勝利是\"人民對穩定與溝通的渴望\"。\n\n中國大陸對選舉結果表達\"積極評價\"，並釋放善意信號，表示願意在\"九二共識\"基礎上恢覆協商與交流。而台北方面則進入政治重組階段，民進黨高層已召開緊急會議。\n\n國際社會普遍對局勢保持關注，敦促台灣新政府維持現狀、保障區域和平。日、英等國政府則呼籲\"理性過渡\"，避免不穩定因素擴散至印太地區。"
 taiwan.28.a: "……天無絕人之路？"
 
 taiwan.29.t: "民進黨勝選引發大陸強烈反對 "
 taiwan.29.d: "隨著2020年台灣地區領導人選舉落下帷幕，民進黨候選人蔡英文宣稱勝選。有關部門隨即嚴正重申，台灣自古屬於中國，絕不容許任何\"台獨\"行徑分裂國家。\n\n國台辦發言人嚴厲譴責民進黨當局拒不承認\"九二共識\"，公然挑戰一個中國原則，嚴重破壞台海和平穩定。發言人強調，祖國大陸有堅定的意志、充分的信心和足夠的能力挫敗任何分裂圖謀，堅定捍衛國家主權和領土完整。\n\n北京方面指出，台灣問題純屬中國內政，任何外部勢力幹涉必將遭到堅決反制。大陸方面警告，任何\"台獨\"勢力與外部勢力的勾連與挑釁，都將遭到有力打擊。\n\n分析人士指出，盡管民進黨繼續頑固推進分裂立場，但歷史大勢不可逆轉，祖國統一是不可阻擋的，任何背叛民族的行徑必將以徹底失敗告終。兩岸關系的未來方向已由歷史和人民作出明確選擇。"
 taiwan.29.a: "持續關注台海局勢變化，堅定支持維護國家統一的一切正義行動。"
 
 taiwan.291.t: "美國國務院對台海聲明"
 taiwan.291.d: "在台海局勢再度緊張之際，美國國務院發表聲明，重申\"反對任何一方片面改變台海現狀\"的立場。聲明中強調，美國\"對台政策未變\"，繼續依據《與台灣關系法》與\"六項保證\"維持對台支持，並呼籲雙方\"保持克制，避免誤判\"。\n\n美國務院發言人表示：\"我們對近期台海區域出現的緊張態勢深表關切。我們重申，和平與穩定符合國際社會共同利益。敦促各方避免采取可能激化局勢的單邊行動，特別是使用武力或脅迫。\"\n\n第七艦隊部分艦艇\"例行性航行自由任務\"中繼續出現在西太平洋地區。盡管中方批評其\"幹涉內政\"，美方官員則表示，這些行動\"完全符合國際法，且與當前地區局勢無關\"。"
 taiwan.291.a: "華盛頓拒絕接受強力改變現狀！"
 
 taiwan.292.t: "特朗普宣布對台軍援"
 taiwan.292.d: "在台海局勢持續緊張之際，美國總統唐納德·特朗普在一場記者會上宣布，將向台灣提供\"規模空前的防御性軍事援助方案\"。該援助包括防空導彈、雷達系統、無人機及\"有限數量的反艦武器\"。特朗普表示：\"台灣正在為自由而戰，美國不會袖手旁觀。\"\n\n該聲明引發國際高度關注。相較於國會內部已出現跨黨派議員聲援，中國外交部對此表示\"強烈譴責\"，並警告美方\"不要玩火\"。\n\n五角大樓則表示，美方\"將評估相關轉交機制\"，但強調\"任何對台軍事支援都將基於防御性質，並符合現有法律框架\"。"
 taiwan.292.a: "這是對中國主權的侵犯！"
 
 taiwan.293.t: "佩洛西訪台引發地區震蕩"
 taiwan.293.d: "眾議院議長南希·佩洛西乘坐專機抵達台北，並在台北\"立法院\"發表演講。她在講話中強調美國\"支持台灣的民主制度\"，稱\"台灣不孤單\"，並呼籲深化美台關系。\n\n解放軍東部戰區隨後宣布，啟動\"環台島實戰演訓\"，多支海空兵力在台灣周邊展開大規模實彈演練，涵蓋聯合封鎖、突防打擊、區域拒止等多個科目。多枚導彈越過台灣本島上空，引發島內空防戒備升至最高等級。\n\n盡管白宮試圖淡化事件影響，稱\"此訪為議長個人行程\"，但國際社會普遍認為，這一事件標志著中美關系進一步惡化."
 taiwan.293.a: "風暴已至。"
 
 taiwan.30.t: "解放軍台海軍演加劇兩岸緊張局勢"
 taiwan.30.d: "隨著海峽兩岸勢持續緊張，解放軍近日在台灣海峽及周邊海空域組織大規模軍事演習。演習科目涵蓋聯合奪控、遠程打擊與海空協同作戰，實兵實彈演練強度為近年來罕見。\n\n國防部發言人表示，此次演訓是對當前台海局勢變化的必要反制，旨在捍衛國家主權和領土完整，維護台海地區和平穩定。發言人強調，針對\"台獨\"分裂勢力和外部幹涉行徑，解放軍將持續加強備戰練兵，堅決打擊一切挑釁。\n\n台灣方面則指責大陸\"加劇區域緊張\"，台防務部門稱已全程掌握相關動態，並提升戰備等級，以防\"不測事態\"。\n\n軍事專家指出，隨著近期兩岸關系明顯惡化，軍事對峙風險持續上升。解放軍的軍事施壓被視為對民進黨當局不斷推進\"漸進式台獨\"路線的直接回應，而台方在外部勢力支持下亦表現出強化抵抗的姿態。台海局勢短期內恐將維持高壓態勢，地區安全形勢不容樂觀。"
 taiwan.30.a: "我們將持續關注解放軍台海演訓動態。"
 taiwan.30.b: "此類措施旨在遏制台灣獨立企圖。"
 
 taiwan.31.t: ""
 taiwan.31.d: ""
 taiwan.31.a: ""
 
 taiwan.32.t: "最終……我們撐過了考驗！"
 taiwan.32.d: "經過數周激戰，面對太約部隊的頑強抵抗，解放軍攻勢已全面受阻，其擊潰我軍與政府的作戰目標宣告失敗。近日情報顯示解放軍正放棄占領區，但暫未公開以防解放軍突襲反攻。隨著日澳多方證實共軍正從包括金門在內的各戰線撤軍，總統府終於於黎明時分宣布民主力量獲勝。\n\n伴隨地面入侵部隊撤離，空軍與海軍也已停止所有軍事行動，天空與海域重新開放。滿目瘡痍的碼頭和機場正接收來自全球各地和太約盟友的人道主義援助。\n\n然而一切遠未結束。我們的城市化為廢墟，工廠遭摧毀，鐵路公路癱瘓，身為皇冠明珠的半導體產業更被徹底抹去。不僅如此，太約情報指出共軍此次慘敗極可能引發其國內政治動蕩，或將催生更具侵略性的領導層，在未來數年持續威脅我國民主自由。眼下，艱巨的重建任務正擺在面前。"
 taiwan.32.a: "而我們的人民正漫步於人生路之上。"
 
 taiwan.34.t: "國防部函"
 taiwan.34.d: "受文者：總統府\n速別：最速件\n主旨：我國國防現狀\n\n我軍阻止解放軍攻入台灣本島的主要目標已失敗。解放軍利用我方防御漏洞，現控制多個主要城市及港口，嚴重削弱我軍作戰能力。因首要目標未達成，戰鬥已無法局限於海岸線，我軍被迫轉入城市及山地作戰。\n\n解放軍現已推進至環繞剩餘城市與山脈的第二防線，覆雜化的城市及山地環境可轉為防御優勢。國軍陸軍已在解放軍控制城市外圍建立防御陣地，更有能力阻滯其後續推進。\n\n太約組織在此次沖突中亦傷亡慘重，意外地對軍民心理產生雙重沖擊。在確認太約部隊確為並肩戰友後，民間志願人員正大量投入防御工事構築與後勤支援。此舉顯著提升士氣與防御效能，據指揮官報告，地面部隊作戰意願與戰備狀態已達歷史高點。"
 taiwan.34.a: "我們一定會贏的……"
 
 taiwan.35.t: "餘波"
 taiwan.35.d: "上午6:27。\"[防空警報]敵機空襲台灣各地區，請就近避難。\"\n學校突然停課的第四周，凱智理再次被刺耳的空襲警報聲吵醒，窗外陰雲密布，仿佛隨時會落下炸彈。三架F-16戰機呼嘯著升空攔截，幾乎蓋過了警察的喊聲：\"別搭電梯，走樓梯！\"\n\n上午6:50。\"[防空警報]台灣地區防空警報於06：50解除，發現不明物體請通報警消。\"\n轟鳴聲停止，避難者們井然有序地走出，開始他們的戰時日常。凱匆忙趕往他工作的全家便利店，為上午8點的班次做準備。十幾名顧客已經在外面等候，手里拿著紙幣、硬幣和政府發放的食物券。今天一切如常——除了他被告知要訓練實習生如何整理用過的票卷。\n\n下午2:00。\"中央氣象局日照時間通知——今天充足日照直到下午6:35。\"\n\"陳經理——把這些打印100份並分發下去。政府要求的。PA20018583.pdf。\"兩個小時前，當陽光穿透雲層時，他還抱有一線希望，但中央氣象局的更新證實了——今天沒有短班。他失望地讓實習生去打印傳單，而他短暫休息後回到收銀台。\n\n下午6:50。\n為節省帶寬與電力，民用網絡開始限流。雖然實施汽油配給後車輛已很稀少，但路燈仍會短暫亮起防止事故。凱步行回家時，發現了一個綠色迷彩桌布的攤位——像學園祭上的那種。他好奇地走上前去。攤位經理向他招手。\"我們正在組織民防小組，\"他說。\"加入我們的培訓項目就可以學習識別未爆彈藥（UXOs）和處理傷員，以支援我們的消防和醫護人員。\"\n\n下午6:52。\n凱拿起一本小冊子讀了起來。政府資助、自願性質、不涉及武器、不是民兵或炮灰部隊。常見問題解答欄目回答了他大部分問題。他停頓了一下，深吸一口氣。"
 taiwan.35.a: "\"我該什麼時候開始工作？\""
 
 taiwan_detente.0.t: "國民黨贏得台灣選舉"
 taiwan_detente.0.d: "近期，在我方社交媒體平台上廣泛傳播、引發熱議的話題，莫過於台灣地區地方選舉的結果。此次選舉中，民眾選出韓國瑜擔任該分裂地區的行政負責人。有人對此表示慶祝，認為是對激進\"台獨\"勢力的一次有力否定；也有部分網友質疑該次\"地方選舉\"的合法性。\n\n國台辦對這一結果並未作出過多評論，僅重申所謂\"總統選舉\"不過是台灣地區的一次地方選舉，外部勢力不應幹涉中國內政。不過，據傳政府內部部分人士對於國民黨的勝選持謹慎樂觀態度，認為該黨在立場上較傾向於與我方溝通合作，有助於維持兩岸關系的溫度。盡管對韓國瑜是否真心致力於恢覆兩岸聯系仍存疑慮，但在民進黨下台的背景下，整體對話的推進至少將會更加順暢。"
 taiwan_detente.0.a: "我們希望他們能夠明辨是非。"
 
 taiwan_detente.1.t: "向大陸伸出橄欖枝"
 taiwan_detente.1.d: "隨著選舉塵埃落定，內閣人事底定，我們終於可以著手處理國家事務。當前議程中最重要的一項，就是終結蔡英文政府與大陸\"保持距離\"的兩岸政策。這一政策不僅嚴重沖擊了本地觀光與農業產業，大陸方面也因應多次祭出禁令，限制部分商品輸入，並加強對陸客來台的控制，致使遊客數量銳減，直接影響民生。更令人憂心的是，中共多次對民進黨政府發出強硬警告，令社會陷入不安與焦慮。\n\n為扭轉現狀，陸委會將以修覆兩岸關系為首要任務。我們將重啟對話，籌劃高層會晤，全力嘗試釋出善意，希望大陸方面能夠回應和平之意，重回合作共贏的道路。"
 taiwan_detente.1.a: "兩岸互動的新時代。"
 
 taiwan_detente.2.t: "國民黨政府尋求和解"
 taiwan_detente.2.d: "我們近期獲悉，自從激進\"台獨\"政黨掌權以來幾近停擺的台灣陸委會，已通過海峽交流基金會主動與我方接觸，表達重建兩岸外交聯系的意願。據悉，對方已有數位代表與我方進a行初步溝通，商討籌備未來更具正式性與全面性的會談。我方對此作出積極回應，國台辦已私下核準數位台灣代表入境的外交許可，但目前尚未對外發布進一步評論，以待雙方尋求更多共識後再行公布。\n\n盡管我們對台灣和平回歸的前景並不抱有過高期待，但仍希望此次會談能作為契機，促使台灣人民重新認識兩岸骨肉相連的兄弟情誼。"
 taiwan_detente.2.a: "好的。"
 
 taiwan_detente.3.t: "通往和平的基石"
 taiwan_detente.3.d: "陸委會的和平事務團隊帶來了好消息！海基會已成功與大陸的海協會取得聯系，顯然是在國台辦默許下進行的接觸，並就未來會談建立了初步共識。其中一項重要內容，是本屆政府表達了對\"九二共識\"持開放態度的立場。自李登輝時代以來，\"九二共識\"一直是兩岸和平交流的基礎，包括馬習會在內的重要會談，也都建立在這一共識之上，其意義可追溯至1945年的重慶談判。\n\n借由來自對岸的善意，我們將開始籌備更多開放性的基層交流活動，以緩和島內的反中情緒，為未來更高層次的政治與經濟峰會奠定基礎。我們也會吸取《兩岸服務貿易協議》推進失敗的教訓，避免再次激發強烈的反中情緒——當年正是這種情緒，為反對派掀起2014年\"太陽花運動\"提供了土壤。"
 taiwan_detente.3.a: "好！"
 
 taiwan_detente.4.t: "廈門會議"
 taiwan_detente.4.d: "在對岸同仁積極回應之後，內政部與陸委會迅速展開行動，努力打破與大陸之間的堅冰。最新民調顯示，三分之二的受訪者支持或不反對重啟對話。在總統府的授權下，陸委會代表啟程前往廈門，並得到了大陸官員的熱情接待。\n\n此次會談成為各大媒體關注焦點，三項重要成果尤為矚目：會議盛大開幕、此前因蔡英文政府對陸敵意政策而遭到報覆性禁止的多項農產品恢覆輸入、以及關於新冠病毒最新情況的討論。大陸方面也同意在防疫事務中擔任中介角色，協助傳遞世衛組織的相關信息，並同步轉達我方通報。\n\n本次會談被外界廣泛視為馬總統執政團隊的重要突破，陸委會方面也已規劃後續多輪交流。與此同時，大陸代表團預計不久將訪問金門，推動兩岸旅遊合作，也進一步鞏固金門作為國民黨在離島的重要支持據點。"
 taiwan_detente.4.a: "未來一片光明。"
 
 taiwan_detente.5.t: "台灣自由行"
 taiwan_detente.5.d: "\"請注意，飛往台北的BR721次航班即將登機，這是最後登機廣播。尚未登機的乘客請立即前往3號登機口。\"\n\n廣播聲在航站樓回蕩時，黃福基正氣喘籲籲地奔向3號登機口，手中緊握著護照與登機牌。簡單核對後，他登上了飛機。\n\n引擎轟鳴，地面逐漸遠去。他打開手機，查看從國台辦網站上截取的頁面，仔細閱讀赴台自由行的注意事項與禁忌。作為一位習慣事前籌劃的旅客，他為此趟旅程制定了精確到分鐘的行程表，同時也基於過往經驗預留了充足的緩沖時間。\n\n抵達台北後，當地機場電視正播放著關於\"上海會談\"成功舉行的新聞，宣布大陸恢覆個人赴台遊。然而黃福基對此並不關心——他的目光緊盯著行李提取信息，心里只想著即將展開的旅程。\n\n夜幕低垂，他入住的是七年前住過的那家酒店。不同的是，這一次沒有導遊、沒有喧鬧的旅行團、沒有被催促的節奏。明日清晨，他將前往傳統菜市場與木柵動物園，期待一睹熊貓與其他珍稀動物的風采。"
 taiwan_detente.5.a: "旅途愉快。"
 
 taiwan_detente.6.t: "新加坡會談開幕"
 taiwan_detente.6.d: "在新加坡的極力促成下，大陸與台灣地區代表近日在新加坡正式展開會談，就兩岸關系發展相關議題進行協商。此次台灣方面由中國國民黨代表出席，大陸方面則由國務院台灣事務辦公室代表組成代表團。\n\n雙方本著平等協商、互相尊重、擱置爭議、求同存異的原則，就兩岸經貿合作、人員往來便利化、區域和平穩定等議題進行了深入溝通，並在多個領域達成初步共識。會談氣氛坦誠積極，展現出重啟交流、改善關系的共同意願。\n\n新加坡外交部表示，歡迎雙方選擇在新加坡作為中立場地對話交流，並希望此次會談有助於緩解緊張局勢，推動地區和平穩定。"
 taiwan_detente.6.a: "看看他們會談些什麼。"
 
 taiwan_detente.7.t: "兩岸統一議題迫在眉睫"
 taiwan_detente.7.d: "在美國內戰局勢惡化之前，國際外交格局已顯現明顯的變化跡象。隨著美國國內社會分裂日益加劇，政府運作頻頻受阻，其在國際事務中的影響力持續衰退。\n\n在這一背景下，中國大陸加緊掌控周邊局勢。與此同時，台灣內部也出現了多元聲音，一些主流政黨呼籲重新審視兩岸關系的走向，以避免在國際力量重組中被邊緣化。\n\n不久之後，隨著美國內戰正式爆發，美國政府的對外幹預能力驟然下降，亞太地區的安全局勢出現了重大空缺。中國大陸明確表示，將堅定不移地推進國家統一進程，堅決反對任何形式的分裂行徑，強調維護國家主權與領土完整的決心絕不會動搖。\n\n在台灣，面對政局動蕩，國民黨等主要政治力量呼籲以更務實的態度面對兩岸現實，主張通過和平談判尋求新的安排。"
 taiwan_detente.7.a: "分裂要結束了？"
 
 taiwan_detente.8.t: "新加坡兩岸會談提出統一議程"
 taiwan_detente.8.d: "本周，來自中國大陸和台灣的代表團在新加坡政府的協調下舉行了新一輪談判。此次會談正值美國內戰、亞太局勢深刻變動之際，因而引發國際社會的廣泛關注。\n\n在會談過程中，大陸代表團正式提出加快推進兩岸統一進程，呼籲建立常態化溝通機制，並就統一框架展開實質性對話。代表指出：\"實現祖國完全統一是十四億人民的共同心願，也是中華民族偉大覆興的關鍵一步\"，強調應把握當前的歷史機遇。\n\n由中國國民黨領導的台灣代表團則持謹慎態度。台方重申致力於和平處理兩岸關系，但對統一議題持\"開放但保留\"的立場，強調必須維護台灣民眾的生活方式、社會制度與核心利益。\n\n這是多年來統一議題首次作為正式議程重返兩岸談判桌。盡管前路充滿不確定性，但此次對話本身已具有重要的戰略意義。"
 taiwan_detente.8.a: "兩岸統一是必然趨勢。"
 
 taiwan_detente.9.t: "新加坡會談破裂"
 taiwan_detente.9.d: "在新加坡舉行的兩岸會談於今日宣告中止。雙方在統一議題與政治安排上的關鍵分歧始終未能縮小，會場氣氛一度緊張，最終未發布聯合聲明。\n\n大陸代表團在會中強調，當前國際格局劇烈變化，兩岸應抓住戰略窗口期，推進統一進程。大陸方面提出設立聯絡機制並商討統一路徑草案，重申\"和平統一是最大誠意，不排除必要選項\"的政策立場。\n\n台灣方面則明確拒絕進入任何涉及統一議程的階段性協商。國民黨主導的代表團，稱現階段\"缺乏島內共識\"，並對大陸在會中強調\"一國框架\"表達嚴重關切，要求\"先處理現實接觸、建立互信\"，再談後續安排。\n\n閉門會議持續不到兩小時即告中斷，雙方未安排媒體簡報，代表團分別提前離場。\n\n新加坡外交部對此表示遺憾，呼籲雙方保持溝通渠道暢通，並避免言語升級和誤判風險。"
 taiwan_detente.9.a: "至少我們盡力了。"
 
 taiwan_detente.10.t: "最終抉擇"
 taiwan_detente.10.d: "中南海深夜，習近平獨坐勤政殿辦公室。案前攤開的泛黃台灣海峽地圖上，淩厲燈光將海界線照得如同歷史裂痕。\n\n總參謀部與中央軍委的匯報反覆確認：和平統一的關鍵窗口期已然消逝。島內民意深度撕裂，外部幹涉持續加劇。再等，將徹底喪失戰略主動。\n\n十年來，他始終避免對抗，謀求穩定的國際秩序，化解風險。但時間，此刻卻成了最兇險的敵人。統一不再是政治選項，而是關乎國家完整與未來的存亡抉擇。他清楚代價——戰場犧牲、經濟震蕩、國際壓力乃至重大政治風險。但歷史不會等待。\n\n\"風險？\"他望向夜色，\"革命年代，我們的同志哪次前進不冒風險？\"中南海的空氣仿佛凝固，舉國目光似都聚焦於此。\n\n\"命運只留下這條單行道。\"\n\n\"準備下一階段行動。\""
 taiwan_detente.10.a: "歷史的大門已然敞開。"
 
 taiwan_detente.11.t: ""
 taiwan_detente.11.d: ""
 taiwan_detente.11.a: ""
 
 taiwan.500.t: "最終決戰"
 taiwan.500.d: "在數周可疑的東協動向以及中日冷戰緊張局勢不斷升級達到新高峰後，許多國際觀察家預計熱戰即將爆發。盡管太約組織加強了外交斡旋試圖緩和局勢，但北京和東京均已宣布兩大陣營進入戰爭狀態，我們被迫再次為生存而戰。\n\n當所有外交努力徒勞無功，亞太地區最激烈的區域沖突已在我們眼前展開。這場人類迄今規模最大的戰爭將波及30多億人口，現實而言我們無法指望中方會像以往那樣退讓。要麼太約徹底摧毀中國的戰爭機器及其重啟沖突的能力，要麼東協將推進征服亞洲其餘地區。\n\n對我們而言，這是本世紀第二次面臨存亡威脅。這個曾受挫卻未屈服的新中國政府，在覆仇主義情緒和亞洲新盟友的驅動下，必將像2021年那樣試圖顛覆我國政府、摧毀民主制度。為確保我們的未來，我國決定投身大亞洲戰爭，與民主盟友並肩作戰，一勞永逸地擊敗北京領導的邪惡聯盟。"
 taiwan.500.a: "我們上吧！"

 ROC_CHI.2.t: "平民"
 ROC_CHI.2.d: "中國軍隊的導彈和戰機已經連續轟炸好幾天，台中市區的電力早斷了，水也停了，醫院只能靠最後幾台發電機茍延殘喘。陳建宏坐在父親的病床邊，手裡緊握著一張泛黃的全家福。那是五年前中秋節拍的，右邊父親還笑得開懷，中間的自己剛畢業，左邊的母親帶著幸福的笑容。可面前現在只剩一張沒有血色的臉。父親的肺癌本來就越來越糟，戰爭爆發後，化療藥早就斷貨，止痛藥也只剩半瓶嗎啡。病房裡瀰漫著消毒水混雜屎尿和血腥的味道，隔壁床的阿伯剛斷氣，護士連擡出去的力氣都沒有，只能用床單蓋住，等空襲間隙再處理。\n\n「爸，我去樓下找點吃的回來，你撐一下。」陳建宏低聲說，聲音乾澀得像砂紙。他站起來的時候腿都在發抖。失業已經快一個月了，原本在精密機械廠上班，戰爭一打，工廠直接被飛彈炸成廢墟，老闆跑了，同事死的死、逃的逃。家裡存款早燒光，母親前天去排隊領救濟米，可惜遇上了解放軍的飛彈攻擊，最後被人潮踩死。\n\n走廊上擠滿傷患和家屬，有人抱著斷肢哭喊，有人呆坐牆角發楞。樓梯間的玻璃全碎了，風灌進來時夾雜遠處爆炸的悶響和焦味。陳建宏小心避開地上的血跡和碎玻璃，腦袋裡只有一個念頭就是至少讓父親吃一口熱的，讓他不至於餓死。\n\n他剛踏出醫院大門，夜風像冰刀似的吹在他臉上。忽然天空亮起一道刺眼的火線，下一秒，巨響撕裂耳膜，整個世界晃動起來。醫院東翼直接被命中，火光衝天，鋼筋混凝土像紙片一樣飛散。人群的尖叫，哭喊和建築的崩塌聲混成一片。\n\n陳建宏被氣浪掀倒，臉貼在地上，滿嘴的泥土和血。他爬起來，雙眼空洞望向剛才還亮著微弱燈光的病房大樓。現在那裡只剩半邊，火舌從斷裂的樓層舔出來，像怪獸般的吞噬一切。他知道父親在那裡，也知道自己剛剛才離開那張病床和死神擦肩而過。「爸……」聲音被爆炸的餘波吞沒。\n\n煙塵還沒散盡，遠處傳來靴子踩碎玻璃的急促腳步。一隊穿著迷彩、臂上綴著青天白日徽的後備軍人衝過來，手裡拿著名單和手電筒搜尋能找到的幸存者。他們神情疲憊，眼中帶滿血絲不敢有一絲怠慢「你！身分證！」領頭的班長一把抓住陳建宏的胳膊，力道大得像鐵鉗。陳建宏沒有掙紮，他只是又看了一眼燃燒的醫院，火光映在他瞳孔裡，像兩團永遠熄不滅的恨。"
 ROC_CHI.2.a: "隨後他轉頭目光冰冷的看向海對岸的方向"

 ROC_CHI.3.t: "無言傾訴的遺憾"
 ROC_CHI.3.d: "夕陽西下，斜斜的陽光照舊灑落在這塊小小的彈丸之地上，此時通常是高中生放學的時候，三三兩兩的情侶手牽手，襯衫包裹青澀的情感與愛意。朱敏宣永遠記得那個男生的手，每次鐘聲一響，她總是一把抓起書包衝向校門，為的就是能夠第一時間找到他。\n\n敏宣總是盼著能跟他永遠逃離這個考卷跟課本構成的囚籠，她放下沙包，舉起袖子擦了擦汗，當年白色的學生服成了綠白相間的野戰軍服。敏宣以一種令她怎麼想也沒想到的的方式回到她的母校，當年學測失利的她被家人送入軍校入伍，那位男生北上讀書去了，相隔兩地過後兩人很少再聯絡，不知道他過的怎麼樣？\n\n她在學校各個出入口堆好大量沙包，奉連長之命清出剩餘教室的課桌椅，一部分搬到臨時連指揮部、剩下的當作街壘扔到路上充當路障。天色漸漸黯淡，最後一間教室終於整理完了！敏宣長舒一口氣，餘光卻在桌椅堆瞥到一抹異樣的白，在微弱的路燈下是如此顯眼。她撿起那個東西，是一封信，上面只寫了三個歪歪扭扭的大字：給敏宣\n\n敏宣知道自己不應該在備戰之時閱讀書信，但她還是忍不住拆開信封，裡面是熟悉的字跡，每次抄作業時她都沒少抱怨過這種瀟灑的「文筆」。\n\n讀到一半，敏宣發現大半信件早已濕透，淚水和汗水混雜著情感在此刻宣洩而出，當年來不及表達的情感現在才被發現⋯⋯\n\n導彈落地的爆炸將她狠狠甩到牆上，她無力地攤在地上、手中信件滑落、視野染上一層暗紅、敏宣的意識逐漸模糊……過去因為害羞而不敢坦承的愛意...可能也永遠無法得到兌現"
 ROC_CHI.3.a: "時代的灰塵，是一個人頭上的一座山"

 ROC_CHI.4.t: "查禁"
 ROC_CHI.4.d: "夜色壓低在城市上方，街燈一盞盞亮起，卻照不透巷弄深處的陰影。消息在傍晚傳開——台灣人民共產黨被正式取締，多處據點同步遭到搜索，相關人員被帶走調查。名單沒有公開，但傳聞已經在圈內迅速擴散。\n\n吳榮元坐在辦公室裡，窗外的車流被雨水拉成模糊的光帶。他沒有開燈，只讓桌上的檯燈照著文件，指尖停在紙面上，沒有翻頁。\n\n「動作太快了。」他低聲說。\n\n這場行動以國安為名展開，程序嚴整、節奏緊密，幾乎沒有留下縫隙。表面上針對特定組織，但在他看來，範圍顯然不只如此。那些長期處於邊緣地帶的人，忽然之間都變得顯眼起來。\n\n桌上的手機亮了一下，是訊息，又很快暗下去。他沒有去看，只是把手收回來，靠在椅背上。窗外傳來警車的聲音，短暫又清晰，隨即遠去。辦公室裡只剩空調運轉的低響。\n\n他重新坐直，開始整理桌上的文件，把幾份資料分開放好。動作不急，但很有條理。\n\n「局勢在變。」他說，像是在確認一件已經發生的事。"
 ROC_CHI.4.a: "風聲越來越緊"

 ROC_CHI.5.t: "立法院"
 ROC_CHI.5.d: "立法院內原本就不平靜。主席台被在野黨立委占據，標語與文件散落四周，擴音器反覆傳出抗議聲。這樣的對峙已經不陌生，只是這一天，界線開始鬆動。\n\n外圍的人群迅速聚集。最初只是零星喊聲，很快連成一片。幾處出入口同時出現推擠，安保人員試圖維持秩序，卻被不斷增加的人流擠開。門被推開，人群湧入，聲音在大廳裡放大回響。\n\n議場內的距離被壓縮。原本隔著桌椅與程序的對抗，轉為面對面的拉扯。有人高聲指責，有人試圖阻擋，更多人被推著向前。手中的文件被扯落，標語倒下又被踩過，現場逐漸失去原有節奏。\n\n主席台周圍最先崩解。幾名占據者被強行拉開，有人跌倒，有人被人群推離原位。短暫的反抗很快被更大的力量吞沒，場面變得混亂而直接。\n\n媒體鏡頭在邊緣記錄這一刻。畫面裡沒有清楚的分界，只有交錯的人影、斷續的喊聲，以及不斷移動的焦點。有人憤怒，有人猶豫，也有人只是站在原地，被氣氛推動。\n\n議場的秩序在短時間內瓦解。原本依靠程序維繫的結構消失，只剩下人群本身的力量在運作。\n\n聲音仍在持續，沒有人能確定接下來會如何收場。"
 ROC_CHI.5.a: "亂死了"

 ROC_CHI.6.t: "清算"
 ROC_CHI.6.d: "夜幕壓下來時，城市沒有安靜。各地街頭開始聚集人群，聲音一層層疊上去，像從地面湧出的回響。戰後的廢墟還未清理，牆面斑駁、路燈忽明忽暗，卻很快被新的動作填滿。\n\n紀念設施最先成為目標。幾座銅像在繩索與人力的拉扯下傾斜、倒下，金屬撞擊地面的聲音在夜裡傳得很遠。玻璃被打碎，石材剝落，原本安靜的場域被迅速改變，留下散落一地的碎片與標語。\n\n人群持續向外擴散。旗幟、口號與燈光交錯，有人高聲呼喊，也有人沈默地跟隨。情緒在不同人之間傳遞，從壓抑轉為直接，從觀望轉為行動。\n\n另一側，政治機構與相關據點同步出現變化。公告被貼上門口，封條覆蓋舊有標誌，出入口被接管。部分人士試圖離開，卻在街口被攔下，爭執迅速升溫，推擠與喊聲交織在一起。\n\n更遠的地方，墓園也未能維持原狀。石碑被移動、翻覆，供品散落，現場的人群來去不定，有人停下腳步，也有人繼續向前。\n\n警笛聲斷續響起，卻難以覆蓋整體的喧嘩。整座城市像被同一股力量牽引，各種聲音在夜色中彼此碰撞。\n\n沒有人宣布結束。動作仍在延續，範圍也在擴大。"
 ROC_CHI.6.a: "一切正在改變"

 ROC_CHI.7.t: "左翼聯盟"
 ROC_CHI.7.d: "戰火蔓延之際，台灣左翼陣營出現罕見整合。勞動黨主席吳榮元、帶有毛派背景的代表陳信行，連同多個左翼團體與工運組織，宣布重組為『台灣左翼聯盟』，並發表聯合聲明，公開支持抗戰動員。\n\n台北一處勞工文化中心低調舉行發布會。出席者包括各派左翼代表、工會幹部，以及白色恐怖受難者家屬與社運人士。場內氣氛壓抑而集中，言語克制，卻指向同一個目標。\n\n吳榮元宣讀聲明，聲音沙啞卻穩定：「面對軍事侵略與戰爭壓力，左翼不能再分散。過去關注階級與勞權，現在必須共同承擔防衛責任。反戰並不等於放棄抵抗，在現實面前，我們選擇保護這片土地上的人民。」\n\n陳信行接著發言，語氣冷靜：「我們長期反對帝國主義與資本壓迫，也批判各種權力結構。但當外來武力直接威脅人民生存時，沈默不再是選項。」他略微停頓，補充道：「這場抵抗，對我們而言首先是人民自保，而不是意識形態的勝負。」\n\n聯盟隨後公布行動方向：協助後備動員、建立勞工支援網絡、維持基本民生，同時監督戰時資源運用，避免權力失衡。對內則明確反對投降與破壞行為。\n\n消息傳出後，社會反應分歧。有人視為跨陣營的戰時整合，也有人質疑立場轉變過於急促。街頭與集會現場，左翼標語與防衛口號並列出現，彼此之間仍帶著張力。\n\n會後，陳信行在簡短訪問中說：「立場可以辯論，但前提是人還活著。」"
 ROC_CHI.7.a: "我還以為他們會當帶路黨呢"

 ROC_CHI.8.t: "民主聯軍？"
 ROC_CHI.8.d: "黎明前的桃園國際機場仍亮著跑道燈，一架接一架航班降落。最先出現的是一支名為『觀察與評估』的國際小組——成員來自日本、澳洲與歐洲，多是退役將領、情報人員與政策顧問。他們穿著低調的防護裝備，攜帶衛星通訊與偵察設備，沒有旗幟，卻帶著明確任務。領隊馬修·李與接應官員簡短交談後，隨即被護送離開，直赴指揮中樞。\n\n南方的高雄港，同時迎來另一批人。掛外籍旗的貨輪緩慢靠岸，艙門打開後走出的不是貨物，而是一支混合戰鬥團隊——來自東歐戰場的退役志願軍、東南亞私人安保人員，還有少數抱持強烈政治立場的歐洲志願者。他們裝備各異，語言混雜，領隊「雷克斯」語氣乾脆，只留下兩句話：「我們不屬於任何一方，但會作戰。」\n\n機場另一側，人流變得更零散。自發前來的志願者陸續入境，有人曾在中東或東歐作戰，也有人只是帶著裝備與信念抵達。背包裡塞滿夜視器材與醫療用品，臉上則是各自不同的理由。臨時設立的登記中心迅速運作，發證、編組、分流，一切在混亂中勉強維持秩序。\n\n部分政治團體也現身接機，口號與立場交錯，短暫引發騷動，又很快被現場維安壓下。\n\n總統府的聲明語氣克制，只提到「感謝選擇站在台灣一側的人」。同時，臨時法規已啟動——志願者被納入戰時體系，提供基本保障；受雇人員則以合約形式編入特定任務單位。\n\n街頭的反應並不一致。有人稱這是國際支援的象徵，也有人質疑局勢正在失控。只是到了前線，情緒變得單純得多——當不同語言的士兵並肩挖掘掩體時，疲憊中多了一點不那麼孤立的感覺。"
 ROC_CHI.8.a: "國際縱隊也來了？"

 ROC_CHI.9.t: "黑夜"
 ROC_CHI.9.d: "臺中的夜空被撕開，導彈飽和打擊過後，港區成了一片燃燒的廢墟。濃煙隨海風翻湧，刺鼻氣味壓得人幾乎無法呼吸。陳浩然從倒塌的貨櫃後撐起身子，耳中仍在嗡鳴，他擡頭望去，遠處機群尚未散去，引擎低吼在夜裡迴盪。\n\n張凱倫握著焦黑的步槍，手臂被彈片劃開，血沿著槍身滴落。「海軍陸戰隊撐不住了……直升機已經進內港。」她的聲音乾裂。\n\n李欣怡跌跌撞撞地跑來，懷裡的通訊機只剩雜音：「指揮部失聯，民防隊也散了。」她擡頭，眼裡既驚惶又倔強。\n\n忽然，空中傳來刺耳的呼嘯。白色傘花在火光映照下接連綻開，像從黑暗中墜落的影子。許子豪躲在斷牆後，盯著那些緩慢下沈的身影：「他們直接空降進市區了。」聲音壓得很低。\n\n街角的翻覆計程車旁，楊芷萱抱著受傷的母親躲進陰影，呼吸顫抖卻不敢出聲。她握緊手中的鐵管，指節發白。\n\n另一側，王承恩帶著幾名後備役守在炸毀的橋墩後，彈匣所剩無幾，呼吸急促。「再退一步，臺中就守不住了。」他低聲說，語氣幾乎逼近失控。\n\n降落傘接連落地，靴聲與槍聲同時響起。火舌撕開黑暗，街道深處傳來爆炸與崩塌的回響。\n\n「不能讓他們站穩！」陳浩然猛然起身，扣下扳機。槍火在黑夜中閃動，他的視線死死鎖住空中一個尚未落地的身影。子彈劃過夜色，那人影在空中失衡，直墜進燃燒的港區。"
 ROC_CHI.9.a: "正被烈焰吞噬"

 ROC_CHI.10.t: "迷惘"
 ROC_CHI.10.d: "高雄港外圍，一處被炸塌一半的倉儲區，鋼骨裸露在夜色裡。火還在遠處燒，橘紅的光時明時滅，把整片廢墟照得忽暗忽亮。海風吹進來，帶著鹹味，也帶著焦味。\n\n三排九班縮在斷牆後休整。班長劉承業把步槍立在身旁，手指在彈匣上來回敲著，像在確認還剩多少子彈；列兵趙子昂坐在地上，背靠水泥塊，盯著自己靴子上的血跡發楞，那血不是他的。通訊員何嘉豪蹲在一旁，反覆調整電台旋鈕，耳機裡卻只剩斷續的雜音。\n\n「連部還沒回？」劉承業沒有擡頭。\n\n何嘉豪搖了搖頭：「只聽到幾段斷訊，說要繼續推進，之後就沒了。」\n\n趙子昂忽然開口，聲音發乾：「班長，我們今天到底拿下了哪裡？」他頓了一下，又補了一句，「白天那條街，我們走過去，又退回來……人卻少了一半。」\n\n劉承業沒有立刻回答。他看著遠處還在燃燒的貨櫃區，過了幾秒才說：「任務是清理港區阻力，打通通道。」語氣平直，像在背條令。\n\n趙子昂笑了一下，笑得很短：「可我只記得誰倒在我旁邊。」他低頭看手，「他們說這是統一，是必要的，可這裡的人也在拼命。」\n\n何嘉豪把耳機摘下，壓低聲音：「宣教裡說得很簡單，落地才知道不是那回事。」他看向兩人，「我們甚至不知道前面還有沒有自己人。」\n\n遠處突然傳來幾聲槍響，三人本能地壓低身子。沈默重新落下來。劉承業終於坐下，背靠斷牆，語氣比剛才更低：「命令沒有變，我們還得往前。」\n\n趙子昂沒有再問，只是把頭埋進臂彎。何嘉豪把電台關掉，省下一點電。\n\n黑暗裡只剩火光閃動。過了很久，劉承業低聲說了一句，像是在問別人，又像是在問自己：「如果前面什麼都沒有，我們還要走多久？」"
 ROC_CHI.10.a: "繼續推進"

 ROC_CHI.11.t: "民族陣線"
 ROC_CHI.11.d: "高雄一處由舊軍事倉庫改建的會議室裡，燈光昏暗，牆面仍留著焦黑痕跡。長桌中央攤著一份染血的公開宣言，墨跡混著灰塵，簽名歪斜卻沈重。陳信豪低頭看著那些名字，想起港區被導彈擊中的畫面，神色愈發冷硬。\n\n王興煥站在窗邊，遠處港口殘骸仍在悶燒。他低聲說：「親眼看見家園被炸成這樣，我們已經沒有退路。」語氣壓抑，卻清晰。\n\n周倪安撐著桌沿起身，拍去袖上的灰塵：「從今天起，不再各自為戰。我們要組成真正能守住台灣的人。」聲音不高，卻讓室內瞬間安靜。\n\n吳欣岱提筆，在宣言末尾落下名字。他環視四周——街頭運動者、退伍軍人、基層代表——每張臉都帶著疲憊與決絕。「內鬥與退讓已經沒有意義，再遲疑，只會被炮火吞沒。」\n\n陳信豪終於開口，嗓音沙啞：「每一具屍體都在提醒我們，這場戰爭沒有幻想。我們只能自己守住這裡。」\n\n王興煥回到桌前，展開宣言，逐字念出：「侵略已經發生，台灣的未來只能由台灣人決定。我們不再容許任何形式的破壞與背叛。」\n\n門外的記者接過宣言，紙張在夜風中顫動。陳信豪舉起拳頭，目光冷峻：「從今天起，我們不只是政黨，是最後的防線。」眾人隨之舉手，掌聲與快門聲交錯。遠處火光映紅夜空，高雄仍在燃燒。"
 ROC_CHI.11.a: "左右齊上陣"

 ROC_CHI.12.t: "花蓮"
 ROC_CHI.12.d: "陸軍花蓮防衛指揮部第203旅殘部，代號『鐵拳』，現在只剩不到兩百人，散在七星潭到秀林的斷崖與廢墟間。我是連長林志偉，三十四歲，原駐佳山基地，如今那裡已成火海。\n\n清晨，兩棲登陸艇衝上沙灘，直升機自海面壓來。075型兩棲攻擊艦在外海開火，艦砲如雨落入市區。防空飛彈打掉幾架，但更多還是壓下來；空降兵直接落在機場跑道，我們的M109還沒轉向就被火箭彈擊毀。\n\n『守住七星潭！』旅長最後一聲命令後，無線電只剩靜電。\n\n戰鬥五小時後，沙灘滿是焦黑殘骸與屍體。我躲在一間被炸毀的飯店地下停車場，身邊是日澳混編小隊——日本中尉高橋翔負傷在牆角，彈藥見底；澳洲軍士長麥可·雷恩轉著最後一枚手榴彈，苦笑著問我們還能撐多久。我沒有回答，只盯著手機裡淩晨那句：『爸媽在地下室，保重。』\n\n敵軍再度推進，步兵戰車碾過沙灘。我們僅存的火箭筒擊毀一輛，爆炸碎片卻也帶走兩名弟兄。\n\n我下令撤退，但已無路可退。高橋翔單手舉槍衝出，很快倒下；麥可拉開拉環，也衝進火線，爆炸聲隨後傳來。\n\n剩下十幾人，有人哭，有人發呆。直升機低空掃射，入口坍塌，我們被困在塵土與碎石中。無線電沈默，只剩斷續慘叫。\n\n子彈打光後，我丟下步槍，握著戰術刀坐在牆邊。外頭腳步逼近，喊話器反覆命令投降。我閉上眼，想起家人、台北夜市，還有那片曾經明亮的花蓮天空，如今只剩煙火與灰燼。"
 ROC_CHI.12.a: "恍惚間想起了家人"

 ROC_CHI.13.t: "自爆"
 ROC_CHI.13.d: "花蓮山區被煙霧壓住，林間殘火未熄，空氣裡全是焦土與血的味道。國軍一個班沿著山路推進，腳步踩在碎石上發出細碎聲響。\n\n排頭的林志偉壓低身形，手勢示意停下。他盯著前方一棟半毀的水泥屋，牆面被炸開一個缺口，裡面一片死寂。\n\n「裡面有東西。」後方的陳奕廷低聲說，手心已經濕透。\n\n還沒等命令下達，屋內突然炸出一串槍聲。子彈貼著地面掃過，打在石塊上四處亂跳。國軍立刻散開，依掩體還擊，槍聲在山谷間來回震盪。\n\n幾輪交火後，屋內火力突然停了。\n\n「壓住，別急。」林志偉舉手示意，慢慢逼近。他們貼著牆邊移動，靠近那個缺口。就在此時，一個滿身血污的解放軍士兵從陰影裡踉蹌站出來。軍服破爛，渾身沾滿灰與血，眼神卻異常明亮，像燃著某種不穩定的火。\n\n他盯著外面的人，忽然笑了，笑聲乾裂又刺耳。\n\n「來啊……來啊！」他一邊喘，一邊罵，「你們不是很會打嗎？操你們的——來啊！」\n\n國軍一瞬間全都僵住，槍口對準他，卻沒人開火。\n\n那人一步步往前走，腳步不穩，卻越走越快，聲音也越來越高：「都得死！全他媽一起死！」林志偉瞳孔一縮，猛地吼：「退後！」\n\n太晚了。\n\n那士兵猛地扯開衣襟，露出胸前綁著的炸藥，手指已經死死扣住引爆器。他最後一聲幾乎是吼出來的：「去死吧台獨野狗！！」\n\n強光與爆炸瞬間吞沒一切。氣浪把人掀翻，碎石與殘骸像雨一樣落下。耳鳴蓋過所有聲音，世界只剩一片白。\n\n幾秒後，煙塵慢慢落下，林志偉從地上撐起來，視線模糊，只看到原本的屋子已經不見，只剩一個焦黑的坑。旁邊幾名弟兄倒在地上。\n\n「喂！喂！還有沒有活得？」回應他的只有滿地殘屍。"
 ROC_CHI.13.a: "他媽的瘋子"

 ROC_CHI.14.t: "識時務者"
 ROC_CHI.14.d: "夜深，臨時指揮帳外風聲不斷，帆布被吹得起伏。帳內燈光昏黃，幾張臉在陰影間來回晃動。\n\n營長許國霖把地圖攤在桌上，指尖停在幾條被反覆圈畫的補給線上，沒有再往下說。他沈默片刻，才開口：「再拖下去，我們撐不了幾天。」\n\n副營長趙成遠靠在桌邊，握著水壺，指節發白：「彈藥見底，後方沒有回應。淪陷是時間問題。」\n\n話落下後，帳內更安靜了。有人低頭，有人盯著桌面，沒人願意接下一句。\n\n角落裡的韓啟山忽然開口，聲音壓得很低：「其實……也不是只有一條路。」\n\n他站直了些，語氣平穩：「對面早就放出風聲。只要我們配合，不追責，還能保住位置。」\n\n許國霖擡頭看他，眼神收緊：「你從哪裡聽來的？」\n\n韓啟山沒有閃避：「不是最近才有。」\n\n帳內的空氣像被壓住。外面的風聲灌進來，燈影晃了一下。\n\n趙成遠把水壺放回桌上，聲音低沈：「如果結局已經寫好，換條路，也未必是錯。」有人忍不住問：「你是說……過去？」\n\n沒有人直接回答。\n\n許國霖的手指在桌面上輕輕敲著，一下又一下，節奏緩慢。他看著地圖，又看了看帳內的人，像是在衡量什麼。過了許久，他才說：「這一步，走了就沒有回頭。」韓啟山沒有再說話，只是站在陰影裡。\n\n燈光下，每個人的影子都被拉長，貼在帳篷布上，一動不動。"
 ROC_CHI.14.a: "沒有人願意先說破"

 ROC_CHI.15.t: "新一輪突襲"
 ROC_CHI.15.d: "台北的夜晚原本只剩零星車聲。街燈照著空曠的路口，高樓之間的風帶著些許濕氣。某處臨時設置的哨點，幾名士兵輪流警戒，疲憊幾乎寫在臉上。\n\n聲音先是很遠，低沈而規律，像壓在城市上空的回響。\n\n「你有聽到嗎？」李志鴻擡頭，神色一瞬間繃緊。\n\n還沒等回應，天空已經出現黑影。大型運輸機貼著雲層掠過，機腹燈光閃動，隨後一片片降落傘在夜色中展開，從高樓之間緩慢下沈。\n\n「敵襲！」鄭柏庭的聲音劃破街道，警報隨即響起。\n\n整個街區瞬間甦醒。門窗亮起燈光，士兵衝出掩體，倉促就位。第一批傘兵落地時，槍聲已經響起。子彈在街道間反彈，擊碎玻璃，火花四濺。\n\n「數量太多了！」王尚澤躲在路邊車輛後方，快速更換彈匣，呼吸急促。\n\n「他們是衝著市中心來的！」林子凱壓低身形回擊，視線不斷掃過高處與巷口。\n\n傘兵迅速集結，戰術燈在樓宇間掃動，冷白光束切開黑暗。幾處路口同時爆發交火，火力交織成密集的網。車輛被打穿，招牌碎裂，街道在短時間內變得陌生而危險。\n\n「後撤！往下一線防禦點收縮！」連長周柏淵的命令在爆炸聲中斷續傳來。人員開始後移，邊打邊退。街口的火光逐漸擴大，煙霧沿著建築間隙上升，遮住了原本的夜空。"
 ROC_CHI.15.a: "城市被再次拖入戰火"

 ROC_CHI.16.t: "逆行"
 ROC_CHI.16.d: "台北的街區已經失去原本的秩序。警報聲斷續響起，遠處傳來爆炸的回音，煙霧沿著樓宇之間蔓延。路口的臨時防線被壓得節節後退，幾名國軍士兵躲在翻覆的車輛後方，子彈打在鋼板上發出刺耳的聲響。\n\n「彈藥不多了！」林志遠壓低聲音，手指快速換上最後一個彈匣。\n\n一旁的陳奕廷探頭看了一眼街角，立刻縮回來：「他們在包過來，再撐不住就要斷線了！」\n\n就在火力最密集的時候，遠處忽然傳來引擎聲。幾輛車強行衝進街區，剎車聲劃破空氣。車門一開，一隊人迅速下車展開隊形。\n\n最前面的那人穿著防彈背心，沒有多餘的裝備，卻站得筆直。\n\n「援軍到了！」有人喊出聲。韓國瑜大步走進火線，沒有停下。他掃了一眼四周的陣地，語氣直接：「防線別散，火力往兩側拉開！」\n\n林志遠楞了一瞬，隨即回過神，立刻照做。原本混亂的射擊開始有了節奏，幾個關鍵位置重新被壓住。\n\n敵方火力還在逼近。韓國瑜沒有退到後方，而是直接蹲下，接過一把步槍，對著街口連續射擊。槍聲清晰而穩定，壓住了對面一瞬的動作。陳奕廷忍不住看了他一眼：「你——」\n\n「現在沒什麼你我。」韓國瑜沒有回頭，只是簡短地說了一句，「站穩。」\n\n他換彈、再射擊，動作並不花俏，但沒有停頓。周圍的士兵逐漸穩住呼吸，跟著節奏壓制火力。\n\n街道另一端的敵人開始後退，原本被逼近的距離重新被拉開。煙霧之中，視線仍然模糊，但槍聲已經不再混亂。韓國瑜站起身，掃了一眼四周，聲音不高，卻傳得很清楚：「記住，現在我是你們的將軍。」\n\n林志遠重新握緊步槍，與身邊的人對視一眼，然後一起把火力壓向前方。"
 ROC_CHI.16.a: "撐住防線"

 ROC_CHI.17.t: "仇恨的力量"
 ROC_CHI.17.d: "沈伯洋如今披著黑熊部隊指揮官的臂章，身影如刀鋒般冷硬。他曾是大學教授，如今卻成為戰場上最令人恐懼的名字。\n\n\"集合！\"\n\n他的聲音低沈，卻帶著不容置疑的威壓。\n\n黑熊部隊第一突擊連迅速在廢墟中列隊：一百多名身經百戰的戰士，分成數個戰鬥小隊，動作整齊而殺氣騰騰。他親手挑選的核心幹部——陳浩然、吳子瑜、林韶輝、郭天翔、張遠哲——站在最前方，每個人眼中都燃燒著冰冷而持久的仇恨。他們的家人死在大陸導彈與轟炸之下，家園早已化為灰燼。\n\n\"今晚，我們先手。\"沈伯洋掃視全連，眼神冷冽如刀，\"村落裡有一支解放軍偵察營前鋒，目標：無人生還。\"\n\n戰士們齊聲低吼，沒有絲毫猶豫。\n\n交火在瞬間爆發。陳浩然率領第一小隊率先開火，火光閃爍中，林韶輝的小隊投出手榴彈，爆炸聲撕裂夜空。吳子瑜帶人揮刀近身，動作乾脆而致命。郭天翔與張遠哲指揮機槍壓制，子彈如暴雨般傾瀉。\n\n當最後幾名解放軍士兵舉起雙手試圖投降時，張遠哲的狙擊步槍已精準鎖定。那一聲聲槍響，沈悶、冰冷，沒有任何遲疑。\n\n戰鬥結束，空氣中瀰漫著濃烈的火藥與血腥味。沈伯洋摘下鋼盔，深吸一口氣，仰望滿是彈痕的夜空。他的目光沈靜，卻像深井中燃燒的火焰。\n\n陳浩然擦去臉上的血跡，低沈開口：\"指揮官，下一次是什麼時候？\"\n\n\"很快。\"沈伯洋望向遠方的黑暗，手緊握著步槍，\"我們必須報仇。\"\n\n這一支黑熊部隊的尖刀突擊連，早已成為戰線上最鋒利、最無情的利刃。他們沒有憐憫，只有堅定的信念與復仇的執念。每一次衝鋒，沈伯洋總是衝在最前方。每一次行動，他都目光冷峻，指揮著數百名黑熊勇士如潮水般席捲敵陣。\n\n他們是台灣最狂熱的守護者，也是解放軍最恐懼的黑色幽靈。"
 ROC_CHI.17.a: "嚇人哦"

 ROC_CHI.18.t: "迷失"
 ROC_CHI.18.d: "幾個月過去，台灣戰火沒有完全消失，只是被拉得很遠。偶爾傳來的爆炸聲隔著山谷回蕩，像遲來的雷。\n\n趙子昂躲在一間勉強修補過的山中木屋裡，屋頂用鐵皮與木板拼接，牆縫仍透著冷風。桌上放著一碗泡麵，早已沒有熱氣。他沒有動，只是看著那層凝住的油光。\n\n這裡不是他該在的地方。\n\n幾個月前，他還在高雄港的斷牆後，和三排九班一起等命令。現在，那些聲音全都消失了。連隊、呼號、位置，一個個斷開，最後只剩空白。\n\n屋子裡只有他一個人。白天，他會沿著山徑找水、找能吃的東西，把門板釘緊，把破掉的地方補起來。偶爾會遠遠看到其他人影，但沒有誰停下來說話。\n\n夜裡更安靜。風穿過林間，帶著濕氣與土味，偶爾夾著遠方傳來的悶響。他很少真正睡著，任何聲音都能把他拉醒。\n\n他低頭看著自己的手，傷口已經結痂，卻留下深色的痕。那天的畫面時不時浮現——港區的火光、槍聲，還有劉承業最後那句話。\n\n山那頭忽然閃過一抹紅光，幾秒後，悶響傳來，在山谷間層層回蕩。木屋微微震了一下，灰塵落在桌面。\n\n趙子昂沒有擡頭。\n\n他只是把手慢慢放在桌上，盯著那碗冷掉的麵，聲音低得幾乎聽不見。"
 ROC_CHI.18.a: "只剩我一人了啊"

 ROC_CHI.19.t: "餘火"
 ROC_CHI.19.d: "中部山脈的夜更冷了。風從林間壓下來，帶著濕氣與土味，遠處偶爾傳來延遲的悶響，在山谷裡慢慢散開\n\n那時天色還沒完全黑，他沿著一條狹窄的山徑往下走，腳步很輕。轉過一處倒木時，他看見一個身影蹲在路邊，正在翻著什麼。\n\n他停住了。女孩也察覺到動靜，猛地擡頭，整個人僵住。兩人隔著幾步距離對視，誰都沒有先動。\n\n過了幾秒，趙子昂慢慢把手從槍上移開，示意自己沒有要靠近。\n\n「你一個人？」他開口，聲音壓得很低。女孩點了點頭，沒有說話。\n\n他看了一眼四周，又問：「跟家人走散了嗎？」這句話讓她的表情變了一下。\n\n她沒有立刻回答，只是低頭看著地面，手指抓著衣角。過了一會，才很小聲地說：「他們……被殺了。」\n\n「誰？」他問。\n\n女孩擡頭看他，眼神很直，沒有太多情緒，只是單純地說出來：「解放軍。」風從山谷裡吹上來，帶著一點冷意。趙子昂的手指微微收緊，又慢慢放開。他沒有再問。\n\n過了一會，他才開口：「這裡不安全。」他轉身往山上走了幾步，又停下來，回頭看她。\n\n她還站在原地，像在等什麼。「跟我走。」他說。女孩點了點頭，小跑幾步跟上。\n\n天色徹底暗下來時，他們回到了那間木屋。門關上，風聲被隔在外面。趙子昂把剩下的泡麵分了一半給她。兩人坐在屋裡，沒有再提剛才的話。\n\n他最後只是低聲說了一句。"
 ROC_CHI.19.a: "今晚先撐過去"

 ROC_CHI.20.t: "中國軍隊的最後一搏"
 ROC_CHI.20.d: "午後的天空沒有預兆地暗了下來。從北到南，整條台灣西部走廊幾乎在同一時間進入異常靜默。沿海雷達站回傳的訊號迅速飆升，密集的彈道軌跡如同交錯的網，覆蓋整個西部平原與城市帶。\n\n來自對岸多個方向的東風系列彈道導彈與巡航導彈幾乎同時升空，目標不再侷限於單一城市，而是對整個西部核心區域展開飽和式全面打擊。從台北盆地向南延伸至桃園、新竹、台中、嘉義、台南與高雄，關鍵軍事基地、交通樞紐與工業設施在短時間內接連遭到密集轟擊。\n\n第一波打擊直指防空與指揮節點。雷達站與通訊中樞在數分鐘內接連失效，多處防空陣地尚未完成反應便被壓制。緊接而來的第二波導彈落向機場、港口與高速交通網絡，跑道被炸裂，橋樑斷裂，西部幹道迅速陷入癱瘓。\n\n爆炸聲沿著海岸線與城市帶連續傳遞，震動幾乎沒有間斷。高樓玻璃成片崩落，火光與濃煙在不同城市同時升起，彼此交織成一條橫貫全島西側的燃燒帶。醫療系統與應急機制尚未完全展開，便被後續的沖擊進一步撕裂。\n\n當轟炸進入尾聲，西部的基礎運作能力已遭到重創。指揮鏈斷裂、通訊紊亂，使各地部隊難以形成有效協同。就在煙塵尚未散去之際，新的威脅已從海平面浮現。\n\n台灣海峽上，大規模艦隊編組在煙霧掩護下迅速逼近。兩棲攻擊艦與登陸艦群沿著西部多個海岸段同時展開行動，從淡水河口、台中港外海、嘉南沿岸到高雄近海，多點同步推進。氣墊登陸艇與兩棲裝甲車成批湧出艙門，在炮火與空中掩護下直撲岸線。\n\n幾乎同一時間，低空飛行的直升機編隊與運輸機掠過受損的防空網，將空降兵投送至內陸關鍵節點，試圖切斷殘存的交通聯繫與後備動員。沿海防線在連續打擊與多方向壓力下迅速出現缺口，局部陣地甚至尚未完成重整便被迫迎戰登陸部隊。"
 ROC_CHI.20.a: "死守到底!"

 ROC_CHI.21.t: "福建滲透敢死隊"
 ROC_CHI.21.d: "台南的夜色濃得像墨，街角僅存的幾盞路燈在斷壁殘垣間忽明忽暗。林建宏靠在彈痕累累的牆邊，雙手捧著那張早已褶皺的全家福。照片里笑得最燦爛的妹妹，再也回不來了。自從解放軍對台北實施無差別轟炸，他的心就像被徹底掏空，只剩下一個漆黑的深淵。\n\n\"建宏，你真的決定了嗎？\"許雅婷聲音沙啞，她緊緊攥著一條染血的發帶，那是她弟弟留下的最後遺物。\n\n\"決定了。\"林建宏擡起頭，眼神冷硬得像刀鋒，\"他們炸平了台北，也殺了我的家人。我要讓他們血債血償。\"\n\n不遠處的廢棄倉庫里燈火昏黃，鄭博文、蔡士凱、黃冠霖、謝雨璇等人正緊張地整理武器彈藥。他們原本都是再普通不過的台灣人：有人是夜市賣珍奶的攤販，有人是在電子廠做組裝的工人，還有人曾經公開主張兩岸和平交流。可在台北遭到無差別轟炸、親人接連死於導彈與空降部隊的屠殺之後，他們心中只剩下最純粹、最冰冷的恨意。\n\n\"我以前真的相信和平。\"蔡士凱苦笑著，把一箱手榴彈推到角落，\"我還帶老婆去廈門玩過，覺得大家是一家人……結果呢？一枚東風導彈把我老婆和整個夜市炸成了碎片。台北被炸成那樣，死了一堆人，我還能相信什麼？\"\n\n\"我們今天站在這里，理由很簡單。大海的那一邊，已經不是親人，而是徹頭徹尾的敵人。我們不管過去支持過什麼、相信過什麼，現在只剩一個目標——讓他們付出十倍、百倍的代價。\"\n\n話音落下，倉庫里陷入短暫的死寂。隨後，所有人同時點頭。\n\n鄭博文舉起手中的武器，聲音低沈而堅定，像在宣誓\n\n\"我們現在正式報名加入『福建滲透敢死隊』。通過測驗的人，今晚就會被送往秘密訓練營，學習如何潛入福建沿海，進行破壞與暗殺行動。不管以前是什麼身份，從今天起，我們只有一個名字——那就是台灣的復仇者\"\n\n林建宏握緊拳頭，腦海中再次浮現妹妹最後的笑容。他緩緩吐出一口氣，望向倉庫外那片漆黑的海面。"
 ROC_CHI.21.a: "海的那邊是敵人"

 ROC_CHI.22.t: "時代力量宣布加入抗戰"
 ROC_CHI.22.d: "黃國昌站在一間簡樸的會議室里，目光銳利，語氣堅定而直接：「面對中國的軍事威脅，我們沒有退路。保衛台灣、守護民主自由，這是每一個台灣人、尤其是年輕世代不可逃避的責任。」\n\n他的話語透過媒體迅速傳開，沒有多餘的修飾，卻充滿改革的決心。時代力量一向以打破藍綠惡鬥、推動真正進步改革為己任，在這場前所未有的危機中，毫不猶豫地選擇站在守護台灣的最前線。支持政府的抗中立場，不是妥協，而是基於捍衛台灣主權與民主價值的原則性決斷。\n\n過去那些藍綠之間的權力鬥爭與意識形態對立，在中國的軍事壓力下顯得蒼白無力。台灣社會此刻需要的，是超越黨派的團結與行動。黃國昌的聲音依舊帶著一貫的批判力：「我們不能再被黑箱與妥協拖累，民主不是用來退讓的，而是要勇敢捍衛的。年輕人尤其要站出來，因為未來是屬於我們的。」"
 ROC_CHI.22.a: "捍衛台灣!"

 ROC_CHI.23.t: "民眾黨宣布加入抗戰"
 ROC_CHI.23.d: "柯文哲站在一間簡樸的會議室里，表情平靜，語氣像平常看診時那樣務實：「眼下台灣面對的危機，大家心里都有數。保衛台灣、守住我們的生活方式，這不是藍綠的問題，而是每一個台灣民眾的共同責任。」\n\n他的話透過媒體傳開，沒有華麗的修飾，卻讓人感覺踏實。民眾黨一向主張以台灣為名、以民眾為本，這次在戰爭陰影下，選擇用理性務實的態度站出來，支持守護台灣的立場。不是為了意識形態，而是為了台灣的整體利益和人民的平安。\n\n過去藍綠的口水戰、族群對立，在更大的危機面前顯得不再那麼重要。台灣這個島嶼，此刻需要的是團結，而不是繼續分裂。柯文哲的語氣一如既往地直接：「我們對民意要心存敬畏，政治就是要解決問題，不是製造仇恨。該合作的時候合作，該對抗的時候就要對抗，但最終目標是讓台灣民眾過上安穩的日子。」"
 ROC_CHI.23.a: "拒絕妥協！"

 ROC_CHI.24.t: "台灣團結聯盟宣布加入抗戰"
 ROC_CHI.24.d: "劉一德站在一間簡樸的會議室里，目光堅毅，語氣充滿本土熱情：「在中國的軍事威脅面前，我們台灣人沒有退縮的空間。保衛台灣、抵抗共匪，這是每一個愛台灣的人必須承擔的責任！」\n\n他的話語透過媒體傳遍島內各地，像一聲響亮的號角，喚起台灣人心中那股不屈的本土精神。台灣團結聯盟一向以李登輝先生的精神為指引，高舉『台灣優先、壯大台灣』的大旗，這次在戰爭陰影下，毫不猶豫地選擇站出來，支持守護台灣主權的立場。不是為了政黨利益，而是為了鞏固民主、穩定政局，讓台灣成為一個真正正常、獨立的國家。\n\n過去藍綠之間的爭執、族群的分歧，在中國的外部壓力下，都必須讓位給更大的台灣整體利益。台灣這個美麗的島嶼，此刻比任何時候都更需要團結。劉一德的聲音依舊帶著台聯一貫的堅定：「我們要振興經濟，更要鞏固民主；我們要穩定政局，但絕不以妥協主權為代價。台灣人要勇敢站起來，守護自己的家園！」"
 ROC_CHI.24.a: "壯大台灣!"

 ROC_CHI.25.t: "泛藍陣營宣布加入抗戰"
 ROC_CHI.25.d: "吳成典、宋楚瑜與林炳坤共同站在一間簡樸的會議室里，三人神情嚴肅而堅定。吳成典率先開口，語氣沈穩：「面對中國大陸的軍事壓力，我們必須以中華民國的整體利益為優先。保衛台灣、維護兩岸和平，這是每一個中華民國國民的共同責任。我們反對台獨冒進，但也絕不接受武力威脅。」\n\n宋楚瑜接著說道，聲音帶著一貫的親民與務實：「台灣民眾最希望的是安穩的生活。過去我們主張兩岸多交流、少對抗，就是為了避免走到今天這一步。現在危機當前，我們願意放下黨派分歧，支持一切有利於台灣安全與中華民國尊嚴的立場。親民黨一向以民眾為本，現在更要以台灣的長治久安為念。」\n\n林炳坤則補充，語氣樸實直接：「無黨團結聯盟來自地方基層，我們看到民眾最怕的就是戰爭。無論藍綠，現在都該團結一致，守護中華民國的憲政體制與人民福祉。我們支持穩定政局，反對任何破壞兩岸和平的做法。」\n\n三人的聯合發言迅速傳遍媒體，沒有華麗的口號，卻透露出泛藍一貫的理性務實。過去藍營內部的路線差異，在外部危機壓力下逐漸淡化。新黨的堅定立場、親民黨的親民路線、無盟的地方力量，此刻匯聚成一股守護中華民國的共同意志。"
 ROC_CHI.25.a: "抵抗共匪，只待反攻大陸"

 ROC_CHI.26.t: "台灣基進宣布加入抗戰"
 ROC_CHI.26.d: "陳奕齊站在一間簡樸的會議室里，目光銳利而堅定，語氣直接有力：「面對中國的軍事威脅與帝國主義野心，我們沒有任何妥協的空間。保衛台灣、抵抗共匪，這是每一個認同台灣作為獨立政治民族的人，必須肩負的責任。我們要透過政治民主化、主權自主化與社會自由化，真正守護這片土地。」\n\n他的話語迅速傳開，帶著基進黨一貫的剛性與進步精神。台灣基進自成立以來，就以台灣民族主義與左翼台獨為核心，高舉『台灣就是台灣人的國家』的旗幟，在這場危機中，毫不猶豫地選擇站在守護台灣主權的最前線。支持抗中保台的立場，不是權宜之計，而是基於主權自主化的根本信念——我們反對任何形式的中國併吞，也拒絕在中華民國框架下繼續模糊台灣的國家地位。\n\n過去藍綠的路線爭執、威權遺毒，在中國外部武力壓迫下，都必須被徹底清算。台灣這個島嶼，此刻正檢驗每一位公民的民族認同。王興煥的聲音充滿原則：「國民黨不倒，台灣不會好。我們要深化政治民主化，裂解威權象徵；要推動主權自主化，讓台灣成為真正的正常國家；也要實現社會自由化，讓年輕人不再被低薪與不公綁架，讓台灣成為人民尊嚴而幸福的家園。」"
 ROC_CHI.26.a: "台灣就是台灣人的國家！"
 
 ROC_CHI.27.t: "支援大陸民運"
 ROC_CHI.27.d: "夜幕壓低在高雄港上方，海面反射著斷裂的燈光。數小時前傳出的各地集會畫面，仍在通訊設備的螢幕上反覆播放。那些來自北京、廣州與哈爾濱的片段，被一遍遍放大、暫停、重播，像是在確認某種尚未穩固的現實。\n\n陳柏宇站在車旁，目光停留在畫面中人群舉起的標語上。他沒有說話，只是把手機收進口袋，轉身看向貨櫃後方整齊堆放的箱子。那些原本被當作備案的物資，此刻忽然有了更明確的去向。\n\n林昱廷將最後一批設備搬上推車，動作比以往更快。吳佩珊蹲在地上核對清單，手指在紙面快速滑動，確認每一項標記與編號。\n\n「他們已經開始了，我們不能再等。」黃子軒靠在貨櫃邊緣，視線投向遠方海面，聲音壓得很低，卻清楚。\n\n張雅婷將封條貼上最後一個箱子，輕輕按壓固定，「能送進去多少，就算多少。」\n\n另一側，劉承翰正與船員快速確認新的中轉安排。原本分散的路線被重新調整，節點被壓縮，節奏變得更緊密。交談聲不高，但每一句都直接指向同一個方向。\n\n短暫的停頓之後，陳柏宇重新打開車門，將引擎啟動。低沈的聲響在夜里緩緩擴散，他看了一眼身後的人群，沒有多說什麼。\n\n遠處的海面沒有回應，只有風聲與機械運轉聲交錯。那些尚未抵達的訊號，正在被提前準備。"
 ROC_CHI.27.a: "給對岸添把火"

 ROC_CHI.28.t: "夜不能寐"
 ROC_CHI.28.d: "淩晨兩點的房屋內依舊亮著燈。\n\n的走廊空無一人，只有值勤人員的腳步聲在遠處斷斷續續地回響。辦公室內，他獨自坐在桌前，面前的文件已經翻過無數次，卻始終停留在同一頁。\n\n他沒有開燈，只讓桌上的一盞台燈亮著，光線壓得很低，像刻意避開什麼。\n\n窗外的沈在夜色里，霓虹燈依舊閃爍，卻顯得異常遙遠。\n\n他閉上眼，試圖讓思緒平靜下來，但各種聲音卻反而更清晰——媒體的質疑、在野黨的攻擊、街頭越來越直白的憤怒，還有那些在內部會議中沒有說出口的擔憂。\n\n他手指輕輕敲著桌面，一下，又一下，節奏卻越來越亂。\n\n他很清楚，真正讓局勢變得危險的，從來不是對岸的動作，解放軍的攻勢越來越疲憊，明眼人都看得出來中國無論如何都無法打下台灣，可問題來自內部。\n\n民進黨的支持率在下降，盟友在觀望，潛在的對手則在迅速積累聲量。那些原本依附在執政體系下的力量，開始尋找新的出口。\n\n他睜開眼，目光落在桌上的一份最新民調上。數字沒有大幅崩塌，卻呈現出一種更令人不安的趨勢。\n\n這種下滑，比任何一次暴跌都更危險。他忽然站起身，走到窗邊，手掌貼在冰冷的玻璃上。\n\n遠處傳來一陣低沈的轟鳴聲，像是軍機，也像只是夜里的錯覺。\n\n\"時間不多了……\"\n\n他的聲音咬牙切齒。\n\n窗外的燈光微微晃動，仿佛整座城市都在某種看不見的壓力下緩慢傾斜。"
 ROC_CHI.28.a: "真的是靠北"

 ROC_CHI.29.t: "海天重誓"
 ROC_CHI.29.d: "夜色愈發濃稠，像一張浸透海水的漁網，勒得人喘不過氣。會議室的門被從里面反鎖，窗簾終於拉嚴，只剩桌上一盞昏黃的台燈，投下三道長長的陰影。門外走廊空蕩蕩的，只有風卷著浪聲，隱約像遠處的炮響。\n\n韓國瑜坐回椅中，拳頭仍舊半握。陳寶餘上將終於點燃了那根雪茄，青煙在燈下盤旋，苦澀味混著潮濕的鐵銹味，彌漫整個房間。\n\n門輕叩三下——這是約定的暗號。進來的是王忠信，國民黨中常委、情報老手，頭發花白，眼神卻像老狼一樣警覺。他手里提著一個不起眼的公文包，里面塞滿了從台北緊急帶過來的加密檔案。\n\n\"韓主席，陳總長。\"王忠信壓低聲音，掃了一眼窗外搖曳的燈塔光，\"外面風聲緊。綠營那邊已經嗅到味了，左聯的家夥更在到處放話，說我們想借大陸亂局翻盤。\"\n\n韓國瑜冷笑一聲，目光如刀：\"讓他們說去。國民黨這些年活得像個被閹過的太監，穿西裝打領帶，卻連句硬話都不敢放。這次台海收場，正是天賜的斷層。我們不搶，別人就會搶——綠的搶，赤的搶，那些自稱革命者的也會搶。\"\n\n陳寶餘吐出一口煙，軍靴在地板上輕輕一頓：\"忠信兄，大陸那邊的情報更新了沒有？\"\n\n王忠信打開公文包，攤開幾張衛星照片和手寫情報摘要。中國大陸的暴動畫面模糊卻觸目驚心，煙火與人群像蟻群般湧動。\n\n\"南京已經不是小打小鬧，\"他聲音低沈，\"供應鏈斷裂，地方武裝開始冒頭。北京那邊忙著維穩，內部裂痕比我們預想的還深。國光計劃的舊檔案我帶了一部分——1960年代的登陸方案、敵後特戰要點，雖然紙面上的東西，但框架還在。只要我們注入新血，就能從草稿變作戰圖。\"\n\n韓國瑜傾身向前，聲音帶著壓抑的狂熱，卻又刻意放緩，像在對黨內同志宣誓：\"重啟國光，不是單純的軍事冒險。我們要三分武力、七分民心。反攻大陸，先反攻台灣的民心。告訴他們：混亂結束了，秩序回來了。民主不是綠營的專利，福利不是赤匪的空話。我們國民黨，才是那個能跨過山海、帶回江山的人。\""
 ROC_CHI.29.a: "舊意覆燃"

 ROC_CHI.30.t: "山河再議"
 ROC_CHI.30.d: "陳寶餘瞇起眼，雪茄在指間轉動，聲音帶著軍人慣有的直白與懷疑：\"韓主席，說得漂亮。但黨內不是鐵板一塊。有些中常委還想著‘維持現狀’就能過日子，有些人怕一動手就引來日方壓力，甚至綠營的反撲。萬一南京的火沒燒大，我們這邊先亂了呢？\"\n\n王忠信點頭附和，目光在兩人之間遊移：\"正是如此。這次會談必須絕對保密。花蓮港這里後山靠海，進出方便，但也容易被盯上。我們三人，加上台北兩位可靠的立委。一步步來：先穩住軍中老派，再通過地方派系放出‘秩序牌’的風聲。最後，才把國光從檔案里真正拉出來，變成跨海的利刃。\"\n\n韓國瑜站起身，走到窗邊，掀開窗簾一角。遠山如沈默的鐵壁，海浪拍打港堤的聲音越來越急，像無數隱形的戰鼓在催促。\n\n\"國民黨不能再等了。\"他轉過身，眼神在昏暗中灼灼燃燒，\"歷史給過我們三次秘密和談的機會，都錯過了。這一次，我們不和任何人談——我們要自己定規矩。從綠營手里奪島，從赤匪手里奪大陸，從那些軟骨頭手里奪回男人的脊梁。一寸山、一寸海、一寸血，都要用我們的方式拿回來。\"\n\n陳寶餘緩緩起身，軍靴踩出沈悶的聲響，與海浪聲交織。王忠信合上公文包，三人目光交匯，空氣中仿佛有無形的電流在湧動。\n\n會議室外，太平洋的風愈發狂野。花蓮港的燈塔在夜色中孤獨閃爍，像是為這場國民黨內部的秘密會談，悄然點亮了引向巨變的道路。"
 ROC_CHI.30.a: "掀起真正的反攻序幕。"
 CHI_KMT_nati: "中國國民黨-軍系"

 ROC_CHI.31.t: "機密情報"
 ROC_CHI.31.d: "情報系統近期呈現出異常密集的活動軌跡。隨著對岸戰事陷入僵持，其內部壓力正以可觀速度累積，而這種壓力已開始轉化為對外軍事行動的準備跡象。通過持續交叉比對衛星影像、通信截獲與後勤流動數據，我們確認對方導彈部隊進入高度戒備狀態，多個沿海發射陣地與機動單位頻繁轉移，明顯處於戰備展開階段。\n\n不僅如此，其海軍與兩棲部隊的集結亦已出現系統性特征。港口裝卸頻率異常上升，大型登陸艦與護航編組的調度呈現出前所未有的規律性，而內陸運輸節點的壓力也同步增大，顯示其後勤體系正為大規模行動進行最後整備。這類高頻運作狀態並非例行演訓所能解釋，更接近實戰前的壓縮式準備周期。\n\n當前局勢的關鍵，在於對方可能試圖以短時間內的密集火力與快速突入打破僵局，將外部戰線轉化為內部壓力的釋放出口。一旦行動展開，其初期打擊將極具強度與突然性，意在癱瘓我方指揮、通信與關鍵防御節點。\n\n在此背景下，任何遲疑都將放大風險。我們必須以最壞情境為基準，重新校準防御部署與應急體系，強化分散指揮與冗餘通信能力，確保在首輪打擊下仍能維持作戰連續性。同時，情報系統需進一步前推，持續鎖定對方發射窗口與兵力集結節奏，爭取預警時間與決策空間。\n\n這不是單一方向的威脅，而是一場系統性壓力測試。唯有提前進入戰時狀態，才能在真正的沖擊到來之前，占據主動。"
 ROC_CHI.31.a: "按最壞情況部署"

 ROC_CHI.31.t: "機密情報"
 ROC_CHI.31.d: "情報系統近期呈現出異常密集的活動軌跡。隨著對岸戰事陷入僵持，其內部壓力正以可觀速度累積，而這種壓力已開始轉化為對外軍事行動的準備跡象。通過持續交叉比對衛星影像、通信截獲與後勤流動數據，我們確認對方導彈部隊進入高度戒備狀態，多個沿海發射陣地與機動單位頻繁轉移，明顯處於戰備展開階段。\n\n不僅如此，其海軍與兩棲部隊的集結亦已出現系統性特征。港口裝卸頻率異常上升，大型登陸艦與護航編組的調度呈現出前所未有的規律性，而內陸運輸節點的壓力也同步增大，顯示其後勤體系正為大規模行動進行最後整備。這類高頻運作狀態並非例行演訓所能解釋，更接近實戰前的壓縮式準備周期。\n\n當前局勢的關鍵，在於對方可能試圖以短時間內的密集火力與快速突入打破僵局，將外部戰線轉化為內部壓力的釋放出口。一旦行動展開，其初期打擊將極具強度與突然性，意在癱瘓我方指揮、通信與關鍵防御節點。\n\n在此背景下，任何遲疑都將放大風險。我們必須以最壞情境為基準，重新校準防御部署與應急體系，強化分散指揮與冗餘通信能力，確保在首輪打擊下仍能維持作戰連續性。同時，情報系統需進一步前推，持續鎖定對方發射窗口與兵力集結節奏，爭取預警時間與決策空間。\n\n這不是單一方向的威脅，而是一場系統性壓力測試。唯有提前進入戰時狀態，才能在真正的沖擊到來之前，占據主動。"
 ROC_CHI.31.a: "按最壞情況部署"

 ROC_CHI.32.t: "緊急動員"
 ROC_CHI.32.d: "西線的火光尚未熄滅，戰線卻已被撕開數道缺口。沿海登陸與內陸穿插同時推進，使原本尚能維持的防禦體系迅速變得支離破碎。就在這種幾近崩塌的邊緣，零星而急促的集結開始出現。 \n\n一支由各地臨時編組的志願民兵，從被轟毀的鄉道與田野間趕來。帶隊的是周嶺，她臉上沾著未乾的煙灰，背包裡除了急救物資，只剩下零散彈藥。趙聞川緊跟其後，步伐略顯急促，卻始終沒有回頭。他們沒有統一的裝備，也沒有完整的編制，更多時候只能依靠口頭指示與彼此默契維持隊形。 \n\n「前面就是斷線的位置。」週嶺壓低聲音，指向遠處被炮火削平的堤岸。那裡原本是防線的一段，現在只剩下斷裂的混凝土與翻覆的鐵絲網。幾名守軍殘部正在撤離，神情麻木而疲憊。 \n\n沒有交接，也沒有多餘的說明，志工們直接接替了陣地。趙聞川將僅有的彈匣分送出去，又把水壺遞給一名還在發抖的新兵。沈知夏蹲在破損的掩體後，用簡陋電台重新建立聯絡，一段斷續的回音在耳機裡反覆跳動。當她報出座標時，聲音有一瞬間的遲滯，卻很快恢復穩定。 \n\n顧承野則在陣地間來回穿梭，把零散的人員重新組織成幾個火力點。他的動作不算熟練，卻帶著一種近乎固執的專注，像是在強行把混亂壓回秩序之中。 \n\n遠處傳來履帶碾壓的低沈聲響。還未完全冷卻的地面再次震動，煙霧中隱約浮現推進的裝甲輪廓。林語棠伏在壕溝邊緣，呼吸貼著泥土，她沒有等待命令，只是微微調整姿勢，將槍口對準側翼最薄弱的部分。 \n\n第一聲槍響之後，陣地迅速被拉回戰鬥節奏。簡易機槍斷斷續續壓制前方推進路線，手雷在殘牆間爆開，掀起碎石與泥土。補員並未改變火力對比，卻讓原本即將崩潰的防線重新有了「形」。 \n\n砲火再度覆蓋下來，壕溝泥水四濺。有人被震得耳鳴失聲，也有人在黑暗中死死抓住身邊同伴的衣袖。週嶺靠在土壁上，短暫閉上眼睛，又很快睜開，重新舉起手臂示意分散。 \n\n當第二輪衝擊逼近，陣地已經不再完整，卻仍然存在。那些倉促拼湊起來的人影，在煙塵與火光之間穩住了位置，像一條被不斷撕裂卻始終未斷的線。"
 ROC_CHI.32.a: "補上去，哪怕只多撐一分鐘"

 ROC_CHI.33.t: "勝利的預兆"
 ROC_CHI.33.d: "【中華民國戰時廣播系統特別新聞】\n\n「這裡是[CHI.GetName]戰時臨時廣播系統，現在為您插播一則重大突發新聞。」\n\n主播沈亦嵐坐在臨時搭建的播報台前，神情克制，手中的稿件邊緣微微捲起。 \n\n「根據多方獨立情報來源與現場畫面交叉確認，中國內陸局勢已出現劇烈變化。數日前，南京發生大規模武力清場行動。執法與武裝力量對集結人群實施強制驅散，過程中造成嚴重傷亡。」\n\n畫面切換至模糊影像，火光與人群奔散的輪廓交織。 \n\n「事件迅速引發連鎖反應。包括華東、華中在內的多個地區，相繼出現抗議升級與武裝對峙跡象。部分城市交通節點被佔據，鐵路運輸受阻，地方行政系統運作出現明顯中斷。」\n\n副主播顧行之接替播報，語速平穩卻壓低音量。 \n\n「更引人關注的是軍方內部的異常動向。南京方向所屬部隊在執行後續命令時出現分裂。根據目前掌握的信息，部分單位拒絕繼續參與鎮壓行動，並與上級指揮系統產生對抗。」\n\n畫面再次切換，出現疑似軍用汽車調動與路障對峙的片段。 \n\n「個別建制部隊已脫離原有指揮鏈，控制駐地與週邊區域。這一情況被外界普遍視為南京軍區內部出現兵變跡象。同時，其餘戰區部隊正向相關區域機動，試圖重新建立控制。」\n\n沈亦嵐重新出現在畫面中央，語氣更為凝重。 \n\n「目前，各地局勢仍在快速變化之中。武裝對立呈現多點擴散趨勢，部分區域已出現交火與臨時武裝重組的情況。由於資訊封鎖與通訊幹擾，實際規模仍難以完全確認。」\n\n她短暫停頓，低頭確認稿件後繼續。 \n\n\"可以確定的是，南京清場事件已成為當前局勢的關鍵轉折點，其影響正沿著交通與指揮體系迅速擴散，對整體穩定構成持續衝擊。\""
 ROC_CHI.33.a: "我們要贏了!"

 ROC_CHI.39.t: "山海之間的盟友"
 ROC_CHI.39.d: "今夜的台灣東海岸，海風裹著潮濕的鹹味，從花蓮的港口一路吹到臨時陣地。月光很亮，照得海面發白，如果不是遠處偶爾閃過的炮火，這一切幾乎像是和平年代的夜晚。\n\n我和佐藤誠政務官一起吃著野戰口糧。說是吃飯，其實只是靠在一輛裝甲車旁將壓縮幹糧掰碎塞進嘴里。他已經四十多歲了，臉上帶著長期熬夜留下的疲憊。他說帶這樣一支聯合部隊，比打仗本身更難。自衛隊志願隊、我們國軍，還有臨時編入的地方守備隊，指揮體系像一團亂麻。\n\n遠處的掩體旁，有人點起小小的篝火。士兵們低聲哼著歌，混雜的旋律，帶著不同的情緒，有人唱著《梅花》，也有人用生澀的日語跟著哼唱君之代的調子。語言混亂，卻奇妙地沒有沖突。\n\n佐藤盯著那邊看了很久，忽然問我：\"你們真的相信能守住嗎？\"他的語氣不帶挑釁，更像是在確認什麼。我沒有立刻回答，只是看著火光旁的人影——一個台南來的年輕兵正教一名日本士兵用閩南語說\"兄弟\"，兩個人笑得前仰後合。\n\n我知道他在擔心什麼。不同的國家，不同的人，甚至是曾被侵略國。如今卻被在同一條戰線上。對他來說，這種並肩本身就充滿矛盾。\n\n明天我們要往北推進，支援台北外圍防線。我得休息了。只是合上記錄本時，海風里還夾著斷斷續續的歌聲："
 ROC_CHI.39.a: "とまるもゆくも、かぎりとて（無論留下或離開，一切終有結束之時)"

 ROC_CHI.40.t: "敵襲"
 ROC_CHI.40.d: "陰天，不確定是在基隆外緣，還是更靠近海岸的某段陣地。\n\n手還是抖。\n\n陳志遠，那個台南新兵的血已經幹在袖口，顏色發暗，怎麼搓都下不去。他才十九歲，很多事情還沒來得及經歷，就停在了今天早上。\n\n最初見到他是在後送點。他替傷兵處理傷口，動作細得不像在戰場上。我當時偏過頭，對旁邊的人說，這樣的人，大概撐不了幾天。\n\n清晨的海面先是安靜得異常，隨後整片天空像被撕開一樣。來自解放軍的火力壓了下來——遠處艦炮的悶響一下一下砸進地面，火箭彈拖著尾焰掠過頭頂，爆炸把陣地前沿掀成一片翻滾的泥土和碎石。無線電里一片雜音，根本聽不清指令。\n\n就在這樣的混亂里，是他先發現側翼的空隙。\n\n他看過來，沒有解釋，也沒有遲疑。\n\n\"我去。\"聲音不高，卻很穩，\"他們會先注意我。\"\n\n我還沒開口，他已經翻出掩體。\n\n他沿著被炸塌的掩體邊緣移動，借著煙塵和彈坑一點點向前。火力果然被吸引過去，我們才有機會重新組織陣形。但下一瞬間，一發爆炸在他附近掀起，他整個人被氣浪拋開，重重摔在地上。\n\n等我趕到，他已經說不出話。血不斷從喉嚨里湧出來，他卻執意把一件東西塞進我手里。\n\n現在陣地安靜下來，風聲蓋過了一切。\n\n我把他的遺物收整好：青天白日、一本寫滿急救記錄的手冊，還有那張前些日子的合影。照片上的他笑得很松弛，像完全不屬於這里。背面那行字寫得很認真——等結束以後，要一起開一家診所。"
 ROC_CHI.40.a: "那句話，我還是沒來得及說出口"

 ROC_CHI.41.t: "海峽盡頭的火光"
 ROC_CHI.41.d: "海風從台灣海峽方向壓過來，帶著鹽味，也帶著燃燒後的焦糊氣息。傍晚的天色本該溫和，卻被火光撕開——港區在燃，堆疊的貨櫃一排排塌陷，油料庫爆炸後升起的黑煙直沖雲層，把整片天空染成暗紅。\n\n遠處的碼頭上，一面青天白日旗仍掛在殘破的旗桿上。旗面被沖擊波撕裂，邊緣卷曲發黑，卻還在風里頑強地展開。橋面和岸邊的混凝土滿是彈坑，碎片散得到處都是，像被反覆碾碎過。\n\n幾名登陸的中國人民解放軍士兵已經推進到港區邊緣，他們順著斷裂的護欄往高處爬，動作急促而謹慎。下方的部隊在廢墟間展開，有人用手勢催促，有人架起機槍警戒，更多的人只是擡頭盯著那面旗。\n\n在港區外側的高地上，國軍軍官林振國伏在破碎的掩體後，看著這一切。腳下的泥土還在微微震動，像是剛剛那輪炮擊留下的餘波。身後傳來腳步聲，日方聯絡官佐藤誠沿著被炸開的斜坡爬上來，呼吸略顯急促。\n\n兩人沒有立刻說話。\n\n港區那邊，有人已經開始切斷旗索。動作很慢，風很大，旗幟被拉扯得不斷翻卷。金屬摩擦聲斷斷續續傳過來，在爆炸後的寂靜里顯得格外清晰。\n\n\"你在看那個？\"佐藤最終開口。\n\n林振國點了點頭，沒有移開視線。\n\n\"現在不開火？\"佐藤壓低聲音。\n\n林振國沒有回答。\n\n瞄準鏡里，那兩個人已經固定好身體，開始切割旗索。風很大，動作被不斷打斷，鋼索在刀具下發出斷續的摩擦聲。\n\n\"再等。\"他只說了兩個字。\n\n時間被拉得很長。\n\n就在旗索出現明顯松動的一瞬間，林振國的手指壓下去。\n\n第一聲槍響幾乎和風聲重疊。\n\n高處的其中一人猛地一頓，整個人向後仰去，失去支點後直接從結構邊緣墜落。第二個人還沒反應過來，第二發子彈已經打在他肩側，他試圖抓住什麼，卻只抓到空氣。\n\n幾乎同時，掩體後的火力全部展開。機槍、步槍沿著預先標定的角度壓向港區，高處和下方瞬間被交叉火力覆蓋。剛剛還在觀望的士兵被迫散開，原本準備完成的動作被徹底打斷。\n\n那面旗沒有被割斷。\n\n它在風里劇烈抖動，半斷未斷，像被拉扯著懸在那里。林振國重新拉動槍機，目光仍停在瞄準鏡里："
 ROC_CHI.41.a: "\"別讓他們只記住廢墟。\""

 ROC_CHI.38.t: "三井倉庫"
 ROC_CHI.38.d: "今日仍舊是烏雲密布的一天，照理來說，這時候的台灣應當是豔陽高照才對。汪銳金少校坐在自己的行軍床上看向窗外，手伸向床頭櫃那本軍綠色封皮的筆記本，順著書中紅線找到昨天寫的那一頁，入伍以前的他根本沒有寫日記的習慣，畢竟生活中能玩的東西多了去了，哪有那個美國時間寫日記呢?直到進入之後閒得發慌的他才開始學著寫日記。\n\n想到，這個偶然的習慣已經伴隨著自己走過十多年的軍旅生涯，在營中有甚麼樂的、好玩的他都有記下來，但大部分時候書頁裡承擔的都是委屈與痛苦，在今天也是如此。汪銳金拿出壓在枕頭下的那支鉛筆，距離解放軍進攻台灣已過數周，他帶領127旅第16步兵營奉命在前沿海灘附近的城區與工業區阻擊敵軍，最後收到的指示是上個禮拜旅部派發過來的堅守命令，他和他剩下的100多名弟兄集中在八輕工業區最邊緣的廢舊倉庫之中，數條聯外道路不是被灘頭部隊攻占、就是處在無人機的火力打擊範圍內，根本沒辦法輸送任何補給與傷員。\n\n汪銳金深吸一口氣、闔上筆記本，像是下定了某種決心，邊下樓邊思索該怎麼給剩餘的弟兄們鼓舞士氣，軍糧飲水見底、無線電的電池也是勉勉強強用到現在⋯⋯。三三兩兩躺在樓梯上的傷兵勉強擡起右手敬禮，在軍隊裡大夥有福同享有難同當，現在正是考驗信念的時刻，可嚴峻的戰損和缺乏補給讓汪銳金實在沒有臉面對他的部下。他微微點頭回禮，走到一樓倉庫，那些沒有站崗的士兵全都在這裡休息，彈藥箱和個人物品雜亂無章地散落在倉庫各處，只有一小塊區域用簾子簡單遮擋----那裏是參謀室。倖存的連長和排長都在這裡集合，少校站在桌前和軍官們商討戰略，其實走到這一部他們也沒有多少選擇:要嘛抵抗到底、要嘛放下武器投降。一開始的討論還算溫和，大家都盡可能地保持克制，不想讓基層士兵發現自己的長官內鬨導致士氣更為低落，但到後來兩方還是都沒能忍住破口大罵，髒話和排泄物迴盪在整座倉庫間，直到有位班長走進參謀室請示自己的佈防位置，他們才慢慢冷靜下來。\n\n「先生們......」少校在送走班長後才終於開口，「你們聽說過八百壯士的故事嗎?松滬會戰期間，謝晉元中校率領著餘下四百多名官兵堅守四行倉庫，與日軍激戰數日，國軍將士們在此多次抵擋日寇的瘋狂進攻，有位烈士甚至抱著手榴彈從倉庫一躍而下，與準備炸開大門的日軍同歸而盡。」\n\n所有人都沈默不語。「想想看，如果我們今天投降了，歷史會怎麼評價我們?後人會如何看待我們?!」汪銳金少校的斥責迴盪在倉庫裡，「我不知道你們是徵召來的還是志願服役，但在此時此刻，我們的土地正在被敵人無情地蹂躪著，難道你們願意在台灣最艱難的時刻選擇成為戰俘袖手旁觀，放棄抵抗嗎?!」\n\n汪銳金掀開參謀室角落的彈藥箱，裡面還存放著一些雷管和C4，「管他還剩多少人，就算只剩我一人!也得叫那些該死的共匪有去無回!讓他們知道，中華民國從來就沒有滅亡!你們要投降的隨你們去吧，我不會攔著，但要是你們願意為台灣獻出一切......」少校掃視著參謀室內的所有人，他們全都直勾勾地盯著他，全員的寂靜震耳欲聾\n\n一簇黑色的煙圈冉冉升起蒙在月亮上。那天晚上，混雜著解放軍撕心裂肺吼叫的，是視死如歸的黃埔將士們的坦然。"
 ROC_CHI.38.a: "家書伴著北風飛向天堂；將士抱著敵人墜入地獄"

 ROC.77.t: "黑鷹直升機在烏來山區墜毀"
 ROC.77.d: "2020 年 1 月 2 日上午，中華民國空軍一架 UH-60M「黑鷹」直升機自新北市新店區直潭營區起飛，執行例行春節慰勉行程，原定前往宜蘭東澳嶺雷達站進行視導與勉勵官兵。機上共 13 人，包含時任參謀總長沈一鳴上將及多名高階將領與隨行人員\n\n直升機於飛行途中進入新北市烏來山區上空時，因天候不佳、能見度低，飛機在雷達上訊號消失。國防部隨即啟動緊急搜救機制，出動空中與地面搜救部隊展開搜尋。經數小時搜索，搜救人員於烏來桶後溪上遊山區發現失事殘骸。\n\n5名生還者則在搜救人員協助下送醫治療。後續調查指出，事故與當時山區天候惡劣、雲霧濃厚、飛行環境能見度不佳，以及飛行決策判斷等因素相關，並非機械故障所致。國軍隨後全面檢討高階軍官搭乘同一航空器的風險管理與飛安程序，強化相關規範。"
 ROC.77.a: "沈痛哀悼"
 ROC_77_tt: "§Y事故共造成 8 人罹難、5 人生還。罹難者包含：§!\n\n參謀總長 §Y沈一鳴§! 上將\n政戰局副局長 §Y於親文§! 少將\n情次室助次 §Y洪鴻鈞§! 少將\n作計室處長 §Y劉鎮富§! 少將\n參謀總長室參謀官 §Y黃聖航§! 中校\n空軍作計室參謀官 §Y韓正宏§! 中校\n空勤組員 §Y許鴻彬§! 上士\n空勤組員 §Y張志光§! 士官長§!"

 ROC.78.t: "中國暫停台灣鳳梨輸入"
 ROC.78.d: "2021 年 3 月，中國海關總署宣布自 3 月 1 日起暫停台灣鳳梨輸入，理由為多次檢出介殼蟲等有害生物。由於中國長期為台灣鳳梨最大外銷市場，此舉立即對鳳梨產業與農民生計造成衝擊，也迅速升高為政治與經貿議題。\n\n台灣政府隨即啟動因應措施，包含加強檢疫與品質管理、協助外銷市場轉移、啟動內銷促銷與加工收購機制。同時，民間企業、電商平台、餐飲業者與地方政府紛紛響應採購與行銷，社群媒體掀起「挺鳳梨」熱潮，大量民眾以實際購買行動支持農民，鳳梨入菜、鳳梨加工品與創意行銷在短時間內蔚為風潮。\n\n政府表示台灣鳳梨外銷市場將逐步分散至日本、香港、新加坡與中東等地，對單一市場依賴的問題也再次成為社會與政策討論焦點。"
 ROC.78.a: "這對它們沒好處!"

 ROC.79.t: "太魯閣號列車出軌事故"
 ROC.79.d: "2021年4月2日上午9時28分，位於台灣花蓮縣秀林鄉的台灣鐵路北迴線清水隧道北口，一列載有498人的TEMU1000型列車在行逕隧道前，因撞擊滑落邊坡侵入路線的工程車造成出軌，列車因慣性持續往前滑行撞進隧道內，車廂嚴重損毀，造成49人罹難和309人輕重傷\n\n儘管中華民國相關部門在事故發生後第一時間就發起救援及搶修工作，但是由於狹長的隧道與滑坡災害使得救援工作異常困難，造成49人罹難和309人輕重傷害的嚴重後果\n\n"
 ROC.79.a: "徹查事故原因，避免悲劇重演。"

 ROC.80.t: "花蓮 7.2 強震"
 ROC.80.d: "2024 年 4 月 3 日淩晨，台灣花蓮縣發生 芮氏規模 7.2 的強烈地震，震央位於花蓮近海，震源深度約 20 公里。此次地震是近年東台灣地區最嚴重的天然災害之一，對花蓮及鄰近縣市造成重大破壞。\n\n地震發生後，建築物倒塌、道路裂縫、橋樑受損，並引發多起土石流與山崩，導致交通中斷、供電中斷與水電設施損壞。初步統計，共造成 數十人死亡、數百人受傷，多處民宅與公共設施嚴重損毀，居民緊急疏散。"
 ROC.80.a: "向罹難者家屬表達哀悼"

 ROC.81.t: "颱風「丹娜絲」登陸嘉義"
 ROC.81.d: "2025 年 7 月 6 日，颱風 「丹娜絲」由南海北上，於下午登陸嘉義縣布袋鎮，造成台灣中南部地區出現 豪雨、強風與山洪暴發。颱風來勢強勁，最大風速達每秒 45 公尺，降雨量在部分山區累積超過 500 毫米，帶來大規模水患風險。颱風登陸後，中南部多地發生嚴重淹水，沿海地區出現風災與海水倒灌。嘉義、台南與雲林地區交通癱瘓，高速公路與省道多處中斷。初步統計，颱風造成至少 2 人死亡、數十人受傷，部分農作物及民房遭受損毀，民眾緊急撤離至避難所。\n\n在花蓮、台東等東部山區，由於連日豪雨與地形陡峭，部分河川如馬太鞍溪、秀林溪等 發生山崩與土石流，形成多處堰塞湖。部分堰塞湖水位快速上升，水壩潰堤風險極高。地方政府與水利單位立即展開疏散與搶險，強制疏散附近居民，防止次生災害造成重大傷亡。\n\n堰塞湖事件導致道路中斷，部分山區村落與農田被淹沒或受損，民生供水與電力一度中斷。中央與地方政府協調空勤、消防與工務單位，派遣挖掘機與搶險設備進行堰塞湖排水作業，並設置臨時安全通道。"
 ROC.81.a: "派遣救援部隊!"

 ROC.82.t: "清明"
 ROC.82.d: "四月的雨絲絲點點，郁郁蔥蔥地籠成一片蒙蒙的煙。\n\n老夏頭少年時見慣了這雨，那時候，他仔細地去看那些弄影的青柳枝間隙時，還能見到細密的銀針穿過去，縫在蒼郁的地上，不像如今模糊。老夏頭踩在著松軟的春泥里，細密的雨絲穿過那些弄影的青柳枝，也穿過他的身子，把他縫在地上，弄得他身上癢絲絲的。他沒帶傘，這樣的雨沒必要帶傘，一如他年少時在那片白雲鄉中自由的時光。\n\n今天清明節，他正去拜會幾個經久不見的老友。幾個小丘此起彼伏，幾條小路彎彎繞繞，放在曾經，輕鞭快馬，回眼望去，淺淺的草痕沒不過他的足跡，只留下一串響在四面里歡暢的笑聲。現在他正一步一步，踏踏實實地踩在這樣松軟的泥土上，相較曾經，他的腳步更沈穩了，也更能感受到這土地是何等的堅實——竟足以托起一副幹枯的軀體，一個垂老下墜的心。"
 ROC.82.a: "物是人非事事休"

 ROC.83.t: "緣丘而上"
 ROC.83.d: "朦朧的視野里出現幾個漆綠的點，漸而是團，最後是柱。那些是柳樹，它們立在老夏頭遠遠的視野里，柳絲輕撫，春風得意。柳下是更多的，凹凸不平的小土包，像許多倒著的大鬥，前面樹著幾方纏著苔痕的碑。\n\n老夏頭的腳步快了些，丘面並不陂陀，老夏頭很順利地下去了，點散在野的柳樹也好像聚攏了一些。他提了酒，還有鹵牛肉，他小時候作佃，只見東家吃過。東家的嘴巴一張一合，一盤鹵牛肉就幹凈了大半，隨之而來的是酒的臭味和一陣陣歡聲笑語。他還記得那時東家心情好，給他賞了幾片肉，最後他才知道，那不是鹵牛肉，但往後的日子里他一直把那幾片肉當鹵牛肉。\n\n他立在那些靜靜地立在雨中，腳底下舒張的生命力蔓延到到他的頭頂去。這滋味很令人懷念。這是年少的滋味。有溫熱從他臉上劃過。他想家了。"
 ROC.83.a: "半晌"

 ROC.84.t: "欲語淚先流"
 ROC.84.d: "老夏頭顫巍巍地從口袋里掏出幾個白凈的小瓷盞，一一放在自己眼前，貼著那些小土包，好像立了一堵透明的墻，墻外只留他孤身一人，墻里是眾人的沈默；又像一條路，從記憶深處延伸到這些小土包里，橫在老夏頭身子前面。他斟酒的動作很慢，卻很穩。他想起來還在軍隊的日子，那些抽中敢死簽的大頭兵，有些很豪氣，有些哆哆嗦嗦，結果一碗酒幹盡，都叫嚷著要和敵人拼個命，好像死這件事，在酒面前不值一提。\n\n他徑自喝了一盞，辛、辣，而後是沖鼻子，他忍著咽下去，眼淚都憋了出來。他一向不喝酒，也不明白這東西是為何有如此大的魔力，但他仿著記憶里那些穿著軍裝的灰色的人影，一盞接著一盞，直到眼前天花亂墜，頭腦發脹發昏才停下來。\n\n他端起那些斟滿的酒盞，又搖搖晃晃地起身，一盞接著一盞地澆在那些小土包邊上。雨絲跌在盞中，蕩起淡淡的漣漪。做完這一切，他跪下去，重重磕了幾個頭，聲音顫抖，幾個不成音節的字從他嘴里蹦出來："
 ROC.84.a: "「弟兄們……小弟無能……還沒替你們回大陸……替你們回家……」"

 ROC.85.t: "相見歡"
 ROC.85.d: "「……來了？」\n\n「……來了。」\n\n病房里蒼白的墻面覆住無力遠望的視線，外面的聲音也被這墻塗上了馬賽克，模糊不清——靜極了。\n\n老夏頭抽出那把病床旁的凳子坐下去，動作很輕，只牽動幾縷和風惹得衣角騷動。老夏頭聽到心跳和沈重的呼吸聲，但不知是自己還是床上人的。他展眼和床上人對視，卻發現他的眼睛幾乎瞇成一條縫。印象里，他的眼睛不是這樣的。\n\n「…你眼睛怎麼了？」\n\n「我看不清你的樣子了，人老了。」\n\n床上人的聲音沈重，喉頭似乎被什麼堵住了，咬字時的發音連帶著牙齒的顫動聲。老夏頭握住了床上人搭在白被上的手。他的手很涼，還粗糙，大小不一的繭子錯落在寬厚的手上。手掌很厚實，老夏頭得用兩只手才能緊緊握住。\n\n老夏頭喉頭哽咽，眼眶里忽得溫熱起來，但他控制住了，只讓淚水在心里劃出傷痕。\n\n「你說這人，怎麼說有事，他就有事了？我前幾天走台北時你精神頭還足，怎麼這一回宜蘭，就成這模樣了…」\n\n"
 ROC.85.a: "十年生死兩茫茫……"

 ROC.86.t: "……不思量"
 ROC.86.d: "他的聲音顫抖起來。老張的另一只手搭過去，按在老夏頭手上。他搖了搖頭，似乎並不認可老夏頭的悲傷。\n\n「人老了就是這樣，身子弱，骨頭脆，就算萬千當心也會有這麼一遭，不過有些人來得晚，有些人來得早罷了，這是小事。」\n\n「我活了這麼大，仗，大大小小打了幾百場，人，不三不四殺了幾十個，死，我不怕，人總有一死…」\n\n老張眼睛瞥到別處，不去看老夏頭。\n\n「只是，我沒死到家里，沒死到大陸，沒再見我娘一面，沒給她和我老爹盡孝，這真是我最大的遺憾…」\n\n老張聲音漸漸弱下去，隱隱抽泣。他慢慢轉過頭看向老夏頭，眼皮跳動，眼睛晃動。他正打量著老夏頭。\n\n「…就這幾天的事情了…老夏，我恐怕回不去了…」\n\n老張的聲音有些顫抖，他的手緊緊按在老夏頭的手上，額上擠出深深的溝壑，呼吸聲愈來愈沈重。\n\n「但我不想埋在這里，我不想埋在台灣，老夏，這里不是我家，等我死後，我想求你把我的骨灰帶回家里去，埋在那里，不要立碑，我沒臉見後輩們……」"
 ROC.86.a: "「更沒臉見我爹娘在天之靈…」"

 ROC.87.t: "自難忘"
 ROC.87.d: "老張雙眼眼角扯起來，嘴角下垂，嗚嗚地哭出來，好像一陣迅疾的風瘋狂地吹打沙漠里一棵幹枯到樹。\n\n「老夏…我求你…兄弟就這一個願望…」\n\n老夏頭咬住嘴唇，舌頭觸到幾絲腥味。他重重點頭，握緊了老張的手，喉頭緊縮，話到嘴邊卻說不出來，只能沈默地看著老張。\n\n「這就好…這就好…」\n\n老張慢慢抽開自己的手，臉上溢出幸福的笑，嘴里嘟囔著什麼，聲音越來越小，老夏聽不清楚，只能緊緊握住他的手。過去一陣，病房里漸漸安靜下來，和他剛進來時沒有兩樣。\n\n他聽見心跳聲。他知道，這心跳聲只能是自己的了。"
 ROC.87.a: "老張咽氣了"

 ROC.88.t: "青天濁"
 ROC.88.d: "黃先任眼神複雜的看著螢幕上傳來的倖存國軍將士們登上撤離載具的畫面。他知道，這一天終於是到來了，看來他不得不離開金門，這片他守護了不知歲月的國土，中華民國長達七十餘年的統治即將結束，對於金門國民的撤離已經先一步完成，還有部門國民不願離開故土，拒絕撤離，願與金門共存亡。\n\n\"報告，金門留守國民，他們自發……\"\n\n\"自發什麼？\"黃先任轉過頭來看著負責撤離的將官前來報告。\n\n\"他們自發舉行了升旗儀式，並手舉國旗送別國軍同志們。\"\n\n\"讓他們送吧，金門經歷了共軍登陸，八二三砲戰，一直作為反共第一線，金門的歷史是曲折但光榮的，也許，這一次……\"\n\n黃先任終是沒有說出口，也許這次撤離，是永別金門，中華民國也許自此與大陸完全劃分開來，血緣親情為紐帶的兩岸關係，已經隨共軍的炮火硝煙中化為無限的仇恨。\n\n\"他們，他們把國旗倒掛過來了！\"\n\n\"什麼？！\""
 ROC.88.a: "白日降…"

 ROC.89.t: "政治禁令"
 ROC.89.d: "戰火甫起，島嶼迅速進入全面動員狀態。隨著飛彈威脅與登陸風險同時升高，政府高層開始關注另一條看不見的戰線——內部的政治穩定與安全風險。\n\n情報單位在戰前即已警告，極端意識形態組織可能在戰時環境中被激化，甚至成為滲透、煽動與破壞的潛在節點。無論是鼓吹極端民族主義與威權統治的法西斯主義團體，還是與對岸政權存在意識形態連結的共產主義組織，都被視為可能影響戰時團結與國家安全的不穩定因素。\n\n即日起，暫時查禁所有具有法西斯主義與共產主義性質之政黨與政治組織活動。"
 ROC.89.a: "...掃清叛徒"
 
 CHI.11.t: "台灣人口首次負成長"
 CHI.11.d: "隨著內政部戶政司敲下最後一聲定音錘，2020年的統計數據揭示了一個殘酷的現實：台灣正式步入了人口負成長時代。在過去的一年裡，島內的新生兒數量僅有16.5萬人，創下歷史新低，而死亡人數卻高達17.3萬人。這個被媒體稱為「生不如死」的自然增加死亡交叉，加上新冠肺炎疫情導致邊境管制、跨國人口流動受阻的社會減少，共同造成了台灣總人口的首次衰退。少子化與高齡化的雙重夾擊，正化為烏雲籠罩在寶島上空。這不僅僅是數據的更叠，更是一場動搖國本的長遠危機——未來，我們的工廠將缺乏勞工，我們的軍隊將缺乏士兵。政府必須立刻採取行動，否則國力的衰退將不可逆轉。"
 CHI.11.a: "這是我們必須面對的國安危機……"

##上面編號CHI1部分只到CHI.11
 ###
 CHI.300.t: "中華民國經濟部地質調查及礦業管理中心    函"
 CHI.300.d: "                                                        地址：100005臺北市中正區中華路一段53號\n                                                                                                          承辦人：徐銘宏\n                                                                              電話：(02)23113001    分機001\n                                                                                                 傳真：(02)23112663\n                                                                   電子郵箱：bom001＠gsmma.gov.tw\n\n受文者：韓國瑜總統\n\n發文日期：中華民國1XX年X月X日\n發文字號：經地調字第114514號\n速別：最速件\n密等及解密條件或保密期限：極機密（本件於200年12月31日解密）\n附件：\n\n主旨：陳「全國地質資源調查計畫」第一階段成果，並就我國內可開採戰略\n            礦產及油氣資源以及其潛力提出評估，呈請總統鑒核。\n\n說明：\n\n    一、為因應全球供應鏈重組、地緣政治風險升高及國家安全需求，本部依\n            行政院核定之「全國地質資源調查計畫」，運用高解析度衛星遙測、\n            航空磁力探測、重力測量、三維地震探勘、人工智慧地質建模及深層\n            鑽探等技術，完成臺灣本島及周邊海域第一階段資源普查。\n\n    二、本次調查成果顯示，過去受限於探勘技術及經濟效益評估，部分具有\n            開發潛力之礦體未能完整確認。經重新建模分析後，已掌握數處具戰\n            略價值之礦產與能源蘊藏區。\n\n    三、桃園地區確認存在較既有資料更完整之鐵礦礦體，其規模足以列入國\n            家戰略礦產儲備名單；苗栗地區沈積構造亦發現新增油氣蘊藏潛力，\n            可作為未來能源自主政策之重要基礎。\n\n    四、南海相關海域之地震測勘成果顯示，多處海底盆地具有良好油氣聚集\n            條件，推估可採儲量高於歷年估算值。建議加速後續試鑽、海域調查\n            及相關基礎設施規劃，以維護我國能源安全及海洋權益。\n\n    五、本次成果已完成建檔，並同步納入國家戰略資源資料庫。建議由國家\n            安全會議統籌相關部會，建立平戰轉換機制，確保於緊急狀況下得迅\n            速展開資源開發與生產。\n\n呈請   總統   鑒核。\n\n經濟部   敬呈"
 CHI.300.a: "「不錯，歸檔吧。」"
