 taiwan.13.t: "郑文灿当选台湾总统"
 taiwan.13.d: "在最近的战争中成功抵御来自大陆的部队后，台湾宣布将依据宪法重新举行自由选举。由于战争激起了对中国大陆的广泛仇恨，国民党失去了大量选民的支持，这些选民指责国民党未能维护和平，甚至将其视为可能与大陆合作的势力。最终，由[CHI.GetLeader]领导的民进党轻松胜选，成功连任。\n\n在各政党均接受选举结果的情况下，新一届领导层已着手宣布重建计划。"
