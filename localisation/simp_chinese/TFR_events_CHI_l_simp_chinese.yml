l_simp_chinese:
 ROC.1.t: "紅、藍、白"
 ROC.1.d: "中華民國如今已走入第109個年頭，以外國人的角度來說這個國家資歷尚淺，這種印象在中共悄悄掌握「中國」繼承者稱號的近代逐漸成為主流，而作為中華民族正統繼承人的中華民國也面臨著史上最大的身分認同危機。 \n\n由蔡英文及其背後的民主進步黨主張本土意識，強調「台灣人」的身份在「中國人」之前----在大家是中華民國公民之前，大家首先是個台灣人。 此種意識形態在戒嚴中後期逐漸成為主流，近代民主化之後成長為一股新興的政治力量。 \n\n與之相對應的則是推派韓國瑜參選的中國國民黨，這個歷史悠久的政黨由中華民國國父孫中山一手創立，隨後由蔣介石帶領的國民政府先後打敗各地軍閥、法西斯日本的入侵後統一中國，然不幸的是在抗戰結束之日中國共產黨趁勢而起，遼西、徐蚌、 平津的戰略重挫逼迫當年的國民政府撤退遷台。 在台灣國民黨政府的政策從撤退前期的「反攻大陸」逐漸轉變為「深耕台灣」，主要以「中華民國人」自居----即便他們並不反對台灣人這份身分認同標簽，就算在民主化之後受到來自內外的壓力，國民黨仍可透過當年深入基層的各地農會與黨組織深深掌握當地選票。 \n\n藍與綠，外省人與本省人，中國人與台灣人，這塊土地上的人民承受過太多苦難，對於作秀般的選舉也感到厭倦。 這一次，是否會有些不同呢？ "
 ROC.1.a: "中華民國萬歲！"

 CHI.10.t: "石油危機波及台灣"
 CHI.10.d: "隨著油價飆升以及沙特阿拉伯內戰引發的經濟體系崩潰，國際能源與金融市場接連失序，沖擊迅速外溢，並對台灣造成沈重打擊。 全台證券交易所指數跌至歷史新低，多位頂級經濟學家警告，情勢仍在持續惡化，短期內難以止穩。 \n\n同時，紐約證券交易所崩盤與海外大規模經濟衰退疊加，引發連鎖反應，進一步壓縮台灣的出口、金融與制造業空間。 資金緊縮、訂單銳減，迫使數百家企業啟動裁員與業務收縮方案，就業市場隨之承壓。 \n\n過去半世紀支撐台灣高速成長的經濟引擎正明顯降速，資本信心動搖，產業擴張受阻，整體經濟逐步顯露出停滯的跡象。 "
 CHI.10.a: "得快點做準備！"

 CHI.1.t: "2020年大選"
 CHI.1.d: "民眾的目光再次聚焦於國家未來的方向，各派政治勢力摩拳擦掌、全力爭取支持。這不只是一次選舉，而是對現行政策與國家策略的公民檢驗。\n\n選民的選擇將直接影響國內改革步調、社會穩定以及對外政策的方向。政府必須同時應對民意、輿論與國際關注，在短期政治壓力與長期國家利益間找到平衡。"
 CHI.1.a: "民進黨繼續執政"
 CHI.1.b: "國民黨上台"

 CHI.2.t: "零號病患" 
 CHI.2.d: "客機平穩地降落在桃園機場，空姐溫柔的聲音通過廣播提醒旅客留在座位並講解入境檢疫規定，但楊淑惠一個字也聽不進去。 \n\n她的頭從幾個星期前就痛得不行，當時在武漢出差的淑惠只覺得這只是水土不服外加一點小感冒的癥狀罷了。可吃完隨身攜帶的感冒藥癥狀也沒有半點緩解，她靠在前排椅背試圖舒緩疼痛，從腳下背包里抽出最後一張衛生紙捂住嘴巴，咳完後將之塞進嘔吐袋中——里面裝著飛行期間累積起來的衛生紙。 \n\n下機之後她主動向地勤人員報備自己的健康狀況，身穿隔離裝的工作人員將她帶進臨時整理出來的隔離區內，里面的護士小心翼翼地將剛采集的檢體放入機器中等待結果。 \n\n緊湊的嗶嗶聲響起，即便淑惠的視線幾乎扭成一團，永遠都忘不了那個時候，在場每一位工作人員凝固的表情。"
 CHI.2.a: "天啊！"

 CHI.4.t: "亞細亞的孤兒"
 CHI.4.d: "自國共內戰失利後，中華民國政府於民國三十八年遷至台灣。 最初，這個政權仍能代表「中國」之名，然而在失去廣大領土之後，這份正統性也隨之動搖。 \n\n1971年，中國共產黨建立的中華人民共和國取代中華民國，成為國際社會所承認的中國。 自此，中華民國被迫退出世界舞台的中央，只能以台灣或中華台北之名，在國際秩序的邊緣艱難求存。 \n\n在這樣的國際處境下，國內也歷經劇烈轉變。 從戒嚴到民主，這個國家曾在威權的長夜中掙紮。 前輩們以血與淚換來今日的自由與繁榮，卻也在無形之中承受了國體與國際地位進一步流失的代價。 時至今日，已鮮有人能真心認為中華民國仍是「中國」，但正是在這樣的現實之中，這個國家學會了如何在強權的夾縫中呼吸，並勉力維持自身的存在。 \n然而，這份脆弱的平衡正面臨新的挑戰。 中共軍機日覆一日越過海峽中線，逼近台灣本島; 突如其來的疫情動搖了全球供應鏈; 美國即將迎來大選，其國內局勢卻前所未有地動蕩不安。 \n\n或許正如我們的對手所言——百年未有之大變局，正在展開。 \n\n此刻，我們正站在命運的分水嶺。"
 CHI.4.a: "還顧望舊鄉，長路漫浩浩。"

 CHI.6.t: "一瓶礦泉水，一碗鹵肉飯"
 CHI.6.d: "今天的榮哥照慣例起的很早，下床簡單洗漱後便開始準備食材，燉一鍋肉臊、熬一整天的大骨湯對榮哥來說家常便飯。 他從他阿爸手上接過這間店已經30多年了，從小在台灣長大的榮哥對阿公阿爸口中的那些長江黃河什麼碗糕的都沒興趣，那些東西離他離得這麼遠也從來沒見過，跟他有什麼關系？\n中午短暫的休息時間他盯著墻上的大電視陷入沈思，總統大選又結束了，屏幕里光鮮亮麗的政治人物滿面春風，他自稱自己是「庶民總統」、滔滔不絕地講述他的政策、還說要讓「呆丸」發大財！\n榮哥不屑地咂了咂嘴，就在他拿起遙控器準備轉台的那一剎那，他在前台聽見了熟悉的聲音......\n\n「老板，來一碗鹵肉飯。」一個有著油亮光頭、穿著競選背心以及洗了幾十年快要褪色的襯衫的中年男子走進店里，手上著一瓶喝到一半的礦泉水。 榮哥嚇了一跳，電視里的韓國瑜總統怎麼會就這樣一個人出現在他的店內？ 但還是接過他的菜單開始被菜，上完菜後韓國瑜讓他留下來，兩人促膝長談了很久，從教育聊到經濟、從當兵聊到孩子。\n\n「現在生意很難做了啦！」榮哥對著韓國瑜抱怨道。\n「嘿啊，挖當兵的時候一碗陽春面才十幾塊，現在去菜市場買菜不帶五百都不敢出門啰！」\n「每個總統都說要改變台灣，電視上那些圖啊什麼的都說台灣很好，經濟成長率很高，阿我怎麼越來越難過啊！」\n\n韓國瑜沒有說話，只是靜靜地挖起一口鹵肉飯送入口中。 在這個地方，沒有位階、沒有職權、沒有長幼之分，只有兩位孤獨的中年人一起分享著過往的人生。"
 CHI.6.a: "真正的庶民總統！"
 
 ROC.7.t: "尖閣諸島石油開發請求"
 ROC.7.d: "台灣政府剛才向日本遞交外交照會，提議針對尖閣諸島周邊海域的石油儲量進行共同開發，並申請相關資源的使用權。\n\n台灣政府背後的動機明確：在區域能源缺口擴大的壓力下，台灣急需穩定能源以維持高科技產業與民生運作。對日本而言，這不僅是經濟合作，更是對地緣政治底線與領土主權定位的考驗。\n\n接受請求將實質改善日台關系，但必將激化與中國的領土爭議；拒絕則可能疏遠兩國關系。"
 ROC.7.a: "考慮到區域穩定，我們必須拒絕。"
 ROC.7.b: "基於戰略互惠，同意共同開發。"
 
 ROC.8.t: "東京的拒絕信"
 ROC.8.d: "日本外務省回覆了我方關於尖閣諸島石油開發權的請求。可想而知，考慮到目前極覆雜的東亞形勢及中共對「領土主權」的要求，日本無法支持台灣在該海域進行任何形式的開發計劃。\n\n外交部對此表示遺憾，並告知我方尋求其他能源替代方案。"
 ROC.8.a: "可惜！"
 
 ROC.9.t: "東京的讚成信"
 ROC.9.d: "意料之中地，日本政府宣布同意給予台灣開發尖閣諸島周邊海域的石油資源。也就是說，台灣將獲得該海域部分原油的采掘權，並獲得日本提供的相關技術支持。\n\n盡管此舉引發了中共媒體的強烈譴責，但這不僅大大促進了日台關系，台灣的能源供給也得到了極大的保障。"
 ROC.9.a: "能源新篇章！"
 
 ROC.10.t: "南海石油共同開發請求"
 ROC.10.d: "台灣地區政府剛才向中國大陸遞交外交照會，提議針對南海周邊海域的石油儲量進行共同開發，並申請相關資源的使用權。\n\n台灣政府背後的動機明確：在區域能源缺口擴大的壓力下，台灣急需穩定能源以維持高科技產業與民生運作。對中國大陸而言，這不僅是經濟合作，更是對地緣政治底線與領土主權定位的考驗。\n\n接受請求將實質改善兩岸關系，但必將激化與周邊國家的領土爭議；拒絕則可能將兩岸關系進一步疏遠。"
 ROC.10.a: "台灣人？不熟。"
 ROC.10.b: "本是同根生..."
 
 ROC.11.t: "北京方面拒絕"
 ROC.11.d: "北京方面回覆了我方關於南海石油共同開發請求。可想而知，考慮到目前極覆雜的東亞形勢及中共對「領土主權」的要求，中國大陸政府無法支持台灣在該海域進行任何形式的開發計劃。\n\n外交部對此表示遺憾，並告知我方尋求其他能源替代方案。"
 ROC.11.a: "中國人？更不熟！"
 
 ROC.12.t: "北京方面同意"
 ROC.12.d: "意料之中地，中國大陸政府宣布同意給予台灣南海石油共同開發請求。也就是說，台灣政府將獲得該海域部分原油的采掘權，並獲得中國大陸提供的相關技術支持。\n\n盡管此舉引發了越南以及菲律賓等南海周邊國家媒體的強烈譴責，但這不僅大大促進了兩岸關系，台灣的能源供給也得到了極大的保障。"
 ROC.12.a: "相煎何太急"

 ROC.17.t: "我們守住了金門"
 ROC.17.d: "\n\n\n                                                          £GFX_MND_event_texticon3   \n\n\n\n\n歷經數日高強度對峙，金門防區成功挫敗對岸部隊的登陸與奪控企圖。敵方先以火箭炮與無人機群對料羅灣、古寧頭一線實施密集威脅，隨後出動小規模兩棲突擊分隊試圖搶灘建立支撐點。我守備部隊依托既設陣地與反登陸火力網展開阻擊，海巡與海軍艦艇協同封鎖近岸海域，空軍戰機在可控空域內實施掩護。\n\n對峙最為激烈之時，古寧頭周邊陣地數度遭到突破風險，守軍憑借機動預備隊與反裝甲火力迅速封堵缺口。至昨夜，敵方殘餘突擊力量被迫撤離近岸水域，其後續兵力未能形成有效增援。金門主要設施與行政體系保持運作，島上補給線未被切斷。\n\n然而，對岸仍在福建沿海維持高度戰備狀態，炮兵與無人機活動未見明顯下降。當前戰果屬於局部且階段性的勝利，戰區已下令持續強化防御工事與後備動員，防範敵方再度試探或升級行動。金門防區整體態勢穩定，但局勢仍存不確定性。"
 ROC.17.a: "目前而言是的"

 ROC.18.t: "金廈炮戰"
 ROC.18.d: "今日淩晨，廈門沿岸與金門防區之間爆發大規模炮戰。解放軍首先對金門主要軍事據點、通信節點與港口設施實施持續火力覆蓋，隨後多波次遠程火箭與無人機打擊接續展開。金門方面進行反制射擊，雙方在數小時內形成密集對轟，廈門部分沿海區域亦傳出爆炸與警報聲。\n\n隨著多國衛星偵測與局勢報道，解放軍在火力壓制下推進兩棲與直升機空降行動。金門守軍在岸防陣地與城鎮外圍組織抵抗，但在兵力與火力對比懸殊的情況下，防線逐步被壓縮。至當日晚間，主要高地與行政中心相繼失守，島上有組織的軍事抵抗基本終止。\n\n沖突造成雙方人員傷亡與基礎設施損毀，港口與機場設施受損嚴重。解放軍隨後宣布已完全控制金門地區，並展開後續清理與管制行動。"
 ROC.18.a: "台海局勢急劇變化"

 taiwan.33.t: "第二波導彈襲擊"
 taiwan.33.d: "生死存亡的戰爭，再次降臨中華民國的土地。\n\n在第四次台海危機爆發僅數日之後，來自大陸的導彈首次直接打擊了我方關鍵基礎設施與城市。國防部正全力動員後備役、組織防御，然而第二輪導彈攻擊更為猛烈，摧毀了我方大部分行政與通信能力。\n\n然而，幸存的雷達站卻探測到更為駭人的景象：無數兩棲攻擊艦及其護衛艦正迅速逼近我沿岸，登陸戰一觸即發。這一刻已無疑義——第四次台海危機已然結束，台海戰爭正式爆發。\n\n盡管美軍缺席，但我們並非孤軍奮戰。太平洋防衛條約組織各國的幹預部隊已全面協防，正與我軍並肩作戰，於灘頭陣地嚴陣以待，誓死捍衛我領土主權。\n\n此刻，我們必須奮起抗爭、決不屈服於那頭紅色巨人。若此役不守，則中華民主之火，將永遠熄滅。"
 taiwan.33.a: "挺身而戰！"

 ROC.34.t: "日澳送來軍事援助"
 ROC.34.d: "東京方面通過內閣緊急決議，自衛隊調派多架C-2與C-130運輸機，自沖繩與九州基地起飛，連續數日空運防空系統組件、反艦飛彈備件、戰術通信平台與無人偵察設備。而日本海上自衛隊艦艇在周邊海域執行護航與情報支援任務，確保運輸航線安全。與此同時堪培拉隨後公布追加支援方案。澳大利亞國防軍啟動大規模後勤投送行動，C-17戰略運輸機經達爾文與關島轉場，將成批便攜式防空武器、反裝甲系統、野戰雷達、彈藥與工程器材運抵台灣南北機場。澳軍顧問與技術人員隨行，協助完成設備整合與操作訓練，並與台灣國防部建立聯合協調中心，加速物資分發至各作戰區。"
 ROC.34.a: "ありがとう"

 ROC.35.t: "日澳送來大量軍事援助"
 ROC.35.d: "東京方面通過內閣緊急決議，自衛隊調派大量C-2與C-130運輸機，自沖繩與九州基地起飛，連續數日空運防空系統組件、反艦飛彈備件、戰術通信平台與無人偵察設備。而日本海上自衛隊艦艇在周邊海域執行護航與情報支援任務，確保運輸航線安全。與此同時堪培拉隨後公布追加支援方案。澳大利亞國防軍啟動最大規模後勤投送行動，C-17戰略運輸機經達爾文與關島轉場，將成批便攜式防空武器、反裝甲系統、野戰雷達、彈藥與工程器材運抵台灣南北機場。澳軍顧問與技術人員隨行，協助完成設備整合與操作訓練，並與台灣國防部建立聯合協調中心，加速物資分發至各作戰區。"
 ROC.35.a: "ほんとにありがとうございます"

 ROC.36.t: "中華民國國慶日"
 ROC.36.d: "10月10日是中華民國的國慶日，用以紀念1911年武昌起義爆發以及隨後中華民國的成立。這一法定紀念日自民國初年確立以來，歷經時代變遷而延續至今。國慶象征著共和國體制的建立與憲政精神的傳承，也是全民共同回顧歷史的重要時刻。\n\n在這一天，台灣各地通常舉行升旗典禮與慶祝活動，總統府前廣場會舉辦國慶大會，總統發表談話，回顧國家發展並展望未來方向。視年度安排而定，政府可能舉行閱兵或大型展演，空中編隊飛越天際，夜間則有煙火與燈光表演點亮城市地標。若適逢連假期間，社會各界也會舉辦音樂會、體育賽事與文化展覽，使節慶氛圍更加濃厚。\n\n海外僑界與駐外機構同樣舉行慶祝酒會與紀念儀式，與友邦及各國代表共同見證這一時刻。盡管社會意見多元，歷史認知各有差異，但在國慶之日，國家的延續與制度的運作被集中呈現。作為紀念中華民國創立與發展的日子，這一節日仍然在當代社會中占有象征性的地位。"
 ROC.36.a: "中華民國萬歲"

 ROC.37.t: "二二八事件紀念日"
 ROC.37.d: "自1947年，在戰後政權接收與社會秩序動蕩的背景下，一場由緝煙沖突引發的抗議迅速蔓延全島。隨後展開的清鄉與鎮壓行動，使無數平民、知識分子與地方菁英遭到逮捕、失蹤或殺害。那段時間留下的創傷，深刻影響了台灣社會的政治走向與世代記憶。\n\n二二八事件不僅是一段歷史，更是一場關於責任與人權的長期討論。隨著解嚴與民主化進程推進，檔案逐步開放，紀念碑與紀念館在各地建立，政府亦推動調查報告與賠償機制。社會輿論在這一日往往顯得格外敏感，有人強調歷史正義與轉型正義的重要性，也有人擔憂記憶的政治化會加深分歧。不同立場交織之下，這一天成為反思國家與公民關系的公共時刻。"
 ROC.37.a: "向死難者默哀"

 ROC.40.t: "冰釋前嫌"
 ROC.40.d: "戰火的紛飛的台灣，原本應身處地堡的民進黨黨首蔡英文公然現身台北，其伴行人員中甚至包括政治敵手韓國瑜，以及其他政黨領袖。會議室里氣氛凝重。長期在立法院針鋒相對的三黨代表，此刻卻圍繞同一份簡報低聲交談。\n\n韓國瑜以國民黨重要政治人物身份受邀出席。他在會上表示，政黨競爭可以繼續，但在抗戰議題上必須形成共同立場，並主動提出協助南部物資調度與民間動員網絡的整合。蔡英文回應稱，當前最重要的是穩定社會信心，任何跨黨派合作都會獲得行政體系全力支持。雙方隨後共同出席記者會，對外傳達一致訊息，強調其抗戰之決心。\n\n幾天後，韓國瑜親自協調地方企業捐贈發電機與醫療器材，民進黨中央則透過黨公職系統協助分配與登記。媒體捕捉到兩人在前線慰問部隊時短暫交談的畫面，此刻雙方沒有往日的激烈攻防言辭，只有對基層士氣的鼓勵。對於許多支持者而言，那一刻既象征著台灣政治的和解，也是對台灣最大的關心。\n\n戰事陰影尚未散去，立法院卻罕見地通過跨黨派決議，支持特別預算與後備改革法案。兩黨領袖在議場內握手的照片被廣泛轉載。在如此緊張歲月中，原本分歧深刻的兩大政黨在關鍵時刻選擇站在同一條防線上。"
 ROC.40.a: "此刻，我們皆是為了保家衛國"

 ROC.41.t: "菲律賓局勢失控"
 ROC.41.d: "過去數周內，菲律賓國內安全形勢急劇惡化。民族民主陣線在呂宋北部發動連續攻勢，占領多處鄉鎮與交通節點，並襲擊電力與通信設施，意圖削弱中央政府控制力。與此同時，摩洛伊斯蘭解放陣線於棉蘭老島擴大武裝行動，控制若幹城鎮與港口周邊區域，宣布進入戰時狀態。\n\n菲律賓政府軍已在馬尼拉周邊及中部要地實施戒嚴，調動陸軍主力進行分區清剿。然而受制於兵力分散與補給線遭破壞，前線推進受阻，部分駐軍被迫收縮防御。局勢進一步覆雜化之處在於海軍宣布維持中立，僅承擔海上巡邏與人道疏散任務，拒絕介入陸上沖突，導致沿海補給與兵力投送能力受限。\n\n當前菲律賓全國範圍內武裝沖突呈多點爆發態勢，交通體系大面積癱瘓，地方政府職能運作失序。若無法在短期內恢覆對關鍵區域的控制，沖突規模恐將進一步擴大。"
 ROC.41.a: "還能再亂一點嗎"

 ROC.42.t: "菲律賓全面內戰"
 ROC.42.d: "當前菲律賓全國局勢已由局部沖突演變為全面內戰。民族民主陣線在呂宋北部山區建立連續控制區，宣布成立菲律賓全國民主陣線，並對主要公路與能源設施實施系統性破壞。菲律賓政府軍則固守馬尼拉大都會區及若幹軍事基地，動員預備役力量，試圖恢覆交通線與行政秩序。\n\n棉蘭老島方面，摩洛伊斯蘭解放陣線全面接管數個省份的地方政權機構，設立獨立指揮體系，與菲律賓政府軍爆發激烈交火。多處機場與港口在爭奪中受損嚴重，補給體系趨於崩潰。菲律賓海軍宣布維持武裝中立，僅在主要航道執行封鎖與疏散行動，未對任何一方提供直接火力支援，使戰局呈現陸上分裂、海上對峙的覆雜格局。\n\n目前各方均宣稱自己為菲律賓唯一合法政府政府並將其餘勢力定性為叛亂分子對其繼續作戰。"
 ROC.42.a: "真是癲狂"

 ROC.43.t: "民族民主陣線統一菲律賓"
 ROC.43.d: "在長期武裝沖突後，民族民主陣線完成對呂宋、維薩亞與棉蘭老主要城市與交通樞紐的控制，其餘武裝勢力相繼瓦解或接受整編。民族民主陣線隨即在馬尼拉宣布成立\"菲律賓民主共和國\"，組建臨時中央委員會，接管全國行政與軍事體系。\n\n此前保持中立的海軍指揮層發布聯合聲明，承認新政權為菲律賓唯一合法政府，並宣布全體艦隊與海上力量納入共和國指揮體系，強調維護國家統一與海上通道安全。\n\n新成立的菲律賓民主共和國隨後發表外交公告，宣布加入\"東亞防御提倡協定\"，與區域成員國建立安全協作與情報共享機制。該決定標志著國家戰略方向的重大調整，未來軍事建設與對外政策將圍繞區域集體防務框架展開。"
 ROC.43.a: "菲律賓之春？"

 ROC.44.t: "政府軍統一菲律賓"
 ROC.44.d: "在長期武裝沖突後，菲律賓政府軍逐步收覆呂宋北部山區與棉蘭老主要城市，其餘武裝勢力相繼瓦解或接受整編。馬尼拉重新恢覆中央行政運作，總統府與國會宣布菲律賓共和國憲政秩序全面恢覆，全國進入戰後重建階段。\n\n此前保持中立的海軍指揮層發布聯合聲明，承認新政權為菲律賓唯一合法政府，並宣布全體艦隊與海上力量納入共和國指揮體系，強調維護國家統一與海上通道安全。\n\n新成立的菲律賓共和國隨後發表外交公告，宣布加入\"太平洋防御條約組織\"，與區域成員國建立安全協作與情報共享機制。該決定標志著國家戰略方向的重大調整，未來軍事建設與對外政策將圍繞區域集體防務框架展開。"
 ROC.44.a: "一如既往"

 ROC.45.t: "摩洛伊斯蘭解放陣線統一菲律賓"
 ROC.45.d: "在長期武裝沖突後，摩洛伊斯蘭解放陣線完成對棉蘭老、維薩亞及呂宋關鍵城市的軍事控制，其餘武裝勢力相繼瓦解或接受整編。其領導委員會在馬尼拉宣布成立\"菲律賓伊斯蘭國\"，廢止原有共和國憲政架構，建立以宗教法為核心的國家體制，並重組全國軍政體系。\n\n此前保持中立的海軍指揮層則聲明當前政府為非法政府\n\n新成立的菲律賓伊斯蘭國隨後發表外交公告，宣布執行極端宗教策略，據悉來自東亞防御提倡協定與太平洋防御條約組織的武器人員正秘密運往此前拒絕發聲的菲律賓海軍政府"
 ROC.45.a: "菲律賓之終"

 ROC.50.t: "台北戰鬥報告"
 ROC.50.d: "\n\n\n                                              £GFX_MND_event_texticon3   \n\n\n\n\n致：國防部暨參謀本部\n\n今日淩晨，共軍在大規模炮火與無人機壓制下，對台北市區發動全面攻勢。敵方主力自淡水河口及新莊方向突破外圍防線，並對關渡、社子一帶實施強渡行動。市區通信與電力設施接連遭到打擊，松山機場與周邊陣地陷入持續火力覆蓋。日本自衛隊協同我方裝甲與機步部隊，在士林、內湖一線組織反擊；韓國志願部隊則固守中山、萬華街區，掩護民眾撤離。\n\n盡管各部頑強抵抗，多處橋梁與交通樞紐已依計劃實施破壞，然敵軍兵力與火力優勢明顯，逐步切斷城區之間的聯系。我軍指揮體系在密集打擊下受到嚴重幹擾，補給線亦遭分割。至傍晚時分，市政核心區與總統府周邊陣地相繼失守，殘餘部隊向陽明山及南港丘陵地帶轉進，準備依托山區繼續抵抗。\n\n基上所述目前台北市區已告失陷。各參戰單位正重整編制，以待後續作戰命令。"
 ROC.50.a: "轉進山區，繼續抗敵"
 CHI_taibei_invade2_tt: "§R預計台北遭受以下損失§!"

 ROC.51.t: "台中戰鬥報告"
 ROC.51.d: "\n\n\n                                              £GFX_MND_event_texticon3   \n\n\n\n\n致：國防部暨參謀本部\n\n自昨夜起，共軍集中遠程火力與空中突擊力量，對台中地區實施持續壓制，並自海線與大甲溪方向展開穿插推進。敵軍迅速奪取清泉崗機場外圍陣地，隨後以裝甲與機步部隊沿市區高架幹道南壓，意圖分割我方防御體系。日本自衛隊分遣隊協同我軍守備部隊固守港區與工業區核心設施，澳大利亞國防軍則在大肚山一線構築反裝甲陣地，掩護主力調整部署。\n\n交戰期間，市區通信頻繁中斷，部分橋梁與交流道依計劃爆破，以遲滯敵軍推進。然而敵方火力優勢顯著，多路並進逐步壓縮我軍防御縱深。清泉崗機場與港區設施相繼失守，市政核心區在持續炮擊下陷入混亂。至傍晚，敵軍完成對城區的合圍，我軍指揮鏈受損嚴重，補給線被切斷。\n\n基上所述目前台中市區已告失陷。各參戰單位正向大雪山與中央山脈西麓轉進，依托山地地形重整戰力同時與友軍保持協同，以待後續作戰指示。"
 ROC.51.a: "存人失地，人地皆存在"
 CHI_taizhong_invade2_tt: "§R預計台中遭受以下損失§!"

 ROC.52.t: "高雄戰鬥報告"
 ROC.52.d: "\n\n\n                                              £GFX_MND_event_texticon3   \n\n\n\n\n致：國防部暨參謀本部\n\n今晨，共軍在遠程火力與海空兵力協同下，對高雄地區展開總攻。敵艦於外海實施壓制射擊，無人機與導彈持續打擊港區油庫、通信節點及左營周邊陣地。我軍與澳大利亞國防軍聯合部隊依托港區倉儲設施、城市幹道與壽山高地構築防御，試圖以縱深陣地消耗敵軍兵力，並掩護重要設備轉移。\n\n交戰數小時後，敵軍裝甲與機步部隊自楠梓、鳳山方向穿插推進，逐步切斷城區聯系。港區多處設施在炮火中起火，跨港橋梁依預案爆破，然仍難阻敵軍持續壓迫。澳軍分隊在大寮一線實施反裝甲阻擊，我軍守備部隊則於市政核心區展開巷戰，戰況激烈，傷亡持續增加。\n\n至傍晚，敵軍完成對高雄港及市區主要行政設施的控制，我軍補給線全面中斷，指揮系統受損嚴重。\n\n基上所述目前高雄市區已告失陷。各單位正向旗山及中央山脈南段轉進，依托山地地形重整戰力同時與友軍保持協同，以待後續作戰指示。"
 ROC.52.a: "大不了我們打遊擊去"
 CHI_gaoxiong_invade2_tt: "§R預計高雄遭受以下損失§!"

 ROC.53.t: "花蓮戰鬥報告"
 ROC.53.d: "\n\n\n                                              £GFX_MND_event_texticon3   \n\n\n\n\n致：國防部暨參謀本部\n\n今日清晨，共軍沿蘇花公路與海岸線方向實施多路突擊，並以遠程火力持續壓制花蓮港與機場設施。敵軍借助空中優勢與無人機偵察，對我方指揮節點與補給線進行精確打擊，戰場通信多次中斷。我軍守備部隊協同澳大利亞國防軍與日本自衛隊分遣隊，於港區、機場周邊及美侖山一線構築防御陣地，掩護市區民眾撤離，並嘗試遲滯敵軍推進節奏。\n\n隨著敵裝甲部隊突破北側防線，花蓮港主要泊位及機場跑道相繼失守。蘇花沿線多處橋隧在交戰中受損，交通體系全面癱瘓。日澳友軍於太魯閣方向實施掩護性撤退，我軍則在市區展開巷戰以爭取時間，然在持續火力壓制與兵力劣勢下，防線逐步被壓縮。\n\n基上所述至傍晚時分目前花蓮市區及關鍵設施已被敵軍控制。殘餘部隊正向中央山脈深處轉進，依托山地地形重整戰力同時與友軍保持協同，以待後續作戰指示。"
 ROC.53.a: "守住就有辦法"
 CHI_hualian_invade2_tt: "§R預計花蓮遭受以下損失§!"
