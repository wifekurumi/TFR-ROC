 taiwan.13.t: "鄭文燦當選台灣總統"
 taiwan.13.d: "在最近的戰爭中成功抵御來自大陸的部隊後，台灣宣布將依據憲法重新舉行自由選舉。由於戰爭激起了對中國大陸的廣泛仇恨，國民黨失去了大量選民的支持，這些選民指責國民黨未能維護和平，甚至將其視為可能與大陸合作的勢力。最終，由[CHI.GetLeader]領導的民進黨輕松勝選，成功連任。\n\n在各政黨均接受選舉結果的情況下，新一屆領導層已著手宣布重建計劃。"
