 taiwan.25.t: "美国第七舰队留守台湾"
 taiwan.25.d: "随着美国本土爆发内战，外界广泛关注美国海外军事部署动向。近日，美国第七舰队部分舰只继续在台湾海峡附近活动，引发区域局势进一步复杂化。\n\n中国国防部发言人指出，美国国内局势混乱，却仍在台湾问题上制造事端，严重违反一个中国原则，干涉中国内政，破坏地区和平稳定。发言人重申，台湾是中国领土神圣不可分割的一部分，解放军保持高度戒备，坚决回击任何挑衅行径，维护国家主权和领土完整。\n\n第七舰队方面则发布简短声明，称其在印太地区的行动将\"维持常态\"，强调航行自由，并宣称将继续在国际法允许的水域开展活动。美国国防部强调，第七舰队的任务\"不受国内局势影响\"。\n\n专业人士批评第七舰队继续在台海周边维持存在，增加了局势的不确定性与误判风险。"
 taiwan.25.a: "旧习难改"
 
 taiwan.26.t: "美国第七舰队留守台湾"
 taiwan.26.d: "随着美国本土爆发内战，外界广泛关注美国海外军事部署动向。近日，美国第七舰队部分舰只继续在台湾海峡附近活动，引发区域局势进一步复杂化。\n\n中国国防部发言人指出，美国国内局势混乱，却仍在台湾问题上制造事端，严重违反一个中国原则，干涉中国内政，破坏地区和平稳定。发言人重申，台湾是中国领土神圣不可分割的一部分，解放军保持高度戒备，坚决回击任何挑衅行径，维护国家主权和领土完整。\n\n第七舰队方面则发布简短声明，称其在印太地区的行动将\"维持常态\"，强调航行自由，并宣称将继续在国际法允许的水域开展活动。美国国防部强调，第七舰队的任务\"不受国内局势影响\"。\n\n专业人士批评第七舰队继续在台海周边维持存在，增加了局势的不确定性与误判风险。"
 taiwan.26.a: "旧习难改"
 
 taiwan.27.t: "台海紧张局势升温"
 taiwan.27.d: "今日沉寂已久的台海再度成为国际焦点。在蔡英文于2020年成功连任台湾地区领导人之后，解放军迅速加强对台军事压力，并于2月9日至10日展开大规模绕台行动。据台方通报，解放军出动近40架战机进行编队巡航，甚至有部分军机短暂跨越台海中线，引发海峡两岸高度戒备。\n\n此次军事行动被广泛解读为蔡英文政府\"拒绝九二共识\"与坚持\"台湾主体性\"立场的强烈回应。台湾国防部第一时间出动战机升空监控、驱离外机，国安系统进入高度戒备状态。与此同时，台北当局呼吁北京方面应停止挑衅，恢复两岸和平对话机制。\n\n中国大陆则表示，这是对\"台独活动\"与外部势力干涉的必要反制措施，旨在捍卫国家主权与领土完整。然而，这一举动已在国际社会引发广泛关注与不安。专家警告，若缺乏对话机制与危机管控路径，台海地区将面临长期不稳定的严重风险。\n\n"
 taiwan.27.a: "1962曾是古巴，2020则是台湾。"
 
 taiwan.28.t: "台海紧张局势缓和"
 taiwan.28.d: "台湾2020年大选爆出冷门，国民党候选人韩国瑜击败原被广泛看好的现任领导人蔡英文，以些微优势赢得胜选，成为新任台湾地区领导人。选举结果一经公布，立即在岛内外引发高度关注与震动。\n\n此次胜选被外界视为台湾民意剧烈波动的体现。经由专家分析指出，经济民生困境、政治对立加剧及对现任政府两岸政策的不满，成为选民转向保守势力的关键原因。韩国瑜阵营则称，此次胜利是\"人民对稳定与沟通的渴望\"。\n\n中国大陆对选举结果表达\"积极评价\"，并释放善意信号，表示愿意在\"九二共识\"基础上恢复协商与交流。而台北方面则进入政治重组阶段，民进党高层已召开紧急会议。\n\n国际社会普遍对局势保持关注，敦促台湾新政府维持现状、保障区域和平。日、英等国政府则呼吁\"理性过渡\"，避免不稳定因素扩散至印太地区。"
 taiwan.28.a: "……天无绝人之路？"
 
 taiwan.29.t: "民进党胜选引发大陆强烈反对 "
 taiwan.29.d: "随着2020年台湾地区领导人选举落下帷幕，民进党候选人蔡英文宣称胜选。有关部门随即严正重申，台湾自古属于中国，绝不容许任何\"台独\"行径分裂国家。\n\n国台办发言人严厉谴责民进党当局拒不承认\"九二共识\"，公然挑战一个中国原则，严重破坏台海和平稳定。发言人强调，祖国大陆有坚定的意志、充分的信心和足够的能力挫败任何分裂图谋，坚定捍卫国家主权和领土完整。\n\n北京方面指出，台湾问题纯属中国内政，任何外部势力干涉必将遭到坚决反制。大陆方面警告，任何\"台独\"势力与外部势力的勾连与挑衅，都将遭到有力打击。\n\n分析人士指出，尽管民进党继续顽固推进分裂立场，但历史大势不可逆转，祖国统一是不可阻挡的，任何背叛民族的行径必将以彻底失败告终。两岸关系的未来方向已由历史和人民作出明确选择。"
 taiwan.29.a: "持续关注台海局势变化，坚定支持维护国家统一的一切正义行动。"
 
 taiwan.291.t: "美国国务院对台海声明"
 taiwan.291.d: "在台海局势再度紧张之际，美国国务院发表声明，重申\"反对任何一方片面改变台海现状\"的立场。声明中强调，美国\"对台政策未变\"，继续依据《与台湾关系法》与\"六项保证\"维持对台支持，并呼吁双方\"保持克制，避免误判\"。\n\n美国务院发言人表示：\"我们对近期台海区域出现的紧张态势深表关切。我们重申，和平与稳定符合国际社会共同利益。敦促各方避免采取可能激化局势的单边行动，特别是使用武力或胁迫。\"\n\n第七舰队部分舰艇\"例行性航行自由任务\"中继续出现在西太平洋地区。尽管中方批评其\"干涉内政\"，美方官员则表示，这些行动\"完全符合国际法，且与当前地区局势无关\"。"
 taiwan.291.a: "华盛顿拒绝接受强力改变现状！"
 
 taiwan.292.t: "特朗普宣布对台军援"
 taiwan.292.d: "在台海局势持续紧张之际，美国总统唐纳德·特朗普在一场记者会上宣布，将向台湾提供\"规模空前的防御性军事援助方案\"。该援助包括防空导弹、雷达系统、无人机及\"有限数量的反舰武器\"。特朗普表示：\"台湾正在为自由而战，美国不会袖手旁观。\"\n\n该声明引发国际高度关注。相较于国会内部已出现跨党派议员声援，中国外交部对此表示\"强烈谴责\"，并警告美方\"不要玩火\"。\n\n五角大楼则表示，美方\"将评估相关转交机制\"，但强调\"任何对台军事支援都将基于防御性质，并符合现有法律框架\"。"
 taiwan.292.a: "这是对中国主权的侵犯！"
 
 taiwan.293.t: "佩洛西访台引发地区震荡"
 taiwan.293.d: "众议院议长南希·佩洛西乘坐专机抵达台北，并在台北\"立法院\"发表演讲。她在讲话中强调美国\"支持台湾的民主制度\"，称\"台湾不孤单\"，并呼吁深化美台关系。\n\n解放军东部战区随后宣布，启动\"环台岛实战演训\"，多支海空兵力在台湾周边展开大规模实弹演练，涵盖联合封锁、突防打击、区域拒止等多个科目。多枚导弹越过台湾本岛上空，引发岛内空防戒备升至最高等级。\n\n尽管白宫试图淡化事件影响，称\"此访为议长个人行程\"，但国际社会普遍认为，这一事件标志着中美关系进一步恶化."
 taiwan.293.a: "风暴已至。"
 
 taiwan.30.t: "解放军台海军演加剧两岸紧张局势"
 taiwan.30.d: "随着海峡两岸势持续紧张，解放军近日在台湾海峡及周边海空域组织大规模军事演习。演习科目涵盖联合夺控、远程打击与海空协同作战，实兵实弹演练强度为近年来罕见。\n\n国防部发言人表示，此次演训是对当前台海局势变化的必要反制，旨在捍卫国家主权和领土完整，维护台海地区和平稳定。发言人强调，针对\"台独\"分裂势力和外部干涉行径，解放军将持续加强备战练兵，坚决打击一切挑衅。\n\n台湾方面则指责大陆\"加剧区域紧张\"，台防务部门称已全程掌握相关动态，并提升战备等级，以防\"不测事态\"。\n\n军事专家指出，随着近期两岸关系明显恶化，军事对峙风险持续上升。解放军的军事施压被视为对民进党当局不断推进\"渐进式台独\"路线的直接回应，而台方在外部势力支持下亦表现出强化抵抗的姿态。台海局势短期内恐将维持高压态势，地区安全形势不容乐观。"
 taiwan.30.a: "我们将持续关注解放军台海演训动态。"
 taiwan.30.b: "此类措施旨在遏制台湾独立企图。"
 
 taiwan.31.t: ""
 taiwan.31.d: ""
 taiwan.31.a: ""
 
 taiwan.32.t: "最终……我们撑过了考验！"
 taiwan.32.d: "经过数周激战，面对太约部队的顽强抵抗，解放军攻势已全面受阻，其击溃我军与政府的作战目标宣告失败。近日情报显示解放军正放弃占领区，但暂未公开以防解放军突袭反攻。随着日澳多方证实共军正从包括金门在内的各战线撤军，总统府终于于黎明时分宣布民主力量获胜。\n\n伴随地面入侵部队撤离，空军与海军也已停止所有军事行动，天空与海域重新开放。满目疮痍的码头和机场正接收来自全球各地和太约盟友的人道主义援助。\n\n然而一切远未结束。我们的城市化为废墟，工厂遭摧毁，铁路公路瘫痪，身为皇冠明珠的半导体产业更被彻底抹去。不仅如此，太约情报指出共军此次惨败极可能引发其国内政治动荡，或将催生更具侵略性的领导层，在未来数年持续威胁我国民主自由。眼下，艰巨的重建任务正摆在面前。"
 taiwan.32.a: "而我们的人民正漫步于人生路之上。"
 
 taiwan.34.t: "国防部函"
 taiwan.34.d: "受文者：总统府\n速别：最速件\n主旨：我国国防现状\n\n我军阻止解放军攻入台湾本岛的主要目标已失败。解放军利用我方防御漏洞，现控制多个主要城市及港口，严重削弱我军作战能力。因首要目标未达成，战斗已无法局限于海岸线，我军被迫转入城市及山地作战。\n\n解放军现已推进至环绕剩余城市与山脉的第二防线，复杂化的城市及山地环境可转为防御优势。国军陆军已在解放军控制城市外围建立防御阵地，更有能力阻滞其后续推进。\n\n太约组织在此次冲突中亦伤亡惨重，意外地对军民心理产生双重冲击。在确认太约部队确为并肩战友后，民间志愿人员正大量投入防御工事构筑与后勤支援。此举显著提升士气与防御效能，据指挥官报告，地面部队作战意愿与战备状态已达历史高点。"
 taiwan.34.a: "我们一定会赢的……"
 
 taiwan.35.t: "余波"
 taiwan.35.d: "上午6:27。\"[防空警报]敌机空袭台湾各地区，请就近避难。\"\n学校突然停课的第四周，凯智理再次被刺耳的空袭警报声吵醒，窗外阴云密布，仿佛随时会落下炸弹。三架F-16战机呼啸着升空拦截，几乎盖过了警察的喊声：\"别搭电梯，走楼梯！\"\n\n上午6:50。\"[防空警报]台湾地区防空警报于06：50解除，发现不明物体请通报警消。\"\n轰鸣声停止，避难者们井然有序地走出，开始他们的战时日常。凯匆忙赶往他工作的全家便利店，为上午8点的班次做准备。十几名顾客已经在外面等候，手里拿着纸币、硬币和政府发放的食物券。今天一切如常——除了他被告知要训练实习生如何整理用过的票卷。\n\n下午2:00。\"中央气象局日照时间通知——今天充足日照直到下午6:35。\"\n\"陈经理——把这些打印100份并分发下去。政府要求的。PA20018583.pdf。\"两个小时前，当阳光穿透云层时，他还抱有一线希望，但中央气象局的更新证实了——今天没有短班。他失望地让实习生去打印传单，而他短暂休息后回到收银台。\n\n下午6:50。\n为节省带宽与电力，民用网络开始限流。虽然实施汽油配给后车辆已很稀少，但路灯仍会短暂亮起防止事故。凯步行回家时，发现了一个绿色迷彩桌布的摊位——像学园祭上的那种。他好奇地走上前去。摊位经理向他招手。\"我们正在组织民防小组，\"他说。\"加入我们的培训项目就可以学习识别未爆弹药（UXOs）和处理伤员，以支援我们的消防和医护人员。\"\n\n下午6:52。\n凯拿起一本小册子读了起来。政府资助、自愿性质、不涉及武器、不是民兵或炮灰部队。常见问题解答栏目回答了他大部分问题。他停顿了一下，深吸一口气。"
 taiwan.35.a: "\"我该什么时候开始工作？\""
 
 taiwan_detente.0.t: "国民党赢得台湾选举"
 taiwan_detente.0.d: "近期，在我方社交媒体平台上广泛传播、引发热议的话题，莫过于台湾地区地方选举的结果。此次选举中，民众选出韩国瑜担任该分裂地区的行政负责人。有人对此表示庆祝，认为是对激进\"台独\"势力的一次有力否定；也有部分网友质疑该次\"地方选举\"的合法性。\n\n国台办对这一结果并未作出过多评论，仅重申所谓\"总统选举\"不过是台湾地区的一次地方选举，外部势力不应干涉中国内政。不过，据传政府内部部分人士对于国民党的胜选持谨慎乐观态度，认为该党在立场上较倾向于与我方沟通合作，有助于维持两岸关系的温度。尽管对韩国瑜是否真心致力于恢复两岸联系仍存疑虑，但在民进党下台的背景下，整体对话的推进至少将会更加顺畅。"
 taiwan_detente.0.a: "我们希望他们能够明辨是非。"
 
 taiwan_detente.1.t: "向大陆伸出橄榄枝"
 taiwan_detente.1.d: "随着选举尘埃落定，内阁人事底定，我们终于可以着手处理国家事务。当前议程中最重要的一项，就是终结蔡英文政府与大陆\"保持距离\"的两岸政策。这一政策不仅严重冲击了本地观光与农业产业，大陆方面也因应多次祭出禁令，限制部分商品输入，并加强对陆客来台的控制，致使游客数量锐减，直接影响民生。更令人忧心的是，中共多次对民进党政府发出强硬警告，令社会陷入不安与焦虑。\n\n为扭转现状，陆委会将以修复两岸关系为首要任务。我们将重启对话，筹划高层会晤，全力尝试释出善意，希望大陆方面能够回应和平之意，重回合作共赢的道路。"
 taiwan_detente.1.a: "两岸互动的新时代。"
 
 taiwan_detente.2.t: "国民党政府寻求和解"
 taiwan_detente.2.d: "我们近期获悉，自从激进\"台独\"政党掌权以来几近停摆的台湾陆委会，已通过海峡交流基金会主动与我方接触，表达重建两岸外交联系的意愿。据悉，对方已有数位代表与我方进a行初步沟通，商讨筹备未来更具正式性与全面性的会谈。我方对此作出积极回应，国台办已私下核准数位台湾代表入境的外交许可，但目前尚未对外发布进一步评论，以待双方寻求更多共识后再行公布。\n\n尽管我们对台湾和平回归的前景并不抱有过高期待，但仍希望此次会谈能作为契机，促使台湾人民重新认识两岸骨肉相连的兄弟情谊。"
 taiwan_detente.2.a: "好的。"
 
 taiwan_detente.3.t: "通往和平的基石"
 taiwan_detente.3.d: "陆委会的和平事务团队带来了好消息！海基会已成功与大陆的海协会取得联系，显然是在国台办默许下进行的接触，并就未来会谈建立了初步共识。其中一项重要内容，是本届政府表达了对\"九二共识\"持开放态度的立场。自李登辉时代以来，\"九二共识\"一直是两岸和平交流的基础，包括马习会在内的重要会谈，也都建立在这一共识之上，其意义可追溯至1945年的重庆谈判。\n\n借由来自对岸的善意，我们将开始筹备更多开放性的基层交流活动，以缓和岛内的反中情绪，为未来更高层次的政治与经济峰会奠定基础。我们也会吸取《两岸服务贸易协议》推进失败的教训，避免再次激发强烈的反中情绪——当年正是这种情绪，为反对派掀起2014年\"太阳花运动\"提供了土壤。"
 taiwan_detente.3.a: "好！"
 
 taiwan_detente.4.t: "厦门会议"
 taiwan_detente.4.d: "在对岸同仁积极回应之后，内政部与陆委会迅速展开行动，努力打破与大陆之间的坚冰。最新民调显示，三分之二的受访者支持或不反对重启对话。在总统府的授权下，陆委会代表启程前往厦门，并得到了大陆官员的热情接待。\n\n此次会谈成为各大媒体关注焦点，三项重要成果尤为瞩目：会议盛大开幕、此前因蔡英文政府对陆敌意政策而遭到报复性禁止的多项农产品恢复输入、以及关于新冠病毒最新情况的讨论。大陆方面也同意在防疫事务中担任中介角色，协助传递世卫组织的相关信息，并同步转达我方通报。\n\n本次会谈被外界广泛视为马总统执政团队的重要突破，陆委会方面也已规划后续多轮交流。与此同时，大陆代表团预计不久将访问金门，推动两岸旅游合作，也进一步巩固金门作为国民党在离岛的重要支持据点。"
 taiwan_detente.4.a: "未来一片光明。"
 
 taiwan_detente.5.t: "台湾自由行"
 taiwan_detente.5.d: "\"请注意，飞往台北的BR721次航班即将登机，这是最后登机广播。尚未登机的乘客请立即前往3号登机口。\"\n\n广播声在航站楼回荡时，黄福基正气喘吁吁地奔向3号登机口，手中紧握着护照与登机牌。简单核对后，他登上了飞机。\n\n引擎轰鸣，地面逐渐远去。他打开手机，查看从国台办网站上截取的页面，仔细阅读赴台自由行的注意事项与禁忌。作为一位习惯事前筹划的旅客，他为此趟旅程制定了精确到分钟的行程表，同时也基于过往经验预留了充足的缓冲时间。\n\n抵达台北后，当地机场电视正播放着关于\"上海会谈\"成功举行的新闻，宣布大陆恢复个人赴台游。然而黄福基对此并不关心——他的目光紧盯着行李提取信息，心里只想着即将展开的旅程。\n\n夜幕低垂，他入住的是七年前住过的那家酒店。不同的是，这一次没有导游、没有喧闹的旅行团、没有被催促的节奏。明日清晨，他将前往传统菜市场与木栅动物园，期待一睹熊猫与其他珍稀动物的风采。"
 taiwan_detente.5.a: "旅途愉快。"
 
 taiwan_detente.6.t: "新加坡会谈开幕"
 taiwan_detente.6.d: "在新加坡的极力促成下，大陆与台湾地区代表近日在新加坡正式展开会谈，就两岸关系发展相关议题进行协商。此次台湾方面由中国国民党代表出席，大陆方面则由国务院台湾事务办公室代表组成代表团。\n\n双方本着平等协商、互相尊重、搁置争议、求同存异的原则，就两岸经贸合作、人员往来便利化、区域和平稳定等议题进行了深入沟通，并在多个领域达成初步共识。会谈气氛坦诚积极，展现出重启交流、改善关系的共同意愿。\n\n新加坡外交部表示，欢迎双方选择在新加坡作为中立场地对话交流，并希望此次会谈有助于缓解紧张局势，推动地区和平稳定。"
 taiwan_detente.6.a: "看看他们会谈些什么。"
 
 taiwan_detente.7.t: "两岸统一议题迫在眉睫"
 taiwan_detente.7.d: "在美国内战局势恶化之前，国际外交格局已显现明显的变化迹象。随着美国国内社会分裂日益加剧，政府运作频频受阻，其在国际事务中的影响力持续衰退。\n\n在这一背景下，中国大陆加紧掌控周边局势。与此同时，台湾内部也出现了多元声音，一些主流政党呼吁重新审视两岸关系的走向，以避免在国际力量重组中被边缘化。\n\n不久之后，随着美国内战正式爆发，美国政府的对外干预能力骤然下降，亚太地区的安全局势出现了重大空缺。中国大陆明确表示，将坚定不移地推进国家统一进程，坚决反对任何形式的分裂行径，强调维护国家主权与领土完整的决心绝不会动摇。\n\n在台湾，面对政局动荡，国民党等主要政治力量呼吁以更务实的态度面对两岸现实，主张通过和平谈判寻求新的安排。"
 taiwan_detente.7.a: "分裂要结束了？"
 
 taiwan_detente.8.t: "新加坡两岸会谈提出统一议程"
 taiwan_detente.8.d: "本周，来自中国大陆和台湾的代表团在新加坡政府的协调下举行了新一轮谈判。此次会谈正值美国内战、亚太局势深刻变动之际，因而引发国际社会的广泛关注。\n\n在会谈过程中，大陆代表团正式提出加快推进两岸统一进程，呼吁建立常态化沟通机制，并就统一框架展开实质性对话。代表指出：\"实现祖国完全统一是十四亿人民的共同心愿，也是中华民族伟大复兴的关键一步\"，强调应把握当前的历史机遇。\n\n由中国国民党领导的台湾代表团则持谨慎态度。台方重申致力于和平处理两岸关系，但对统一议题持\"开放但保留\"的立场，强调必须维护台湾民众的生活方式、社会制度与核心利益。\n\n这是多年来统一议题首次作为正式议程重返两岸谈判桌。尽管前路充满不确定性，但此次对话本身已具有重要的战略意义。"
 taiwan_detente.8.a: "两岸统一是必然趋势。"
 
 taiwan_detente.9.t: "新加坡会谈破裂"
 taiwan_detente.9.d: "在新加坡举行的两岸会谈于今日宣告中止。双方在统一议题与政治安排上的关键分歧始终未能缩小，会场气氛一度紧张，最终未发布联合声明。\n\n大陆代表团在会中强调，当前国际格局剧烈变化，两岸应抓住战略窗口期，推进统一进程。大陆方面提出设立联络机制并商讨统一路径草案，重申\"和平统一是最大诚意，不排除必要选项\"的政策立场。\n\n台湾方面则明确拒绝进入任何涉及统一议程的阶段性协商。国民党主导的代表团，称现阶段\"缺乏岛内共识\"，并对大陆在会中强调\"一国框架\"表达严重关切，要求\"先处理现实接触、建立互信\"，再谈后续安排。\n\n闭门会议持续不到两小时即告中断，双方未安排媒体简报，代表团分别提前离场。\n\n新加坡外交部对此表示遗憾，呼吁双方保持沟通渠道畅通，并避免言语升级和误判风险。"
 taiwan_detente.9.a: "至少我们尽力了。"
 
 taiwan_detente.10.t: "最终抉择"
 taiwan_detente.10.d: "中南海深夜，习近平独坐勤政殿办公室。案前摊开的泛黄台湾海峡地图上，凌厉灯光将海界线照得如同历史裂痕。\n\n总参谋部与中央军委的汇报反复确认：和平统一的关键窗口期已然消逝。岛内民意深度撕裂，外部干涉持续加剧。再等，将彻底丧失战略主动。\n\n十年来，他始终避免对抗，谋求稳定的国际秩序，化解风险。但时间，此刻却成了最凶险的敌人。统一不再是政治选项，而是关乎国家完整与未来的存亡抉择。他清楚代价——战场牺牲、经济震荡、国际压力乃至重大政治风险。但历史不会等待。\n\n\"风险？\"他望向夜色，\"革命年代，我们的同志哪次前进不冒风险？\"中南海的空气仿佛凝固，举国目光似都聚焦于此。\n\n\"命运只留下这条单行道。\"\n\n\"准备下一阶段行动。\""
 taiwan_detente.10.a: "历史的大门已然敞开。"
 
 taiwan_detente.11.t: ""
 taiwan_detente.11.d: ""
 taiwan_detente.11.a: ""
 
 taiwan.500.t: "最终决战"
 taiwan.500.d: "在数周可疑的东协动向以及中日冷战紧张局势不断升级达到新高峰后，许多国际观察家预计热战即将爆发。尽管太约组织加强了外交斡旋试图缓和局势，但北京和东京均已宣布两大阵营进入战争状态，我们被迫再次为生存而战。\n\n当所有外交努力徒劳无功，亚太地区最激烈的区域冲突已在我们眼前展开。这场人类迄今规模最大的战争将波及30多亿人口，现实而言我们无法指望中方会像以往那样退让。要么太约彻底摧毁中国的战争机器及其重启冲突的能力，要么东协将推进征服亚洲其余地区。\n\n对我们而言，这是本世纪第二次面临存亡威胁。这个曾受挫却未屈服的新中国政府，在复仇主义情绪和亚洲新盟友的驱动下，必将像2021年那样试图颠覆我国政府、摧毁民主制度。为确保我们的未来，我国决定投身大亚洲战争，与民主盟友并肩作战，一劳永逸地击败北京领导的邪恶联盟。"
 taiwan.500.a: "我们上吧！"
 
 ROC_CHI.1.t: "突袭"
 ROC_CHI.1.d: "海风越过防波堤，带着盐分与冷意，拍击着岸边的混凝土与消波块。林承翰立在临时构筑的海岸防线上。已经连续十多天的警戒，让人开始怀疑紧张本身是否多余。海面过于平静，没有渔船，也没有巡逻艇，甚至连夜航货轮的影子都消失了。这种空白，比任何异动都更让人不安。\n\n一道不合时宜的光闪在海面上又很快消失。林承翰的视线瞬间凝住。他下意识伏低身体，借着夜视仪重新捕捉海平线。海面上，轮廓开始浮现。他几乎是冲进掩体的，声音在压低的同时失去了所有伪装的镇定：“周柏谦！起来！快看海上！”\n\n周柏谦从睡袋里弹起，神情尚未完全清醒，却在夜视仪贴上眼眶的一刻彻底僵住。外海方向，一片低矮而密集的影子正破浪前行。“……是共军。”他的声音几乎贴着喉咙挤出来。数十艘灰色登陆艇分成数列。部分艇只后方隐约可见更大的黑影，像是两栖装甲或支援舰艇的轮廓。\n\n林承翰的心跳陡然加快，血液在耳中轰鸣。他重新校正姿势，手指稳稳扣在扳机护圈外侧，他的声音不大，却异常清晰，“全线战斗状态。把画面、坐标、时间全部传上去。”他停顿了一瞬，目光死死盯着那片正在逼近的海。\n\n“告诉指挥部共军正在登陆台北。”\n\n下一秒，刺耳的警报声沿着海岸线炸开，穿透风声与浪声，直扑内陆。尚未完全苏醒的台北，被海上传来的黑影逼入现实。"
 ROC_CHI.1.a: "维持阵线！"

 ROC_CHI.2.t: "平民"
 ROC_CHI.2.d: "中國軍隊的導彈和戰機已經連續轟炸好幾天，台中市區的電力早斷了，水也停了，醫院只能靠最後幾台發電機苟延殘喘。陳建宏坐在父親的病床邊，手裡緊握著一張泛黃的全家福。那是五年前中秋節拍的，右邊父親還笑得開懷，中間的自己剛畢業，左邊的母親帶著幸福的笑容。可面前現在只剩一張沒有血色的臉。父親的肺癌本來就越來越糟，戰爭爆發後，化療藥早就斷貨，止痛藥也只剩半瓶嗎啡。病房裡瀰漫著消毒水混雜屎尿和血腥的味道，隔壁床的阿伯剛斷氣，護士連抬出去的力氣都沒有，只能用床單蓋住，等空襲間隙再處理。\n\n「爸，我去樓下找點吃的回來，你撐一下。」陳建宏低聲說，聲音乾澀得像砂紙。他站起來的時候腿都在發抖。失業已經快一个月了，原本在精密機械廠上班，戰爭一打，工廠直接被飛彈炸成廢墟，老闆跑了，同事死的死、逃的逃。家裡存款早燒光，母親前天去排隊領救濟米，可惜遇上了解放軍的飛彈攻擊，最後被人潮踩死。\n\n走廊上擠滿傷患和家屬，有人抱著斷肢哭喊，有人呆坐牆角發愣。樓梯間的玻璃全碎了，風灌進來时夾雜遠處爆炸的悶響和焦味。陳建宏小心避開地上的血跡和碎玻璃，腦袋裡只有一個念頭就是至少讓父親吃一口熱的，讓他不至於餓死。\n\n他剛踏出醫院大門，夜風像冰刀似的吹在他臉上。忽然天空亮起一道刺眼的火線，下一秒，巨響撕裂耳膜，整個世界晃動起來。醫院東翼直接被命中，火光衝天，鋼筋混凝土像紙片一樣飛散。人群的尖叫，哭喊和建築的崩塌聲混成一片。\n\n陳建宏被氣浪掀倒，臉貼在地上，滿嘴的泥土和血。他爬起來，雙眼空洞望向剛才還亮著微弱燈光的病房大樓。現在那裡只剩半邊，火舌從斷裂的樓層舔出來，像怪獸般的吞噬一切。他知道父親在那裡，也知道自己剛剛才離開那張病床和死神擦肩而過。「爸……」聲音被爆炸的餘波吞沒。\n\n煙塵還沒散盡，遠處傳來靴子踩碎玻璃的急促腳步。一隊穿著迷彩、臂上綴著青天白日徽的後備軍人衝過來，手裡拿著名單和手電筒搜尋能找到的幸存者。他們神情疲憊，眼中帶滿血絲不敢有一絲怠慢「你！身分證！」領頭的班長一把抓住陳建宏的胳膊，力道大得像鐵鉗。陳建宏沒有掙扎，他只是又看了一眼燃燒的醫院，火光映在他瞳孔裡，像兩團永遠熄不滅的恨。"
 ROC_CHI.2.a: "隨後他轉頭目光冰冷的看向海對岸的方向"

 ROC_CHI.3.t: "全台無戰事"
 ROC_CHI.3.d: "夕陽西下，斜斜的陽光照舊灑落在這塊小小的彈丸之地上，此時通常是高中生放學的時候，三三兩兩的情侶手牽手，襯衫包裹青澀的情感與愛意。朱敏宣永遠記得那個男生的手，每次鐘聲一響，她總是一把抓起書包衝向校門，為的就是能夠第一時間找到他。\n\n敏宣總是盼著能跟他永遠逃離這個考卷跟課本構成的囚籠，她放下沙包，舉起袖子擦了擦汗，當年白色的學生服成了綠白相間的野戰軍服。敏宣以一種令她怎麼想也沒想到的的方式回到她的母校，當年學測失利的她被家人送入軍校入伍，那位男生北上讀書去了，相隔兩地過後兩人很少再聯絡，不知道他過的怎麼樣？\n\n她在學校各個出入口堆好大量沙包，奉連長之命清出剩餘教室的課桌椅，一部分搬到臨時連指揮部、剩下的當作街壘扔到路上充當路障。天色漸漸黯淡，最後一間教室終於整理完了！敏宣長舒一口氣，餘光卻在桌椅堆瞥到一抹異樣的白，在微弱的路燈下是如此顯眼。她撿起那個東西，是一封信，上面只寫了三個歪歪扭扭的大字：給敏宣\n\n敏宣知道自己不應該在備戰之時閱讀書信，但她還是忍不住拆開信封，裡面是熟悉的字跡，每次抄作業時她都沒少抱怨過這種瀟灑的「文筆」。\n\n讀到一半，敏宣發現大半信件早已濕透，淚水和汗水混雜著情感在此刻宣洩而出，當年來不及表達的情感現在才被發現⋯⋯\n\n導彈落地的爆炸將她狠狠甩到牆上，她無力地攤在地上、手中信件滑落、視野染上一層暗紅、敏宣的意識逐漸模糊……過去因為害羞而不敢坦承的愛意..."
 ROC_CHI.3.a: "可能也永遠無法得到兌現"

 ROC_CHI.4.t: "查禁"
 ROC_CHI.4.d: "夜色壓低在城市上方，街燈一盞盞亮起，卻照不透巷弄深處的陰影。消息在傍晚傳開——台灣人民共產黨被正式取締，多處據點同步遭到搜索，相關人員被帶走調查。名單沒有公開，但傳聞已經在圈內迅速擴散。\n\n吳榮元坐在辦公室裡，窗外的車流被雨水拉成模糊的光帶。他沒有開燈，只讓桌上的檯燈照著文件，指尖停在紙面上，沒有翻頁。\n\n「動作太快了。」他低聲說。\n\n這場行動以國安為名展開，程序嚴整、節奏緊密，幾乎沒有留下縫隙。表面上針對特定組織，但在他看來，範圍顯然不只如此。那些長期處於邊緣地帶的人，忽然之間都變得顯眼起來。\n\n桌上的手機亮了一下，是訊息，又很快暗下去。他沒有去看，只是把手收回來，靠在椅背上。窗外傳來警車的聲音，短暫又清晰，隨即遠去。辦公室裡只剩空調運轉的低響。\n\n他重新坐直，開始整理桌上的文件，把幾份資料分開放好。動作不急，但很有條理。\n\n「局勢在變。」他說，像是在確認一件已經發生的事。"
 ROC_CHI.4.a: "風聲越來越緊"

 ROC_CHI.5.t: "立法院"
 ROC_CHI.5.d: "立法院內原本就不平靜。主席台被在野黨立委占據，標語與文件散落四周，擴音器反覆傳出抗議聲。這樣的對峙已經不陌生，只是這一天，界線開始鬆動。\n\n外圍的人群迅速聚集。最初只是零星喊聲，很快連成一片。幾處出入口同時出現推擠，安保人員試圖維持秩序，卻被不斷增加的人流擠開。門被推開，人群湧入，聲音在大廳裡放大回響。\n\n議場內的距離被壓縮。原本隔著桌椅與程序的對抗，轉為面對面的拉扯。有人高聲指責，有人試圖阻擋，更多人被推著向前。手中的文件被扯落，標語倒下又被踩過，現場逐漸失去原有節奏。\n\n主席台周圍最先崩解。幾名占據者被強行拉開，有人跌倒，有人被人群推離原位。短暫的反抗很快被更大的力量吞沒，場面變得混亂而直接。\n\n媒體鏡頭在邊緣記錄這一刻。畫面裡沒有清楚的分界，只有交錯的人影、斷續的喊聲，以及不斷移動的焦點。有人憤怒，有人猶豫，也有人只是站在原地，被氣氛推動。\n\n議場的秩序在短時間內瓦解。原本依靠程序維繫的結構消失，只剩下人群本身的力量在運作。\n\n聲音仍在持續，沒有人能確定接下來會如何收場。"
 ROC_CHI.5.a: "乱死了"

 ROC_CHI.6.t: "清算"
 ROC_CHI.6.d: "夜幕壓下來時，城市沒有安靜。各地街頭開始聚集人群，聲音一層層疊上去，像從地面湧出的回響。戰後的廢墟還未清理，牆面斑駁、路燈忽明忽暗，卻很快被新的動作填滿。\n\n紀念設施最先成為目標。幾座銅像在繩索與人力的拉扯下傾斜、倒下，金屬撞擊地面的聲音在夜裡傳得很遠。玻璃被打碎，石材剝落，原本安靜的場域被迅速改變，留下散落一地的碎片與標語。\n\n人群持續向外擴散。旗幟、口號與燈光交錯，有人高聲呼喊，也有人沉默地跟隨。情緒在不同人之間傳遞，從壓抑轉為直接，從觀望轉為行動。\n\n另一側，政治機構與相關據點同步出現變化。公告被貼上門口，封條覆蓋舊有標誌，出入口被接管。部分人士試圖離開，卻在街口被攔下，爭執迅速升溫，推擠與喊聲交織在一起。\n\n更遠的地方，墓園也未能維持原狀。石碑被移動、翻覆，供品散落，現場的人群來去不定，有人停下腳步，也有人繼續向前。\n\n警笛聲斷續響起，卻難以覆蓋整體的喧嘩。整座城市像被同一股力量牽引，各種聲音在夜色中彼此碰撞。\n\n沒有人宣布結束。動作仍在延續，範圍也在擴大。"
 ROC_CHI.6.a: "一切正在改變"

 ROC_CHI.7.t: "左翼聯盟"
 ROC_CHI.7.d: "戰火蔓延之際，台灣左翼陣營出現罕見整合。勞動黨主席吳榮元、帶有毛派背景的代表陳信行，連同多個左翼團體與工運組織，宣布重組為『台灣左翼聯盟』，並發表聯合聲明，公開支持抗戰動員。\n\n台北一處勞工文化中心低調舉行發布會。出席者包括各派左翼代表、工會幹部，以及白色恐怖受難者家屬與社運人士。場內氣氛壓抑而集中，言語克制，卻指向同一個目標。\n\n吳榮元宣讀聲明，聲音沙啞卻穩定：「面對軍事侵略與戰爭壓力，左翼不能再分散。過去關注階級與勞權，現在必須共同承擔防衛責任。反戰並不等於放棄抵抗，在現實面前，我們選擇保護這片土地上的人民。」\n\n陳信行接著發言，語氣冷靜：「我們長期反對帝國主義與資本壓迫，也批判各種權力結構。但當外來武力直接威脅人民生存時，沉默不再是選項。」他略微停頓，補充道：「這場抵抗，對我們而言首先是人民自保，而不是意識形態的勝負。」\n\n聯盟隨後公布行動方向：協助後備動員、建立勞工支援網絡、維持基本民生，同時監督戰時資源運用，避免權力失衡。對內則明確反對投降與破壞行為。\n\n消息傳出後，社會反應分歧。有人視為跨陣營的戰時整合，也有人質疑立場轉變過於急促。街頭與集會現場，左翼標語與防衛口號並列出現，彼此之間仍帶著張力。\n\n會後，陳信行在簡短訪問中說：「立場可以辯論，但前提是人還活著。」"
 ROC_CHI.7.a: "我還以為他們會當帶路黨呢"

 ROC_CHI.8.t: "民主聯軍？"
 ROC_CHI.8.d: "黎明前的桃園國際機場仍亮著跑道燈，一架接一架航班降落。最先出現的是一支名為『觀察與評估』的國際小組——成員來自日本、澳洲與歐洲，多是退役將領、情報人員與政策顧問。他們穿著低調的防護裝備，攜帶衛星通訊與偵察設備，沒有旗幟，卻帶著明確任務。領隊馬修·李與接應官員簡短交談後，隨即被護送離開，直赴指揮中樞。\n\n南方的高雄港，同時迎來另一批人。掛外籍旗的貨輪緩慢靠岸，艙門打開後走出的不是貨物，而是一支混合戰鬥團隊——來自東歐戰場的退役志願軍、東南亞私人安保人員，還有少數抱持強烈政治立場的歐洲志願者。他們裝備各異，語言混雜，領隊「雷克斯」語氣乾脆，只留下兩句話：「我們不屬於任何一方，但會作戰。」\n\n機場另一側，人流變得更零散。自發前來的志願者陸續入境，有人曾在中東或東歐作戰，也有人只是帶著裝備與信念抵達。背包裡塞滿夜視器材與醫療用品，臉上則是各自不同的理由。臨時設立的登記中心迅速運作，發證、編組、分流，一切在混亂中勉強維持秩序。\n\n部分政治團體也現身接機，口號與立場交錯，短暫引發騷動，又很快被現場維安壓下。\n\n總統府的聲明語氣克制，只提到「感謝選擇站在台灣一側的人」。同時，臨時法規已啟動——志願者被納入戰時體系，提供基本保障；受雇人員則以合約形式編入特定任務單位。\n\n街頭的反應並不一致。有人稱這是國際支援的象徵，也有人質疑局勢正在失控。只是到了前線，情緒變得單純得多——當不同語言的士兵並肩挖掘掩體時，疲憊中多了一點不那麼孤立的感覺。"
 ROC_CHI.8.a: "國際縱隊也來了？"

 ROC_CHI.9.t: "黑夜"
 ROC_CHI.9.d: "臺中的夜空被撕開，導彈飽和打擊過後，港區成了一片燃燒的廢墟。濃煙隨海風翻湧，刺鼻氣味壓得人幾乎無法呼吸。陳浩然從倒塌的貨櫃後撐起身子，耳中仍在嗡鳴，他抬頭望去，遠處機群尚未散去，引擎低吼在夜裡迴盪。\n\n張凱倫握著焦黑的步槍，手臂被彈片劃開，血沿著槍身滴落。「海軍陸戰隊撐不住了……直升機已經進內港。」她的聲音乾裂。\n\n李欣怡跌跌撞撞地跑來，懷裡的通訊機只剩雜音：「指揮部失聯，民防隊也散了。」她抬頭，眼裡既驚惶又倔強。\n\n忽然，空中傳來刺耳的呼嘯。白色傘花在火光映照下接連綻開，像從黑暗中墜落的影子。許子豪躲在斷牆後，盯著那些緩慢下沉的身影：「他們直接空降進市區了。」聲音壓得很低。\n\n街角的翻覆計程車旁，楊芷萱抱著受傷的母親躲進陰影，呼吸顫抖卻不敢出聲。她握緊手中的鐵管，指節發白。\n\n另一側，王承恩帶著幾名後備役守在炸毀的橋墩後，彈匣所剩無幾，呼吸急促。「再退一步，臺中就守不住了。」他低聲說，語氣幾乎逼近失控。\n\n降落傘接連落地，靴聲與槍聲同時響起。火舌撕開黑暗，街道深處傳來爆炸與崩塌的回響。\n\n「不能讓他們站穩！」陳浩然猛然起身，扣下扳機。槍火在黑夜中閃動，他的視線死死鎖住空中一個尚未落地的身影。子彈劃過夜色，那人影在空中失衡，直墜進燃燒的港區。"
 ROC_CHI.9.a: "正被烈焰吞噬"

 ROC_CHI.10.t: "迷惘"
 ROC_CHI.10.d: "高雄港外圍，一處被炸塌一半的倉儲區，鋼骨裸露在夜色裡。火還在遠處燒，橘紅的光時明時滅，把整片廢墟照得忽暗忽亮。海風吹進來，帶著鹹味，也帶著焦味。\n\n三排九班縮在斷牆後休整。班長劉承業把步槍立在身旁，手指在彈匣上來回敲著，像在確認還剩多少子彈；列兵趙子昂坐在地上，背靠水泥塊，盯著自己靴子上的血跡發愣，那血不是他的。通訊員何嘉豪蹲在一旁，反覆調整電台旋鈕，耳機裡卻只剩斷續的雜音。\n\n「連部還沒回？」劉承業沒有抬頭。\n\n何嘉豪搖了搖頭：「只聽到幾段斷訊，說要繼續推進，之後就沒了。」\n\n趙子昂忽然開口，聲音發乾：「班長，我們今天到底拿下了哪裡？」他頓了一下，又補了一句，「白天那條街，我們走過去，又退回來……人卻少了一半。」\n\n劉承業沒有立刻回答。他看著遠處還在燃燒的貨櫃區，過了幾秒才說：「任務是清理港區阻力，打通通道。」語氣平直，像在背條令。\n\n趙子昂笑了一下，笑得很短：「可我只記得誰倒在我旁邊。」他低頭看手，「他們說這是統一，是必要的，可這裡的人也在拼命。」\n\n何嘉豪把耳機摘下，壓低聲音：「宣教裡說得很簡單，落地才知道不是那回事。」他看向兩人，「我們甚至不知道前面還有沒有自己人。」\n\n遠處突然傳來幾聲槍響，三人本能地壓低身子。沉默重新落下來。劉承業終於坐下，背靠斷牆，語氣比剛才更低：「命令沒有變，我們還得往前。」\n\n趙子昂沒有再問，只是把頭埋進臂彎。何嘉豪把電台關掉，省下一點電。\n\n黑暗裡只剩火光閃動。過了很久，劉承業低聲說了一句，像是在問別人，又像是在問自己：「如果前面什麼都沒有，我們還要走多久？」"
 ROC_CHI.10.a: "繼續推進"

 ROC_CHI.11.t: "民族陣線"
 ROC_CHI.11.d: "高雄一處由舊軍事倉庫改建的會議室裡，燈光昏暗，牆面仍留著焦黑痕跡。長桌中央攤著一份染血的公開宣言，墨跡混著灰塵，簽名歪斜卻沉重。陳信豪低頭看著那些名字，想起港區被導彈擊中的畫面，神色愈發冷硬。\n\n王興煥站在窗邊，遠處港口殘骸仍在悶燒。他低聲說：「親眼看見家園被炸成這樣，我們已經沒有退路。」語氣壓抑，卻清晰。\n\n周倪安撐著桌沿起身，拍去袖上的灰塵：「從今天起，不再各自為戰。我們要組成真正能守住台灣的人。」聲音不高，卻讓室內瞬間安靜。\n\n吳欣岱提筆，在宣言末尾落下名字。他環視四周——街頭運動者、退伍軍人、基層代表——每張臉都帶著疲憊與決絕。「內鬥與退讓已經沒有意義，再遲疑，只會被炮火吞沒。」\n\n陳信豪終於開口，嗓音沙啞：「每一具屍體都在提醒我們，這場戰爭沒有幻想。我們只能自己守住這裡。」\n\n王興煥回到桌前，展開宣言，逐字念出：「侵略已經發生，台灣的未來只能由台灣人決定。我們不再容許任何形式的破壞與背叛。」\n\n門外的記者接過宣言，紙張在夜風中顫動。陳信豪舉起拳頭，目光冷峻：「從今天起，我們不只是政黨，是最後的防線。」眾人隨之舉手，掌聲與快門聲交錯。遠處火光映紅夜空，高雄仍在燃燒。"
 ROC_CHI.11.a: "左右齊上陣"

 ROC_CHI.12.t: "花蓮"
 ROC_CHI.12.d: "陸軍花蓮防衛指揮部第203旅殘部，代號『鐵拳』，現在只剩不到兩百人，散在七星潭到秀林的斷崖與廢墟間。我是連長林志偉，三十四歲，原駐佳山基地，如今那裡已成火海。\n\n清晨，兩棲登陸艇衝上沙灘，直升機自海面壓來。075型兩棲攻擊艦在外海開火，艦砲如雨落入市區。防空飛彈打掉幾架，但更多還是壓下來；空降兵直接落在機場跑道，我們的M109還沒轉向就被火箭彈擊毀。\n\n『守住七星潭！』旅長最後一聲命令後，無線電只剩靜電。\n\n戰鬥五小時後，沙灘滿是焦黑殘骸與屍體。我躲在一間被炸毀的飯店地下停車場，身邊是日澳混編小隊——日本中尉高橋翔負傷在牆角，彈藥見底；澳洲軍士長麥可·雷恩轉著最後一枚手榴彈，苦笑著問我們還能撐多久。我沒有回答，只盯著手機裡凌晨那句：『爸媽在地下室，保重。』\n\n敵軍再度推進，步兵戰車碾過沙灘。我們僅存的火箭筒擊毀一輛，爆炸碎片卻也帶走兩名弟兄。\n\n我下令撤退，但已無路可退。高橋翔單手舉槍衝出，很快倒下；麥可拉開拉環，也衝進火線，爆炸聲隨後傳來。\n\n剩下十幾人，有人哭，有人發呆。直升機低空掃射，入口坍塌，我們被困在塵土與碎石中。無線電沉默，只剩斷續慘叫。\n\n子彈打光後，我丟下步槍，握著戰術刀坐在牆邊。外頭腳步逼近，喊話器反覆命令投降。我閉上眼，想起家人、台北夜市，還有那片曾經明亮的花蓮天空，如今只剩煙火與灰燼。"
 ROC_CHI.12.a: "恍惚間想起了家人"

 ROC_CHI.13.t: "自爆"
 ROC_CHI.13.d: "花蓮山區被煙霧壓住，林間殘火未熄，空氣裡全是焦土與血的味道。國軍一個班沿著山路推進，腳步踩在碎石上發出細碎聲響。\n\n排頭的林志偉壓低身形，手勢示意停下。他盯著前方一棟半毀的水泥屋，牆面被炸開一個缺口，裡面一片死寂。\n\n「裡面有東西。」後方的陳奕廷低聲說，手心已經濕透。\n\n還沒等命令下達，屋內突然炸出一串槍聲。子彈貼著地面掃過，打在石塊上四處亂跳。國軍立刻散開，依掩體還擊，槍聲在山谷間來回震盪。\n\n幾輪交火後，屋內火力突然停了。\n\n「壓住，別急。」林志偉舉手示意，慢慢逼近。他們貼著牆邊移動，靠近那個缺口。就在此時，一個滿身血污的解放軍士兵從陰影裡踉蹌站出來。軍服破爛，渾身沾滿灰與血，眼神卻異常明亮，像燃著某種不穩定的火。\n\n他盯著外面的人，忽然笑了，笑聲乾裂又刺耳。\n\n「來啊……來啊！」他一邊喘，一邊罵，「你們不是很會打嗎？操你們的——來啊！」\n\n國軍一瞬間全都僵住，槍口對準他，卻沒人開火。\n\n那人一步步往前走，腳步不穩，卻越走越快，聲音也越來越高：「都得死！全他媽一起死！」林志偉瞳孔一縮，猛地吼：「退後！」\n\n太晚了。\n\n那士兵猛地扯開衣襟，露出胸前綁著的炸藥，手指已經死死扣住引爆器。他最後一聲幾乎是吼出來的：「去死吧台独野狗！！」\n\n強光與爆炸瞬間吞沒一切。氣浪把人掀翻，碎石與殘骸像雨一樣落下。耳鳴蓋過所有聲音，世界只剩一片白。\n\n幾秒後，煙塵慢慢落下，林志偉從地上撐起來，視線模糊，只看到原本的屋子已經不見，只剩一個焦黑的坑。旁邊幾名弟兄倒在地上。\n\n「喂！喂！還有沒有活得？」回應他的只有滿地殘尸。"
 ROC_CHI.13.a: "他媽的瘋子"

 ROC_CHI.14.t: "識時務者"
 ROC_CHI.14.d: "夜深，臨時指揮帳外風聲不斷，帆布被吹得起伏。帳內燈光昏黃，幾張臉在陰影間來回晃動。\n\n營長許國霖把地圖攤在桌上，指尖停在幾條被反覆圈畫的補給線上，沒有再往下說。他沉默片刻，才開口：「再拖下去，我們撐不了幾天。」\n\n副營長趙成遠靠在桌邊，握著水壺，指節發白：「彈藥見底，後方沒有回應。淪陷是時間問題。」\n\n話落下後，帳內更安靜了。有人低頭，有人盯著桌面，沒人願意接下一句。\n\n角落裡的韓啟山忽然開口，聲音壓得很低：「其實……也不是只有一條路。」\n\n他站直了些，語氣平穩：「對面早就放出風聲。只要我們配合，不追責，還能保住位置。」\n\n許國霖抬頭看他，眼神收緊：「你從哪裡聽來的？」\n\n韓啟山沒有閃避：「不是最近才有。」\n\n帳內的空氣像被壓住。外面的風聲灌進來，燈影晃了一下。\n\n趙成遠把水壺放回桌上，聲音低沉：「如果結局已經寫好，換條路，也未必是錯。」有人忍不住問：「你是說……過去？」\n\n沒有人直接回答。\n\n許國霖的手指在桌面上輕輕敲著，一下又一下，節奏緩慢。他看著地圖，又看了看帳內的人，像是在衡量什麼。過了許久，他才說：「這一步，走了就沒有回頭。」韓啟山沒有再說話，只是站在陰影裡。\n\n燈光下，每個人的影子都被拉長，貼在帳篷布上，一動不動。"
 ROC_CHI.14.a: "沒有人願意先說破"

 ROC_CHI.15.t: "新一輪突襲"
 ROC_CHI.15.d: "台北的夜晚原本只剩零星車聲。街燈照著空曠的路口，高樓之間的風帶著些許濕氣。某處臨時設置的哨點，幾名士兵輪流警戒，疲憊幾乎寫在臉上。\n\n聲音先是很遠，低沉而規律，像壓在城市上空的回響。\n\n「你有聽到嗎？」李志鴻抬頭，神色一瞬間繃緊。\n\n還沒等回應，天空已經出現黑影。大型運輸機貼著雲層掠過，機腹燈光閃動，隨後一片片降落傘在夜色中展開，從高樓之間緩慢下沉。\n\n「敵襲！」鄭柏庭的聲音劃破街道，警報隨即響起。\n\n整個街區瞬間甦醒。門窗亮起燈光，士兵衝出掩體，倉促就位。第一批傘兵落地時，槍聲已經響起。子彈在街道間反彈，擊碎玻璃，火花四濺。\n\n「數量太多了！」王尚澤躲在路邊車輛後方，快速更換彈匣，呼吸急促。\n\n「他們是衝著市中心來的！」林子凱壓低身形回擊，視線不斷掃過高處與巷口。\n\n傘兵迅速集結，戰術燈在樓宇間掃動，冷白光束切開黑暗。幾處路口同時爆發交火，火力交織成密集的網。車輛被打穿，招牌碎裂，街道在短時間內變得陌生而危險。\n\n「後撤！往下一線防禦點收縮！」連長周柏淵的命令在爆炸聲中斷續傳來。人員開始後移，邊打邊退。街口的火光逐漸擴大，煙霧沿著建築間隙上升，遮住了原本的夜空。"
 ROC_CHI.15.a: "城市被再次拖入戰火"

 ROC_CHI.16.t: "逆行"
 ROC_CHI.16.d: "台北的街區已經失去原本的秩序。警報聲斷續響起，遠處傳來爆炸的回音，煙霧沿著樓宇之間蔓延。路口的臨時防線被壓得節節後退，幾名國軍士兵躲在翻覆的車輛後方，子彈打在鋼板上發出刺耳的聲響。\n\n「彈藥不多了！」林志遠壓低聲音，手指快速換上最後一個彈匣。\n\n一旁的陳奕廷探頭看了一眼街角，立刻縮回來：「他們在包過來，再撐不住就要斷線了！」\n\n就在火力最密集的時候，遠處忽然傳來引擎聲。幾輛車強行衝進街區，剎車聲劃破空氣。車門一開，一隊人迅速下車展開隊形。\n\n最前面的那人穿著防彈背心，沒有多餘的裝備，卻站得筆直。\n\n「援軍到了！」有人喊出聲。韓國瑜大步走進火線，沒有停下。他掃了一眼四周的陣地，語氣直接：「防線別散，火力往兩側拉開！」\n\n林志遠愣了一瞬，隨即回過神，立刻照做。原本混亂的射擊開始有了節奏，幾個關鍵位置重新被壓住。\n\n敵方火力還在逼近。韓國瑜沒有退到後方，而是直接蹲下，接過一把步槍，對著街口連續射擊。槍聲清晰而穩定，壓住了對面一瞬的動作。陳奕廷忍不住看了他一眼：「你——」\n\n「現在沒什麼你我。」韓國瑜沒有回頭，只是簡短地說了一句，「站穩。」\n\n他換彈、再射擊，動作並不花俏，但沒有停頓。周圍的士兵逐漸穩住呼吸，跟著節奏壓制火力。\n\n街道另一端的敵人開始後退，原本被逼近的距離重新被拉開。煙霧之中，視線仍然模糊，但槍聲已經不再混亂。韓國瑜站起身，掃了一眼四周，聲音不高，卻傳得很清楚：「記住，現在我是你們的將軍。」\n\n林志遠重新握緊步槍，與身邊的人對視一眼，然後一起把火力壓向前方。"
 ROC_CHI.16.a: "撐住防線"

 ROC_CHI.17.t: "仇恨的力量"
 ROC_CHI.17.d: "沈伯洋如今披着黑熊部隊指揮官的臂章，身影如刀锋般冷硬。他曾是大学教授，如今却成为战场上最令人恐惧的名字。\n\n“集合！”\n\n他的声音低沉，却带着不容置疑的威压。\n\n黑熊部隊第一突擊連迅速在廢墟中列隊：一百多名身經百戰的戰士，分成數個戰鬥小隊，動作整齊而殺氣騰騰。他親手挑選的核心幹部——陳浩然、吳子瑜、林韶輝、郭天翔、張遠哲——站在最前方，每個人眼中都燃燒着冰冷而持久的仇恨。他們的家人死在大陸導彈與轟炸之下，家園早已化為灰燼。\n\n“今晚，我們先手。”沈伯洋掃視全連，眼神冷冽如刀，“村落裡有一支解放軍偵察營前鋒，目標：無人生還。”\n\n戰士們齊聲低吼，沒有絲毫猶豫。\n\n交火在瞬間爆發。陳浩然率領第一小隊率先開火，火光閃爍中，林韶輝的小隊投出手榴彈，爆炸聲撕裂夜空。吳子瑜帶人揮刀近身，動作乾脆而致命。郭天翔與張遠哲指揮機槍壓制，子彈如暴雨般傾瀉。\n\n當最後幾名解放軍士兵舉起雙手試圖投降時，張遠哲的狙擊步槍已精準鎖定。那一聲聲槍響，沉悶、冰冷，沒有任何遲疑。\n\n戰鬥結束，空氣中瀰漫着濃烈的火藥與血腥味。沈伯洋摘下鋼盔，深吸一口氣，仰望滿是彈痕的夜空。他的目光沉靜，卻像深井中燃燒的火焰。\n\n陳浩然擦去臉上的血跡，低沉開口：“指揮官，下一次是什麼時候？”\n\n“很快。”沈伯洋望向遠方的黑暗，手緊握著步槍，“我們必須報仇。”\n\n這一支黑熊部隊的尖刀突擊連，早已成為戰線上最鋒利、最無情的利刃。他們沒有憐憫，只有堅定的信念與復仇的執念。每一次衝鋒，沈伯洋總是衝在最前方。每一次行動，他都目光冷峻，指揮著數百名黑熊勇士如潮水般席捲敵陣。\n\n他們是台灣最狂熱的守護者，也是解放軍最恐懼的黑色幽靈。"
 ROC_CHI.17.a: "嚇人哦"

 ROC_CHI.18.t: "迷失"
 ROC_CHI.18.d: "幾個月過去，台灣戰火沒有完全消失，只是被拉得很遠。偶爾傳來的爆炸聲隔著山谷回蕩，像遲來的雷。\n\n趙子昂躲在一間勉強修補過的山中木屋裡，屋頂用鐵皮與木板拼接，牆縫仍透著冷風。桌上放著一碗泡麵，早已沒有熱氣。他沒有動，只是看著那層凝住的油光。\n\n這裡不是他該在的地方。\n\n幾個月前，他還在高雄港的斷牆後，和三排九班一起等命令。現在，那些聲音全都消失了。連隊、呼號、位置，一個個斷開，最後只剩空白。\n\n屋子裡只有他一個人。白天，他會沿著山徑找水、找能吃的東西，把門板釘緊，把破掉的地方補起來。偶爾會遠遠看到其他人影，但沒有誰停下來說話。\n\n夜裡更安靜。風穿過林間，帶著濕氣與土味，偶爾夾著遠方傳來的悶響。他很少真正睡著，任何聲音都能把他拉醒。\n\n他低頭看著自己的手，傷口已經結痂，卻留下深色的痕。那天的畫面時不時浮現——港區的火光、槍聲，還有劉承業最後那句話。\n\n山那頭忽然閃過一抹紅光，幾秒後，悶響傳來，在山谷間層層回蕩。木屋微微震了一下，灰塵落在桌面。\n\n趙子昂沒有抬頭。\n\n他只是把手慢慢放在桌上，盯著那碗冷掉的麵，聲音低得幾乎聽不見。"
 ROC_CHI.18.a: "只剩我一人了啊"

 ROC_CHI.19.t: "餘火"
 ROC_CHI.19.d: "中部山脈的夜更冷了。風從林間壓下來，帶著濕氣與土味，遠處偶爾傳來延遲的悶響，在山谷裡慢慢散開\n\n那時天色還沒完全黑，他沿著一條狹窄的山徑往下走，腳步很輕。轉過一處倒木時，他看見一個身影蹲在路邊，正在翻著什麼。\n\n他停住了。女孩也察覺到動靜，猛地抬頭，整個人僵住。兩人隔著幾步距離對視，誰都沒有先動。\n\n過了幾秒，趙子昂慢慢把手從槍上移開，示意自己沒有要靠近。\n\n「你一個人？」他開口，聲音壓得很低。女孩點了點頭，沒有說話。\n\n他看了一眼四周，又問：「跟家人走散了嗎？」這句話讓她的表情變了一下。\n\n她沒有立刻回答，只是低頭看著地面，手指抓著衣角。過了一會，才很小聲地說：「他們……被殺了。」\n\n「誰？」他問。\n\n女孩抬頭看他，眼神很直，沒有太多情緒，只是單純地說出來：「解放軍。」風從山谷裡吹上來，帶著一點冷意。趙子昂的手指微微收緊，又慢慢放開。他沒有再問。\n\n過了一會，他才開口：「這裡不安全。」他轉身往山上走了幾步，又停下來，回頭看她。\n\n她還站在原地，像在等什麼。「跟我走。」他說。女孩點了點頭，小跑幾步跟上。\n\n天色徹底暗下來時，他們回到了那間木屋。門關上，風聲被隔在外面。趙子昂把剩下的泡麵分了一半給她。兩人坐在屋裡，沒有再提剛才的話。\n\n他最後只是低聲說了一句。"
 ROC_CHI.19.a: "今晚先撐過去"

 ROC_CHI.20.t: "中国军队的最后一搏"
 ROC_CHI.20.d: "午後的天空沒有預兆地暗了下來。從北到南，整條台灣西部走廊幾乎在同一時間進入異常靜默。沿海雷達站回傳的訊號迅速飆升，密集的彈道軌跡如同交錯的網，覆蓋整個西部平原與城市帶。\n\n來自對岸多個方向的東風系列彈道導彈與巡航導彈幾乎同時升空，目標不再侷限於單一城市，而是對整個西部核心區域展開飽和式全面打擊。從台北盆地向南延伸至桃園、新竹、台中、嘉義、台南與高雄，關鍵軍事基地、交通樞紐與工業設施在短時間內接連遭到密集轟擊。\n\n第一波打擊直指防空與指揮節點。雷達站與通訊中樞在數分鐘內接連失效，多處防空陣地尚未完成反應便被壓制。緊接而來的第二波導彈落向機場、港口與高速交通網絡，跑道被炸裂，橋樑斷裂，西部幹道迅速陷入癱瘓。\n\n爆炸聲沿著海岸線與城市帶連續傳遞，震動幾乎沒有間斷。高樓玻璃成片崩落，火光與濃煙在不同城市同時升起，彼此交織成一條橫貫全島西側的燃燒帶。醫療系統與應急機制尚未完全展開，便被後續的衝擊進一步撕裂。\n\n當轟炸進入尾聲，西部的基礎運作能力已遭到重創。指揮鏈斷裂、通訊紊亂，使各地部隊難以形成有效協同。就在煙塵尚未散去之際，新的威脅已從海平面浮現。\n\n台灣海峽上，大規模艦隊編組在煙霧掩護下迅速逼近。兩棲攻擊艦與登陸艦群沿著西部多個海岸段同時展開行動，從淡水河口、台中港外海、嘉南沿岸到高雄近海，多點同步推進。氣墊登陸艇與兩棲裝甲車成批湧出艙門，在炮火與空中掩護下直撲岸線。\n\n幾乎同一時間，低空飛行的直升機編隊與運輸機掠過受損的防空網，將空降兵投送至內陸關鍵節點，試圖切斷殘存的交通聯繫與後備動員。沿海防線在連續打擊與多方向壓力下迅速出現缺口，局部陣地甚至尚未完成重整便被迫迎戰登陸部隊。"
 ROC_CHI.20.a: "死守到底!"
 #ROC_CHI.20.b: "謝天謝地總統還活著！"

 ROC_CHI.21.t: "福建滲透敢死隊"
 ROC_CHI.21.d: "台南的夜色濃得像墨，街角僅存的幾盞路燈在斷壁殘垣間忽明忽暗。林建宏靠在彈痕累累的牆邊，雙手捧著那張早已褶皺的全家福。照片裡笑得最燦爛的妹妹，再也回不來了。自從解放軍對台北實施無差別轟炸、蔡英文總統當場殉職之後，他的心就像被徹底掏空，只剩下一個漆黑的深淵。\n\n“建宏，你真的決定了嗎？”許雅婷聲音沙啞，她緊緊攥著一條染血的發帶，那是她弟弟留下的最後遺物。\n\n“決定了。”林建宏抬起頭，眼神冷硬得像刀鋒，“他們炸平了台北，也殺了我的家人。我要讓他們血債血償。”\n\n不遠處的廢棄倉庫裡燈火昏黃，鄭博文、蔡士凱、黃冠霖、謝雨璇等人正緊張地整理武器彈藥。他們原本都是再普通不過的台灣人：有人是夜市賣珍奶的攤販，有人是在電子廠做組裝的工人，還有人曾經公開主張兩岸和平交流。可在台北遭到無差別轟炸、親人接連死於導彈與空降部隊的屠殺之後，他們心中只剩下最純粹、最冰冷的恨意。\n\n“我以前真的相信和平。”蔡士凱苦笑著，把一箱手榴彈推到角落，“我還帶老婆去廈門玩過，覺得大家是一家人……結果呢？一枚東風導彈把我老婆和整個夜市炸成了碎片。台北被炸成那樣，死了一堆人，我還能相信什麼？”\n\n“我們今天站在這裡，理由很簡單。大海的那一邊，已經不是親人，而是徹頭徹尾的敵人。我們不管過去支持過什麼、相信過什麼，現在只剩一個目標——讓他們付出十倍、百倍的代價。”\n\n話音落下，倉庫裡陷入短暫的死寂。隨後，所有人同時點頭。\n\n鄭博文舉起手中的武器，聲音低沉而堅定，像在宣誓\n\n“我們現在正式報名加入『福建滲透敢死隊』。通過測驗的人，今晚就會被送往秘密訓練營，學習如何潛入福建沿海，進行破壞與暗殺行動。不管以前是什麼身份，從今天起，我們只有一個名字——那就是台灣的復仇者”\n\n林建宏握緊拳頭，腦海中再次浮現妹妹最後的笑容。他緩緩吐出一口氣，望向倉庫外那片漆黑的海面。"
 ROC_CHI.21.a: "海的那邊是敵人"

 ROC_CHI.22.t: "时代力量宣布加入抗战"
 ROC_CHI.22.d: "黃國昌站在一間簡樸的會議室裡，目光銳利，語氣堅定而直接：「面對中國的軍事威脅，我們沒有退路。保衛台灣、守護民主自由，這是每一個台灣人、尤其是年輕世代不可逃避的責任。」\n\n他的話語透過媒體迅速傳開，沒有多餘的修飾，卻充滿改革的決心。時代力量一向以打破藍綠惡鬥、推動真正進步改革為己任，在這場前所未有的危機中，毫不猶豫地選擇站在守護台灣的最前線。支持政府的抗中立場，不是妥協，而是基於捍衛台灣主權與民主價值的原則性決斷。\n\n過去那些藍綠之間的權力鬥爭與意識形態對立，在中國的軍事壓力下顯得蒼白無力。台灣社會此刻需要的，是超越黨派的團結與行動。黃國昌的聲音依舊帶著一貫的批判力：「我們不能再被黑箱與妥協拖累，民主不是用來退讓的，而是要勇敢捍衛的。年輕人尤其要站出來，因為未來是屬於我們的。」"
 ROC_CHI.22.a: "捍衛台灣!"

 ROC_CHI.23.t: "民众党宣布加入抗战"
 ROC_CHI.23.d: "柯文哲站在一間簡樸的會議室裡，表情平靜，語氣像平常看診時那樣務實：「眼下台灣面對的危機，大家心裡都有數。保衛台灣、守住我們的生活方式，這不是藍綠的問題，而是每一個台灣民眾的共同責任。」\n\n他的話透過媒體傳開，沒有華麗的修飾，卻讓人感覺踏實。民眾黨一向主張以台灣為名、以民眾為本，這次在戰爭陰影下，選擇用理性務實的態度站出來，支持守護台灣的立場。不是為了意識形態，而是為了台灣的整體利益和人民的平安。\n\n過去藍綠的口水戰、族群對立，在更大的危機面前顯得不再那麼重要。台灣這個島嶼，此刻需要的是團結，而不是繼續分裂。柯文哲的語氣一如既往地直接：「我們對民意要心存敬畏，政治就是要解決問題，不是製造仇恨。該合作的時候合作，該對抗的時候就要對抗，但最終目標是讓台灣民眾過上安穩的日子。」"
 ROC_CHI.23.a: "拒絕妥協！"

 ROC_CHI.24.t: "台灣團結聯盟宣布加入抗戰"
 ROC_CHI.24.d: "劉一德站在一間簡樸的會議室裡，目光堅毅，語氣充滿本土熱情：「在中國的軍事威脅面前，我們台灣人沒有退縮的空間。保衛台灣、抵抗共匪，這是每一個愛台灣的人必須承擔的責任！」\n\n他的話語透過媒體傳遍島內各地，像一聲響亮的號角，喚起台灣人心中那股不屈的本土精神。台灣團結聯盟一向以李登輝先生的精神為指引，高舉『台灣優先、壯大台灣』的大旗，這次在戰爭陰影下，毫不猶豫地選擇站出來，支持守護台灣主權的立場。不是為了政黨利益，而是為了鞏固民主、穩定政局，讓台灣成為一個真正正常、獨立的國家。\n\n過去藍綠之間的爭執、族群的分歧，在中國的外部壓力下，都必須讓位給更大的台灣整體利益。台灣這個美麗的島嶼，此刻比任何時候都更需要團結。劉一德的聲音依舊帶著台聯一貫的堅定：「我們要振興經濟，更要鞏固民主；我們要穩定政局，但絕不以妥協主權為代價。台灣人要勇敢站起來，守護自己的家園！」"
 ROC_CHI.24.a: "壯大台灣!"

 ROC_CHI.25.t: "泛藍陣營宣布加入抗戰"
 ROC_CHI.25.d: "吳成典、宋楚瑜與林炳坤共同站在一間簡樸的會議室裡，三人神情嚴肅而堅定。吳成典率先開口，語氣沉穩：「面對中國大陸的軍事壓力，我們必須以中華民國的整體利益為優先。保衛台灣、維護兩岸和平，這是每一個中華民國國民的共同責任。我們反對台獨冒進，但也絕不接受武力威脅。」\n\n宋楚瑜接著說道，聲音帶著一貫的親民與務實：「台灣民眾最希望的是安穩的生活。過去我們主張兩岸多交流、少對抗，就是為了避免走到今天這一步。現在危機當前，我们願意放下黨派分歧，支持一切有利於台灣安全與中華民國尊嚴的立場。親民黨一向以民眾為本，現在更要以台灣的長治久安為念。」\n\n林炳坤則補充，語氣樸實直接：「無黨團結聯盟來自地方基層，我們看到民眾最怕的就是戰爭。無論藍綠，現在都該團結一致，守護中華民國的憲政體制與人民福祉。我們支持穩定政局，反對任何破壞兩岸和平的做法。」\n\n三人的聯合發言迅速傳遍媒體，沒有華麗的口號，卻透露出泛藍一貫的理性務實。過去藍營內部的路線差異，在外部危機壓力下逐漸淡化。新黨的堅定立場、親民黨的親民路線、無盟的地方力量，此刻匯聚成一股守護中華民國的共同意志。"
 ROC_CHI.25.a: "抵抗共匪，只待反攻大陆"

 ROC_CHI.26.t: "台灣基進宣布加入抗戰"
 ROC_CHI.26.d: "陳奕齊站在一間簡樸的會議室裡，目光銳利而堅定，語氣直接有力：「面對中國的軍事威脅與帝國主義野心，我們沒有任何妥協的空間。保衛台灣、抵抗共匪，這是每一個認同台灣作為獨立政治民族的人，必須肩負的責任。我們要透過政治民主化、主權自主化與社會自由化，真正守護這片土地。」\n\n他的話語迅速傳開，帶著基進黨一貫的剛性與進步精神。台灣基進自成立以來，就以台灣民族主義與左翼台獨為核心，高舉『台灣就是台灣人的國家』的旗幟，在這場危機中，毫不猶豫地選擇站在守護台灣主權的最前線。支持抗中保台的立場，不是權宜之計，而是基於主權自主化的根本信念——我們反對任何形式的中國併吞，也拒絕在中華民國框架下繼續模糊台灣的國家地位。\n\n過去藍綠的路線爭執、威權遺毒，在中國外部武力壓迫下，都必須被徹底清算。台灣這個島嶼，此刻正檢驗每一位公民的民族認同。王興煥的聲音充滿原則：「國民黨不倒，台灣不會好。我們要深化政治民主化，裂解威權象徵；要推動主權自主化，讓台灣成為真正的正常國家；也要實現社會自由化，讓年輕人不再被低薪與不公綁架，讓台灣成為人民尊嚴而幸福的家園。」"
 ROC_CHI.26.a: "台灣就是台灣人的國家！"
 
 ROC_CHI.27.t: "支援大陸民運"
 ROC_CHI.27.d: "夜幕壓低在高雄港上方，海面反射著斷裂的燈光。數小時前傳出的各地集會畫面，仍在通訊設備的螢幕上反覆播放。那些來自北京、廣州與哈爾濱的片段，被一遍遍放大、暫停、重播，像是在確認某種尚未穩固的現實。\n\n陳柏宇站在車旁，目光停留在畫面中人群舉起的標語上。他沒有說話，只是把手機收進口袋，轉身看向貨櫃後方整齊堆放的箱子。那些原本被當作備案的物資，此刻忽然有了更明確的去向。\n\n林昱廷將最後一批設備搬上推車，動作比以往更快。吳佩珊蹲在地上核對清單，手指在紙面快速滑動，確認每一項標記與編號。\n\n「他們已經開始了，我們不能再等。」黃子軒靠在貨櫃邊緣，視線投向遠方海面，聲音壓得很低，卻清楚。\n\n張雅婷將封條貼上最後一個箱子，輕輕按壓固定，「能送進去多少，就算多少。」\n\n另一側，劉承翰正與船員快速確認新的中轉安排。原本分散的路線被重新調整，節點被壓縮，節奏變得更緊密。交談聲不高，但每一句都直接指向同一個方向。\n\n短暫的停頓之後，陳柏宇重新打開車門，將引擎啟動。低沉的聲響在夜裡緩緩擴散，他看了一眼身後的人群，沒有多說什麼。\n\n遠處的海面沒有回應，只有風聲與機械運轉聲交錯。那些尚未抵達的訊號，正在被提前準備。"
 ROC_CHI.27.a: "给对岸添把火"

 ROC_CHI.28.t: "夜不能寐"
 ROC_CHI.28.d: "凌晨两点的房屋内依旧亮着灯。\n\n的走廊空无一人，只有值勤人员的脚步声在远处断断续续地回响。办公室内，他独自坐在桌前，面前的文件已经翻过无数次，却始终停留在同一页。\n\n他没有开灯，只让桌上的一盏台灯亮着，光线压得很低，像刻意避开什么。\n\n窗外的沉在夜色里，霓虹灯依旧闪烁，却显得异常遥远。\n\n他闭上眼，试图让思绪平静下来，但各种声音却反而更清晰——媒体的质疑、在野党的攻击、街头越来越直白的愤怒，还有那些在内部会议中没有说出口的担忧。\n\n他手指轻轻敲着桌面，一下，又一下，节奏却越来越乱。\n\n他很清楚，真正让局势变得危险的，从来不是对岸的动作，解放军的攻势越来越疲惫，明眼人都看得出来中国无论如何都无法打下台湾，可问题来自内部。\n\n民进党的支持率在下降，盟友在观望，潜在的对手则在迅速积累声量。那些原本依附在执政体系下的力量，开始寻找新的出口。\n\n他睁开眼，目光落在桌上的一份最新民调上。数字没有大幅崩塌，却呈现出一种更令人不安的趋势。\n\n这种下滑，比任何一次暴跌都更危险。他忽然站起身，走到窗边，手掌贴在冰冷的玻璃上。\n\n远处传来一阵低沉的轰鸣声，像是军机，也像只是夜里的错觉。\n\n“时间不多了……”\n\n他的声音咬牙切齿。\n\n窗外的灯光微微晃动，仿佛整座城市都在某种看不见的压力下缓慢倾斜。"
 ROC_CHI.28.a: "真的是靠北"

 ROC_CHI.29.t: "海天重誓"
 ROC_CHI.29.d: "夜色愈发浓稠，像一张浸透海水的渔网，勒得人喘不过气。会议室的门被从里面反锁，窗帘终于拉严，只剩桌上一盏昏黄的台灯，投下三道长长的阴影。门外走廊空荡荡的，只有风卷着浪声，隐约像远处的炮响。\n\n韩国瑜坐回椅中，拳头仍旧半握。陈宝余上将终于点燃了那根雪茄，青烟在灯下盘旋，苦涩味混着潮湿的铁锈味，弥漫整个房间。\n\n门轻叩三下——这是约定的暗号。进来的是王忠信，国民党中常委、情报老手，头发花白，眼神却像老狼一样警觉。他手里提着一个不起眼的公文包，里面塞满了从台北紧急带过来的加密档案。\n\n“韩主席，陈总长。”王忠信压低声音，扫了一眼窗外摇曳的灯塔光，“外面风声紧。绿营那边已经嗅到味了，左联的家伙更在到处放话，说我们想借大陆乱局翻盘。”\n\n韩国瑜冷笑一声，目光如刀：“让他们说去。国民党这些年活得像个被阉过的太监，穿西装打领带，却连句硬话都不敢放。这次台海收场，正是天赐的断层。我们不抢，别人就会抢——绿的抢，赤的抢，那些自称革命者的也会抢。”\n\n陈宝余吐出一口烟，军靴在地板上轻轻一顿：“忠信兄，大陆那边的情报更新了没有？”\n\n王忠信打开公文包，摊开几张卫星照片和手写情报摘要。中国大陆的暴动画面模糊却触目惊心，烟火与人群像蚁群般涌动。\n\n“南京已经不是小打小闹，”他声音低沉，“供应链断裂，地方武装开始冒头。北京那边忙着维稳，内部裂痕比我们预想的还深。国光计划的旧档案我带了一部分——1960年代的登陆方案、敌后特战要点，虽然纸面上的东西，但框架还在。只要我们注入新血，就能从草稿变作战图。”\n\n韩国瑜倾身向前，声音带着压抑的狂热，却又刻意放缓，像在对党内同志宣誓：“重启国光，不是单纯的军事冒险。我们要三分武力、七分民心。反攻大陆，先反攻台湾的民心。告诉他们：混乱结束了，秩序回来了。民主不是绿营的专利，福利不是赤匪的空话。我们国民党，才是那个能跨过山海、带回江山的人。”"
 ROC_CHI.29.a: "舊意复燃"

 ROC_CHI.30.t: "山河再议"
 ROC_CHI.30.d: "陈宝余眯起眼，雪茄在指间转动，声音带着军人惯有的直白与怀疑：“韩主席，说得漂亮。但党内不是铁板一块。有些中常委还想着‘维持现状’就能过日子，有些人怕一动手就引来日方压力，甚至绿营的反扑。万一南京的火没烧大，我们这边先乱了呢？”\n\n王忠信点头附和，目光在两人之间游移：“正是如此。这次会谈必须绝对保密。花莲港这里后山靠海，进出方便，但也容易被盯上。我们三人，加上台北两位可靠的立委。一步步来：先稳住军中老派，再通过地方派系放出‘秩序牌’的风声。最后，才把国光从档案里真正拉出来，变成跨海的利刃。”\n\n韩国瑜站起身，走到窗边，掀开窗帘一角。远山如沉默的铁壁，海浪拍打港堤的声音越来越急，像无数隐形的战鼓在催促。\n\n“国民党不能再等了。”他转过身，眼神在昏暗中灼灼燃烧，“历史给过我们三次秘密和谈的机会，都错过了。这一次，我们不和任何人谈——我们要自己定规矩。从绿营手里夺岛，从赤匪手里夺大陆，从那些软骨头手里夺回男人的脊梁。一寸山、一寸海、一寸血，都要用我们的方式拿回来。”\n\n陈宝余缓缓起身，军靴踩出沉闷的声响，与海浪声交织。王忠信合上公文包，三人目光交汇，空气中仿佛有无形的电流在涌动。\n\n会议室外，太平洋的风愈发狂野。花莲港的灯塔在夜色中孤独闪烁，像是为这场国民党内部的秘密会谈，悄然点亮了引向巨变的道路。"
 ROC_CHI.30.a: "掀起真正的反攻序幕。"
 CHI_KMT_nati: "中国国民党-军系"

 ROC_CHI.31.t: "机密情报"
 ROC_CHI.31.d: "情报系统近期呈现出异常密集的活动轨迹。随着对岸战事陷入僵持，其内部压力正以可观速度累积，而这种压力已开始转化为对外军事行动的准备迹象。通过持续交叉比对卫星影像、通信截获与后勤流动数据，我们确认对方导弹部队进入高度戒备状态，多个沿海发射阵地与机动单位频繁转移，明显处于战备展开阶段。\n\n不仅如此，其海军与两栖部队的集结亦已出现系统性特征。港口装卸频率异常上升，大型登陆舰与护航编组的调度呈现出前所未有的规律性，而内陆运输节点的压力也同步增大，显示其后勤体系正为大规模行动进行最后整备。这类高频运作状态并非例行演训所能解释，更接近实战前的压缩式准备周期。\n\n当前局势的关键，在于对方可能试图以短时间内的密集火力与快速突入打破僵局，将外部战线转化为内部压力的释放出口。一旦行动展开，其初期打击将极具强度与突然性，意在瘫痪我方指挥、通信与关键防御节点。\n\n在此背景下，任何迟疑都将放大风险。我们必须以最坏情境为基准，重新校准防御部署与应急体系，强化分散指挥与冗余通信能力，确保在首轮打击下仍能维持作战连续性。同时，情报系统需进一步前推，持续锁定对方发射窗口与兵力集结节奏，争取预警时间与决策空间。\n\n这不是单一方向的威胁，而是一场系统性压力测试。唯有提前进入战时状态，才能在真正的冲击到来之前，占据主动。"
 ROC_CHI.31.a: "按最坏情况部署"

