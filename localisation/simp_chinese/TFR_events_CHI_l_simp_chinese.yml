 taiwan.16.t: "柯文哲当选台湾总统"
 taiwan.16.d: "在最近的战争中成功抵御来自大陆的部队后，台湾宣布将依据宪法重新举行自由选举。由于战争在岛内激起了对大陆的强烈仇恨，蓝营失去了大量选民的支持，他们认为该党未能维护和平，甚至被视为可能与大陆合作的潜在\"协作者\"。与此同时，绿营也遭重创，被指责为导致战争与血腥冲突的直接责任方。而前一任政府的激进政策则使大量中间选民转向了第三势力。在这种背景下，一匹政坛黑马——由柯文哲领导的台湾民众党成功挑战台湾长期以来的蓝绿两党格局，历史性地赢下了总统大选，实现首次执政。\n\n新总统柯文哲感谢了所有支持者共同创造这政治奇迹，同时宣布了自己的重建计划。"
 taiwan.16.a: "鹬蚌相争，渔翁得利。"
 
