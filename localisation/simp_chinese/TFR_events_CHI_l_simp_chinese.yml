 taiwan.4.t: "2020年台灣總統選舉"
 taiwan.4.d: "2020年台灣選舉是西歷新年和農歷新年之間最重要的事件，它將決定立法機構和總統職位。在1月2日因黑鷹直升機墜毀事件暫停一周後，競選活動的最後階段重新開始，候選人在幾個主要城市舉行了最後也是規模最大的政治集會。\n\n代表親綠陣營的是現任總統蔡英文，她是台灣第一位女總統，也是第一位具有原住民血統的總統。她是一位法學教授，政治生涯可以追溯到2000年，她的經驗和專業精神經常被支持者認為是她更有資格當選的原因。盡管第一個任期充滿動蕩，但自2019年7月以來，她的支持率一直在上升，許多觀察家預測綠營將獲勝。\n\n代表親藍陣營的是現任高雄市長韓國瑜，他因被指控\"拋棄\"市民而面臨市民的強烈反對。韓國瑜擁有法學碩士學位，2017年才重返政壇，與民進黨候選人相比，他的經驗相形見絀。盡管如此，他的支持者認為，民進黨的表現不佳讓選民渴望改變，許多人認為他非正統的政治風格可以為台灣迎來一個新的黃金時代。\n\n宋楚瑜也參加了競選，盡管公眾對他的認知更多為玩笑，而非嚴肅的政治參與。\n\n在經歷了疲憊的最後一晚集會後，全國各地的公民前往最近的投票站，以決定他們國家的未來。當夜幕降臨，選票被清點完畢，最終結果宣布："
 taiwan.4.a: "蔡英文和泛綠陣營全勝！"
 taiwan.4.b: "韓國瑜和泛藍陣營登上權力寶座！"
 
 taiwan.5.t: "蔡英文連任成功"
 taiwan.5.d: "經過漫長的計票之夜，數百萬民眾守在電視機前觀看結果，新聞頻道和官方消息最終宣布：蔡英文總統成功連任！\n\n這在許多國內外觀察家看來是意料之中的事，因為蔡英文不僅擁有更豐富的經驗，並受益於選民傾向於重新選舉現任總統的偏好，而且她的對手的醜聞和多次公關災難也說服了中間派選民，甚至部分泛藍支持者轉而支持蔡英文。\n\n此外，民進黨還在立法院贏得了多數席位，獲得了大約45%的選票和60個席位，足以控制立法院。這確保了蔡英文以及整個民進黨執政期間的順利。\n\n這激起了一部分泛藍支持者的強烈抗議，他們要求重新計票，一些國民黨領導人也提出了同樣的要求。然而，由於韓國瑜公開宣布接受敗選，這些行動很快平息下來，台灣又完成了一次和平選舉。"
 taiwan.5.a: "綠色旗幟升上天空!"
 
 taiwan.6.t: "韓國瑜爆冷勝選"
 taiwan.6.d: "經過漫長的計票之夜，數百萬觀眾守在電視機前觀看結果，各新聞頻道和官方消息來源終於宣布了獲勝者——韓國瑜市長獲得了勝利！\n\n許多國際和國內觀察家對此結果感到驚訝，因為蔡英文擁有更多經驗，並受益於重新選舉現任總統的優勢。然而，韓國瑜的政見似乎成功地贏得了民心。此外，許多對民進黨失望的中間選民選擇在此次選舉中支持泛藍，以表達他們的不滿。\n\n另一方面，國民黨也重新奪回了立法機構。國民黨以44%的普選票和62個席位，成功地重新確立了自己的多數黨地位，將民進黨降為少數派反對黨，從而確保了韓國瑜的執政順利。\n\n一部分泛綠陣營不認可這一結果，聲稱選舉受到了操縱，並與少數民進黨領導人一起要求重新計票。然而，由於蔡英文及其團隊公開向公眾發出接受失敗並祝賀新總統的信息，抗議活動迅速平息，共和國又一次完成了和平選舉。\n\n對於韓國瑜個人而言，由於禁止同時擔任市長和總統，他被迫辭去高雄市長一職。將在三個月內舉行補選，以決定下一屆地方政府，而此前倡導罷免韓國瑜的運動也隨之解散。"
 taiwan.6.a: "青天白日滿地紅！"
 
