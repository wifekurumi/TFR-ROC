 taiwan.4.t: "2020年台湾总统选举"
 taiwan.4.d: "2020年台湾选举是西历新年和农历新年之间最重要的事件，它将决定立法机构和总统职位。在1月2日因黑鹰直升机坠毁事件暂停一周后，竞选活动的最后阶段重新开始，候选人在几个主要城市举行了最后也是规模最大的政治集会。\n\n代表亲绿阵营的是现任总统蔡英文，她是台湾第一位女总统，也是第一位具有原住民血统的总统。她是一位法学教授，政治生涯可以追溯到2000年，她的经验和专业精神经常被支持者认为是她更有资格当选的原因。尽管第一个任期充满动荡，但自2019年7月以来，她的支持率一直在上升，许多观察家预测绿营将获胜。\n\n代表亲蓝阵营的是现任高雄市长韩国瑜，他因被指控\"抛弃\"市民而面临市民的强烈反对。韩国瑜拥有法学硕士学位，2017年才重返政坛，与民进党候选人相比，他的经验相形见绌。尽管如此，他的支持者认为，民进党的表现不佳让选民渴望改变，许多人认为他非正统的政治风格可以为台湾迎来一个新的黄金时代。\n\n宋楚瑜也参加了竞选，尽管公众对他的认知更多为玩笑，而非严肃的政治参与。\n\n在经历了疲惫的最后一晚集会后，全国各地的公民前往最近的投票站，以决定他们国家的未来。当夜幕降临，选票被清点完毕，最终结果宣布："
 taiwan.4.a: "蔡英文和泛绿阵营全胜！"
 taiwan.4.b: "韩国瑜和泛蓝阵营登上权力宝座！"
 
 taiwan.5.t: "蔡英文连任成功"
 taiwan.5.d: "经过漫长的计票之夜，数百万民众守在电视机前观看结果，新闻频道和官方消息最终宣布：蔡英文总统成功连任！\n\n这在许多国内外观察家看来是意料之中的事，因为蔡英文不仅拥有更丰富的经验，并受益于选民倾向于重新选举现任总统的偏好，而且她的对手的丑闻和多次公关灾难也说服了中间派选民，甚至部分泛蓝支持者转而支持蔡英文。\n\n此外，民进党还在立法院赢得了多数席位，获得了大约45%的选票和60个席位，足以控制立法院。这确保了蔡英文以及整个民进党执政期间的顺利。\n\n这激起了一部分泛蓝支持者的强烈抗议，他们要求重新计票，一些国民党领导人也提出了同样的要求。然而，由于韩国瑜公开宣布接受败选，这些行动很快平息下来，台湾又完成了一次和平选举。"
 taiwan.5.a: "绿色旗帜升上天空!"
 
 taiwan.6.t: "韩国瑜爆冷胜选"
 taiwan.6.d: "经过漫长的计票之夜，数百万观众守在电视机前观看结果，各新闻频道和官方消息来源终于宣布了获胜者——韩国瑜市长获得了胜利！\n\n许多国际和国内观察家对此结果感到惊讶，因为蔡英文拥有更多经验，并受益于重新选举现任总统的优势。然而，韩国瑜的政见似乎成功地赢得了民心。此外，许多对民进党失望的中间选民选择在此次选举中支持泛蓝，以表达他们的不满。\n\n另一方面，国民党也重新夺回了立法机构。国民党以44%的普选票和62个席位，成功地重新确立了自己的多数党地位，将民进党降为少数派反对党，从而确保了韩国瑜的执政顺利。\n\n一部分泛绿阵营不认可这一结果，声称选举受到了操纵，并与少数民进党领导人一起要求重新计票。然而，由于蔡英文及其团队公开向公众发出接受失败并祝贺新总统的信息，抗议活动迅速平息，共和国又一次完成了和平选举。\n\n对于韩国瑜个人而言，由于禁止同时担任市长和总统，他被迫辞去高雄市长一职。将在三个月内举行补选，以决定下一届地方政府，而此前倡导罢免韩国瑜的运动也随之解散。"
 taiwan.6.a: "青天白日满地红！"
 
