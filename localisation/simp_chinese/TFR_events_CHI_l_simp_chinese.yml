 ROC.55.t: "年菲律宾总统大选"
 ROC.55.d: ""
 ROC.55.a: "邦邦·马科斯"
 ROC.55.b: "莱妮·罗布雷多"
 ROC.55.c: "曼尼·帕奎奥"
 
 ROC.57.t: "选择未来计划"
 ROC.57.d: "台海战争的头24小时已经结束，而我们不能不对英勇的人民解放军表示祝贺。台湾伪政府的武装力量已经溃不成军。组成第一道防线的预警雷达和防空导弹车在启动之前便成为歼20的猎物。数以千计的战斗机在跑道上便被火箭军摧毁。台湾海军的陈旧战舰也基本都在港口内燃起浓浓黑烟。更加弱小的台湾装甲部队的一举一动也被我们的卫星时刻监视。\n\n解放军将领们正就下一步行动展开激烈的讨论。东部战区的前线指挥官们认为，应当利用因突袭而形成的宝贵时间窗口，立即派遣登陆舰队出发，趁台军还未从损失中恢复前在岛上建立桥头堡。联合参谋部的参谋们则提醒说，太约的主力部队已经投入战斗，绝不能冒险行事。接下来几天还是应该聚焦于压制敌军可能的反击。\n\n中央军委已经将两种意见一起提交给了政治局进行决断。这一决定将很有可能将改变整场战争的进程。"
 ROC.57.a: "解放军逢敌必战！"

 ROC.58.t: "台海战争"
 ROC.58.d: "美国内战毫无疑问让东亚的地缘政治格局进行了重新洗牌，对于日本来说，最直接且紧迫的挑战是中国大陆对台湾的入侵威胁。作为第一岛链的重要节点，台湾的战略位置至关重要，一旦失守，不仅第一岛链的防御体系将被拦腰斩断，日本本土也将直接暴露在中国的军事威胁下，整个亚太地区的力量平衡将因此崩塌。\n\n对日本政府而言，台湾的沦陷不仅仅是民主阵营的重大损失，更意味着日本在战略上的全面被动。中国如果控制了台湾，将获得一个重要的战略支点，这将使其海军力量能够更加深入地投射到太平洋海域，直接威胁日本的海上生命线。\n\n因此，日本政府的唯一选择便是干预台海战争，协助台湾抵抗中国的入侵。"
 ROC.58.a: "我们会赢的！"

 ROC.59.t: "西藏告急"
 ROC.59.d: "我国近期愈发动荡的局势似乎让那些阴谋分裂我国领土的叛国者们看到了机会。西藏自治区，一块已经有近20年没有出现突发情况的高原净土，如今似乎也陷入了惶恐不安中。各种分离主义者所传播的仇恨言论和蓄意制造的汉藏民族冲突让当地社会已经到了崩溃的边缘。自治区政府为了维持当地交通和经济的正常运转已经疲于奔命，而北京的中央政府也已下达指示，要求西藏绝大多数地区进入戒严状态，并将从邻近治安状况较好的省份增派用于维稳的警力。"
 ROC.59.a: "拉萨之虎你在哪"

 ROC.60.t: "西藏陷入火海"
 ROC.60.d: "如果曾有人认为西藏在经历高压维稳和高原基建后能够成为一片永远安宁与统一的雪域，那么他就大错特错。不到十年的时间，该地区便又一次重回血与火的漩涡。藏人们涌上街头，手持藏刀、铁棍、燃烧瓶甚至从黑市搞来的老式步枪，与武警和公安激烈对抗。拉萨街头打砸抢烧汉族商铺和移民住宅的场面此起彼伏，火光映红了布达拉宫的金顶。随着冲突升级，那些长期蛰伏的境外藏独武装组织再度浮出水面，街头暴徒中甚至出现了身穿迷彩、携带AK的武装分子。\n\n“西藏流亡政府”从印度达兰萨拉发出声明，达赖喇嘛以高龄之躯通过视频现身，号召“全体藏族儿女起来，为自由与信仰而战”。藏青会、西藏妇女协会等激进团体宣布组建“雪山狮子军”，在境外训练多年的武装人员已渗透回藏区，宣称要“恢复神权与雪域主权”。\n\n"
 ROC.60.a: "雪域染上了血水"
 
 ROC.61.t: "西藏恢复秩序"
 ROC.61.d: "在经历了台海战役的挫折后，我国的局势一度出现波动。西藏的分裂势力趁机死灰复燃，境外“流亡政府”残余武装与藏青会等极端组织勾结，妄图在雪域高原制造分裂、颠覆国家。但在中国人民解放军和武警部队的雷霆铁拳下，叛乱阴谋被彻底粉碎，国家主权与领土完整得到坚决捍卫。\n\n从拉萨到日喀则，从那曲到昌都，街头巷尾重新飘扬起鲜艳的五星红旗，民族团结进步创建标语随处可见，高原蓝天下回荡着“中华民族一家亲”的口号。如今，西藏各大城市和乡镇正有序恢复生产生活，当地党组织和基层干部深入寺庙、牧区、矿区，全力投入灾后重建与社会稳定工作，不断巩固各民族交往交流交融的良好局面。曾经被叛军焚毁的定居点和基层政府大楼，正在加紧修复，汉藏干部并肩作战，牧民群众积极参与重建。\n\n曾经的火海已成过去，西藏这片古老而神圣的土地，正以更加团结、更加繁荣的崭新面貌，牢牢屹立在伟大祖国的西南边陲。"
 ROC.61.a: "千岭积雪镇高原，古道梵钟唤旧盟"

 ROC.62.t: "西藏局势失控"
 ROC.62.d: "解放军当然不希望在台海战争失利后继续蒙受耻辱，但如今将军们最深层的恐惧已成现实。虽然一再宣称有能力碾压任何分裂武装，但西藏自治区领导层彻底辜负了中央和人民的信任，让精锐高原部队在一次次高海拔交火中溃败，最终导致藏独叛军攻占拉萨，他们所做的不过是龟缩在罗布林卡旧址的临时指挥部，并在雪山狮子旗逼近布达拉宫时，仓皇乘直升机逃离高原。\n\n我们已别无选择。藏独极端分子如今占据了党政机关修建的现代化住宅，而汉族干部、移民家庭以及不愿合作的藏族群众正被剥夺合法财产，挤在缺氧的卡车和越野车里，载着饱经风霜的老人、冻伤的孩子和高原反应严重的伤员，向东仓皇逃离青藏线、川藏线。我们绝不能容忍神权疯子再撕裂祖国的一块神圣领土，并屠杀更多忠诚公民。因此，解放军正在西藏边缘集结重兵。他们刚刚焚烧了和平的橄榄枝，但我们将用钢铁洪流淹没他们的妄想——命令已下达：在整个自治区境内，只能有五星红旗高高飘扬。\n\n与炮火一同埋葬。"
 ROC.62.a: "劝君更尽一杯酒，西出阳关无故人。"

 CHI.3.t: "太平洋之殇"
 CHI.3.d: "曾长期维系太平洋秩序的强权，如今陷入自身的内战与分裂。美国的港口封锁、军事调动与政治混乱，使原本稳定的海上航道与经贸网络瞬间失去依靠。这场远在彼岸的冲突，却直接动摇了我们赖以生存的国际环境。金融市场剧烈震荡，出口与供应链遭到切断，区域安全出现前所未有的真空。太平洋不再是和平与繁荣的象征，它成为了动荡与不确定的源头。"
 CHI.3.a: "旧有的秩序，已然焚毁"

 CHI.7.t: "深夜的總統府"
 CHI.7.d: "［關於美國陷入完全混亂的報告］\n\n［關於美國本土武裝反政府動亂的報告］\n\n［關於中國解放軍不正常行動的報告］\n\n隨著一份份報告送到總統的辦公桌上，蔡佛已此刻的世界世界彷彿已經崩塌。 「這不可能，美國就這麼垮了?」但是事實已經如美國本土四處升起的烈焰般明了，台灣失去了美國的保護，今後台灣必將獨立前行，美國崩潰帶來的經濟危機相比對岸共軍的虎視眈眈似乎已經不是什麼要緊的事。"
 CHI.7.a: "台灣必須自己站穩腳步"

 CHI.8.t: "韓總統的電視演講"
 CHI.8.d: "外匯市場的劇烈波動已無法掩飾。銀行間清算幾近停滯，美元資產價格在短時間內大幅崩跌，企業與民眾同時陷入不安與觀望。這場源自太平洋彼岸的內戰，正以前所未有的速度衝擊我國經濟命脈。韓國總統府派對全國安與財經高層的內戰，正以前所未有的速度衝擊我國經濟命脈。韓國總統府 瑜部發表鏡頭前，這位「庶民總統」神情凝重，語氣卻異常平穩。 \n\n「各位國人同胞，這不是一般的經濟波動，而是一場全球秩序的改變。我們手中的外匯、我們依賴的市場、我們熟悉的世界，都正在快速消失。」\n\n「但請各位放心，政府已經啟動緊急機制，確保金融體系穩定、民生供應無虞。這是一場考驗，但也是一次讓台灣，但也是一次讓台灣重新考驗」的機會。"
 CHI.8.a: "「我們一定會撐過去。」"

 ROC_PRC.33.t: "中国折戟台海"
 ROC_PRC.33.d: "随着中华人民共和国于今日宣布终止对台湾岛的军事行动，欢呼声响彻台湾。经过数周的激烈战斗，人民解放军始终无法在台湾牢牢站住脚跟，屡屡被台湾守军击退。\n\n入侵台湾的解放军已被击溃，台湾政治家们便开始讨论重建事宜及国际承认。岛内议员们正争论，是维持中华民国国号，还是同\"中国\"切割，改国号为台湾共和国。而与此同时，台湾民众可以安然入睡，因为他们知道，北京领导人的心血来潮不再能左右他们的命运。"
 ROC_PRC.33.a: "巨龙折翼"

 ROC_PRC.32.t: "绝境"
 ROC_PRC.32.d: "夜色如墨，中南海的会议厅内，灯光刺眼却冰冷。投影屏上定格着一份加密军事情报，第八十二集团军某机械化旅，在接到“南京方向增援戒严”命令后，全旅拒绝前进。旅长通过加密频道上报：“官兵情绪极端抵触，多数基层连队已出现公开抗议，部分士兵卸下弹匣、丢弃枪械，甚至出现集体下跪哭喊‘我们不打自己人’的情况。强行推进恐酿更大兵变。”\n\n情报下方附着一段偷拍视频：河南某军营操场，数百名士兵围成圈，中间一名中尉高举手机，屏幕上是南京中山陵清场后的血迹照片。士兵们齐声喊：“人民的军队为人民！不开枪！不镇压！”视频最后，旅政委试图夺手机，却被几名战士拦住，场面一片混乱。\n\n军委联合参谋部一位中将声音低哑，打破了死一般的沉默。我们监测到，至少还有三个集团军出现类似迹象，基层官兵通过私下微信群、军内加密APP，甚至翻墙VPN，流传南京清场视频。许多人对南京清场行动表示质疑和抵制。总书记的目光从屏幕移开，扫过在座的每一个人。空气仿佛凝固，连呼吸都变得小心翼翼。“台海那边呢？”他问，声音平静得可怕。\n\n负责台湾方向的军委委员苦笑：“更糟。我们在台海死了几十万人，军队士气低下，后勤补给线已被地方罢工和民兵骚扰切断。部分船员拒绝登船。如果现在继续攻打台湾，极可能出现万劫不复的局面。”\n\n“那我们还有什么选择？，”一位老资格的政治局常委冷冷开口，“眼下国内经济已经崩溃边缘，各地民心溃散，军心动摇。甚至不乏警力倒戈的局势出现。”东部军区的一名中将低声道：“那我们要不要放弃台湾行动？先全力镇压国内，稳定了再说”“可这样不就承认三十年战略的失败和政府的无能？更坏的情况是台湾会直接宣布独立！”蔡奇第一个站起，脸色涨红。话音刚落会议室陷入长久的死寂。\n\n“如果我们台海中取得胜利，红旗在台北飘扬，那就有可能重整全国公信力。”终于，总书记缓缓站起。他的身影在灯光下拉得极长，像一座即将崩塌的山。\n\n“可如果失败了，我们将带来中国走向一个万劫不复的深渊，我们会失去一切。”会议室陷入长久的死寂。只有墙上的挂钟滴答作响，像在倒数某个不可逆的时刻。"
 ROC_PRC.32.a: "我们已经不能再打下去了"

 ROC_PRC.31.t: "紧急时刻"
 ROC_PRC.31.d: "华灯之下北京的中南海会议厅却比以往任何时候都更显死寂。厚重的窗帘隔绝了外界的喧嚣，但无法阻挡空气中那股挥之不去的血腥味，尽管它只是幻觉，却像浸透了每个人的衣服。\n\n投影屏上循环播放着南京中山陵清场后的航拍画面：石阶已被高压水枪冲洗得发白，烛光残骸和横幅碎片被扫成一堆，军车列队撤离，广场空荡荡的，只剩几辆救护车还在闪烁红蓝灯。画面定格在祭堂前的台阶上，一摊未完全冲净的暗红色印迹，像一道无法抹去的疤。\n\n“清场完成了。”一位安全部门负责人声音平板，像在念一份例行报告，“凌晨三点四十七分，最后一批滞留人员被带离。现场已完全控制，无人继续聚集。”\n\n房间里没人回应。只有挂钟的滴答声，和偶尔翻动文件时的窸窣。\n\n“伤亡数字呢？”坐在主位的资深干部终于开口，语气平静得近乎冷酷。\n负责人低头看了一眼手中的平板：“官方通报：行动中无平民死亡，数名军警受伤。实际……根据医院和基层反馈，死亡人数在三百至五百之间，受伤超过两千。多数为学生和工人。部分重伤者已被转移至军医院，家属暂未获知。”\n“CNN、BBC、Al Jazeera全程直播了清场片段，标题统一叫‘南京屠杀2.0’。联合国人权高专办已要求独立调查。欧盟、日本、澳大利亚联合声明谴责‘过度武力’。社交媒体上，#NanjingMassacre 和 #CandlelightNeverDies 标签在海外已破亿浏览。”\n\n会议室陷入死一般的寂静,随着有人忍不住开口问道“国内呢？”\n负责人顿了顿咽了下口水，“尽管我们切断了所有直播、删除了99%的相关内容，但VPN和暗网仍在流传视频。地下群组里，年轻人把清场画面做成循环动画，配上《国际歌》。一些地方的悼念活动转为私下点烛、默哀，甚至出现‘烛光接力’——一个人被抓，另一个人接过蜡烛继续点。”\n\n会议桌一端，一位中年干部猛地合上文件夹，声音带着压抑的怒火：今天凌晨又有三座城市出现零星烛光聚集。工人罢工没有停，失业青年开始组织‘夜行祭奠’。河南那边的工厂甚至挂出了横幅：为南京死难者默哀三分钟。”\n\n军方代表不合时宜的低声报告道“南京本地部队换防后，虽然河南河北的部队执行了命令，但执行过程中已有士兵拒绝开枪、掉头、甚至把弹匣卸下的情况。事后我们做了思想整顿，但……基层官兵私下流传一句话：‘我们打的是自己人。’”\n\n房间陷入死一般的沉默。终于，主位上的资深干部缓缓开口，声音低沉得像从喉咙深处挤出来：“三十多年前，我们用同样的方式赢了稳定，却付出了三十年的隐痛。今天，我们又走了一次老路……只是这一次，我们的压力比以往任何时候都大。”墙上的挂钟指向午夜12点。投影屏上的画面定格在中山陵空荡荡的石阶上，那道未冲净的血迹，在灯光下显得格外刺眼。"
 ROC_PRC.31.a: "先烈们用鲜血铸就的共和国，如今却要用鲜血来维护"

 ROC_PRC.30.t: "中国军队南京中山陵清场行动"
 ROC_PRC.30.d: "经过数周天的对峙，中国当局于昨夜，对南京中山陵广场的抗议人群实施大规模清场行动。中国人民解放军装甲部队和步兵在戒严状态下推进，使用实弹、催泪瓦斯和装甲车辆驱散聚集者。国际人权组织和目击者报告称，此次行动造成数百人伤亡，现场目击者描述了“混乱而致命的场景”。\n\n根据多位外国记者、外交观察员和社交媒体流传的视频片段，清场于晚上8点宵禁生效后约两小时启动。\n\n目击者报告称，士兵开枪射击。枪声密集，先是警告射击，随后转为平射。多名抗议者倒在台阶中段，一名年轻女性被抬离时头部中弹。装甲车履带碾压临时搭建的障碍物，发出刺耳金属声。剩余抗议者手拉手围坐，士兵使用电棍和警棍驱赶。广场上的烛光残骸和白纸被风卷起。\n凌晨3:30清场基本完成。部队控制中山陵全域，医护车辆进入运送伤者。现场血迹被高压水枪冲洗，目击者称“地面很快恢复干净”。\n中国官方新华社简短通报称：“南京局部地区非法聚集已被依法处置，社会秩序恢复。行动中少数暴徒袭击军警，造成数名士兵受伤，无平民死亡报告。”但独立来源提供不同数字：基于目击者和医院记录，初步估算死亡至少200–400人，受伤上千人，包括学生、工人和路过市民。\n\n英国外交部引述驻华使馆观察：类似1989年事件模式，实际死亡可能更高，一名在附近酒店的外国记者描述，“枪声持续了近两小时，像机关枪扫射。很多人倒下后，士兵继续推进，没有停顿救治。”中国外交部发言人回应：“这是维护国家安全和公共秩序的必要措施，外部势力无权干涉中国内政。”当前中山陵现场已被军警封锁，石阶上的血迹已冲洗干净，但目击者称，空气中仍残留催泪瓦斯和血腥味。"
 ROC_PRC.30.a: "人权之癌"

 ROC_PRC.29.t: "最后通牒"
 ROC_PRC.29.d: "夕阳沉入西山，秦淮河水面映出一片血红。下午五點四十五分，南京市政府通過所有渠道發布「緊急通告」——電視、廣播、手機推送、社區喇叭、無人機高音喇叭同時響起。聲音機械、冷硬，帶着明確警告。\n\n「南京市人民政府緊急通告：為維護社會秩序、保障人民群眾生命財產安全，自即日起至次日零時，南京市主城區實施嚴格宵禁。晚八點後禁止一切人員外出。中山陵廣場聚集人員必須在今晚八點前自行離開。逾期不散者，將依法採取必要措施。特此通告。」\n\n通告重複三遍後戛然而止。整個城市仿佛被按下靜音鍵，只剩風聲與遠處坦克引擎的悶響。中山陵石階上，學生與市民聽到了。人群中先是死一般的寂靜，隨後爆發低低的議論。\n\n一個戴眼鏡的女生站起來，聲音顫抖卻堅定：「我們走不走？」旁邊一個中年工人苦笑：「走？走到哪兒去？回宿舍？回工地?我們已經沒地方可去了。」人群中爆發出一陣低吼：「走不了！」「不走！」「坦克來了又怎樣？我們又沒槍！」「人民的軍隊為人民！」口號漸漸連成一片，聲音比之前更嘶啞、更絕望，也更齊整。\n\n天色完全暗下來時，山坡下的裝甲車燈光亮起，一排排探照燈如冷白的刀刃，切割夜色。無人機在上空盤旋，投下刺眼強光。擴音喇叭再次響起，這次是軍方口音的「最後警告」：「中山陵聚集人員立即解散！八點後仍滯留者，將被視為違法分子，依法處置！」\n\n學生們沒有動。有人開始手拉手圍成圈，有人把書包堆在身前當簡易掩體，有人舉高手機，錄下最後一段視頻：「如果我回不去了……告訴爸媽，我愛他們。」八點整，宵禁正式生效。城區路燈一盞盞熄滅，只剩中山陵方向的探照燈還亮着，像一隻巨大的眼睛，死死盯着石階上的年輕人。\n\n同一時間，北京高層會議室內，燈火通明。強硬派主導的決策已成定局：實施更嚴格的戒嚴措施，將中山陵事件定性為「嚴重動亂」，授權戒嚴部隊在必要時採取「一切必要手段」恢復秩序。若不果斷平息，中國將面臨更大內亂風險。保守派元老們一致支援出兵，調動更多外地精銳部隊的命令已下達。\n\n然而，南京街頭的現實卻並未如預期。通告發布後，不僅中山陵人群沒有散去，反而有更多市民從四面八方湧來：工人、教師、醫護、退休老人，甚至部分基層公務員與公安幹警。他們手持白紙、橫幅，沿途高喊「撤銷動亂定性」「人民的軍隊不能對人民開槍」。據不完全統計，僅當晚湧向中山陵周邊的聲援群眾已超過數十萬。\n\n軍車隊伍在進城路上遭遇大規模阻攔。市民自發築起人牆，包圍裝甲車，提供食物與水給士兵，有人向年輕戰士喊話：「兄弟們，你們的槍口不能對着我們！」部分士兵低頭不語，有人站著部隊面前使部隊推進受阻。\n\n高層下令：所有戒嚴部隊立馬肅清反革命分子。"
 ROC_PRC.29.a: "全体都有，预备..."

 ROC_PRC.28.t: "最后的劝说"
 ROC_PRC.28.d: "石階上的學生大多裹着外套蜷睡，有人低聲交談，有人盯着手機殘存電量看最後一條朋友圈。突然，一陣低沉腳步從側門傳來。一個身影在保安與便衣簇擁下走進殿內。燈光昏暗，但認出他的人瞬間屏息：李強，西裝筆挺，領帶卻鬆了半截，眼圈發黑。\n\n學生們被驚醒，紛紛站起，有人揉眼，有人低聲驚呼：「李強總理？怎麼來了？」李強抬起手，示意安靜。他的聲音沙啞，卻穿透寂靜，像極了三十多年前另一個深夜的另一個人。「同學們，我是李強總理。我不是來抓人的，也不是來宣布什麼的。我是偷偷來的……就是想跟你們說幾句話。」\n\n他頓了頓，環視一周，看到一張張年輕的臉，滿是血絲與淚痕。「孩子們，我知道你們為什麼站在這裡。我也知道李克強總理走了，你們有多痛。我也痛……我們很多人，都痛。三十多年前，我也像你們這麼大。那時候，我們也相信理想能改變一切，也相信站出來就能讓國家更好。那時候的總書記……趙紫陽同志，偷偷跑到廣場。他對學生說的話，我到現在還記得清清楚楚。」\n\n李強深吸一口氣，聲音微微顫抖：「他說：『我們來得太晚了……對不起同學們。』他說：『你們還年輕，你們要好好活下去，要健康活下去。』他說：『我知道你們是愛國的，你們的要求是合理的……但現在情況很複雜，你們再堅持下去，會死人的。』」他看向身邊一張張充滿朝氣的臉。「今天，我也只能對你們說同樣的話。孩子們，你們已經做到了。你們讓全國看到了問題，讓很多人開始思考。但是北京的決定，不會因為我一個人偷偷跑來就改變。你們再待下去，不是在爭取勝利，而是在等死。甚至更壞的東西我們都不想看到那一幕再發生。」李強轉身離開，腳步沉重，像背負整個時代的重量。警衛護送他從側門消失，夜色很快吞沒身影。\n\n殿內，學生們面面相覷。有人開始收拾東西，有人抱頭痛哭，有人一根根吹滅蠟燭。但更多的人仍然坐在原地，石階上的人群沒有散開，反而更密集了些。\n\n同一時間，全國各地開始湧現聲援浪潮。南京街頭，數十萬市民自發湧向中山陵周邊，工人、教師、醫護、記者、甚至部分基層公務員與公安幹警加入遊行隊伍。橫幅五花八門：。蘇州、無錫、上海、杭州、北京、廣州、成都、武漢等城市校園與街頭，同時出現大規模集會與遊行。據不完全統計，僅南京一地，當天參與聲援的各界民眾超過百萬；全國範圍內，至少三十多個主要城市、數百所高校有學生與市民上街，總人數難以精確估計。\n\n多家媒體開始如實報道中山陵現場，央視部分頻道罕見播出燭光畫面。知識分子聯署聲明，呼籲當局撤銷動亂定性、展開對話；民主黨派人士公開致函高層，肯定學生訴求正當；宗教界人士、手持標語加入；醫院醫護穿白大褂前來志願服務；工廠工人開着卡車組成車隊；甚至部分軍人與警察在遊行中比出V字手勢，贏得掌聲。\n\n北京高層遲遲未給出明確新定位，地方當局陷入困惑，不知如何應對本地聯動。絕食呼聲開始在南京部分學生中醞釀，有人宣讀宣言，稱「我們願以生命喚醒良知」。國際媒體鏡頭24小時對準，西方國家政府呼籲克制。壓力如潮水般湧向中南海，內部討論戒嚴擴大與進一步措施的聲音愈發強烈。"
 ROC_PRC.28.a: "它像一場更大的潮水，正從南京向全國漫延"

 ROC_PRC.27.t: "良心"
 ROC_PRC.27.d: "擴音喇叭每隔半小時重複一次：「立即解散，否則依法處置。」但中山陵石階上的燭光依舊未滅。學生、工人、市民圍坐成圈，手拉手，口號聲一浪高過一浪。他們直面最前排的士兵，雙方面面相覷，年輕的臉龐帶着難以言喻的壓力與堅強。\n\n最前排的士兵隸屬南京軍區某機械化步兵旅，平均年齡二十出頭，多為90後、00後。頭盔下稚氣未脫，手中95式步槍握得發白。連續站崗十八小時，耳邊是同齡人的哭喊、歌聲與口號。有人認出人群中高中同學，有人看到對面白紙上寫着自己母親的名字。\n\n突然，一名列兵將槍托重重砸在地上，發出「咚」的一聲悶響。他扯下頭盔，淚水混着汗水滑落，聲音嘶啞卻清晰：「我……我不幹了！他們是老百姓！我們是來保家的，不是來打自家人的！」話音剛落，旁邊兩名戰士也放下槍，互相攙扶後退幾步。人群爆發驚呼與哭喊：「別開槍！他們是兄弟！」盾牌牆後，軍官厲聲呵斥，但秩序已亂。類似場景在多個點位同時發生：至少三個連隊出現拒絕執行命令、槍口轉向天空、卸下彈匣扔地，甚至跪在石階前對學生喊「對不起……我們錯了……」的舉動。\n\n消息如野火傳回北京。中南海應急指揮中心瞬間燈火通明。習近平臉色鐵青。蔡奇第一個開口：「必須立刻更換部隊！南京本地部隊靠不住，已出現倒戈跡象。」\n\n丁薛祥迅速調出地圖：「從河南、河北抽調精銳。北部戰區與濟南軍區机动部隊，忠誠度高，距離近，十二小時內可到位。把南京原駐軍全部調離，換防到廈門方向——台海前線壓力大，正好增援。」\n\n上午十一時，第一批河南、河北籍部隊軍列抵達南京南站。車廂門開，全副武裝的陌生面孔魚貫而出：河南某紅軍師、河北某裝甲旅官兵。他們無南京口音，眼神冷峻，訓練有素。指揮官直接宣布：原南京軍區參與戒嚴部隊即刻撤離，調往深圳方向執行「南海机动任務」。撤離過程混亂倉促。許多年輕士兵被強行押上軍車，有人哭喊不肯走，有人把軍帽扔在地上。學生們隔着鐵絲網高喊：「兄弟們！別走！回來！」士兵們低頭，不敢回望。\n\n新部隊迅速接管警戒線。但奇怪的是，他們未立即推進。指揮官命令僅為「維持高压態勢，暫不實施武力清場」。北京顯然仍在評估：換血後能否穩住局面。\n\n與此同時，全國多地傳來聯動：上海、廣州、杭州等地校園開始醞釀更大行動，有人呼籲絕食靜坐，以迫使當局改變定性、展開真正對話。新聞界與知識分子加入聲援，強調「人民的軍隊為人民」，試圖喚起更多同情。但高層內部分歧加劇：溫和聲音主張開放有限對話、承認部分訴求正當如反腐、民生，強硬派則堅持視為動亂，拒絕讓步。暫時的喘息，讓運動從純粹悼念轉向更廣泛的道德與政治抗爭，卻也讓北京的鐵腕更為警惕。"
 ROC_PRC.27.a: "人民的军队为人民？"

 ROC_PRC.26.t: "国务院关于南京部分地区实施戒严的决定"
 ROC_PRC.26.d: "消息傳到中山陵時，已是清晨六點半。學生們低聲議論：「又斷網了……」「戒嚴？真的假的？」但當無人機在上空盤旋、擴音喇叭反覆播放官方通告時，整個廣場瞬間沸騰。先是死一般的寂靜，隨後壓抑不住的怒吼爆發。一個站在石階高處的男生扯開嗓子，用盡全力喊出第一句：「反對戒嚴！還我自由！」\n\n聲音迅速被成千上萬人接上，如火山噴發：「反對戒嚴！還我自由！」「打倒腐敗！還我民主！」「李克強總理萬歲！」「人民萬歲！」\n\n熟悉的三十多年前曾在另一座廣場回蕩的口號，開始在中山陵的392級石階上此起彼伏響起，撕心裂肺卻堅定：「我們要民主！我們要自由！」「沒有民主就沒有現代化！」「反官倒！反腐敗！」「人民的總理人民愛！人民的總理人民救！」「血債血償！」最後一句出口時，許多人眼淚同時湧出。不是恐懼，而是積壓太久的悲憤終於找到出口。燭光在喊聲中劇烈搖晃，有人高舉白紙，黑筆寫着四個大字：「六四重演？」\n\n警方盾牌牆開始緩慢推進，但未使用催淚彈，也未開槍。雙方之間只剩一道越來越窄的空地。學生們沒有後退，反而手拉手往前挪動幾步。人群中，有人開始唱《國際歌》，有人高喊「坦克人永垂不朽」，有人脫下外套鋪在地上，準備長期堅持。戒嚴部隊的士兵呆立原地，槍栓拉得「咔咔」響，卻無人下令進一步行動。年輕士兵在頭盔下眼神閃爍，有人偷偷低頭，有人緊咬牙關。\n\n與此同時，全國多地傳來聯動跡象：蘇州、上海、杭州、北京等城市校園與街頭，學生與市民開始自發聚集，抗議南京戒嚴通告對悼念者的污名化。口號強調「和平請願，不是動亂」「擁護改革，反對腐敗」，試圖展現愛國性質，避免被進一步定性為顛覆。部分工人團體沿途支援，維持秩序，讓抗議隊伍順利通過路障。\n\n官方的反應迅速卻謹慎：宣傳口跟進強調「境外勢力操控」「維護安定團結」，但暫未全面清場。國務院發言人表示願意與代表對話，適時安排，但堅持戒嚴定性不變。學生領袖們拒絕單方面讓步，堅持要求公開李克強死因、撤銷動亂定性、保障新聞自由。\n\n秦淮河水無聲流淌。晨光灑在中山陵石階上，映照出無數張淚痕斑斑卻倔強的臉。這不是結束，而是更大風暴的開始。戒嚴通告非但未壓制，反而點燃了更多人的團結與決心，就像三十多年前那篇社論一樣，激怒了原本可能退讓的群眾，讓運動從校園走向全社會。"
 ROC_PRC.26.a: "往日再现?"

 ROC_PRC.25.t: "裂痕"
 ROC_PRC.25.d: "中南海深處的會議室，空氣中瀰漫着濃重的煙草味與疲憊。投影屏上，南京中山陵的實時畫面依舊：燭光海洋綿延不絕，數萬人席地而坐，橫幅在夜風中微微搖曳。溫和的燈光映照出一張張年輕而稚嫩的臉龐。\n\n坐在主位的習近平目光如炬，久久未語。身旁幾位核心常委，爭執聲已從激烈轉為低沉，卻仍未平息。李強率先開口，聲音低沉卻急切：「總書記，現在不能再拖，也不能硬來。南京已持續兩週，全國目光都盯着。如果再來一次大規模清場，民怨會更猛烈。建議派代表對話，哪怕象徵性讓步：公開李克強死因調查、承諾部分民生紓困、允許有限媒體報道，至少能止損。」\n\n他翻開一份最新內部評估：「民意監測顯示，超過六成城市青年與中產對當前局勢不滿，但支持暴力的不到兩成。他們要的是對話。給點空間，就能壓下去。」\n\n蔡奇臉色鐵青，手指敲擊桌面：「李強，這不是讓步，這是開門揖盜！你看他們的訴求，直指黨的領導地位！現在一刻也不能軟弱，不然等於承認他們合法，等於在國際上給分裂勢力遞刀子。南京不解決，明天其他城市都會跟進。必須果斷、強硬！讓他們耗不下去。歷史證明，軟弱只會讓動亂雪球越滾越大！」旁邊的王滬寧微微點頭附和道：「蔡奇同志有道理。意識形態陣地絕不能讓。這些年輕人被境外勢力蠱惑，借悼念李克強搞顏色革命，我們絕不能容忍。」\n\n沉默持續整整三分鐘。習近平注視投影屏上的燭光，終於開口，聲音平靜卻不容置疑：「夠了。觀察到此為止。南京事態已超出悼念，演變為有組織動亂。核心訴求指向國家根本制度與統一大業，絕不能讓步。」話音落下，會議室響起一陣低低的呼氣聲，仿佛壓抑已久的弦終於繃斷。他轉向蔡奇：「起草命令。」蔡奇立刻起身，聲音中帶着一絲解脫：「是，總書記。立即定性為『動亂』，宣布南京市局部戒嚴。調動武警與公安特警，實施清場。斷網、封鎖交通、抓捕骨干。宣傳口同步跟進：境外勢力操控、借悼念之名行顛覆之實。」\n\n同一時間，南京街頭傳來新消息：數千學生試圖靠近中山陵周邊核心區域，要求高層代表出面對話。警方迅速限制進入，學生決定原地靜坐。夜深時，數千高校學生與圍觀群眾匯聚，齊聲呼喊要求公開回應。多次試圖突破警戒線未果。凌晨，大批警察與警車到場，強行將靜坐者拖上大巴。過程中發生推搡與衝突，有學生受傷，傳聞警方使用警棍與暴力驅離迅速蔓延，激怒更多原本觀望的校園青年與知識分子加入。\n\n與此同時，一家立場較開明的媒體試圖刊發紀念李克強的專題，內含對當前經濟困境與民生訴求的正面評價，卻遭上級要求刪除敏感內容。報社內部爭執不下，總編勉強同意刪改，但報紙已部分發出。當局緊急攔截郵局渠道，街頭與內部直送的部分仍流傳，引發新聞界強烈反彈。多個官媒從業人員聯名發聲，譴責壓制決定，並對該媒體表達敬意。此事迅速成為新聞自由訴求的新焦點，進一步擴大運動規模。\n\n李強聽完匯報，臉色蒼白，沉默不語。會議室內的裂痕，已無可彌合。"
 ROC_PRC.25.a: "到底能做些什麽"

 ROC_PRC.24.t: "中山陵的烛光"
 ROC_PRC.24.d: "紫金山的霧氣在清晨漸漸散去，中山陵的392級石階上，燭光已燃燒整夜。火苗在風中搖曳，卻始終未滅。無數的學生，工人，知識分子他們從南京四面八方匯聚而來。幾天內，人數從幾千漲到上萬。廣場上沒有帳篷，只有席地而坐的人群，沒有統一旗幟，只有無數白紙和手寫橫幅。\n\n人群中沒有擴音器，只用手機連成簡易「人鏈麥克風」：一人低聲說一句，後面齊聲重複，聲音在山谷回蕩，如潮水層層推上。沒有人衝撞警戒線，沒有人投擲物品，更沒有人點燃任何東西。他們只是坐在那裡，分享個人故事、唱歌，討論著未來和過去。\n\n在部分大學生主導下，原本單純的悼念活動逐漸轉向更直接的訴求。有人站起，用手機燈照亮紙張，朗讀對當前經濟與社會問題的呼籲：控制通貨膨脹、解決大規模失業、處理官員腐敗、要求政府問責、恢復新聞自由、推進民主政治與結社自由。這些話語迅速在人群中傳開，得到低聲附和與點頭。第七天清晨，一群來自南京大學、東南大學的學生代表在中山陵祭堂前製作大型花圈，置於李克強語錄旁。下午，數百人聚集在警戒線前，舉起手寫的七項要求清單:\n重新評價李克強總理的功過，肯定其「大道至簡，有權不可任性」「六億人月收入不足千元」等務實觀點。\n嚴查拖欠工資、地方債違約等經濟亂象，要求相關責任人公開道歉並賠償。\n盡快制定並公布保障新聞自由的相關法規，允許民間獨立報道。\n要求國家領導幹部公開本人及家屬財產收入，嚴懲腐敗與權力濫用。\n對教育、就業政策失誤作出正式檢討，大幅增加教育與民生投入，提高青年與知識分子待遇。\n重新審視近年經濟管控措施，為受影響的公民與企業提供平反與補償。\n強烈要求官方媒體對當前民生困境與中山陵悼念活動給予公正、如實、及時報道。\n\n學生代表試圖將這份要求遞交給現場負責人。幾名年輕人走近警戒線，請求與更高層級官員對話。警方維持秩序，勸說人群勿聚集，但未強行驅散。代表們表示，若要求未獲正式回應，他們不會離開。現場氣氛緊張卻克制：學生席地而坐，警察排成密集陣型，雙方面面相覷。\n\n與此同時，CNN、BBC、Al Jazeera等國際媒體的直播鏡頭24小時對準中山陵，標題日益聳動：「南京中山陵對峙進入第七天，中國學生重演歷史？」「經濟崩潰邊緣的燭光抗議」。或許正因股市連續跌停、外資加速撤離、地方債危機隱現，再來一場大規模衝突後果不堪設想，雙方就這樣僵持。\n\n白天，輪流演講、分享食物、唱歌；夜晚，手機屏幕組成光的海洋。警戒線外，防暴警察站得筆直，偶有年輕士兵眼神複雜。民眾自發送水、麵包，沒有人動手，也沒有人退讓。\n\n一個中年工人坐在石階上，手握泛黃工資條，對旁邊大學生說：「拖欠八個月工資，老母親等錢治病。我不怕死，但怕再這樣下去，下一代連活下去的勇氣都沒有。你們年輕人站出來，我們這些老傢伙也得跟上。」大學生點頭，將外套披在他肩上：「叔，我們不走。他們不答應，我們就不走。\n\n"
 ROC_PRC.24.a: "六四回響？"

 ROC_PRC.23.t: "秋风萧瑟"
 ROC_PRC.23.d: "南京的紫金山籠罩在一層薄霧中。中山陵的石階上，落葉被風卷起，又輕輕落下，仿佛在低語着什麼。幾天前，前國務院總理李克強在上海突發心臟病逝世的消息傳來，如一顆石子投入湖面，激起層層漣漪。官方通報簡短而冰冷：「突發心臟病，經搶救無效，不幸逝世。」但民間早已炸開鍋，這位曾說「人話」的平民總理，怎會如此英年早逝？\n\n消息傳到南京大學校園時，已是深夜。學生群組先是長久的沉默，隨後爆發憤怒的討論，有人貼出李克強視察災區時彎腰傾聽老人說話的照片，和那句“六億人月收入不足千元”的金句。很快，情緒從線上蔓延到線下。凌晨三點，南京大學仙林校區操場上，幾十個身影悄然聚集，手持白紙和蠟燭。有人低聲說：“他走了，我們得送送他。”沒有組織更沒有領袖，只是自發。\n\n天剛蒙蒙亮，來自南京大學、東南大學、南京師範大學的年輕人三三兩兩走出宿舍，背着書包，舉起簡易橫幅：「沉痛悼念李克強總理」「人民的好總理，走好」。他們沒有高喊口號，只是默默走向中山陵。沿途，路人駐足，有人加入，有人拍照。南京街頭本就壓抑：失業青年、拖欠工資的工人、為房貸發愁的白領——李克強的死，像一根導火索，點燃了積壓已久的悲憤。\n\n中山陵入口處，保安試圖阻攔，但學生們只是靜靜站立，手舉白紙。紙上寫着：「大道至簡，有權不可任性」「人在幹，天在看，蒼天有眼」。漸漸地，人群從幾百擴大到上千。學生們沿着392級石階向上，每一步都異常沉重。抵達祭堂前，他們圍成圈，點燃蠟燭，擺放花圈。有人帶頭默哀三分鐘。當局的反應來得極快。下午，警方封鎖中山陵周邊道路，增派警力。廣播反覆播放：「請市民理性悼念，勿聚集，勿影響公共秩序。」但學生們沒有退卻。夜幕降臨時，中山陵前燭光点点，數百人席地而坐，有人低聲唱起《國際歌》。\n\n中山陵的石階上，燭火在夜風中搖曳，帶來秦淮河的濕氣。學生們知道，這不是結束。只是開始。就像三十多年前胡耀邦之死一樣，最終他們堅信自己將改變了歷史的走向。"
 ROC_PRC.23.a: "不复以往"

 ROC_PRC.22.t: "中国总理李克强逝世"
 ROC_PRC.22.d: "今日，一则突发新闻震惊了整个中国：中共政治局常委兼国务院总理，此时年纪还不到70岁的李克强，在上海突发心脏病逝世。这对于普遍拥有良好医疗保障的中共领导人来说极其难以置信。\n\n据悉，李克强在台海战事僵持和国内动荡后，被指定来到上海居住，受到变相的软禁。李陷入昏迷后，中共上海市委立刻组织医疗团队进行抢救，但最后仍无力回天。目前，除发布李逝世的消息以外，中国官方便没有了近一步动作。\n\n在局势动乱的消沉气氛中，李的突然逝世更加深了中国人的幻灭感。中国民间对李的\"英年早逝\"提出了多种阴谋论，认为是中共领导人习近平担忧李的影响力而秘密将其暗杀，抑或者是故意拖延了救治时间。目前各地社会治安部门已经接到指令，要求对借此机会反对政府的民间异见团体进行密切监视和控制。"
 ROC_PRC.22.a: "意外"

 ROC_PRC.21.t: "先人已逝"
 ROC_PRC.21.d: "[GetDateText]的秋风吹过北京的中南海，树叶泛黄，空气中弥漫着一种压抑的凉意。随着僵持已久的台海战事以及国内混乱的局势，他的健康开始日渐虚弱。一切u都从那天开始。\n\n那天美国内战后，中国政府迅速采取了对台统一策略，奈何在新加坡会议上本该理想的和平统一大业却破裂。与此同时媒体上充斥着“以武促统”的口号，民间极端情绪也日渐壮大。台海局势战机呼啸，导弹频发。解放军登陆金门那天。李克强私下里忧心忡忡。他曾对亲近友人感慨：“台海若开战，经济必崩。两岸同胞，何苦自相残杀？”\n\n作为经济专家，他清楚战争的代价。随着习近平话语权的壮大，他虽无权决策，却通过老渠道进言，但他的声音如石沉大海，在强硬派主导的氛围中，被视为“软弱”。\n\n战争期间政府种种行为已让国民失望透顶，随着房地产崩盘，失业率飙升，地方债台高筑。工人罢工从零星转为频发，东北地区爆发大规模冲突，南方民众武力对抗黑衣人和警察。\n\n压力如山岳般堆积。李克强的健康本就不好，他本该休养，却夜不能寐。友人回忆，他常常半夜醒来，盯着地图上的台湾海峡发呆。台海的炮声仿佛回荡在耳边，国内的罢工新闻如利刃刺心。他的心脏问题早在总理任期就显现：高强度工作、官僚阻力、疫情应对的煎熬，已让他多次住院。但如今，局势的恶化加速了崩盘。一次秘密会议上，他试图说服高层“缓和台海、优先民生”，却被冷遇。回家后，他胸闷气短，服药无效。\n\n他对老友说：“六亿人月收入不足千元，这仗怎么打？内忧未解，外患怎抗？”\n\n一个深夜，上海的酒店泳池边。李克强本在散步，试图缓解压力。突然，胸口剧痛，他倒地不起。医生赶到时，已是回天乏术。官方通报称“突发心脏病”。台海的战云、国内的民怨，如无形的枷锁，压垮了这位“平民总理”。"
 ROC_PRC.21.a: "克强走好"

 ROC_PRC.20.t: "情况不对"
 ROC_PRC.20.d: "在中央的一间会议室中，空气比往日更加凝重。窗外的雾霾依旧浓厚，室内灯光却显得格外刺眼。示威规模激增，聚集点从几十个暴涨到数百个，网络上匿名抗议帖子的转发量呈指数级爆炸。更令人不安的是，报告中反复出现的关键词“持械”和“死亡人数”\n\n“情况不对，”一名安全部门领导声音低沉，手指重重敲在最新一份汇总报告上，“那群人非但没有震慑，反而激起了反弹。现在各地民众开始自备武器，甚至从黑市流入的刀具和自制燃烧瓶。东北，华北多个地区已经爆发多起激烈冲突，双方都有伤亡。”\n\n投影屏上迅速切换出一组现场照片。昏黄路灯下，一群工人手持铁棍和消防斧，与黑衣人形成对峙。另一张是南昌的街头，民众用摩托车和货车筑起临时路障，身后是挥舞着菜刀和镰刀的居民。画面中，催泪瓦斯弹在空中绽开，白烟滚滚，但人群没有溃散，反而有人高喊：“他们先动的手，我们只是正当防卫！”社交媒体上流传的视频一个中年男人被黑衣人围殴后，邻居们抄起家伙冲出来跟黑衣人厮杀到了一起，转发量已经破百万。”\n\n会议室里安静下来。有人翻开另一份内部简报投影到屏幕上：“过去两周，多地爆发持械对抗，东北的一个矿区，工人用矿灯和铁镐跟黑衣人和警察爆发冲突，造成数十人伤亡；广州的失业青年和快递员用电动车链条和砖头反击，警方增援时已晚。而且云南的一个小镇村民甚至用猎枪和土制炸在村口和警方对峙。”\n\n“不能再依赖他们了，”一位军方背景的官员终于开口，“军队必须立刻下场！应当给予公安部适当的权限来制止动乱！”众人交换眼神，却没人立刻附和。他们知道，这不是简单的策略调整。如果失败，他们将被钉在历史的耻辱柱上。"
 ROC_PRC.20.a: "暗流涌动"

 ROC_PRC.19.t: "黑色的幽灵"
 ROC_PRC.19.d: "黑色的幽灵悄无声息地渗入城市的脉络。统一的黑色连帽衫，蒙面，铁棍，手套，一切都像精心排练过的。他们不挑目标，不问缘由，见人就打。\n\n突然，从地铁口涌出一群黑衣人，像决堤的暗流。他们沉默地挥舞武器。第一个受害者是一个推着婴儿车的年轻母亲，她甚至来不及尖叫，就被一根铁棍砸中后脑便倒地不起。婴儿的哭声瞬间刺破空气。\n\n随着黑衣人分散开来，像猎犬般扑向人群。有人被拖进巷子殴打，有人被围在路灯下踢踹，有人只是路过就被从背后猛击头部。没有任何征兆。他们打上班族、打学生、打老人、打妇女、打推轮椅的残疾人。血迹溅在橱窗上，尖叫声此起彼伏。\n\n目击者后来回忆：“他们不说话，也不骂人，就打。打完一个换下一个，像机器一样。”一个中年男子试图阻拦，被三人同时围殴，肋骨断裂，肺部出血。他倒下时，还在问：“为什么……为什么是我们？”\n\n事件持续了不到二十分钟，却留下了数十人重伤，几个当场昏迷。救护车蜂拥而至，警笛声终于响起时但黑衣人早已如潮水退去，消失在城市的阴影里。地上散落着断裂的棍棒、撕碎的口罩、血染的衣物。监控录像显示，他们来去有序，仿佛有预设的撤离路线。\n\n事后，警方通报称这是一起“恶性群体斗殴事件”，已成立专案组全力侦破。但通报中没有提到“黑衣人”这个词，只说“部分涉案人员已落网”。网络上，视频被迅速删除，相关讨论被限流，却仍有碎片流传：有人说这是“自发维稳”，有人说这是“雇佣的影子部队”，还有人猜测“他们不是冲着谁来的，就是要制造恐惧，让所有人闭嘴。\n\n国际媒体很快跟进。CNN的一篇报道将此事件与历史上的“棕衫党”或“黑衫军”类比，称其为法西斯主义的现代化版本”。\n\n官方回应一如既往地简短道“我们坚决反对任何形式的暴力。相关部门正在调查，呼吁群众理性，不要造谣。”但这份声明显然点燃了更多怒火。”"
 ROC_PRC.19.a: "他们似乎想用暴力来使人们屈服"

 ROC_PRC.18.t: "薪中国"
 ROC_PRC.18.d: "傍晚的余晖洒在城市广场上，平日里人来人往的步行街此刻却被一阵阵口号和脚步声撕裂。数百名工人、手持横幅和简易标语，从四面八方涌来，堵住了主干道。横幅上写着“还我血汗钱”“欠薪就是抢劫”“我们要活路”。他们像潮水一样，从工厂宿舍、建筑工地、网约车停车点、失业青年聚集的奶茶店，自发汇聚而来。\n\n起因很简单，却又沉重得让人窒息。一家大型建筑集团拖欠了上千名农民工半年工资，总额上亿。工人们先是堵门讨薪，被保安驱赶；接着去劳动局门口静坐，被劝离。再后来，有人把欠薪名单和血泪视频发到网上，迅速被删，却已在外网和社交媒体疯传。绝望像病毒一样蔓延：有人跳楼，有人割腕，有人干脆躺在马路中央堵车。终于，在这个黄昏，忍耐的底线崩塌了。\n\n广场中央，一个四十多岁的包工头老王站在临时搭起的纸箱上，手里握着破旧的手机当扩音器。他的声音沙哑，却带着一股子狠劲：“弟兄们！我们不是要造反呐！我们是要活命！公司跑路了，政府管都不管，我们还能怎么办？今天不站出来，明天就饿死在工棚里！”\n\n人群回应以怒吼。有人扔掉安全帽，有人脱下反光背心当旗帜挥舞。很快，更多人加入，下班的白领停下脚步围观，失业青年从地铁口冲出来，骑电动车的快递员扔下包裹加入。没有人指挥，却像被同一股无形的力推动着。人群从广场向商业街推进，堵住了几条主干道。汽车喇叭狂鸣，行人尖叫逃散，但工人们没有打砸，只是围坐、拉横幅、高喊口号。\n\n人们常说，中国社会早已被打散成无数孤立的个体：没有工会，没有真正的集体谈判，没有敢站出来的领袖。每个人都像原子，独自承受房贷、医疗、教育、失业的重压。可当压迫达到临界，当无数原子同时沸腾，它们就会在毫无预兆的瞬间碰撞、聚合，形成一股无法忽视的乱流。\n\n今晚就是这样。起初只是几十人堵在公司门口，后来变成几百人涌上街头，再后来，消息在不同城市的工人群里扩散：北京、上海、广州、成都几乎同时，有人开始效仿。不是有预谋的全国串联，而是绝望的共振。一个人看到视频动了，另一个人看到热搜跟了，第三个看到朋友圈转发也站起来了。当原子碰撞时瞬间裂变。\n\n警方很快赶到。防暴警察列队，手持盾牌和警棍。带队警官用喇叭喊话：“立即解散！这是非法聚集！否则后果自负！”\n\n工人们没有退。有人高喊：“我们没砸没抢，就要工资！”老王跳下纸箱，走到最前面：“抓我啊！抓我一个，你们得抓多少？全国欠薪的工人有多少？抓得完吗？”\n\n跟着警察推进，工人后退又往前挤。有人被按倒在地，有人被电棍击中发出惨叫。混乱中，更多路人加入，有人拍照直播，有人扔矿泉水瓶助威。场面一度失控。一辆警车玻璃被砸，一名警察的头盔被掀飞，但工人没有武器，只是用人墙、人潮、人数对抗。\n\n最终，增援的特警和武警赶到。催泪瓦斯弹升空，白烟滚滚。人群被驱散、冲锋、围堵。数百人被按倒、反铐、押上警车。老王满脸是血的被几个警察架走时，还在喊：“弟兄们别怕！这事没完！”\n\n夜色降临，广场恢复了表面的平静。被拖走的横幅碎片在路灯下翻滚，地上散落着安全帽、口罩、破碎的手机屏。官方通报很快出来：定性为“非法聚集扰乱公共秩序”，少数“带头闹事者”被刑拘，同时承诺“严肃查处欠薪问题”。\n\n但谁都知道，这不是结束。一次抗议被镇压，换来的往往不是恐惧，而是更多人的觉醒。下一个黄昏，也许在另一个城市，另一群绝望人民会再次碰撞产生更强大的共振。"
 ROC_PRC.18.a: "风满楼"

 ROC_PRC.17.t: "一声叹息"
 ROC_PRC.17.d: "夜幕笼罩下的老工业区，警笛声撕裂了深夜的宁静。厂区大门外，几辆警车闪烁着蓝红灯光，数十名全副武装的警察迅速封锁了出口。空气中弥漫着催泪瓦斯的余味，混合着烧焦的橡胶和铁锈的味道。被带走的工人双手反铐，低着头排成一列，脚步拖沓，像一群疲惫的影子。\n\n老李被押上警车时，还回头看了一眼那座熟悉的车间大楼。玻璃碎了一地，机器停转后留下的寂静格外刺耳。几个小时前，这里还挤满了愤怒的工友，有人挥舞着自制的横幅，有人用手机录下管理层拖欠三个月工资的证据，有人甚至点燃了厂里的废纸箱。\n\n“境外势力勾结，组织暴动。”警察在现场反复宣读这个定性。工人们面面相觑。老张被铐得手腕发紫，忍不住骂道：“我们就想要工资，要活路，怎么就成暴动了？”\n\n回想起来，一切从上周开始发酵。工厂突然宣布“资金链断裂”，工资停发，社保断缴。管理层人间蒸发，只剩保安拿着棍棒守门。工人们先是堵在厂门口静坐，后来有人从网上看到匿名帖子，说有个叫韩东方的老哥，当年就为工人维权，坐过牢，流亡香港，还在办劳工通讯，帮底层曝光真相。\n\n“试试联系他吧。”小王当时的提议虽然让大家犹豫了很久，但最终还是凑了点钱，买了个二手手机，用匿名账号把工资条、欠薪名单、厂里安全事故的照片发了过去。没想到第二天就有了回应，海外一个劳工组织的转发。帖子迅速在工人微信群里传开。\n\n但等来的不是解决方案，而是如今的惨状。警方冲进宿舍，翻箱倒柜，搜走了所有手机、电脑，还有那几张模糊的打印纸，上面是他们偷偷复印的劳动法条款和韩东方旧文章的节选。带队的中年警官冷笑道“境外资助，精密策划，证据确凿。你们这是勾结反华势力，破坏社会稳定。”\n\n车间里残留的痕迹触目惊心：被砸碎的监控摄像头，散落一地的标语纸条。几个年轻工人被当场带走时还在喊：“我们没打人，没砸厂，就要个说法！”警察回以电棍的嗡鸣和更紧的铐链。\n\n随着警车驶离厂区。老李靠在车窗上，看着渐渐远去的烟囱。脑海里闪过韩东方的名字，那个三十多年前在广场上喊工人罢工的汉子，如今被官方通报钉上“幕后黑手”的标签。他苦笑：我们只是想活下去，怎么就成了“暴动”？\n\n车队消失在夜色中。厂区外，风吹过空荡荡的街道，几张被踩烂的传单在路灯下翻滚。上面印着模糊的字迹————"
 ROC_PRC.17.a: "工人不是机器，权利不是恩赐"

 ROC_PRC.16.t: "山雨欲来"
 ROC_PRC.16.d: "夕阳西下，工厂的烟囱吐出最后一缕灰白的烟雾，笼罩着这座老工业城市的边缘。车间里，机器的轰鸣渐渐停歇，工人们擦拭着额头的汗水，三三两两地走出大门。空气中弥漫着铁锈和机油的味道，混合着疲惫的喘息声。这是一个普通的下班时分，但今晚，一切都显得不同寻常。\n\n老李是车间里的骨干，五十出头，脸上布满风霜的皱纹，手上满是老茧。他背着工具包，脚步沉重地走向厂区外的小茶馆。那是工人们聚集的地方，一杯热茶，几句闲聊，就能暂时忘掉一天的劳累。可最近几个月，这里不再是闲聊的场所，而是低声议论的角落。\n\n“老李，你听说了吗？工资又拖了两个月。”一个年轻工人小王跟上来，声音压得低低的，眼睛四处张望。厂区外，人影幢幢，但谁知道有没有人在监听。\n\n老李点点头，没说话。他知道，这不是新鲜事。工厂效益下滑，订单减少，管理层总说“外部环境不好”，但工人们清楚，问题出在那些高高在上的决策者手里。加班费没了，福利缩水，连安全设备都老旧不堪。上个月，小张的手臂在机器里卡住，差点废了，厂里只给了点医药费，就让他滚蛋。\n\n茶馆里，已经坐了十来个工人，有人抽着廉价烟，有人盯着手机屏幕。老李找了个角落坐下，点了一杯茶。空气中飘着淡淡的烟草味，混合着潮湿的霉气。\n\n“不能再忍了。”一个中年工人老张忽然开口，声音虽低，却带着一股子狠劲。“听说外地有厂闹起来了，罢工，游行，最后工资发了，福利也改善了。我们呢？就这样耗着？”\n\n众人交换眼神，有人点头，有人犹豫。小王激动地说：“对啊！我们得团结起来。网上有人说，有个叫韩东方的老哥，当年就带头维权过。他现在在外面，还在帮工人说话。我们能不能联系上他？”\n\n韩东方这个名字，在工人们中间流传已久。有人从父辈那里听过他的故事：八十年代的学运，九十年代的劳工维权，被捕、流亡，却从未停止发声。对于这些底层工人，他像是一个传说中的英雄，虽然遥远，却给人一丝希望。\n\n老李终于开口了：“韩东方？那可是老朋友了。三十多年前，我在报纸上见过他的事。他为工人争权利，结果被抓了，放了又抓。现在他在香港，办了个劳工通讯，帮咱们发声。但联系他？风险大啊。万一被盯上……”\n\n茶馆里安静下来。窗外，夜色渐浓，街灯昏黄。工人们知道，厂里安了监控，宿舍有眼线。谁敢先站出来？但不满的情绪如地下暗流，越来越汹涌。上周，几个工人私下商量，收集了工资拖欠的证据，偷偷传到网上。没想到，很快就删了，但消息还是传开了。\n\n“明天怎么办？”老张问。“再拖下去，家里都揭不开锅了。”\n\n小王拿出手机，屏幕上是一篇匿名的帖子：“兄弟们，韩东方那边有渠道，能帮我们曝光。咱们凑点材料，发过去？”\n\n老李叹了口气：“行吧。但得小心。别让厂里知道。”\n\n"
 ROC_PRC.16.a: "只等那大雨清下"

 ROC_PRC.15.t: "黎明总会到来"
 ROC_PRC.15.d: "夜幕低垂，城市的霓虹在窗外闪烁，却透不进这间狭小的客厅。毛远新坐在旧沙发上，背微微弓着，灯光映在他布满皱纹的脸上，显得格外疲惫。房间里挤着几个年轻人，有人靠在墙边，有人盘腿坐在地毯上，他们的目光都投向这位曾经叱咤风云、如今低调隐居的老人。\n\n“远新叔，”一个年轻人开口，声音带着压抑的急切，“现在外面这么乱，经济下行，民生艰难，国际上又处处掣肘，我们这些普通人，看着国家一步步走到今天，心里堵得慌。您当年经历过那么多风浪，您觉得，我们还能做什么？局势还能翻转吗？”\n\n客厅里一下子安静下来，只剩墙上老挂钟的滴答声。毛远新抬起头，目光缓缓扫过每个年轻人的脸。他没有立刻回答，而是长长地叹了口气，那叹息里带着岁月沉淀的无奈与沉重。\n\n他伸手拿起茶几上的一本旧书，那是一本封面已经泛黄，看样子是几十年前的旧版理论读物。他手指轻轻摩挲着书脊，仿佛在触摸一段遥远的时光。“时代变了，”他声音低沉，带着一丝沙哑，“可有些东西，从来没变过。矛盾总是存在的，积累到一定程度，就要爆发。”\n\n年轻人中有人皱眉：“可现在连声音都被管得死死的，很多人连讨论都不敢。您当年……至少还能在东北呼风唤雨，至少还有空间去推动变革。现在呢？我们连发声的机会都没有。”\n\n毛远新苦笑了一下，那笑容里没有了当年的锋芒，只剩下一种看透世事的苍凉。“呼风唤雨？那不过是表象。权力来得快，去得也快。我当年以为自己站在了历史的正确一边，以为能改变一些东西，结果呢？一夜之间，一切都成了罪证。我坐在牢里的时候，也问过自己：值得吗？值不值得为那些理想，把自己的一生搭进去？”\n\n他顿了顿，目光转向窗外，黑夜中只有零星的灯光。“后来我想通了。不是值不值得的问题，而是我们有没有资格去选择沉默。人民群众的苦难，不是靠一两个人就能解决的。靠的是觉醒，是大多数人慢慢看清真相的那一刻。”\n\n一个坐在地上的年轻人声音颤抖：“那我们现在怎么办？等着？被动地等着局势自己变？”\n\n毛远新摇摇头，声音忽然坚定起来：“不是等，是观察，是学习，是积蓄。帝国主义、修正主义、官僚主义这些东西从来都不是一成不变的，它们会犯错误，会露出破绽。你们要做的，不是急着冲上去，而是要沉下来，看清本质。谁在真正为人民服务，谁在骑在人民头上作威作福。把这些看清楚了，你们的力量才会真正凝聚。”\n\n他放下书，坐直了身体，尽管年纪已大，那一刻却仿佛回到了从前在东北指挥千军万马的模样。“我现在老了，没什么可做的了。但你们不一样。耐心一点，冷静一点。历史不会永远停滞。人民群众一旦真正醒悟，那股力量是谁也挡不住的。就像当年很多人以为一切都完了，结果呢？总有转机，总有黎明。”\n\n客厅里又安静了。年轻人们交换着眼神，有人眼中闪过迷茫，有人却隐隐燃起一丝光亮。窗外的风吹进来，带着冬夜的寒意，但屋里的空气，似乎比刚才暖了一些。\n\n年轻人陆续离开时，有人回头看了一眼。毛远新依然坐在沙发上，手里握着那本旧书，目光投向虚空，仿佛在回想什么，又仿佛在等待什么。他的身影在灯光下拉得很长，孤独，却带着一种倔强的坚持。"
 ROC_PRC.15.a: "世界是你们的，也是我们的"

 ROC_PRC.14.t: "秦城"
 ROC_PRC.14.d: "夜幕早已笼罩秦城，山影沉沉，铁窗外的风带着刺骨的寒意。薄熙来的单人牢房约十六平方米，灯光昏黄，却比普通监舍亮堂许多。他坐在一张简易的写字桌前，身上仍穿着家人送来的深色西装——这里没人强迫他换上统一的囚服。桌上摊开一本旧书和几张纸，笔尖在纸上重重地划着，仿佛要刺穿什么。\n\n牢房里挤进了几个“访客”——其实是狱方安排的定期谈话对象，有老干部模样的人，也有年轻些的监管人员。他们或站或坐，气氛压抑得像凝固的空气。薄熙来抬起头，目光如刀，嘴角却挂着一丝冷笑，那笑里藏着压抑多年的怒火。\n\n“这么多年了，你们还来问我‘认不认罪’？”他的声音低沉，却带着金属般的锋利，“当年重庆那点事，不过是借口。真正的罪名，是我挡了某些人的路，是我让唱红打黑让底层人看到了一丝希望，是我差点……差点坐上那个位置。”\n\n一个年纪较大的“访客”试图插话：“老薄，时代变了，现在讲稳定……”\n\n“稳定？”薄熙来猛地拍桌，声音陡然拔高，牢房里回荡着他的怒吼，“稳定就是把人民的声音堵死？就是让帝国主义和买办们继续骑在脖子上？你们封杀我的声音，封杀我的过去，可你们封得住历史吗？封得住民心吗？”\n\n他站起身，在狭小的空间里来回踱步，脚步沉重，像踩在碎玻璃上。曾经意气风发的重庆市委书记，如今须发渐长，眉宇间却多了一股不驯的戾气。“我父亲当年在秦城关过，我小时候听他说，这里是‘党内疗养院’。呵，现在我才明白，这就是个镀金的笼子！”\n\n他停下脚步，目光扫过每个人，声音压得极低，却字字如钉：“他们以为把我关在这里，我就服了？他们以为这样就能让我闭嘴？错了。我薄熙来还没死！我的想法，我的路子，还在人民心中，在那些被遗忘的底层人心里活着！”\n\n牢房外，夜风吹动铁窗，发出低沉的呜咽。一个年轻的监管人员忍不住问：“那您……还相信会翻案吗？”\n\n薄熙来转过身，背对众人，望着漆黑的窗外。他的声音忽然平静下来，却带着一种近乎疯狂的坚定：“翻不翻案，不重要了。重要的是，有人记得我，有人记得唱红打黑，有人记得人民曾经有过选择的机会。只要记住这一点，这牢房就关不住我。”\n\n"
 ROC_PRC.14.a: "灯光映在他脸上，照出那双燃烧着怒火却又深邃的眼睛"

 ROC_PRC.13.t: "寂静黎明行动当前评估"
 ROC_PRC.13.d: "\n\n\n                                                          £GFX_CCP_event_texticon   \n\n\n\n\n分类级别：绝密\n\n发布日期：[GetDateText]\n\n发布单位：中央军委联合参谋部\n\n收件人：东部战区指挥部全体高级军官及相关单位\n\n抄送：中央军委副主席张又侠上将、中央军委联合参谋部参谋长刘振立上将\n\n同志们：\n\n在[PRC.GetLeader]总书记、中央军委主席的坚强领导下，我们中国人民解放军已进入台海统一行动的第二阶段。然而，战场态势正面临严峻挑战。根据前线实时情报汇总和联合参谋部分析，敌方（台湾当局）在外部势力干预下，成功稳固了部分防线，导致我方第二轮攻势未能完全实现预设目标。这并非不可逆转的挫败，而是考验我们忠诚、韧性和战略调整能力的时刻。作为忠诚于党的军人，我们必须以高度的责任感和使命感，审视当前形势，迅速优化部署。\n\n首先，让我们回顾行动背景。美国内战以来，在[PRC.GetLeader]主席亲自指挥下，我们启动了“寂静黎明”行动，旨在震慑“台独”分裂势力并维护国家主权完整。张又侠副主席在金门行动时的军委扩大会议上强调：“台海是我们的核心利益区，任何外部干涉都将付出代价。”刘振立参谋长则亲自督导了情报整合和多域协同作战计划，确保海空力量与火箭军的精确打击形成合力。然而，敌方借助美海军，以及日澳韩等国的情报支持和武器援助，强化了其“不对称作战”能力，导致我方在某些关键海域的投送受阻。\n\n从内部视角来看，前线指挥官的反馈尤为宝贵。一位东部战区海军指挥员在加密报告中写道：“敌方F-16战机与爱国者导弹系统的联动，成功拦截了部分我方导弹和无人机群。尽管我们已摧毁多个敌雷达站，但其机动部署让我们付出了一定代价。”这反映出我们在情报渗透和实时调整上的短板。回想[PRC.GetLeader]主席在2022年军委工作会议上的指示：“要打信息化战争，打智能化战争。”我们必须深化这一指导思想，避免僵化战术。\n\n更令人警醒的是外部势力的介入。美国太平洋舰队已公开表示将“视情扩大支援”，日本自卫队和澳大利亚国防军也启动了后勤保障机制。这与张又侠副主席在近期视察东部战区时警告的一致：“帝国主义亡我之心不死，我们要准备打持久战。”刘振立参谋长在联合参谋部内部会议上分析道：“敌方的‘时间窗口’正是我们的机会窗口。我们需立即强化电子战和网络攻防，切断其情报链条。”\n\n同志们，作为人民解放军的一员，我们每个人都肩负着民族复兴的重任。想象一下，您正身处指挥舱中，屏幕上闪烁着实时战场数据：东海舰队驱逐舰编队在夜色中推进，歼-20隐身战机划破天际，火箭军东风导弹蓄势待发。但敌方的顽抗提醒我们，胜利不会轻易到来。我们必须忠诚于[PRC.GetLeader]主席的指挥，执行军委的战略部署。\n\n当前态势虽有逆转迹象，但我们坚信，在党的绝对领导下，我军将扭转乾坤，实现祖国统一。任何泄露本简报者，将按军法严惩。\n\n为祖国统一而战！\n\n为中华民族伟大复兴而战！"
 ROC_PRC.13.a: "中央军委联合参谋部"

 ROC_PRC.12.t: "反战之声"
 ROC_PRC.12.d: "夜晚的霓虹灯在雨后湿漉漉的街道上反射出斑驳的光影，整个城市仿佛被一层无形的压抑笼罩。然而，这种表面的平静很快被一段录音打破，像一枚石子投入死水，激起层层涟漪，迅速在全国范围内发酵成风暴。\n\n一个略带南方口音、语速不快却字字清晰的声音响起。那是秦晖教授的嗓音，熟悉的学者腔调，带着一丝疲惫却又异常冷静的理性。\n\n“大家先喝口水，别急。”他似乎在招呼几个人坐下，“咱们今天不是来吵架的，是来聊聊怎么面对现实。”\n\n短暂的停顿后，他继续说道，语气像在课堂上讲课，又像在和老朋友推心置腹：“现在的局面，你们都看在眼里。失业、物价、债务、封控的后遗症……这些不是孤立的问题，而是长期积累的结果。很多人把责任推给外部，或者推给某一种‘主义’，但我一直说：问题不在主义高下，而在制度有没有底线。”\n\n有人小声插话：“那我们现在能做什么？”\n\n秦晖轻轻笑了一声，笑声里没有嘲讽，只有无奈与坚持：“还能做什么？先从最基本的地方做起。读书、思考、交流。不要指望一夜之间天翻地覆，那不现实。历史上多少次激进的冲动，最后都成了更大的悲剧。关键是要有独立判断的能力，要知道什么是‘共同的底线’——人权、言论自由、基本生计，这些东西不是谁赏赐的，是每个人都该有的。”\n\n他顿了顿，声音低沉下来，却更有穿透力：“我常说，低人权优势其实是双刃剑。它短期内可能让某些人赚快钱，但长远看，它欺负的是底层劳工，也在割中产和老板的韭菜。专制权力如果没有制约，哪怕披上再漂亮的外衣，最后都会走向测不准——你永远猜不到它下一步要干什么，因为它只对上负责，不对下负责。”\n\n录音里传来翻书的声音，或许是他随手拿起桌上的某本旧书：“看看历史，从秦制到今天，很多东西换了皮，没换骨。‘大共同体本位’压倒一切，小共同体——家庭、社区、工会、NGO——被不断削弱。结果呢？原子化的个人面对无限大的权力，只有两种结局：要么麻木，要么爆炸。”\n\n有人问：“那出路在哪里？”\n\n秦晖的声音忽然坚定起来，像在黑暗中点亮一盏灯：“出路在于权利与责任的对等。为自由而限权，为福利而问责。没有这个，任何主义都是空谈。你们年轻人有热情，这是好事，但热情要配上理性和耐心。别光喊口号，要学会论证、学会妥协、学会在规则里斗争。静待时机不是消极，是积蓄力量。时机到了，你们得有真东西拿出来，而不是一肚子怨气。”\n\n录音的结尾，他的声音变得很轻，却带着一种不容置疑的力量：“记住，中国走出帝制这条路，我们才走了半截。别指望别人来救我们，自己不努力，谁也救不了。熬过去，好日子在后头。”这段对话迅速在社交平台上疯传。支持者称之为“清醒的灯塔”，是“公共知识分子的脊梁”。反对者则痛斥其“阴阳怪气”“借古讽今”“散布不满情绪”。官方账号很快发声，称录音“系剪辑拼接、AI生成”，并提醒大家“警惕谣言，别被别有用心的人带节奏”。\n\n可那熟悉的语调、那些反复出现在他文章和讲座里的关键词——“共同的底线”“秦制”“低人权优势”“权责对等”——却让很多人无法相信这是假的。无数人反复播放，反复对照他过去的公开演讲，越听越觉得像。\n\n“无论真假，这段话确实戳中了很多痛点。”有人在评论区写道。\n\n线下，讨论在私密的群聊、深夜的出租屋、大学的自习室里悄然蔓延。一个刚毕业的年轻人把录音反复听了几遍，关掉手机后盯着天花板，喃喃自语：“权责对等……底线……”"
 ROC_PRC.12.a: "录音戛然而止，但风暴已经掀起。"

 ROC_PRC.11.t: "中国腐败丑闻暴乱"
 ROC_PRC.11.d: "近日中国多地城市出现规模不一的集会与示威活动。触发因素并非单一事件，而是近期在网络平台持续扩散的一系列腐败指控材料。这些材料包括偷拍视频、文件截图与证人叙述，涉及物资分配、工程招标与基层执行环节。随着相关内容被反复转载、整理与对照，社会关注迅速升温。\n\n在天安门广场周边，警方与安保力量加强了秩序维护。现场聚集的人群构成复杂，既有工薪阶层，也有失业人员与退休者。标语多为手写，内容集中在反腐、反战、问责与生活成本压力等议题。集会以口号与静立为主，秩序在大部分时段保持克制。\n\n与此同时，其他地区也出现响应性活动。东北的哈尔滨，部分下岗工人于行政区域外集结，请求就历史欠薪与安置问题进行公开说明。现场在短暂推挤后恢复隔离状态，未见大规模破坏。南方的广州，物流从业者以车辆停靠的方式表达对燃料成本与运价倒挂的担忧，相关路段采取临时交通疏导。西北的兰州，部分农户在进城通道附近聚集，提出征用补偿与生产资料保障的诉求。\n\n官方渠道在当日发布简要通报，强调依法处置、核查事实与维护秩序，并呼吁理性表达。通报未披露具体涉案人员与时间表。晚间，多地广播与公共信息屏循环播放稳定提示，交通与公共服务在局部时段调整运行。\n\n观察人士指出，本轮抗议的显著特征在于议题的交叉叠加：反腐问责与民生压力同时出现，使得参与者的诉求呈现去中心化。各地活动的规模、方式与强度存在差异，但情绪共振明显。短期内，事态走向取决于调查透明度、信息沟通与秩序管理的平衡。"
 ROC_PRC.11.a: "他们终于要忍不下去了？"

 ROC_PRC.10.t: "大火燃起"
 ROC_PRC.10.d: "清晨的薄雾尚未散去，北京的街道却已被愤怒的脚步踏得尘土飞扬。灰色的天空下，高楼的玻璃幕墙反射出零星的火光，像无数破碎的镜子，映照着这个时代最刺眼的真相。\n\n喧嚣的人群聚集在天安门广场集结上他们手持横幅，高呼着口号，抗议的声音如洪流般席卷而来。\n\n“停止战争！清扫腐败！”\n\n“我们要真相！我们要自由！”\n\n人群从四面八方涌向市中心。曾经沉默的打工人，失业青年，背负房贷的中年人甚至领着微薄退休金的老人，如今都走上了同一条街。他们手中举着的不是精美的印刷横幅，而是用纸壳、旧纸板、甚至撕下的窗帘布潦草写就的字条\n\n“我孩子三个月没吃到肉了”\n\n“工厂倒闭，欠薪半年，还我血汗钱！”\n\n“为什么还要打？谁在受益？”\n\n天安门广场早已人满为患。人群像被压缩的弹簧，一触即发。一位戴着安全帽的建筑工，声音沙哑却格外清晰：“我们盖了那么多房子，自己却连租房都租不起！现在连工地都没了，还让我们爱国？爱国要先活得下去啊！”\n\n在哈尔滨，数千名下岗工人包围了市政府大楼。起初只是静坐请愿，但当防暴警察拉起警戒线、举起盾牌时，人群终于爆发了。有人扔出第一块砖，紧接着是烟雾弹的回击，黑烟与催泪瓦斯交织成一片呛人的迷雾。尖叫、哭喊、警笛、玻璃碎裂声混杂在一起，像一首没有乐谱的末日交响曲。\n\n与此同时的广州，物流园区被愤怒的货车司机封锁。数百辆重卡横在高速路口，喇叭长鸣，像困兽的咆哮。“油价翻倍，运费却被压到地板！我们拉一车货赔一车钱，还让不让人活了？”\n\n更远的兰州，农民堵住了进城的国道。他们拖来农用三轮车、铁锹、锄头，喊着：“粮食被征了，地被占了，现在连种子钱都没了！我们要活路！”\n\n政府紧急发布声明，承诺“加大民生保障力度”“加快问题解决”“希望大家理性表达诉求”。但广播声在人群的怒吼中显得苍白无力，像风中摇曳的烛火。\n\n夜色降临时，街头灯火昏黄，抗议的队伍却越聚越多。有人点燃了轮胎，黑烟直冲云霄；有人用共享单车堆起路障；还有人高举手机，手电筒的光束汇聚成一片光海，像在黑暗中寻找最后的出口。\n\n“他们听不见我们的声音！”\n\n“那就让他们看见我们的怒火！”\n\n远处，特警的装甲车缓缓逼近，扩音器反复播放着相同的劝离警告。但人群没有退缩，反而向前迈了一步。"
 ROC_PRC.10.a: "群众已经无法再忍耐了"

 ROC_PRC.9.t: "火线"
 ROC_PRC.9.d: "没有人能想到那些零零散散的视频可以将舆论彻底颠倒，很快，有人开始比对账目，有人整理名单，有人把不同城市的线索拼在一起。原本彼此无关的“个案”，在同一张表格里连成了一条线。时间，地点，名字一一对得上。\n\n舆论接翻涌。评论区彻底失去秩序，关键词就算不断被封杀替换，新的替代词随即出现。转发速度快得异常，像是早就等着这一刻。街头的议论从低声变成公开，质问不再绕弯，具体的名字和职位被直接点了出来，彷佛人民监督权死灰复燃。\n\n周明成了那个被反复提及的人。最早的几段视频，虽然他使用的是匿名账号，但中国社交软件的匿名程度如同纸糊一样，没多久人们就发现那些视频都是从他的账号传出来的。尽管他后续没有再更新，但他的旧视频被反复搬运，剪辑，二次标注。\n\n凌晨时几个身着黑衣的人迅速破门而入的动作很快，控制、上铐、带走，周明大喊“你们想干什么？”却被黑衣人无情鞭打至晕厥，但整个过程被对门的监控拍下，又被人用手机对着屏幕录了一遍。视频里，周明被按在地上，浑身是血的贴着地砖，声音被压住，只剩急促的呼吸声。\n\n这段偷拍视频在随即便出现在网上。就算被急速下架，但还是有人补档在了twitter和YouTube\n\n评论区先是短暂的质疑，随后彻底失控。有人开始整理时间线，把他拍过的每一段视频重新编号；有人贴出法律条文，质问程序，随后更多的人不再讨论细节，只反复转发那一帧画面。\n\n傍晚，城市里出现了异常的安静。商场提前关门，地铁广播换成循环的反间谍提示。微信群里，有人发出一句话，很快被截图转走————"
 ROC_PRC.9.a: "如果连真相都要被抓，那剩下的只会是谎话"

 ROC_PRC.8.t: "丑闻"
 ROC_PRC.8.d: "赵建国已经在办公室里坐了很久。窗外的天空很亮，阳光落在文件柜的金属边缘上，反射出刺眼的白光。他却始终没去拉百叶窗，只是盯着桌面上那份尚未盖章的内部材料，像是在等一个早就知道结果的宣判。\n\n手机震动个不停。不是新闻推送，就是未接来电的提示。他没有接。那些号码太熟悉了，前几个月还在饭桌上拍着他肩膀说“兄弟，稳得很”，现在却只剩下一串冰冷的数字。\\n\n网络舆论已经失控了。匿名账号接连放出资料，事发突然第一反应虽然下架，但挡不住全中国网民持续补档，最后演变为除战事外最大舆论。\n\n赵建国看着舆情越来越大，手不停发抖，在连续拨打了几十个电话后他终于拨通了上级的电话。对方的声音压得很低，语速却很快：“老赵，这事你先扛一下，组织不会忘记你的。”\n\n“扛？”赵建国笑了一声，嗓子发干，“我一个人怎么扛？”\n\n电话那头沉默了两秒，只回了一句：“现在形势复杂。”\n\n通话没多久便被挂断。办公室重新安静下来，只剩空调运转的低鸣。赵建国的手心全是汗，他这才意识到，所谓的“复杂”，翻译过来就是自己成替罪羊了。\n\n紧接着楼下开始有动静。先是吵闹声，然后是聚集的人影。有人举着打印出来的截图，有人对着大楼拍视频，口号零散却情绪一致。保安试图维持秩序但很快便被愤怒的群众所淹没。\n\n办公室的门被敲响，不重，却连续。如同索命的时钟。赵建国没有应。他知道，再等几分钟，敲门的人就会换一种方式进来。\n\n果然，门被暴力的推开了。几名神船警服的人站在门口，表情严肃，却刻意保持距离。为首的人念着流程，语气平稳：“赵建国，配合调查。”\n\n走廊里挤满了人。有人认出了他，声音立刻拔高：“就是他！”手机镜头齐刷刷对准过来，闪光灯亮了一下又一下。赵建国的脚步有些发虚，却还是走得很直。\n\n在被带走前，他突然停下，回头看了一眼大厅里那面巨大的标语墙——“严惩腐败，回应关切”。他张了张嘴，像是想说什么，最终却只吐出一句话，声音不大，却被最近的几个手机清楚地录了下来。\n\n“不止我一个。”\n\n这句话很快被截出来，单独传播。几个小时后，新的爆料接踵而至，名字、岗位、关系网被一条条补全，像是早就准备好的。舆论再次沸腾，群众的怒火立马转移了目标。\n\n赵建国坐在临时等候室里，听见走廊尽头的电视正在播这条新闻。他靠在椅背上，闭上眼睛，第一次清楚地意识到自己完蛋了。\n\n官方的晚间通报如期而至，措辞严厉结构十分熟悉————"
 ROC_PRC.8.a: "问题已得到基本惩治，部分违法犯罪人员已依法处置"

 ROC_PRC.7.t: "路灯下"
 ROC_PRC.7.d: "夜已经很深了，街道被一排老旧的路灯切割成明暗不均的段落。灯光偏黄，照在地上，像一层迟迟散不去的疲惫。周明沿着人行道慢慢走着，外套没扣紧，风从领口灌进去，让他下意识缩了缩肩。他习惯在这个时间出来走一走，白天的喧闹退去之后，城市至少看起来还算诚实。\n\n转角处传来含混的低语声，断断续续，夹着粗重的喘气。周明停下脚步。路灯下，一个男人靠在公交站的玻璃挡板旁，烟一根接一根地点，指尖被烫得发红也没察觉。\n\n“全是假的……全他妈是假的。”男人低声骂着，他低着头死盯着自己的影子。\n\n周明本可以绕开，但那种语气里带着熟悉的重量。他犹豫了一下，还是走近了些：“出什么事了？”\n\n男人抬头，眼圈发黑，眼里带着血丝，目光先是警惕，随后迅速松散下来。“没事。”他说，又补了一句，“就是想不通。”\n\n两人并肩站着，隔着半步的距离。男人自称陈立，原本在一家外包公司做项目，最近被“优化”了。他说话时语速很快，像是怕被打断。“网上那些人，一天到晚喊口号，说吃点苦就好了。可苦怎么总落到我们头上？”\n\n周明没有立刻回答。他只是点了点头，说：“也有人是真的信。”\n\n“信？”陈立笑了一下，笑意很短，“那是没轮到他们。”\n\n话题很快滑向更大的东西。陈立开始咒骂那些“制造杂音的人”，说如果不是这些人唱衰，情况不会这么糟；周明却提到自己看到的几则通告，措辞漂亮，却避开了关键细节。他说得很慢，像是在拆一件不愿再用力的物件。\n\n两人的分歧渐渐显出来，却都没有提高音量。争论到最后，只剩下疲惫。\n\n就在这时，一阵说笑声从街对面传来，格外清晰。几辆黑色轿车停在会所门口，车门打开，西装革履的几个人走出来，步伐从容。领头的人一边接电话，一边笑着点头，语气轻松。\n\n“放心，那批东西已经分好了，走的是内部渠道。”他说，“下面的人闹一闹就过去了。”\n\n同伴附和着笑，声音在夜里显得突兀。陈立的表情僵住了，像是被人突然抽走了力气。他盯着那几个人，嘴巴张了张，却什么也没说。\n\n周明已经掏出了手机，没有刻意遮掩。屏幕亮起的一瞬间，冷光映在他脸上。他对准那群人，稳稳地拍着。\n\n会所门口的人并没有注意到他们。笑声渐远，车门关上，引擎声很快融进夜色。街道重新安静下来，只剩路灯嗡嗡的电流声。\n\n周明收起手机，屏幕熄灭。陈立站在原地，肩膀微微下塌。\n\n“你觉得有用吗？”陈立低声问。\n\n周明没有回答。他把手机放进口袋，看了一眼被路灯拉长的影子，然后转身离开。陈立没有跟上，只是站在原地，看着灯下那片亮与暗的交界线，久久没有动。周明的声音随着他的步伐传开——"
 ROC_PRC.7.a: "他们终将被制裁，不是国家而是我们"

 ROC_PRC.6.t: "不需要了"
 ROC_PRC.6.d: "赵立正在公交站躲雨。屏幕上滚动的是统一口径的新闻剪辑，背景音乐高昂，画面里厂房灯火通明，机械臂运转不停。他盯着那几秒钟，心里忽然松了一口气。裁员名单出来后，他已经在家待了四个月，存款一天天变薄，日子也越来越重复和穷苦。\n\n“总得有人干活吧？”他把这句话反复在脑子里过了一遍，像是在校准一个公式。战争意味着订单，订单意味着岗位。哪怕不是上前线，只要是搬运、装配、夜班，只要能进系统，就不会被丢在外面。就不会因为没有工作而穷困潦倒最后被斩杀线斩杀...也许是秒杀...\n\n他开始频繁往工厂和人才招聘市场跑。门口的保安比以前多，登记表也厚了一摞。赵立站在队尾，看见有人递交简历，有人被领进办公室。他的心跳跟着快了起来。\n\n几天后，园区外多了个临时咨询点。雨棚下面，几张折叠桌，一叠印刷粗糙的说明。工作人员重复同一句话，语气平直：“等通知。”赵立把名字写得很工整，生怕因为少一个笔画而落选。和万一呢？万一写好一点...就会被录取...\n\n等候的时间越来越长。群里传的消息也越来越杂，有人说有厂扩招，有人说名额内定。赵立每天刷新，出门前都把简历重新抚平。偶尔遇到熟人，彼此点头，话不多，却都盯着同一个方向。\n\n有天上午出现了转折，看样子咨询点换了一批人，桌上也多了一份红章文件。负责人拿着喇叭当众宣读，：“当前行动为局部应对，重点依托既有产能与自动化体系，不进行大规模社会招聘。”\n\n人群安静了几秒。有人问了一句“那我们呢”，声音很小，很快被压过去。工作人员补充：“后续如有需要，会统一发布。”\n\n赵立站在原地，雨水从棚边滴下来落在鞋尖。他低头看手机，群里已经有人转发解读，配着几句安抚的话。有人回了个笑脸，又很快撤回。他的表情也跟这个笑脸一样，但不同的是带着些许苦涩。\n\n散场的时候，他没有挤。走出厂外看着园区的灯亮和里面若隐若现的机器声。拿着手中边角已起毛的简历，他面无表情把它折起来，思考了一会又展开，最后塞回包里。\n\n之后等着公交车进站后，门开了又关。但是赵立呆站不动——"
 ROC_PRC.6.a: "不知道在想些什么"

 ROC_PRC.5.t: "楼道灯"
 ROC_PRC.5.d: "陈骁的日子被压缩成几个固定动作：起床，解锁手机，刷新。信息流像一条永不干涸的河，他站在岸边，专门打捞那些让他愤怒的句子。抱怨停电的，质疑征用的，提到裁员和欠薪的，他统统点进去，逐条回击。有人被禁言，他截图存档，像收集战利品。\n\n白天的时间在键盘声里消耗得很快。傍晚，他发现一条帖子被转得很广：一位老人写自己买不到药。评论区分裂成两半，吵得不堪入目。陈骁盯着屏幕，胸口发闷，“这不明显的AI吗？现在的1450水平这么差了？笑死人。”发送成功的提示弹出来，他靠在椅背上，口中低声道“蛙蛙就喜欢搞水军。”\n\n陈骁盯着屋内堆积成山的垃圾，想着都是台湾人和日本人害的，心中对他们的愤怒又更升一层。拿着手中所剩无几的可乐，看着楼道的感应灯时亮时灭，他踩着影子走出房门。听着钥匙转动的声音在门口显得格外清晰。屋外，母亲站在门口，身上是些淤青和伤痕。\n\n“怎么才回来。”陈骁抬头，看了她一眼。\n\n“忙。”母亲把菜放下，顺手拿起屋内的垃圾袋，又看了一眼陈骁手机内对恨国党的围攻。母亲忽然说：“今天停水，去排了两个小时队。”\n\n陈骁皱眉：“这不是暂时的吗？忍一忍。”母亲把拿着垃圾袋走出屋外，声音不高：“现在停电停水的，菜价也很高，听说是有人...”\n\n话还没说完他便抬起头怒声道。“那些都在造谣，你也信？”他的语速变快，“这种时候说这些，除了对国家添乱还有什么好处？”\n\n母亲看着他，沉默了一会儿，眼中满是悲哀。陈骁的声音一下子拔高，“就是你们被带节奏了！每个人都只顾自己，国家怎么运转？”\n\n母亲被陈骁推倒在地，脸色发白：“你天天对着手机吼别人，家里的事你看见了吗？”陈骁觉得耳朵里嗡嗡作响。他走到房门口，猛地拉开门，“你们这群老不死的不懂，就别他妈说话。我这是为国家着想知道吗！”门被大力关上，发出一声巨响。和母亲落下的泪。但陈骁呢？他继续找着恨国党的言论，用来发泄，至于是为什么？"
 ROC_PRC.5.a: "也许他很爱国爱党吧"

 ROC_PRC.4.t: "配给表"
 ROC_PRC.4.d: "王峻，新闻大二，向来把“理性”，“秩序”，“爱国”挂在嘴边。他相信制度的自我纠错能力，更相信只要站得够稳，权力迟早会站到自己这边。战争爆发后，他几乎成了班群里的“值班员”，任何质疑都会被他用一段极其标准话术压回去\n\n最近一张关于战时分配的配给表流入了出来，清清楚楚的行列：编号、姓名、等级、数量。最上面的几行，油、肉、奶、药一应俱全，备注栏写着“优先保障”；越往下，数量骤减直到替代品的出现，最后几行只剩“延期”“待定”。有人把这张表和小区的实际发放对上了号，心中的落差立马在众人心中炸开\n\n王峻扫了一眼，皱眉着转发并加了一句：“别被节奏带着走，战时调配本就分级，很合理啊？你们觉得不合理是不是蛙蛙的水军没见过这么标准的社会主义分配?。”他敲字时很稳，句句带着对“境外势力”的抨击和“正确”\n\n过了许久官方通报来了。措辞克制而圆润“个别基层人员理解偏差，已责令整改，完善流程。”虽然没有解释那张表从何而来。但王峻依然把通报贴进群里，补了一句：“看，问题被解决了。不知道有些人是在急什么，难不成国家会比你们这群不学无术的人差？”\n\n回应却不像从前。有人发了个问号随即贴出领到了一瓶矿泉水和一个鸡蛋的照片，还有人直接回：“整改到哪了？他妈的，给人当狗养呢？这么点东西狗都不够吃啊！”王峻看到这些胸口一紧感觉十分恼火，立刻回击：“情绪化解决不了问题。你们这样只会给外部势力递刀子知道吗？国家会想不到你们这些问题？去等几天啊！”\n\n午后，学院食堂的配给窗口改了规则。原本不限量的主菜改成了“一人一勺”，汤水多的看不见菜。队伍里有人低声抱怨，声音不大，却连成一片。王峻站在队伍中段，忽然提高音量：“现在谁不难？要有耐心。”话音落下，队伍像被人按了暂停键，几秒后，王峻感到队伍的气氛不对，随即补充了一句“现在国家正在收复台湾呢！我们这群人有的吃就不错了！斤斤计较什么啊？”但所有人的目光都绕开了他。"
 ROC_PRC.4.a: "真是不知感恩"

 ROC_PRC.3.t: "为国奉献当自豪"
 ROC_PRC.3.d: "赵启民二十二岁，是一家社区志愿服务队的骨干成员。他常把“国家需要，大局为重”挂在嘴边，胸前的红色证件从不离身。战争进入僵持阶段后，他主动请缨，负责协助社区统计与上报“支援数据”。在他看来，这不只是工作，而是一种为国奉献，能祖籍单开一页的伟大成就。\n\n最初的任务看上去无可指摘。登记住户信息，核对物资领取情况，提醒大家按时缴纳“特别时期临时费用”。赵启民做得一丝不苟，语气激扬而坚定。他反复强调，这是为了前线，国家的每一步都是经过深思熟虑的，支持就是我们全体中国人民的责任。有人迟疑，他就把政策文件拍在桌上；有人抱怨，他便高声告诫“那个谁，不要给组织添麻烦！”。\n\n渐渐地，除了粮油与药品，还多出“市民自愿捐献党和国家领导费”和“国家劳务赞助费”。赵启民在会议室里听上级布置时，记得很清楚那句话便是“我们不搞强制，但要把觉悟讲到位。”他点头记下，回到社区，话术却变得更加熟练。他会在夜里敲门，解释得头头是道，把“自愿”说成一种必须完成的态度。\n\n一些老人开始少领口粮。年轻住户被要求轮班值守却没有补贴。赵启民在记录簿上划掉异议，把“拒绝”改写成“暂缓执行”。当有人私下问他，这样是不是不太公平，他的表情立刻冷了下来：“你们这是在质疑党和国家的决策吗？现在是特殊时期！你们别想搞破坏！”\n\n他并非没有看到变化。便利店货架越来越空，居民群里消息减少，头像一个个变灰。但在另一端，他的账户数字在缓慢上升，名目清晰而合法——“协调补贴”“工作津贴”。每一笔都有文件背书并盖着鲜红印章。\n\n有一次，一位中年妇女在办公室门口哭，说家里实在拿不出钱。赵启民听完，只递给她一张表，那是一项贷款，利息很高。语气平直而诱惑：“大家都在忍，你也一样。这样吧，这是国家给我们一些帮助，这些钱你拿去补贴家用。”随后他以犀利的眼光注视着这位中年妇女签下了贷款，拿到了5000元人民币的”国家补贴“。中年妇女感动的痛哭流涕直言“我们国家真是太好了！谢谢领导，谢谢伟大的共产党！”\n\n妇女走后。赵启民便大笑出了声。办公室里充满了快活的气息以及———"
 ROC_PRC.3.a: "支付宝到账五万元"

 ROC_PRC.2.t: "清算名单"
 ROC_PRC.2.d: "林澈十七岁，还没成年，住在厦门的一处老小区。开战那天的消息冲刷着整个互联网，当时他正趴在书桌前写作业，但手机却比笔更吸引人。短视频里是剪辑过的战场画面，配着激昂的配乐，评论区像一口沸腾的锅。他很快学会了那些高频词汇，复制、粘贴、再加一句更狠的评语，使得账号的点赞数一路往上爬。\n\n起初，一切都发生在网路里。林澈混进几个QQ和微信群，头像换成了夸张的国旗渐变，发言越来越极端，语气也越来越冲。\n“谁还在替对面说话？”\n“别装中立。”\n\n每一次有人试图讲生活、讲生计，都会被迅速围攻。林澈也在围攻的人里面。他在这种行为里感到安全和自豪，像是站在一堵不会倒的墙后面。\n\n又过了几天学校附近的便利店贴出了转让告示，原本常来的那对台湾口音的店员不见了。林澈在群里发了一句“走得好！这种人估计就是死台独！我很久以前就觉得他不对劲了！”，发送的下一刻立刻有人回应支持。面对自己带起的言论他忽然觉得这种回馈是某种确认，仿佛自己被选中了的正确。\n\n周末，他跟着群里的“老哥”去了一次所谓的“爱国行动”。地点是商业街，时间选在傍晚，人多而杂。没有复杂的计划，只是在人群里指认，贴标签，围上去。有人用手机对着一对说日语的游客拍，有人高声质问。林澈站在外围，心跳快得发疼，却还是跟着喊了几句。他没看清对方的脸，只记得对方下意识后退的动作。\n\n那天晚上他回到家，手还在抖。群里却已经在庆祝，截图、剪辑、夸张的标题轮番出现。有人把未成年写成“最纯粹爱国场”，有人让他继续别怂。林澈盯着屏幕，嘴角勾起一个夸张的弧度，随即发了一条更激烈的动态。"
 ROC_PRC.2.a: "留岛不留人，杀光小日本！"

 ROC_PRC.1.t: "中国台海战事出现挫折"
 ROC_PRC.1.d: "来自东亚的最新战况通报迅速牵动国际舆论。台湾方面今日对外披露，在持续多日的高强度对抗中，已成功稳住主要防线，使中国方面发动的第二轮进攻未能达成预期目标。尽管战区局势依旧高度紧张，但战场节奏正在发生微妙变化。\n\n台湾联合作战指挥体系在上午举行的简报会上指出，过去十余天内，海空域拦截与纵深防御相互配合，成功削弱了对手的投送能力。声明中特别提到，情报整合、机动部署以及远程精确打击的协同运用，使得多处关键节点免于失守。一名不具名的前线指挥官形容，目前的态势“尚未脱离危险，但已争取到重新调整部署的时间窗口”。\n\n区域外部力量的反应同样迅速。太约方面在随后发布的声明中强调，将密切关注台海局势，并视发展情况进一步扩大对台湾的支援范围。日本与澳大利亚的政府官员分别在各自首都表态，确认已启动新的军事协助与后勤保障机制，以强化台湾在持续冲突中的防御韧性。\n\n相较之下，中国政府的公开表态显得谨慎而克制。官方媒体未对前线具体情况作出详细说明，仅转述外交部门的简短回应，称当前战局“仍处于演变阶段”，并重申将依据自身判断采取必要行动。这一表态回避了对战场得失的直接评估，也未回应外界关于进攻受阻的广泛猜测。"
 ROC_PRC.1.a: "太意外了"
 
 taiwan.1.t: "抗争之岛"
 taiwan.1.d: "城市的天际线被耀眼的烟花照得比往常更加明亮。表演者将音乐会推向高潮，进一步炒热了人群。人们聚集在最高的建筑物周围，敬畏地看着月亮本身似乎被火箭的火焰所压倒，而那些在自己舒适的避难所里的人们则欢欣鼓舞，因为倒计时终于归零——标志着十年的结束。\n\n时值2020年。我们在半导体制造业的领先地位仍然没有受到挑战。股市飙升至前所未有的高度，台湾加权指数（TAIEX）几乎全年维持在10,000点以上。尽管受到中美贸易战造成的动荡影响，但我们强大的经济表现出了卓越的韧性，2019年全年经济增长率稳定在3%左右。\n\n新年也预示着总统选举活动的结束。蔡英文总统正在寻求连任，而主要的反对派领导人，备受争议的韩国瑜，继续获得民众的支持。宋楚瑜将第五次竞选总统，尽管他也宣布这可能是他最后一次尝试。\n\n在外交上，由于中国大陆不断扩大的全球影响力（包括其\"一带一路\"倡议）等因素，我们的国家继续失去正式盟友。与此同时，我们的战略已转向与主要大国建立友好但非官方的关系。香港的骚乱进一步疏远了我们境内的亲统一阵营，许多人认为这是\"一国两制\"框架不可避免的失败的证据。\n\n总而言之，包括金门和马祖在内的台湾群岛上勇敢的人民，准备好迎接即将到来的风暴，并向前迈进到下一个十年。尽管卫生福利部报告了来自中国大陆的一例新的疑似非典型肺炎病例，但可以肯定的是，这不会成为什么大问题。"
 taiwan.1.a: "愿你前方旅程一帆风顺，台湾。"
 
