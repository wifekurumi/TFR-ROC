 taiwan.1.t: "抗爭之島"
 taiwan.1.d: "城市的天際線被耀眼的煙花照得比往常更加明亮。表演者將音樂會推向高潮，進一步炒熱了人群。人們聚集在最高的建築物周圍，敬畏地看著月亮本身似乎被火箭的火焰所壓倒，而那些在自己舒適的避難所里的人們則歡欣鼓舞，因為倒計時終於歸零——標志著十年的結束。\n\n時值2020年。我們在半導體制造業的領先地位仍然沒有受到挑戰。股市飆升至前所未有的高度，台灣加權指數（TAIEX）幾乎全年維持在10,000點以上。盡管受到中美貿易戰造成的動蕩影響，但我們強大的經濟表現出了卓越的韌性，2019年全年經濟增長率穩定在3%左右。\n\n新年也預示著總統選舉活動的結束。蔡英文總統正在尋求連任，而主要的反對派領導人，備受爭議的韓國瑜，繼續獲得民眾的支持。宋楚瑜將第五次競選總統，盡管他也宣布這可能是他最後一次嘗試。\n\n在外交上，由於中國大陸不斷擴大的全球影響力（包括其\"一帶一路\"倡議）等因素，我們的國家繼續失去正式盟友。與此同時，我們的戰略已轉向與主要大國建立友好但非官方的關系。香港的騷亂進一步疏遠了我們境內的親統一陣營，許多人認為這是\"一國兩制\"框架不可避免的失敗的證據。\n\n總而言之，包括金門和馬祖在內的台灣群島上勇敢的人民，準備好迎接即將到來的風暴，並向前邁進到下一個十年。盡管衛生福利部報告了來自中國大陸的一例新的疑似非典型肺炎病例，但可以肯定的是，這不會成為什麼大問題。"
 taiwan.1.a: "願你前方旅程一帆風順，台灣。"
 
