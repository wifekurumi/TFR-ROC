 PRC_made_in_china_STATE2_dynamic: "中国特色社会主义"
 PRC_made_in_china_STATE2_dynamic_desc: "中国特色社会主义中有关\"中华民族伟大复兴\"最本质的特征之一便是对民族主义的宣扬。党时刻提醒人民，正是中国共产党在1949年将中国从内战和贫困的深渊中解救了出来，并在21世纪将它建设为新的超级大国。想要激励公民对国家的热爱和忠诚，没有比宣传祖国的强大和富裕更为有效的了。"
 PRC_CCP_STATE2_dynamic: "中国共产党"
 PRC_CCP_STATE2_dynamic_desc: "自1949年以来，中国共产党便一直是中国大陆无可争议的统治者。即使在以苏联为首的一系列共产党国崩溃后，社会主义中国依然在东亚屹立不倒，并在改革开放后逐渐成为了世界上最强大的国家之一。"
