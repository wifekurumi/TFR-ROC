 Strengthen_coastal_defense: "加強沿海防御"
 Strengthen_coastal_defense_desc: "加強沿海防御和島嶼保護系統。"
 Promote_asymmetric_warfare: "推動非對稱作戰"
 Promote_asymmetric_warfare_desc: "開發非常規戰術以對抗更強大的軍事力量。"
