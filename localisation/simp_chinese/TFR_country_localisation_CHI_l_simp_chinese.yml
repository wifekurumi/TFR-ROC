 CHI_test_of_will: "意志之試煉"
 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\n70年彈指一揮間，骨肉相殘的內戰曾告一段落。我們的人民享受了數十載和平繁榮歲月，但這不可能永遠持續下去。大千世界風雲變幻，山雨欲來，我們不得不首當其沖直面洶湧。\n\n被遺忘的內戰餘燼正重新燃起，我們必須為自身的存亡而戰。\n\n§3                            青天白日永不落§!"
