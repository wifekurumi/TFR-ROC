 #描述
 CHI_Han_Post_war_desc: "儘管這一路上充滿艱辛，但此時此刻全體國民可以一起歡呼了：我們戰勝了自內戰失利以來的苦痛，國民黨帶領著大家做到了所有人都認為不可能的事。無論是天不時、地不利，人也不合的選舉，還是在所有國內外的分析機構都認為我們將在台海戰爭中失利的那段時間都過去了。現在，為我們的勝利、為我們的未來，歡呼吧！"
 CHI_new_ten_propositions_desc: "無色覺醒十大主張正是九合一選前，由旺旺中時媒體集團董事長蔡衍明拋出的想法。\n\n十大主張以理性、務實為基礎，針對藍綠惡鬥、經濟困境、司法沉痾、兩岸僵局，提出十個解方，做為「真道理性、真愛台灣」的行動綱領，盼政府依此跳脫意識形態，帶領人民走出困境，讓台灣人過更好的日子。\n\n當時韓國瑜正參選高雄市長，率先出面支持並簽署「無色覺醒十大主張」，肯定了十大主張對於當今社會的積極作用，並表示這同於他本人的主張。\n\n但在經歷血腥的兩岸戰爭之後，這些主張必須進行改動，以符合原本的立意……"
 CHI_lone_tower_of_dragon_desc: "儘管兩岸同文同種的事實不變，但臺海戰爭的影響讓臺灣成了中華文化最後的堡壘，中華人民共和國這個擁有部分領土治權的政治實體已經摒棄了中華文化的精神與歷史。\n\n我們應該積極透過課綱正常化、文化產業扶持等手段保護優良的中華傳統文化，守護這文明的火種。"
 CHI_sledgehammer_brings_justice_desc: "嚇阻理論、威嚇理論，是犯罪學中關於消除犯罪動機，刑事政策中關於預防犯罪的一種理論觀點，其指的是如果已經有人犯罪，透過嚴懲他們來「殺雞儆猴」，便能嚇阻其他人犯罪。亂世用重典、向毒品宣戰、三振法案、潔西卡法案、嚇乖計畫皆屬於嚇阻理論的產物。\n\n立法院國民黨團已經決定據此引進更多透過加強法律執行的程度，或提高刑罰的強度以阻止犯罪的法案。"
 CHI_tranquil_lake_in_the_storm_desc: "中華民國各級政府一直弊案頻傳，我們必須立即透過建立檢舉機制、修改法規方面制度等方式杜絕政府中的貪腐問題，尤其是在這動盪的時刻。"
 CHI_one_day_tea_party_desc: "在台海戰爭期間，中華民國各黨各派展現了空前的團結。\n\n韓總統希望那樣的局面延續下來，促使各黨派對於政黨惡鬥的政治手段出現在政治競爭中的醜惡狀態不再出現。\n\n為此，韓總統打算舉辦每個月都有一場的半公開各黨領袖會談，稱為一日茶會。"
 CHI_broken_homeland_united_chinese_desc: "我們的家園已遭摧毀，全國上下動員所有的力量進行復興，戰火成功團結了島上所有的群體，同時台灣人奮勇捍衛民主與家園的決心鼓舞了海外所有台裔跟華裔人民，政府陸續收到了海外華人的捐贈款項，甚至還有人表達歸化的意願，看來連發表團結演說的必要也沒了。"
 CHI_cyber_security_managment_act_amendement_desc: "《資通安全管理法》修正案的核心目的在於因應新興地緣政治與科技威脅，全面升級國家數位防禦能力。此次修法提案首要確立由數位發展部作為中央主管機關，藉以整合跨部會資安資源；在防護範圍上，修正案不僅擴大納管對象，將關鍵基礎設施、特定公營事業及政府捐助之財團法人納入法規落實範圍，更明文要求特定機關須設置專職資安長以拉高決策層級。同時，新法強化了資安事件的通報與調查機制，賦予主管機關針對重大事件進行實地稽核與專案調查的權力，並嚴格限制公務機關採購或使用危害國家資通安全的特定危害產品。最受矚目的是，修正案大幅調高了未依規定通報或改善的行政罰鍰，藉由提高違法成本，徹底督促公私部門落實資安防護與應變，建構更具韌性的國家級資安聯防體系。\n\n國民黨立院黨團已經和立院所有黨派達成共識，將共同推動法案通過。"
 CHI_finish_them_desc: "對現代人道主義者來說，法律應具有教化意義，若是對每樣事物加以嚴懲，可能會導致罪犯採取更加激進的行動。這些話不無道理，但以過往的案例來說，教化犯人的效果是有限的，人們時不時能聽到出獄回歸社會的犯人重複犯下罪行，是因為我們的教化政策不夠完善嗎？不，很顯然有的人就是無法改變自己作惡的思想，人們之所以不犯罪不是因為知道那是犯法，而是因為他們樸素的道德觀告訴自己傷害別人就是不對的，我們有必要修訂法律來盡量從這個世界「隔離」這些犯人。"
 CHI_reestablish_special_investigation_division_desc: "最高法院檢察署特別偵查組（簡稱特偵組、特別偵查組）是中華民國最高檢察署曾經的特設單位，該機構在形式上參照大韓民國大檢察廳中央搜查部設立，職能上則旨在仿傚美國特別檢察官制度。特偵組是在陳水扁總統任內，於2007年4月2日成立，專責偵辦中華民國總統、中華民國副總統及五院院長、立法委員等中央政府高層官員貪污或重大經濟舞弊案。\n\n但特偵組因索賄案爭議與體制問題引發廢除呼聲，經朝野討論及法務部評估後，立法院於2016年三讀刪除相關法源，正式於2017年元旦裁撤。\n\n國民黨立院黨團已在近期對於再修法院組織法以令特偵組重返的提案提出討論，並在公開協商後取得共識，朝野將一致支持一個比過去倉促立法版本更完整的草案，回應社會各界對清廉政府的期待。"
 CHI_hunt_down_spies_desc: "儘管我們贏得了戰爭，成功抵禦了對我們三十年來的民主建設的赤色威脅，但島內人心仍舊浮動，這一切的背後仍然有這那一抹赤色的陰影。由此，我們將擴大政治審查範圍，揪出那些蓄意破壞戰後重建工作的赤色匪諜。"
 CHI_the_flag_is_fluttering_desc: "有宋一代為何能跟避免五代十國時被武將奪權內亂的局面？答案正是矯枉過正。常言道：“亂世當用重典。”正逢天下大亂之時，我們更要重拳出擊，維護社會安定，如此才能在內部凝聚我們的民主力量，從而保衛文明的民主旗幟。如今我們的行動正再次讓民主的青天白日滿地紅旗在國民的擁簇中高高飄揚！"
 CHI_Post_war_review_status_quo_desc: "戰爭結束了！我們成功保衛了中國最後的民主政治遺產。雖然這份遺產自兩蔣時代的專制到李陳馬蔡後，民主政治已經有了極大建設，但歷代惰政、怠政、懶政、腐政已成沈屙，戰爭將這些和平年代裏精心粉飾的裂隙統統暴露出來，為了中華民國的明天，我們必須革除積弊，重煥民主政治之活力。"
 CHI_Pork_Rice_desc: "臺灣中央政府長期重北輕南，不分黨派皆是如此。\n\n韓總統在擔任高雄市黨部主委時，曾北上登記台北市長，原因是要求國民黨黨部重視南部，他說：「至少給我們一碗滷肉飯」。\n\n這原是指當時藍綠在選戰資源上的落差，但在地方政府的資源上又何嘗不是如此？\n\n如今，他要改變這種不公平的狀況，讓南北均衡發展。"
 CHI_Special_budget_desc: "國之大事，在祀與戎。七十九年前，蔣中正流亡台灣，法統旁落，軍紀荒弛，蔣中正領導下的國民黨在慘痛失敗後進行了一系列改革，並與對岸一較高下，民主化浪潮後，我們也曾有過一段“黃金時代”。由此三十多年後的今天，我們的社會發展卻一直止步不前，軍事問題也籍由戰爭暴露出來，為了改變現狀，韓國瑜總統已經與幕僚們制定好了一項旨在促進台灣社會、軍事、經濟等方面發展的投資計劃，力圖革除舊故沉疴，再開台灣新局面。"
 CHI_Eleplant_in_room_desc: "自國民政府撤退來台以來，我國的政治系統基於現實因素歷經多次修改逐漸變得完善，但同樣也是基於現實因素導致其弊病叢生。在台海戰爭以前，國民黨與民進黨專注於政治鬥爭有意或無意的忽視了國家內的許多缺陷，過去也不乏出現一些力求改革的政治人物，但同樣也因多種因素慘遭失敗。在全國上下大重建的時代，是時候來好好「重建」這個國家的政治系統了。"
 CHI_corruption_desc: "自第一次政黨輪替之後，中華民國政府長年飽受黑金政治、地方勢力勾結等嚴重問題，過去李登輝前總統為了保證台灣能夠順利轉型民主政府而不得不進行一些不怎麼「乾淨」的手段，12年的執政期間不足以讓他完成民主轉型並根除貪腐問題這等偉業，現在我們從他手中接過國家的未來，是時候完成他的未竟之事了。"
 CHI_Political_donations_act_desc: "我國的政治獻金法由於法條內容過於老舊有著申報透明度不足、金流查核困難，以及新興數位科技帶來的法規漏洞等諸多問題，這些鑽漏洞謀取私利的政治蟑螂，這已經不是普通的貪污了，不能再容忍了，必須出重拳！"
 CHI_expand_control_yuan_power_desc: "自孫中山先生創立五權分立的政治體制以來，監察院應具備行使彈劾、糾舉及糾正權，並擁有調查權以監督政府各部門等權利，但這個多災多難的國家一直無法讓其發揮應有的作用，好不容易穩住情況後政府官員也默認了這個情況，是時候讓其重回正軌了。"
 CHI_negotiate_with_DPP_desc: "民主進步黨（Democratic Progressive Party）——簡稱民進黨（DPP），是中國國民黨在中華民國政府裡最主要的政治對手，過去兩黨在中華民國認同與臺灣存續問題發生過激烈的爭執、在與如何與海峽對岸的鄰居相處這方面產生巨大的分歧，如今這都不重要了，國家安危暫時解除，這為兩黨談話創造出更大的彈性空間，國家需要以更快的效率來應變瞬息萬化的世界局勢，必須盡快找出雙方都想執行或是能互相妥協的施政方向。"
 CHI_political_concession_desc: "在人與人之間的交際中，過於堅持己見不懂得後退一步只會讓事情陷入僵局之中，在政治中也是如此，若是希望民進黨能協助促使法案通過就有必要在容許範圍內對其退讓，電廠建設、電子業、社會正義都是有許多可以妥協的空間，同時也希望他們能在文化、教育、外交（主要是針對大陸地區）政策方面給予更多的理解。"
 CHI_enemys_enemy_desc: "經過多次的政治協商，國民黨與民進黨已然取得一定程度上的合作，在面對來自中國未知的惡意時，兩黨之間的鬥爭顯得多麼微不足道且可笑，沒有必要把執政黨與在野黨區分的這麼明顯，除了黨內的政治立場以外，民進黨的諸多意見也是需要多加考量，共同合作才能促進國家繁榮。"
 CHI_Restore_provincial_government_functons_desc: "自精省方案以來，省政府就已經成為了我國可有可無的機構，但現在各地我們所包含的省數量已經可以到了三個，各地的備戰等級也需要有所不同，省政府的恢復對於國防與行政來說都是必要的，因此我們現在應該開始對各項措施做出計畫及準備，以適應現在的國家情況"
 CHI_reestablish_hainan_province_desc: "自從我們被共產黨人趕出大陸後，我們的在非大陸地區控制範圍便逐漸被他們蠶食鯨吞。先是大陳島、一江山島等島嶼，而後是南海諸島。到最後，我們只剩下了金馬地區與南海的太平島和東沙群島。然而隨著台海戰爭的勝利，我們成功奪回了被他們所控制的南海諸島—也就是所謂的西沙群島和南沙群島。隨著我方逐漸變大的控制區，曾經被我們「去任務」以及「虛級」化的省份也有恢復的必要了。同時為了更好的管理我們的控制區，我們的「海南省」也將會重新沐浴在這青天白日之下的。同時，這也將成為向國內外證明我們一定會反攻大陸的決心與開端！"
 CHI_Establish_local_officials_desc: "隨著我國固有領土收服，政府將過去凍結的省政府逐一重啟，現在得要重新規劃省、縣、鄉（鎮、區）、村（里）、鄰等各級地方官員的選舉與任命，為了應對未來戰事後的諸多可能性，最好連現「淪陷區」的行政官員空缺也規劃完畢，待到時接收的時候不會為災胞造成過多生活上的困擾。"
 CHI_restore_government_information_office_desc: "古來，言論與文章都是讀書人和統治者的利器，既可以讓情勢在表面上利於筆者，也可以防止各地的連鎖反應，民進黨在執政期間多將官方機構民營化、虛級化甚至撤裁，新聞局是其中之一，自其被化為烏有後，台灣媒體亂象叢生，公信力有時甚至不如私人創作者，因此行政院正在擬定經費與人員，重設新聞局應當有利於整治我們新聞界的亂麻，維護民主"
 CHI_reform_PTS_desc: "公視的運作模式是一個妥協的方案，董事會成員依政黨支持度等方法決定，但這種情況導致嚴重的內耗，再者經費超支過度的問題也讓它如果想增加節目的困難程度上加，在這時間下是個讓公視脫離內鬥並裁撤一些不太「合適」的項目"
 CHI_state_media_transformation_desc: "從1970年代以來，我們已經有多久沒有直屬的黨派媒體了，十五年?二十年?民營媒體的開放讓台灣在民主化進程上又跨了一大步，民眾不在只局限於老三台----中視、華視、台視----的報導內容，資本化的商業競爭使媒體為了奪得收視率無時無刻都在緊盯著政治人物的一舉一動，同時也讓嚴肅政治變得跟綜藝一樣荒謬可笑。\n\n愚昧的綿羊必須受到正確的引導，才能讓整個社會正常運作，韓總統目前正在籌備自己的形象紀錄片，人民有知情權「正確」地了解他們的領導人到底是誰，他們會崇拜他、敬仰他、以他為榜樣，認為他才是有史以來台灣最偉大的領導人，沒有之一!"
 CHI_low_fertility_rate_desc: "據統計，中華民國的生育率長年位居倒數前五名，對已開發國家來說，生育率下降是必然的歷程，但在經歷過台海戰爭的摧殘，我國失去了數十萬人口之後也沒有戰後嬰兒潮的景象，長此以往可能會對國家造成沈重的打擊，我們有必要推行更多獎勵生育措施，增加生育輔助、嬰幼兒集中協助撫養、保障基本居住等多項措施來提升國民的生育意願。"
 CHI_Taipei_childcare_desc: "台北市擁有全台最豐厚的育兒津貼政策，第一胎四萬元，每多一胎追加五千，還有各種交通費用補助。如果我們想增進人民生育的意願，並且能在短期內完成的改革便是不能讓台北模式成為最高標準，而是要將其推廣開來，成為全國上下的統一基本準則。"
 CHI_babysitter_selection_desc: "過去的政府並未過度重視嬰幼兒保母的審核程序，進而導致近年發生的剴剴案、小桃子案、送托保母餵毒致死案，人民如果無法保證在自己努力工作維持生活時孩子能夠得到妥善的照顧，便會出於顧慮降低生育的意願，政府有必要加強護工的道德審核、提升懲處辦法等模式確保不會再有國家的棟樑受到傷害。"
 CHI_End_of_Chaos_desc: "漫長的改革終於暫告一個段落，雖然距離徹底改革還有漫長的路要走，但剩下的時間（任期）已經不多了，儘管無法保證下個接棒的總統能否帶領國家走向更好的未來，不過已經斬開束縛國家多年的死結，改革便會穩紮穩打的自行推進。"
 CHI_blue_sky_white_sun_never_falls_desc: "我生在這裡　長在這裡　這裡是我的國家\n\n我愛護這裡　保護這裡　誰都不能欺侮他\n\n\n不聽巧言虛假　不容匪寇欺詐　大風大浪我們不怕\n\n快快備好戰馬　這場聖戰要打　不惜任何代價\n\n\n我生在這裡　長在這裡　這裡是我的國家\n\n我愛護這裡　保護這裡　誰都不能欺侮他"
 CHI_efficient_government_desc: "效率。什麼是效率？簡要而言，效率就是快、準、狠。評判從古至今的為政者，首要就是看其政令既出後是否風行全國。一套精準、高效的官僚體系往往是這個國家走向復興主旋律的前奏曲。作為大戰的勝利者，認識到效率重要性的我們將在韓國瑜總統的領導下在台灣重新建設一套高效的政府體系。"
 CHI_Three_Labor_arrows_desc: "中國國民黨的創始人、中華民國國父孫逸仙的三民主義中的民生主義的核心即是消除貧困、關懷於勞動者的權益與福利以避免資本主義帶來的貧富差距懸殊。戰爭結束後，韓國瑜總統重拾當初在競選時的承諾，繼承孫逸仙三民主義之民生主義精神，將“勞動三箭”的政治職責付諸實踐，以期完遂對於勞動者的保障，提高勞動者的待遇，促進台灣社會公平正義。"
 CHI_public_service_variable_pay_desc: "今時不同往日。在現代化管理制度風靡全球的當代，要想在政治上做出改革的成效、化解制度上拖沓的難題，對於制度人員的物質激勵是必不可少的。在韓國瑜總統的帶領下，我們將持續革新軍公教系統中人員發薪機制，在本俸的基礎上將績效等現代化管理概念引入政務系統中來，此舉既能激勵軍公教人努力工作，又能讓政府及時淘汰軍公教系統中的懶人、怠人，從而減輕政府壓力，可謂一舉兩得。"
 CHI_abolish_one_fixed_one_flexed_desc: "一例一休，作為民進黨標榜「保障勞工權益」的一項所謂的「勞工福利政策」，實質上是天馬行空，與台灣現況脫節。這樣的政策導致了台灣企業成本暴漲、勞工薪酬下降、物價飛馳上漲的「三輸局面」。目前，韓國瑜總統已與其幕僚起草法案，旨在廢除一例一休制度，徹底結束民進黨前當局的政治流毒，解放台灣社會發展新活力"
 CHI_Establish_Taiwan_mining_Corporation_desc: "過去台灣有過豐富的礦業採集歷史，但隨著產業轉型與開採安全性和成本的考量，現今基本停止開採，僅保留非金屬礦產的採集場。台海戰爭時期由於中共的海上封鎖讓我國陷入資源匱乏的困境，如今政府正考慮是否重新啟用礦坑，儘管這仍無法達到基本需求的用量，但能在關鍵時刻維持工業最低限度的運作。"
 CHI_strategic_reserves_desc: "在台海戰爭時期，部分軍用工廠回報儲備資源不足無法製作更多砲彈與維修零件，若不是中共的力量投射僅維持一年再加上太約盟友的大力支持，國軍恐怕面臨手無縛雞之力的窘境，我們必須做好最壞打算，趁著中共內部動亂、重新修整的期間盡可能透過購買、自行採集的形式來儲存各種必要的原材料，沒有人知道下一次與中共交戰會不會是另一場八年抗戰。"
 CHI_mineral_exporation_desc: "由於台灣礦業的沒落，政府對於礦產資源勘探僅止於學術研究與發展電子產業所需要的稀土元素，最近一份資料由於時代技術的限制未能徹底勘查這個島嶼，現在我們可以利用最新的技術來徹底勘查台灣的礦脈儲量，以便在未來有緊急需求時能立刻進行開採。"
 CHI_emergency_resources_extraction_mechanism_desc: "目前政府已經大致掌握台灣島上的礦脈所在處，不過由於環境保護等諸多問題，大規模開採仍停留在計畫階段，其礦場選址暫且交由與政府合作的民間企業進行最低限度的開採，在必要的時候可立即下達行政命令讓礦場恢復其應有的產能。"
 CHI_New_generation_education_desc: "教育乃一國之大事，若無教育，則無國民，更無國家。此前民進黨當局一直推行地以99課綱的修訂和108課綱的修訂為代表的「去中化」極端教育政策已荼毒台灣教育八年之久。作為大戰的勝利者，我們必須要重申這樣一件事實：我們才是中華文化的正統繼承者。為此，韓國瑜總統已與其幕僚起草了一份法案，旨在廢止極端“去中化”的108課綱，制定新課綱標準，重拾中華文化精髓，做傳承中華文化精神的台灣人。"
 CHI_community_drug_prevention_experiment_desc: "過去歷屆政府針對毒品犯罪進行嚴格的打擊，但毒品犯罪案件仍不斷湧出，根據調查，毒品集團經常會以分散的形式散落在民間社區住宅之中，依賴現有的警力很難將其全部一網打盡，我們可以與民間深度合作從源頭打擊或是阻止毒品犯罪的發生，例如通報疑似交易地區、宣導毒品認知、協助高風險家庭等......"
 CHI_dilingual_education_desc: "我們的英語課綱實在是過於老舊，更多學生在英語能力僅止於聽寫，這讓未來我國與歐美深度接觸時會有人材不足的問題，現在有必要改革整個外語教育體系，比起有能力撰寫文縐縐的文章，強化學生與外國人交流的能力更為重要。"
