 CHI_killCN_TTPP: "台灣復仇主義"
 CHI_killCN_TTPP_desc: "§Y台灣復仇主義§!誕生於臺海期間的全面崩解時期，是一種以對中國實行民族仇殺為核心的極端意識形態。其理論針對中國所有具體民族或現實群體，認為中國人和共產主義正持續侵蝕人類文明根基，必須被系統性清除。\n\n在政治層面強調高度集中化的權力，主張以鐵腕統治壓制一切中國人和大規模種族屠殺。任何對中國人的妥協都被認為是對人類文明本身的背叛。\n\n該思想的最終目標是在持續凈化中拯救一個被認為\"純凈\"的東亞文明。"
