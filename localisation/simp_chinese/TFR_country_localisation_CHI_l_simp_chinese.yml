 CHI_GATHERING_STORM_DESC: "孤悬海上的民主灯塔正在剧烈摇曳。台湾对自由与自主的坚持如今已走到最危险的临界点。\n\n年轻世代从未如此清醒与勇敢；而在硬币的另一面，经济增长趋缓、能源极度脆弱、朝野恶斗撕裂社会、灰色地带认知作战无孔不入、解放军战机军舰天天绕岛施压、统独历史伤痕与世代认知断层等诸多因素。\n\n在通往明天的航道上，依旧惊涛骇浪、暗礁密布。\n\n台湾必须直面千万重考验，2300万人的存续与尊严皆系于此。"
 CHI_KMT_path_tt: "§B中国国民党§!\n\n\n\n\n£GFX_KMT_banner\n\n\n\n\n\n-------------------------------------\n\n\n\n\n\n\n\n   £GFX_CHI_han_kuo_yu\n\n\n\n\n\n\n\n\n-------------------------------------\n§Y三民主義，吾黨所宗，\n以建民國，以進大同。\n咨爾多士，為民前鋒，\n夙夜匪懈，主義是從。\n矢勤矢勇，必信必忠。\n一心一德，貫徹始終。§!"
 CHI_DPP_path_tt: "§G民主进步党§!\n-------------------------------------\n\n\n\n\n£GFX_DPP_banner\n\n\n\n\n\n-------------------------------------\n\n\n\n\n\n\n\n   £GFX_CHI_tsai_ing_wen\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§Y顧家鄉，無分你我，攏是前鋒。\n踏出勇健的跤步，命運掌握在手中。\n拚未來，你的寄望囥在心中。\n為著囡仔的笑容，成做幸福的力量。行出咱的路，雖然有風有雨。\n心頭掠予定，免驚困難阻擋。\n為理想 向前衝§!"
 CHI_country_summary2: "§Y国家概况§!：\n山川壯麗，物產豐隆。20世紀初誕生於中華大地的東方之龍，在經歷第二次世界大戰中§R日本帝國§W的侵略以及§d中國共產黨§W的革命後，如今只能蜷縮在東南一隅，其棲身之地僅剩台灣——以及福建沿岸與南海上的幾座小島。\n\n時至今日，\"§3中華民國§W\"更像是一具早已死去的屍體，在與世界各國的交流中大多只能使用\"Taiwan\"或\"Chinese Taipei\"來稱呼自己。民主進步黨在一次次的執政中，不斷地修改課綱以及持續性的政治宣傳使得\"台灣\"已然成為了其許多國民的國家身份認同，似乎只要自然而然的發展下去，中華民國就會自己躺入棺材。\n\n然而在21世紀20年代的今天，全球政治格局風雲變幻，過往大多民眾所認同的\"維持現狀\"方案早已千瘡百孔，中華民國國民再度面臨了兩個選擇——是拋下\"§R福建省§W\"同胞，建立名為\"§G台灣§W\"的國家，還是堅守\"§3中華民國§W\"，靜待變局的到來? "
 CHI_country_summary: "§Y国家概况§!：\n§3[CHI.GetFlag]中華民國§!，誕生於辛亥革命的烽火之中。這個新生的共和國曾統治廣袤的§3中國大陸§!，在動盪不安的二十世紀裡，經歷了戰爭、§d革命§!與時代巨變的重重考驗。然而，那場席捲山河的血腥內戰最終改寫了歷史的走向。國府遷往§G臺灣§!，[PRC.GetFlag]§R中§!§3國§![CHI.GetFlag]的命運也由此翻開了全新的篇章。\n\n戰後的§G臺灣§!，從一座並不富裕的島嶼起步，在冷戰之中逐漸站穩了腳跟。依靠勤奮的人民與持續的改革，經濟迅速成長，工業與科技也發展蓬勃，使這片土地成為亞洲最具活力的地區之一。\n\n政治體制也在時代變遷中不斷轉型。從§g威權統治§!到§Y民主制度§!，社會逐步開放，多元的聲音交織成今日的臺灣社會。自由、繁榮與不斷進步的制度，讓這座小島得以在世界舞台上擁有獨特的位置。\n\n然而，§3民國§!的陰影從未遠去。西方彼岸的§R[PRC.GetFlag]紅色巨龍§!始終虎視眈眈，而島內五光十色的政治聲音也愈發撕裂著社會。未來的道路仍然充滿變數，§3中華民國§!能否剋服國難，擊退§R惡龍§!？而§G台灣獨立之夢§!，能否在新十年裏實現？\n\n§Y「守護自由，讓這座島嶼繼續前行。」§! "
 CHI_country_paths: "\n\n\n§Y国家路线§!：\n§3 - 中国国民党§!\n§G - 民主进步党§!"
 CHI_country_other: "§Y游玩小贴士：§!\n§Y人生短短 好親像塊七迌\n有時仔煩惱 有時輕可\n問我到底 腹內有啥法寶\n其實無撇步 歡喜就好§!"
 CHI_oil_crash_name: "石油危機"
 CHI_oil_crash_desc: "隨著油價飆升以及沙烏地阿拉伯內戰引發的經濟體系崩潰，國際能源與金融市場接連失序，衝擊迅速外溢，並對台灣造成沉重打擊。"
 CHI_Legislative_Yuan_decisions: "立法院"
 CHI_Legislative_Yuan_decisions_desc: "\n\n\n\n\n£GFX_CHI_congress\n\n\n\n\n\n\n\n§Y中華民國立法院§!是中華民國的最高立法機關，其普遍被視爲中華民國的國會，主責制定各項法律、審查中央政府預算及批准條約，並向行政院政治問責。[CHI_lfy_dangtuan]"
