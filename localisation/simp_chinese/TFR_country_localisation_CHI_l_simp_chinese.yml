 CHI_island_in_one_fate: "同島一命"
 CHI_island_in_one_fate_desc: "八十年來，島上民眾首次直面這場撼動我們獨立與主權的軍事進犯，它來勢洶洶，意圖將我們徹底征服，不留半分協商餘地。縱使黨派之爭撕裂著我們的政治生態、分化著我們的社會民意，但抗拒北京的掌控始終是這片土地上難得的最大公約數。當茍且偏安的殘夢被炮火擊得粉碎，主和派再也找不出妥協求饒的借口，我們終能在保家衛國的旗幟下暫擱政爭。"
 CHI_solidify_civil_defence: "鞏固民防"
 CHI_solidify_civil_defence_desc: "作為一座人口稠密的島嶼，我們的民眾正持續暴露在各類炮火轟擊之下。軍事防御體系已不堪重負，陷入全面混亂的應急服務更無力顧及所有受困平民。所幸我們還能依托歷經六十載建設的民防體系，這套為防範大陸進攻而打造的防御系統曾被視為杞人憂天。通過將其與星羅棋布的防空設施協同運作，我們既能緩解應急系統的崩潰壓力，又能為平民築起隔絕戰火的安全屏障。"
 CHI_guerilla_strategy: "遊擊戰略"
 CHI_guerilla_strategy_desc: "我們無力與解放軍正面抗衡，無論是兵力裝備、實戰經驗、戰備水平，還是戰略戰術，皆處於全面劣勢。有鑒於此，參謀本部決意另辟蹊徑：開展遊擊作戰。依托本島錯綜的都市叢林、蜿蜒的海岸線、險峻的山地與茂密的森林等覆雜地形，我們將保存有生力量，避免武裝部隊在開戰首日即遭殲滅。這種非常規作戰方式配合不利地形與覆雜環境，定能讓侵略者每推進一步都付出慘痛代價。"
 CHI_disrupt_transportation: "破壞交通"
 CHI_disrupt_transportation_desc: "解放軍已成功登陸，正利用我方碼頭港口接收裝備物資，繼而輸送給前線部隊補充戰損。這絕對不可容忍。所幸我方工兵部隊在撤退前，已將港口核心設施與交通要道盡數埋設炸藥，導彈部隊亦蓄勢待發，隨時可對港口實施精確打擊。即便敵軍意圖修覆，也需耗費數周時間才能恢覆運轉。在此期間，困守營地的解放軍將陷入補給斷絕的困境，喪失持續進攻能力，而我方更可趁勢發動反攻，有望殲滅其分散部署的小股部隊。"
 CHI_hold_the_defence_line: "堅守防線"
 CHI_hold_the_defence_line_desc: "在敵方先發制人的導彈與艦炮轟擊下，我方的防御體系、指揮系統和通訊網絡已全面癱瘓。若要扭轉戰局，我們必須頂住開戰初期最猛烈、最殘酷的血腥攻勢。這段遲滯期對恢覆後勤補給能力、重建瀕臨崩潰的指揮體系至關重要。為此，我們將集中資源修覆通訊與交通樞紐，同時命令各部轉入全面防御態勢，而非冒險尋求打擊解放軍的機會。"
 CHI_appeal_to_the_free_world: "呼籲自由世界"
 CHI_appeal_to_the_free_world_desc: "隨著美國陷入可怕的內鬥泥潭，舊有的國際秩序正在我們眼前土崩瓦解。但這並不意味著民主力量會與這個逝去的超級大國一同沈淪，全球各地仍有諸多堡壘與燈塔高舉著民主的火炬。其中不少國家為防止自身國際地位進一步衰落，正積極支持意識形態盟友。主要非北約盟友們、北約殘餘勢力、韓國、加拿大等力量，都願在國際舞台上為我們發聲，甚至采取實際行動對抗中國的壓迫性力量。"
 CHI_military_civilian_duty: "軍民一體"
 CHI_military_civilian_duty_desc: "我們這座島嶼狹小而擁擠，幾乎沒有戰略縱深可言，後方即前線。中方悍然發動這場危險的入侵，已充分暴露其對我平民安危的漠視。隨著傷亡報告不斷傳來，那些鼓吹\"統一\"將速戰速決、兵不血刃的失敗主義論調終被徹底粉碎。掃清這些雜音後，我們得以全力推動軍民融合，讓民眾共同維系這個戰時社會的運轉。"
 CHI_grant_emergency_powers: "賦予緊急權力"
 CHI_grant_emergency_powers_desc: "值此戰時狀態，冗長的官僚程序只會掣肘行政部門應對危機的能力。面對兵臨城下的解放軍，總統將宣布進入緊急狀態，實施戒嚴令，並賦予軍方更大權限以掌控局勢。執法機構將暫時並入軍事指揮體系，此舉既能鎮壓通敵破壞活動與騷亂，更能通過武力管制實現資源的高效公平分配。"
 CHI_engineering_maintenance_brigade: "工程維修隊"
 CHI_engineering_maintenance_brigade_desc: "在解放軍轟炸機與炮火的猛烈轟擊下，我們的經濟活動陷入停滯，尤以建築業與基礎設施行業遭受的打擊最為嚴重。由於擔心遭遇針對性空襲導致重大損失，建築公司及提供必要服務的國企已全面暫停施工維護，致使數萬工人與工程師驟然失業，家庭生計無著。為善用這些專業人才，我們可提供即便在和平時期也堪稱優渥的崗位，組建工程維修旅。這支特種部隊將承擔軍事工程任務，既能協助我軍快速構築多層次防御工事，又可在覆雜地形中實現比共軍更迅捷的機動部署。"
 CHI_withdraw_foreign_exchange: "取出外匯"
 CHI_withdraw_foreign_exchange_desc: "在和平時期，我們龐大的外匯儲備確保了經濟穩健、貨幣穩定；而今戰時，這筆深藏的財富亦可轉化為國防與經濟穩定的戰略資源。通過調用部分外匯儲備，我們既能遏制金融市場恐慌，收購遭拋售的資產與貨幣以維持戰時經濟基本運轉，更能采購關鍵軍備補充戰損，確保我軍持續保有反擊侵略者的戰鬥力。"
 CHI_unite_the_island: "團結島內"
 CHI_unite_the_island_desc: "共軍的野蠻入侵已波及台島各處，從台北到高雄，從都市到鄉野，從鋼筋叢林到寧靜農田，無論深綠或深藍縣市，無人能在毀滅的烈焰中獨善其身，更無人敢妄言這場戰事\"與己無關\"。我們必須奮起反抗侵略者：當對方將數百萬人的生命置於險境時，所謂的\"統一\"真會給我們帶來福祉嗎？全島唯有同仇敵愾方有勝算，一旦戰敗，我們必將永遠失去自由、民主，以及與民主盟友的血脈相連。"
 CHI_wolf_pack_tactics: "狼群戰術"
 CHI_wolf_pack_tactics_desc: "作為島國，我們龐大的漁業原本養育著數萬漁民與無數漁船。雖然戰事迫使所有船只無限期停航，但參謀總部已擬定一項突破解放軍海上封鎖的特別方案，征調民用小型船只，向貿易夥伴秘密運輸緊缺物資。這些船只憑借其小巧靈活的特性，既能規避雷達偵測，又可快速脫離追擊。盡管運力不足以重啟經濟，但獲取的關鍵物資將能維持最基本的民生服務，為島內民眾點燃希望之火。"
 CHI_phantom_legions: "幻影軍團"
 CHI_phantom_legions_desc: "面對解放軍規模龐大、裝備精良的空中力量，我空軍已明顯處於劣勢，導致我軍部隊與關鍵設施日夜遭受空襲。雖無力徹底摧毀敵轟炸能力，但我們可設法誘導其火力，指揮官們提出一項別出心裁的方案：在全島布設由氣球、木板等廉價材料制成的假目標，迷惑解放軍空軍，使其消耗彈藥攻擊虛假設施。盡管看似非常規，但工兵部隊確認方案可行，只待批準即可實施。"
 CHI_taiwan_still_brave: "台灣尚勇！"
 CHI_taiwan_still_brave_desc: "我們已挺過這場沖突中最殘酷、最危險的階段，成功粉碎了解放軍速戰速決的圖謀。這不僅讓那些預言我們迅速潰敗的國際觀察家大跌眼鏡，更讓全體民眾堅信勝利並非遙不可及，如今軍民同心，誓死捍衛被強權剝奪的自決權利。當自由的火炬依然在台海之濱熊熊燃燒，每個台灣人都能昂首宣告：這片土地依然英勇不屈，我們永不放棄。"
