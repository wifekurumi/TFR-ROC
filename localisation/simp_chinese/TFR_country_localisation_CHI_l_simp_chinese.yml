l_simp_chinese:
 CHI_tsai_ing_wen_char_desc: "在體現台灣包容性的代表人物中，無人比蔡英文更具象徵意義。她是中華民國歷史上首位具有原住民血統、未婚且女性的總統，憑藉堅韌意志與學識，突破層層刻板印象，成為政壇與法學領域的佼佼者。\n\n蔡英文自1986年進入政府體系，2000年陳水扁當選首位非國民黨籍總統後，正式踏入政界，擔任大陸事務會要職。2005年當選立法委員，2006年升任副院長。2008年在民進黨選舉失敗後接任黨主席，並帶領政黨征戰2010年地方選舉。儘管她在新北市長與2012總統選戰中連遭敗績，並辭去黨魁一職。但隨著馬英九政府在海峽兩岸經濟合作架構協議問題上的爭議以及太陽花學運的興起，民進黨逐漸重獲民意支持。藉著這股浪潮，她再度回歸領導崗位，在2016年總統大選中大勝國民黨，以超過25個百分點贏得選舉。\n\n她執政後推動台灣主體意識，拓展人權，深化與美國、日本的關係，並在對中政策上維持\"戰略模糊\"。在2018年的低谷之後，她的民意逐漸回溫。如今，她整裝待發，準備再次踏上連任征途。"
 CHI_han_kuo_yu_char_desc: "韓國瑜，又名丹尼爾·韓，常被形容為一位\"非傳統\"甚至\"民粹主義\"的政治人物。他是抗日老兵的後代，但由於學業成績不佳，促使父母將他送入中華民國陸軍軍官學校。在那里，他晉升為上尉，並因一塊魔方啟發而決心努力學習以考取大學。\n\n1990年，韓國瑜當選為台北縣議員，並在1992年因與同僚發生肢體沖突而引起關注。同年他成功當選立法委員，但在2001年國民黨黨內初選中落敗，隨後退出政壇前往北京大學深造。2017年，韓國瑜重返政壇，雖在黨魁選舉中失利，卻成為國民黨提名的高雄市長候選人。2018年，他終結了民進黨在高雄的長期執政，但因參加2020年總統大選而遭到強烈批評，更受到市民指責他背棄高雄。\n\n盡管外界質疑其執政能力，他仍以壓倒性勝利當選總統，誓言對抗\"台獨運動\"並振興經濟。然而，許多人對其激進而不切實際的政策深感擔憂。"
 CHI_lin_de_wang_char_desc: "林德旺，中華民國政治人物，台灣人民共產黨創辦人兼主席，以鮮明的政治立場與高度爭議性的公共行動而受到關注。他出身台南，早年曾加入中國國民黨，並參與地方與黨內事務，隨後逐漸轉向更激進且邊緣化的政治路線。\n\n2016年前後，林德旺因選舉與黨內發展受挫而脫離原有政治體系，並開始籌組新政黨。2017年，他正式成立台灣人民共產黨，主張以\"社會主義\"理念推動經濟分配改革，同時強調兩岸交流與合作。這一政治定位在台灣現行政治環境中較為少見，也使其迅速成為輿論焦點。\n\n在實際行動上，林德旺多次通過具有象征意義的政治表達來強化其主張，例如舉辦公開集會、懸掛政治標志等。這些行為在支持者眼中被視為理念實踐，但在反對者看來則觸及法律與社會共識的邊界，因而引發多次執法爭議與社會討論。"
 CHI_wu_rong_yuan_char_desc: "吳榮元，中華民國左翼政治人物，勞動黨主席，長期活躍於勞工運動與兩岸統一相關議題之中。他出生於台南，成長於戰後中華民國的政治高壓環境，對其思想形成產生深遠影響。\n\n1970年代，就讀於國立成功大學期間，吳榮元接觸馬克思主義思想，並與同學秘密組織左翼團體，印制相關理論文獻。事件曝光後，他在戒嚴體制下被捕，一度被判死刑，後改判無期徒刑，並於1975年因特赦減刑。\n\n1986年出獄後，吳榮元投身勞工運動，逐漸成為中華民國左翼陣營的重要人物之一。他參與創立勞動黨，並擔任主席，主張以社會主義理念推動社會改革，同時強調勞工權益與階級議題。在此過程中，他也積極參與多個社會運動組織，包括勞工人權團體與政治受難者相關組織。"
 CHI_chen_yi_qi_char_desc: "陳奕齊，中華民國政治人物，台灣基進創黨成員之一，並曾任首任黨主席，以鮮明的意識形態立場與強烈行動主義風格在中華民國政壇占據一席之地。\n\n他出生於1972年，早年活躍於學術與公共論述領域，曾任台灣南社秘書長，並長期在多個政論平台發表文章，內容多聚焦於國家認同、歷史敘事與政治體制等議題。\n\n在政治發展上，陳奕齊由學術與思想領域逐步轉向組織化政治行動，參與創建\"基進側翼\"，並推動其轉型為政黨\"台灣基進\"。該黨定位為帶有左翼色彩的本土主義政黨，主張透過制度改革與社會動員推動台灣主體性發展。\n\n其政治風格強調意識形態動員與基層組織建設，常以激進論述挑戰既有政治結構。在選舉與政黨競爭中，陳奕齊多次參與戰略布局，包括曾被推薦為不分區立法委員候選人，試圖擴大其政治影響力。"
 CHI_chen_chen_hsiang_desc: "陳鎮湘，中華民國陸軍二級上將出身的政治人物，長期活躍於軍界與中國國民黨高層體系之中，其經歷橫跨軍事指揮、戰略教育與政黨運作多個領域。\n\n他生於安徽，1949年隨家人遷居台灣，成長於高雄左營眷村體系，並進入陸軍軍官學校接受正規軍事訓練。服役期間由工兵科轉入步兵體系，逐步晉升，在國軍中歷任軍團司令、海巡部司令及陸軍總司令等要職，屬於典型的職業軍人路徑。\n\n1999年出任陸軍總司令期間，適逢台灣\"九二一地震\"，陳鎮湘被指派擔任前進指揮官，負責整合軍方救災行動，其指揮經驗亦成為其軍旅生涯的重要節點。隨後轉任國防大學校長，並進入總統府擔任戰略顧問，逐步由純軍事角色過渡至政策與戰略層面。\n\n退役後，陳鎮湘進入政壇，以不分區方式出任立法委員，成為少數由二級上將直接轉任民意代表的案例之一。此後在黨內歷任副主席等職務，參與政黨決策與路線討論，其影響力主要集中於國防、安全與兩岸關系議題。"
 CHI_lai_ching_te_desc: "賴清德，中華民國政治人物，民主進步黨成員。其政治生涯由醫學專業起步，逐步進入民意代表、地方行政及中央政府核心層，屬於典型由技術專業轉型的政治人物。\n\n賴清德1959年出生於新北萬里礦工家庭，幼年喪父，由母親獨力撫養成長。這一背景對其政治形象產生長期影響，使其在公共論述中常強調基層經驗與社會流動。其學術背景涵蓋國立台灣大學、成功大學及美國哈佛大學公共衛生領域，具備完整醫學訓練，並曾任成大醫院與新樓醫院醫師。\n\n1990年代中期，賴清德在擔任醫師期間參與政治活動，隨後棄醫從政，1996年當選國民大會代表，正式進入政壇。其後歷任多屆立法委員，並在立法院內擔任重要委員會召集人，逐步建立其在民進黨內的政治地位。\n\n2010年，賴清德當選台南市市長，並成功連任，期間以穩健的地方治理風格提升其政治聲望。之後進入中央政府，先後擔任行政院院長與副總統，進一步參與國家層級決策。2024年正式就任中華民國總統，成為民進黨延續執政的重要代表人物。"
 CHI_chen_qi_mai_desc: "陳其邁，中華民國政治人物，民主進步黨成員，其政治生涯橫跨立法、行政與地方治理多個層級，屬於典型的長期執政體系核心幹部之一。\n\n陳其邁1964年出生，具醫學與公共衛生背景，畢業於中山醫學院醫學系及台灣大學公共衛生研究所，早年曾任醫師與學界職務，後轉入政治領域發展。\n\n1990年代中期進入政壇後，他連續當選立法委員，並在民主進步黨內擔任黨團幹事長等要職，逐步建立政策與組織能力。隨後進入行政體系，歷任行政院政務委員兼發言人、總統府副秘書長等職務，並一度出任高雄市代理市長。\n\n其政治生涯曾因家族相關事件與政治風波遭遇挫折，一度淡出核心舞台，隨後重新累積政治資本。2020年，在高雄市長補選中當選，並持續連任，成為當前地方治理的重要代表人物。"
 CHI_zheng_wen_can_desc: "鄭文燦，中華民國政治人物，民主進步黨成員，曾任桃園市市長、行政院副院長及海峽交流基金會董事長，在地方治理與兩岸事務領域均具一定影響力。\n\n鄭文燦1967年出生，成長於桃園地區，早年即參與學生運動，曾活躍於學運與社會議題討論，並在政治啟蒙階段形成其本土派立場。其後進入政壇，歷任桃園縣議員、行政院新聞局局長及行政院發言人等職務，逐步累積政治經驗與組織資源。\n\n2014年當選桃園市市長並成功連任，在任內推動都市建設、產業發展與交通規劃，使其在地方政治中建立較高支持基礎。其治理風格強調務實執行與政策整合，兼顧地方派系與中央資源運用，成為民進黨內重要的地方派系代表人物之一。"
 CHI_hou_yu_ih_desc: "侯友宜，中華民國政治人物，中國國民黨成員，其職業軌跡由基層警員一路晉升至警政系統高層，後轉入地方政治領域，屬於典型由治安體系進入行政權力結構的代表人物。\n\n侯友宜1957年出生於嘉義縣樸子，成長於基層家庭環境，早年就讀中央警官學校（後為中央警察大學），並長期任職刑事警察系統。他在警界歷任多項要職，包括刑事警察局局長、內政部警政署署長及中央警察大學校長，期間參與偵辦多起重大刑案，並在掃黑與治安行動中建立\"強硬執法\"形象。\n\n2010年後，侯友宜轉入地方行政體系，出任新北市副市長，逐步參與城市治理事務。2018年代表國民黨參選新北市市長並當選，2022年成功連任，使其成為當前台灣地方政治中最具影響力的直轄市首長之一。\n\n在政治風格上，侯友宜延續其警政背景所形成的務實與執行導向，強調治安、行政效率與基層治理，其用人傾向偏重專業官僚體系，而非傳統政治派系運作。這一特點使其在地方治理中展現相對穩定的執行力，但也在政治動員與意識形態表達方面呈現較為保守的特征。"
 CHI_ko_wen_je_desc: "柯文哲，中華民國政治人物，台灣民眾黨創黨主席，出身醫學界的政治人物代表之一，其政治路徑由專業領域進入公共事務，並逐步發展為具有全國影響力的政治角色。\n\n柯文哲1959年出生於新竹，早年為外科醫師，任職於國立台灣大學醫院，並擔任台大醫學院教授，專長為重癥醫療與器官移植技術，是將葉克膜（ECMO）技術引入台灣的重要推動者之一。\n\n2014年，柯文哲以無黨籍身份參選台北市市長並當選，隨後於2018年成功連任，成為少數以非傳統政黨背景取得直轄市首長地位的政治人物之一。其執政風格強調數據治理與效率導向，同時也因直率言行頻繁引發爭議。\n\n2019年，柯文哲創立台灣民眾黨，提出\"跳脫藍綠\"的政治路線，試圖在既有兩大政黨之外建立第三勢力。該黨在2020年立法委員選舉中取得席次，正式進入中央政治結構。\n\n在全國政治層面，柯文哲於2024年代表民眾黨參選總統，主打務實治理與中間路線，但最終未能勝選，位列第三。其政治論述強調理性決策、技術官僚治理與制度效率，同時也因個人風格與政策立場在社會中引發明顯分歧。"
 CHI_zhao_shao_kang_desc: "趙少康，中華民國政治人物、媒體企業家與政治評論人，現為中國國民黨成員，其政治生涯橫跨民意代表、行政官員與媒體領域，是少數兼具政治與傳媒影響力的公眾人物之一。\n\n趙少康1950年出生於基隆，畢業於台灣大學並赴美國深造，早年進入政壇後迅速崛起，歷任台北市議員、立法委員及行政院環境保護署署長等職務。在1990年代初期，他以高得票紀錄當選立委，被媒體稱為\"政治金童\"，成為當時國民黨內改革派的重要代表人物之一。\n\n1989年，他參與組建黨內派系\"新國民黨連線\"，推動黨內改革；1993年脫離國民黨，參與創立新黨，並擔任重要領導角色，試圖在當時的兩黨競爭格局中建立第三勢力。1994年代表新黨參選台北市市長未果後，其政治發展進入轉折階段，並於1990年代中後期逐步淡出選舉政治。\n\n離開第一線政治後，趙少康轉向媒體領域，長期經營廣播與電視政論節目，包括主持《少康戰情室》等節目，在台灣輿論場中持續保持影響力。他亦曾擔任中國廣播公司董事長，使其在媒體與政治之間形成雙重資源與話語優勢。\n\n2020年代初期，趙少康重返國民黨體系，參與黨內事務與選舉布局，並於2024年以副總統候選人身份參與大選，再度進入全國政治舞台。在兩岸議題上，其立場強調降低對抗與恢覆溝通，但同時主張在現階段不具備推動統一談判的條件。"
 CHI_hung_chi_chang_desc: "洪奇昌，中華民國政治人物與精神科醫師，民主進步黨創黨元老之一，在黨內長期具有高度輩分與人脈影響力，其政治軌跡橫跨黨外運動、立法體系與兩岸事務領域。\n\n洪奇昌1951年出生於彰化，早年從事精神醫學工作，曾任馬偕醫院與台大醫院精神科醫師，是台灣少數由醫學專業直接轉入政治領域的早期代表人物之一。1980年代參與黨外運動，並成為民進黨創黨十八人小組成員，在台灣民主化進程中扮演重要角色。\n\n進入體制後，他連續當選多屆立法委員，並曾任國民大會代表，逐步累積政治資源與派系影響力。在黨內，他長期擔任\"新潮流系\"核心人物，與邱義仁、吳乃仁、林濁水並稱為該派系的重要領導人物之一，屬於民進黨早期權力結構中的關鍵成員。\n\n其政治影響力不僅體現在公職經歷，更來自廣泛的人脈網絡與資源整合能力。洪奇昌在黨內有\"造王者\"之稱，曾提攜多名後輩政治人物進入政壇，包括賴清德等人，其角色更接近政治組織者與幕後協調者。"
 CHI_cai_yanming_desc: "蔡衍明，中華民國企業家，旺旺集團創辦人兼董事長，同時為旺旺中時媒體集團核心掌控者之一，其事業橫跨食品制造與媒體產業，是少數在兩岸與傳媒領域同時具備影響力的商業人物。\n\n蔡衍明1957年出生於台北，出身商人世家，早年即參與家族企業經營。1980年代創立旺旺品牌，以米果產品迅速打開市場，並在台灣食品業中占據一席之地。其後，他將事業重心轉向中國大陸市場，成為較早一批大規模赴陸投資的台商之一，推動企業規模迅速擴張。\n\n在企業發展上，蔡衍明采取跨區域布局策略，使旺旺集團成長為涵蓋食品制造、流通與國際市場的綜合性企業，並於新加坡、香港等地資本市場運作，逐步建立跨國企業體系。\n\n2008年前後，他以個人及家族資金收購中國時報集團及相關電視媒體，整合為旺旺中時媒體集團，正式進入媒體產業。這一舉動使其由單純企業經營者轉變為同時掌握輿論資源的資本力量，也引發社會對媒體集中與言論影響力的討論。"
 CHI_Chen_xinxing_desc: "陳信行，中華民國學者與社會運動參與者，現任世新大學社會發展研究所教授，長期活躍於左翼理論、勞工議題與科技社會研究領域，其角色兼具學術研究者與公共知識分子雙重性質。\n\n他於1980年代在台灣解嚴前後參與學生運動，是當時學運世代的重要參與者之一。這段經歷對其思想路徑產生關鍵影響，使其逐步由社會運動參與者轉向理論與實踐並重的左翼學者。\n\n除學術工作外，他亦深度介入社會行動，尤其關注勞工權益議題，例如參與台灣RCA職業災害訴訟，嘗試將理論研究與現實社會問題結合，強化學術與實踐之間的連結。\n\n陳信行明確認同馬克思主義傳統，並在部分論述中自稱\"毛派\"，強調應重新評價包括文化大革命在內的歷史經驗，並主張對資本主義與全球權力結構進行系統性批判。這一立場在台灣學術與公共討論中具有明顯爭議性。"
 CHI_Xu_yongming_desc: "徐永明，中華民國政治人物與政治學者，曾任時代力量黨主席及不分區立法委員，其政治路徑結合學術背景與新興政黨發展，是台灣第三勢力政治的重要代表人物之一。\n\n他1966年出生於台中，學術訓練完整，畢業於國立台灣大學政治學系，並取得美國密西根大學政治學博士學位，長期任教於東吳大學政治學系，研究領域涵蓋選舉行為、政黨政治與經驗政治理論。\n\n在進入政壇之前，徐永明即活躍於公共論述領域，常以學者身份參與媒體評論，被視為具有影響力的\"名嘴型學者\"。2015年前後參與時代力量籌組，推動其由社會運動轉型為政黨，並在2016年當選立法委員，進入國會體系。\n\n其在立法院期間，主要關注經濟、財政與制度改革議題，並曾擔任黨團總召集人，在新興政黨中扮演組織與協調角色。隨後出任時代力量黨主席，成為該黨在發展階段的重要領導者之一。"
 CHI_Qiu_xianzhi_desc: "邱顯智，中華民國政治人物與人權律師，時代力量重要成員之一，曾任黨主席及立法委員，其政治路徑結合社會運動、法律實務與第三勢力政黨發展，屬於典型由公共運動進入體制政治的代表人物。\n\n邱顯智1976年出生於嘉義農村家庭，成長背景強調社會責任與公共參與。他原本志向醫學領域，後轉向法律，並赴德國海德堡大學深造，接受完整法學訓練。其求學與成長經歷，使其逐步形成以法律專業介入社會議題的路徑。\n\n返台後，他長期投入公益法律工作，參與多起具代表性的社會案件，包括冤案救援、勞工抗爭與公共事件辯護，如鄭性澤案、關廠工人案與太陽花學運等，並以義務律師身份介入，強調法律作為社會正義工具的功能。"
 CHI_Gao_yuting_desc: "高鈺婷，中華民國政治人物，時代力量成員，曾任黨主席與秘書長，其政治發展路徑由工程專業轉入公共事務，屬於新興政治世代中以技術背景參與政治的代表之一。\n\n她1985年出生於台灣，具工程學背景，畢業於國立臺灣科技大學電子工程研究所，早年任職於工業技術研究院，參與自主衛星研製等科技計畫，並曾擔任相關專案主持人。其職涯初期集中於高科技產業與國家科研體系。\n\n2014年前後，高鈺婷開始參與社會運動組織「島國前進」，逐步接觸公共議題與政治行動。其後加入時代力量，從基層幕僚與政策工作做起，曾參與邱顯智立委選戰團隊，並歷任決策委員、副秘書長等職，逐步進入政黨核心運作。"
 CHI_Chen_Jiaohua_desc: "陳椒華，中華民國政治人物與環境運動人士，曾任時代力量黨主席及不分區立法委員，其政治路徑由長期社會運動轉入體制政治，是台灣環保運動進入國會的重要代表人物之一。\n\n她1959年出生於台灣，具藥學與環境相關學術背景，曾任嘉南藥理大學副教授，並從事食品與環境領域研究。在進入政治之前，陳椒華已長期活躍於民間環保團體，歷任台灣環境保護聯盟會長等職，是台灣早期環境運動的重要參與者之一。\n\n其公共行動以環境議題為核心，長期關注垃圾掩埋場爭議、石化污染、電磁輻射危害與水資源保護等問題，並參與多起地方抗爭運動。在反對台南東山掩埋場等事件中，她曾遭遇暴力攻擊，這些經歷強化了其行動主義形象，也使其在環保界被稱為\"環境鐵娘子\"。"
