 CHI_low_international_recognition_idea: "低國際認可度"
 CHI_low_international_recognition_idea_desc: "在國際舞台上，海峽兩岸有如水火，無法同時存在，並且我們總是被摒棄的一方，也因此不同於其他國家，對我國而言參加國際組織有如一種奢望。\n\n不過生命自然會找到出路，不論是透過地區名稱，抑或民間團體，我國依然能以間接的方式參與多邊外交，盡管極其有限。"
