 CHI_army_decisions_desc: "\n\n\n\n\n£GFX_CHI_army_banner\n\n\n\n\n\n\n\n中華民國陸軍，自從國民革命軍的東征北伐，到艱苦抗戰，直至國共內戰，國軍都是一個充滿苦難著的軍隊，現今，她已經變成一個武功廢弛的軍隊了我們應當做出改變，否則中華民國將步入萬劫不復的境地\n"
