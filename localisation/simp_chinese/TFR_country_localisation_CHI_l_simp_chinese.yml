 CHI_Shina_Destructionism: "支那毁灭主义"
 CHI_Shina_Destructionism_desc : "\n\n\n\n£GFX_HI_Shina_Destructionism_banner\n\n\n\n\n\n§Y支那毁灭主义§!源自对台海战争支那病毒式扩张的血海记忆，对十四亿人口吞噬一切资源的末日恐惧、对文化灭绝与精神殖民的刻骨仇恨，烙印在每一块被践踏的土地上。\n\n不再诉求对话，不再幻想共存，支那毁灭主义者已不相信这片土地上存在“同胞”或“人性”。支那被等同为一整个癌细胞集群，是千年专制帝国最腐烂的残渣。他们将支那人比作历史上的蝗灾——必须焚烧、必须根除、必须让其彻底从地球表面消失。\n\n他们崇尚绝对冷血、情绪灭绝与技术至上。军队被赋予无限清除授权，生物武器、AI猎杀网络与轨道动能打击将成为“人类救赎”的终极圣器。§R“支那，地球之癌”§!"
 ROC_maoism_handeqiang: "神权毛主义"
 ROC_maoism_handeqiang_desc: "\n\n\n\n£GFX_Ideology_handeqiangism\n\n\n\n\n\n§Y神权毛主义§!由韩德强在二十一世纪初主张，是毛泽东思想的宗教化变体。它主张将毛泽东视为神明，通过融合佛教元素与集体主义，建立一种新型信仰体系，强调精神觉悟与道德净化，反对资本主义市场经济与西方自由主义。\n\n韩德强思想推崇“正道农场”模式，认为农业劳动与心灵修养相结合，能培养“公心”而摒弃“私心”；强调以毛泽东为先知般的领袖，视其为带领中华民族走出资本主义困境的神圣存在。该思潮视现代工业文明为生态破坏与人性异化的根源，鼓吹回归前现代的集体生活，通过宗教式洗礼实现社会和谐。\n\n在政治结构上，韩德强思想坚持将毛泽东思想佛教化，主张“为人民服务新宗教”，以农场社区为基地，培养忠实弟子。它将社会分为“鬼”与“人”，要求追随者在天地面前下跪，服从正道思想，以防私有制与欲望解放带来的“鬼世界”。"
 ROC_maoism_rujiamao: "儒家毛主义"
 ROC_maoism_rujiamao_desc: "\n\n\n\n£GFX_Ideology_rujiamaosim\n\n\n\n\n\n§Y儒家毛主义§!，由郭继承在二十一世纪初主张，是毛泽东思想与儒家传统的融合变体。它主张将马克思主义中国化进程中深度嫁接孔孟之道，通过“儒释道马”四教合一的框架，构建当代中国治国理政的意识形态基础，强调道德教化、等级和谐与集体主义相结合，反对极端市场自由主义与西方个人主义民主。\n\n郭继承思想推崇“国学滋养治国理政”模式，认为儒家“仁义礼智信”与毛泽东“为人民服务”本质相通，能共同支撑“四个自信”；强调以孔子“允执厥中”的中庸智慧调和阶级斗争与社会稳定，将马克思主义视为现代“道统”，儒家视为永恒“政统”。该思潮视文化自信为国家统一的灵魂，鼓吹复兴传统礼乐教化，通过道德自律与党的领导实现“天下为公”的大同理想。\n\n在政治结构上，郭继承思想坚持精英治理与等级秩序的儒家内核，主张“君君臣臣父父子子”的现代转化，由党内贤能与红色传统保障体制纯洁。它将社会视为有机道德共同体，要求人民在思想上敬畏权威、在行为上克己复礼，以防“西化”“乱象”和“私欲泛滥”。"
 ROC_fandongsanmin: "反动三民主义"
 ROC_fandongsanmin_desc: "\n\n\n\n£GFX_Ideology_fandongsanmin\n\n\n\n\n\n§Y反动三民主义§!是孙中山三民主义的反革命扭曲变体。它继承民族、民权、民生，阉割联俄、联共、扶助农工三大政策。\n\n反动三民主义推崇“一个主义、一个政党、一个领袖”模式，强调以“剿共”与“安内攘外”为政治核心，反对任何工农武装与群众运动，视阶级斗争和土地改革与民生均富为“共产毒素”。该思潮视联俄容共为“异端”，鼓吹回归封建法西斯式集权，通过白色恐怖、清党屠杀与特务统治实现“党国一体”、社会“稳定”。"
 ROC_fandongsanmin2: "反华三民主义"
 ROC_fandongsanmin_desc: "\n\n\n\n£GFX_Ideology_fanhuasanmin\n\n\n\n\n\n§Y反华三民主义§!，是孙中山三民主义的极端分裂异化形态。它表面借用民族、民权、民生三旗帜，实则彻底背离孙中山“振兴中华”的革命初心，蜕变为服务“台独”、勾结国际反华势力的工具，强调“台湾主体性”、反中仇华与永久分离的不可动摇地位。\n\n反华三民主义推崇“去中国化”模式，认为三民主义只能在台湾活动；强调“反共”“反华”"
 CHI_taiwansocialism: "台湾社会主义"
 CHI_taiwansocialism_desc: "\n\n\n\n£GFX_Ideology_taiwansocialism_du\n\n\n\n\n\n§Y台湾社会主义§!是社会民主主义、进步主义与台湾主体性相结合的当代思潮。它继承反帝反资、劳工权益、社会正义与公平分配的核心诉求，同时将台湾国族认同置于优先位置，反对中国大陆的“威权资本主义”与“红色渗透”，主张在台湾本土框架内实现进步改革。\n\n台湾社会主义推崇“社会民主+台湾优先”模式，认为真正的社会主义只能在台湾民主与本土认同的土壤中生长；强调反中作为反帝的主要形式，推动转型正义、去中去蒋历史清洗，通过本土化教育、婚姻平权、劳工权益与环保运动深化“台湾主体性”，实现“去中国化”与社会进步。"
 CHI_taiwansocialism1: "台湾毛主义"
 CHI_taiwansocialism1_desc: "\n\n\n\n£GFX_Ideology_taiwanmaosim\n\n\n\n\n\n§Y台湾毛主义§!，是毛泽东思想在台湾本土语境下的移植与本土化变体。它继承毛泽东的阶级斗争、群众路线、继续革命与反帝反修的核心主张，同时嵌入台湾左翼的现实经验与统独争议，强调在台湾资本主义框架下推动无产阶级革命、批判国民党威权与美日帝国主义渗透，并对大陆改革开放后的“修正主义”路线持强烈反对态度。\n\n台湾毛主义推崇“文革遗产+台湾本土斗争”模式，认为毛泽东晚年思想是社会主义实践的高潮，非“落伍”或“教条”，而是反抗当代资本主义/帝国主义的宝贵经验；强调以群众运动与思想改造对抗台湾的“买办资本主义”与“外来政权”遗毒，将“为人民服务”与本土劳工、农民权益结合，反对任何形式的“新民主主义”妥协或亲美亲日路线。该思潮视大陆1978年后路线为“走资派”胜利、官僚资产阶级复辟，鼓吹台湾左翼应独立发展毛派实践，通过读书会、社运与批判刊物传承文革精神，实现“继续革命”于台湾土壤。"
