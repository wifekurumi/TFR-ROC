 CHI_stage_1: "§G台灣§!，§3中華民國§!屹立不搖的主權領土，是§3中國人§!民主主自由的最後堡壘，也是面對§g威權§!和§.獨裁§!擴張勢力最前線的民主燈塔。這座物產豐富、環境優美的島嶼，絕不是任何人§.\"內政問題\"§!，而是一個2300萬人民用血汗與選票守護起來的實際存在國家。\n\n光陰荏苒，歲月如梭，自從§.中共當局§!片面撕毀§3\"九二共識\"§!的模糊空間，並在國際上不斷打壓§G台灣§!參與之後，兩岸關系再度急劇惡化。§.北京§!當局從未放棄以武力吞並§G台灣§!的計劃，並持續升高軍事恫嚇、灰色地帶侵擾與認知作戰。\n\n§.\"和平統一\"§!只是§.北京§!對外包裝的統戰語言，對§G台§5灣§3人§R民§!§!§!§!而言，那不過是§.\"被侵略\"§!的委婉說法。§G台灣§!從不，也絕不會接受§.\"一國兩制\"§!或任何形式的投降方案。\n\n面對步步進逼的武力威脅，§G台§5灣§3人§R民§!§!§!§!有權力也有義務選擇捍衛生存與尊嚴。\n\n§Y中共滲透狀況:§![CHI_Infiltration_situation]\n兩岸長期對峙之下，§.北京§!從未只依賴軍艦與導彈來影響§G台灣§!。隨著往來逐漸增加，§.中共統戰系統與情報網絡§!也悄然將觸角伸入島內社會。\n§Y數值越低越好§!\n\n§Y島內戰備狀況:[CHI_combatreadiness]§!\n台海局勢始終籠罩在§.潛在沖突和獨裁者§!陰影之下。面對來自§.中國政府§!持續不斷的軍事壓力，§G台灣§!不得不維持高度的防衛準備。\n§Y數值越高，在未來§.獨裁者§!所促進的§R自相殘殺§!局面爆發時我們能夠有力抵抗乃至反擊。§!\n\n§Y國際支持狀況:[CHI_combatreadiness2]§!\n台海問題始終牽動區域安全格局，因此我們需要在國際社會獲得的政治與軍事支持。\n§Y數值越高，在§Y台海戰爭§!期間更容易獲得外交聲援、軍事援助與制裁協助。§!\n\n§Y社會聲援狀況:[CHI_combatreadiness3]§!\n長期對峙容易造成社會分歧與信息戰沖擊，以此做些事情來保證島內輿論環境與社會共識程度是必要的。\n§Y數值越高，政府在§R危機時期§!更容易維持社會穩定與政策執行。§!\n\n§Y情報反制狀況:[CHI_combatreadiness4]§!\n面對長期的信息戰與情報活動需要逐步強化§.反間諜§!與安全能力。\N§Y數值越高，§.敵對勢力§!在島內活動越容易被發現。§!"
 CHI_stage_2: "經過漫長而血腥的§R台海戰爭§!之後，硝煙雖已散去，但戰爭留下的傷痕仍遍布§G台灣§!的土地。許多城市在反覆空襲與導彈打擊中化為瓦礫。電力、通信與交通網絡一度癱瘓，島內經濟也在戰爭期間陷入停滯。\n\n但當硝煙逐漸散去，世界終於看見了一件無法被忽視的事實：§3中華民國§G台灣§!§!不僅存在，而且在最嚴酷的考驗中守住了自己的土地與制度。曾經威脅要\"迅速解決問題\"的§.北京當局§!未能實現其目標的同時一度陷入動蕩，而§G台§5灣§3人§R民§!§!§!§!則用行動證明，這片土地並不是任何可以被輕易吞並的存在。\n\n如今§G台§5灣§3人§R民§!§!§!§!將面對一段艱難而漫長的重建時期。無數家庭在戰爭中失去了親人，許多社區被迫遷移或重新規劃。政府不得不面對戰後安置、產業恢覆與社會穩定等一系列覆雜問題，同時也必須在安全與自由之間重新尋找平衡。\n\n在這段艱難的§Y戰後重建§!時期，§G台灣§!將從創傷中恢覆、並決定其未來的方向。\n\n§Y產業恢覆狀況:[CHI_combatreadiness5]§!\n戰火對工廠，港口與供應鏈造成嚴重破壞，我們必須提高工業體系與貿易網絡的恢覆程度。\n§Y數值越高，台灣經濟恢覆速度越快，在後續發展中獲得更多工業與貿易加成。§!\n\n§Y社會穩定狀況:[CHI_combatreadiness6]§!\n戰爭結束後，社會情緒往往處於緊張與疲憊之間。\n§Y數值越高，政府更容易維持政治穩定與公共秩序；若穩定度下降，罷工、抗議與政治沖突可能增加，影響國家運作。§!\n\n§Y國防重整狀況:[CHI_combatreadiness7]§!\n戰爭結束並不意味著安全威脅消失。軍隊需要重新整編、補充裝備並總結作戰經驗。\n§Y數值越高，軍隊戰鬥力與防御能力提升，但長期軍備投入也會消耗國家資源。§!"
