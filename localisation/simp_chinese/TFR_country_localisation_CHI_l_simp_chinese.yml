 CHI_stage_1: "§G台湾§!，§3中华民国§!屹立不摇的主权领土，是§3中国人§!民主主自由的最后堡垒，也是面对§g威权§!和§.独裁§!扩张势力最前线的民主灯塔。这座物产丰富、环境优美的岛屿，绝不是任何人§.\"内政问题\"§!，而是一个2300万人民用血汗与选票守护起来的实际存在国家。\n\n光阴荏苒，岁月如梭，自从§.中共当局§!片面撕毁§3\"九二共识\"§!的模糊空间，并在国际上不断打压§G台湾§!参与之后，两岸关系再度急剧恶化。§.北京§!当局从未放弃以武力吞并§G台湾§!的计划，并持续升高军事恫吓、灰色地带侵扰与认知作战。\n\n§.\"和平统一\"§!只是§.北京§!对外包装的统战语言，对§G台§5湾§3人§R民§!§!§!§!而言，那不过是§.\"被侵略\"§!的委婉说法。§G台湾§!从不，也绝不会接受§.\"一国两制\"§!或任何形式的投降方案。\n\n面对步步进逼的武力威胁，§G台§5湾§3人§R民§!§!§!§!有权力也有义务选择捍卫生存与尊严。\n\n§Y中共滲透狀況:§![CHI_Infiltration_situation]\n两岸长期对峙之下，§.北京§!从未只依赖军舰与导弹来影响§G台湾§!。随着往来逐渐增加，§.中共统战系统与情报网络§!也悄然将触角伸入岛内社会。\n§Y数值越低越好§!\n\n§Y岛内战备状况:[CHI_combatreadiness]§!\n台海局势始终笼罩在§.潜在冲突和独裁者§!阴影之下。面对来自§.中国政府§!持续不断的军事压力，§G台湾§!不得不维持高度的防卫准备。\n§Y数值越高，在未来§.独裁者§!所促进的§R自相残杀§!局面爆发时我们能够有力抵抗乃至反击。§!\n\n§Y国际支持状况:[CHI_combatreadiness2]§!\n台海问题始终牵动区域安全格局，因此我们需要在国际社会获得的政治与军事支持。\n§Y数值越高，在§Y台海战争§!期间更容易获得外交声援、军事援助与制裁协助。§!\n\n§Y社会声援状况:[CHI_combatreadiness3]§!\n长期对峙容易造成社会分歧与信息战冲击，以此做些事情来保证岛内舆论环境与社会共识程度是必要的。\n§Y数值越高，政府在§R危机时期§!更容易维持社会稳定与政策执行。§!\n\n§Y情报反制状况:[CHI_combatreadiness4]§!\n面对长期的信息战与情报活动需要逐步强化§.反间谍§!与安全能力。\N§Y数值越高，§.敌对势力§!在岛内活动越容易被发现。§!"
 CHI_stage_2: "经过漫长而血腥的§R台海战争§!之后，硝烟虽已散去，但战争留下的伤痕仍遍布§G台湾§!的土地。许多城市在反复空袭与导弹打击中化为瓦砾。电力、通信与交通网络一度瘫痪，岛内经济也在战争期间陷入停滞。\n\n但当硝烟逐渐散去，世界终于看见了一件无法被忽视的事实：§3中华民国§G台湾§!§!不仅存在，而且在最严酷的考验中守住了自己的土地与制度。曾经威胁要\"迅速解决问题\"的§.北京当局§!未能实现其目标的同时一度陷入动荡，而§G台§5湾§3人§R民§!§!§!§!则用行动证明，这片土地并不是任何可以被轻易吞并的存在。\n\n如今§G台§5湾§3人§R民§!§!§!§!将面对一段艰难而漫长的重建时期。无数家庭在战争中失去了亲人，许多社区被迫迁移或重新规划。政府不得不面对战后安置、产业恢复与社会稳定等一系列复杂问题，同时也必须在安全与自由之间重新寻找平衡。\n\n在这段艰难的§Y战后重建§!时期，§G台湾§!将从创伤中恢复、并决定其未来的方向。\n\n§Y产业恢复状况:[CHI_combatreadiness5]§!\n战火对工厂，港口与供应链造成严重破坏，我们必须提高工业体系与贸易网络的恢复程度。\n§Y数值越高，台湾经济恢复速度越快，在后续发展中获得更多工业与贸易加成。§!\n\n§Y社会稳定状况:[CHI_combatreadiness6]§!\n战争结束后，社会情绪往往处于紧张与疲惫之间。\n§Y数值越高，政府更容易维持政治稳定与公共秩序；若稳定度下降，罢工、抗议与政治冲突可能增加，影响国家运作。§!\n\n§Y国防重整状况:[CHI_combatreadiness7]§!\n战争结束并不意味着安全威胁消失。军队需要重新整编、补充装备并总结作战经验。\n§Y数值越高，军队战斗力与防御能力提升，但长期军备投入也会消耗国家资源。§!"
