 ##
 CHI_dont_forget_homeland_desc: "在這金門太武山巔，有四個字\n\n「毋忘在莒」\n\n這是一個兩千年前的故事，來自如今的山東齊地。\n\n戰國時，燕王拜樂毅為上將軍，舉兵伐齊，齊軍節節敗退，湣王遇害，終剩莒城與即墨二地負隅頑抗。\n\n苦撐五年。\n\n直至田單以火牛陣破燕，一連克復七十城，終成復國之業。\n\n先總統 蔣公也在內戰失敗，撤退來台後以此典故為鑒，鼓舞我國軍民同胞們反攻大陸之業，題下這四字，如今也已七十年餘了。\n\n如今大陸當局折戟台海，政局動盪，更是反攻大業重啟之最好時機\n\n切莫忘田單之精神。\n\n中華民族自強不息！"
 CHI_spirit_reaches_to_rainbow_desc: "回首華夏5000年歷史，中國並不是第一次受到來自強大外敵的挑戰，匈奴、蒙古和金人對這塊肥沃昌盛的土地虎視眈眈，不過這塊土地上的漢人可不會就這麼束手就擒，無論文攻武鬥中國人絕對不會向外來入侵者妥協! 想當年文天祥奮力為南宋爭取喘息的空間，在歷史的滾滾車輪之下南宋還是不敵蒙古選擇投向，但文天祥面對元朝領導人的威逼利誘從不服軟，強忍著蒙古人的虐待在獄中寫下諸多愛國作品，為後世留得不少佳話。\n\n前世不忘後世之師，層層堆疊的歷史告訴我們成為投敵者是多麼可恥，可僅僅依靠強大的意志也是打不贏戰爭的。我們將憑著文天祥的風骨與氣勢騰空而起，仔細審視那些潛藏在空軍中，腐爛到根的頑強痼疾。才能不辜負那些愛國將士們的夙願!"
 CHI_need_of_equipment_desc: "自二次世界大戰以後，誰能掌握制空權誰便能掌握戰場，自國民政府遷台以來儘管仍有在進行的研發項目但國軍仍高度依賴先進的美軍戰機。隨著美國的內戰與台海戰爭的損耗，庫存的戰機僅剩寥寥數架，軍隊失去了快速補充戰機的能力，我們必須動用一切手段突破依賴他國的空軍困境！"
 CHI_funds_college_desc: "若是只靠先進的武器就能打贏中共，那1946年開始的國共內戰也不至於兵敗如山倒，最後敗退福爾摩沙。優秀的武器也得有優秀的研發團隊在背後做支撐，每一片機翼螺絲都有其精密的數學計算與工程設計蘊含其中，那些在航空領域卓有建樹的高等學府將獲得更多研究經費，用於採購更精密的實驗設備與培養未來的航空工程人才。"
 CHI_Air_force_special_allowance_desc: "在帳面上，中華民國空軍的實力似乎相當強勁，僅僅以少量資金就能維持這麼龐大的機隊支出實屬高效，不過只要到空軍基地裡逛一圈，就知道那先數字背後的代價:抗荷服用了十幾年都從未換新、呼吸器修修補補勉強能用、跑道的維護費用更是少之又少，這些潛藏的暗病在承平年代無傷大雅，但經過戰爭的洗禮後這些問題變得難以忽視，沒有錢換新這些基礎裝備，戰力又永遠不可能提升上去。"
 CHI_relauch_ADF_project_desc: "火炮上膛、砲手就位，一切都已經準備就緒。研發團隊和工程師們興致昂揚的看向那個數年前就被放棄的隱身戰機項目:ADF「志航」戰機，用於紀念抗戰中的英勇抗日高志航少將。經費不足和技術難題已不再是無法逾越的高山，雖然當前還有許多設計細節尚未敲定，但所有人認為成功研發出五代機勢在必行!\n\n想當年中國的殲20第一次馳乘藍天時，我們的航空人只能望天興嘆，看著威龍那完美的身姿宣示著這片天空的主權。不過在數年之後，總算是找到了這柄屠龍寶劍的終極奧秘，我們將帶著志航少將的遺志，再一次驅逐霸佔家園的入侵者!\n\n而服役近三十年的IDF，終於等來它的繼任者了。"
 CHI_american_fighters_reverse_enginnering_desc: "長期以來中華民國的空軍主力皆由美製裝備支撐，F86、F5到F16，一代又一代裝備陪伴它挺過無數難關，但這也讓台灣的國防力量嚴重受制於美國對台灣的政治態度，經國號戰鬥機就是在各方的政治妥協下誕生的無奈之舉。\n\n長期的國防困境卻沒有激發台灣軍事航空產業的快速發展，上一次大戰的慘痛教訓用血淋淋的事實告訴我們:沒有時間再等了，我們將直接嘗試逆向測繪手頭上尚為完整的戰機，透過研究與收集得到的數據鍛鍊工程團隊的能力，發動機、機體材料、雷達技術......那怕是一顆螺絲，都將是未來發展的寶貴資產。"
 CHI_sino_japanese_fighter_cooperation_program_desc: "縱使我們已經有了完整的軍工產業鏈與研發團隊，可單獨研製下一代主力戰機的風險還是太大，畢竟高級教練機和隱身戰機的技術難度完全不在一個檔次，跨的腳步太大很可能讓投入的大量研發資金與時間付諸東流。\n\n幸好，我們北方的鄰居願意伸出援手，日本擁有完備的產業鏈與老練的技術工人，雙方的作戰訴求也相近，雙方合作不僅能降低項目風險，也能進一步拉近中日關係。"
 CHI_need_of_talent_desc: "在台海戰役中我們失去了大量優秀的飛行員，這對人力本就緊缺的空軍來說更是沉重打擊，如果想盡快恢復人力，國軍有必要提升空軍相關福利增加現役續簽與志願役簽署意願，並擴建飛行模擬器大規模提升訓練速度，同時招募參與過戰爭的老兵擔任教官。"
 CHI_strengthen_anti_corruption_measures_desc: "負責全軍後勤補給的「陸勤部」，以及直屬國防部、掌控軍需發包的「國防採購室」，這兩個單位名義上維繫著前線幾十萬官兵的生死。這裡不碰動輒百億的外購戰機，管的都是最基礎、卻也最致命的裝備:防彈衣、抗彈板，還有通訊器材。\n\n2010年代政府大刀闊斧推動「國防自主」，這套採購體系在戰前主導了無數本土軍需物資的標案。然而，本該用來保護袍澤的防盾，卻在規格綁標與利益勾結下，成了無良廠商的提款機。那些人用不合格的劣質塗層、甚至民用規格的鋼板魚目混珠，在國防根基上瘋狂吸血。\n\n直到台海戰爭爆發，前線才震驚地發現，公發的抗彈板根本擋不住敵軍的現役步槍彈。這種因為貪腐導致的無謂傷亡，差點讓整個軍心徹底崩潰。為了不讓烈士的鮮血白流，中央已經正式批准「基層裝備全面清查計畫」，我們要翻開所有國內產線與驗收帳目，徹底清洗後勤體系，用鐵腕帶動國軍重獲新生。"
 CHI_forming_air_force_political_warfare_command_desc: "1920年，孫中山為了培育出能夠終結軍閥割據的革命軍隊，仿照蘇聯政工體系，建立「軍事委員會政治部」，之後幾經波折成為國防部下屬的總政治部，負責嚴抓軍隊思想與對外心理作戰，並在合適的情況下觀察並即時干預士兵的心理狀況。歷史一再證明部隊的真正核心在於優秀心理素質和對政府的絕對忠誠，兩廣事變發生時正是蔣介石憑藉國家大義，才說動廣東空軍的黃志剛與黃居谷等人「投誠」，這些烈士在抗戰中英勇赴義、為中國戰至最後一機一卒。\n\n因此，為空軍設置專門的政戰部門是絕對有必要的，我們會讓官兵們知道，他們所守護的國家也是他們最堅實的後盾!"
 CHI_carry_forward_the_inspiration_of_our_airman_desc: "在戰爭時期，我國空軍曾誕生出高志航、王光復、陳懷生等王牌飛行員，政府遷台後也培養出伍克振、廖振國、王同義、高鼎程等優秀人才，不止是他們，還有許多不為人知的藍天英雄們捍衛著這片自由的天空，而他們又會接續培養出更多的優秀後輩，生生不息綿延不絕，現在是如此，以後也將是如此！"
 CHI_modern_whampoa_desc: "中華民國陸軍，自國民黨黨軍、國民革命軍，再到中華民國國軍陸軍，是個歷史悠久的部隊，儘管過去的一些政策仍阻礙著我們，但現在已經開始出現好轉了，畢竟我們守下了解放軍的海岸攻勢，難道解放軍的裝備比我們差，現在我們已經證明了自己，是時候更進一步深化改革了！"
 CHI_new_whampoa_spirits_desc: "許多年來，老派黃埔系將軍是國軍改革的重大阻力之一許多落後的戰術體系直到台海前夕才完成改革，他們擔憂著在北伐戰爭發揮巨大作用的戰術若是被全面替換會讓軍隊忘記自己的根，但戰術會變精神卻常存，台海戰爭證明了即使在戰術、裝備全面朝北約靠攏，國軍依舊是個不畏艱苦、愛國愛民的武裝組織，精神沒有消失，它存在在我們的心裡。"
 CHI_unity_of_knowledge_and_desc: "國防部將台海戰爭時期得到的教訓歸納總結出數份報告，上面條理分明編列著部隊新型的戰術改進與訓練項目，如此優秀的報告可不能塵封在檔案室裡，高層已經命人影印分發至各個單位進行訓練。"
 CHI_shining_spear_and_iron_horses_desc: "在下一代主力戰車開發之前，現在要立刻解決國軍戰車無法擊穿敵人裝甲與裝甲薄弱的問題，國防部預計將為CM-12換裝更大口徑的火炮並裝上爆炸反應裝甲來緊急解決當前的問題。"
 CHI_painful_lesson_of_drones_desc: "在台海戰爭期間，解封軍利用無人機對我軍裝甲部隊做出嚴重打擊，其造成了超過半數以上的被摧毀裝甲車輛原因，我們應當加強反無人機措施，並吸取教訓"
 CHI_Camaraderie_Diligence_Sincerity_desc: "黃埔軍校建成起由蔣介石委員長制定並傳承至今的共同校訓。\n\n在最艱難的時刻，團結合作的精神總是能爆發出意想不到的力量，八年抗戰裡國軍獨自硬撐四年、823砲戰死頂住共軍的炮火、臺海戰爭在太約盟友支援之前抵抗住共軍第一輪猛攻。\n\n現在，我們會持續踐行這份精神，並讓世界知道國軍的堅韌意志是從何而來！"
 CHI_centralized_military_command_desc: "歷史經驗表明大兵團作戰時最重要的優勢在於各單位的緊密協調攻擊與極其精準地完成每一次部署，基層官兵的首要任務是完成上級派下來的作戰計畫。"
 CHI_reform_combined_logistics_command_desc: "對於基層軍需貪腐的清查，撕開了國軍現行體制最醜陋的一面自2012年「聯勤」遭到裁撤、後勤業務被肢解並強行塞入各軍種後，缺乏獨立監管的弊端已暴露無遺。三軍各自為政、採購標準混亂、審查層層外包，這才給了無良廠商與腐敗官僚可乘之機。\n\n戰火的教訓證明，現代戰爭打的就是後勤，而混亂的後勤就是通往戰敗的捷報。為了將各軍種分散的後勤權力重新收攏，中央已下達最高指令：正式恢復「聯合後勤司令部」的編制。我們將跳過各軍種的派系利益，將補給、油料、彈藥及運輸事務等再度收歸一統。\n\n重組後的聯勤將建立直屬中央的獨立審計與驗收標準。這不僅是組織圖上的改動，更是為了確保未來的每一面抗彈板、每一顆子彈，都能在統一且嚴格的現代化監管下交到士兵手中。分散的後勤已經在台海付出了代價，現在，是時候以聯勤之名，重建並改革讓國軍擁有鐵壁一般的補給線了。"
 CHI_military_railway_underground_desc: "長期以來台灣的鐵路系統嚴重缺乏經費，多年的和平也讓本就不多的資源大幅向民用路線傾斜，軍隊不僅難以維持手上大量的貨運專列，就連升級甚至保障最基礎的軍用專線都困難重重。不過令人慶幸的是，上一場戰爭帶來的教訓重重地那些還抱有幻想的政府官員，台灣狹長的地形與南北走向的山脈群注定了一旦西部交通節點被切斷，北部與南部的軍隊就會立刻陷入孤軍作戰的困境。\n\n軍隊正在向立法院提出訴求，希望借用部分高雄市近期完成的地下化鐵路，延伸出一條北至嘉義南至屏東枋寮的軍用快線，同時間也會將北部既有的地下鐵路網向南延伸，保障即便在戰時也能確保南北戰備物資與人員撤離時仍能有條安全、通暢的路線可供使用。"
 CHI_dominate_three_oceans_desc: "台灣海峽素來就有黑水溝之稱，清代移民遷台時「七死二留一回頭」和所有人宣告台灣可不是甚麼能任人欺負的文弱書生，無論山在怎麼高也總有崩落的那天，僅憑這道天險被動防禦只是拱手讓出戰略主導權。我們應當效仿英國的經驗擴大我們的海軍規模，不過這次的艦隊擴張可不是為了維持全球霸權而服務，相反，只有拿著比侵略者更強大的武器才有辦法保護自己，導彈、艦艇和海軍陸戰隊環環相扣，在太平洋上組成一張緻密的區域拒止網絡，並在適當的時候給予敵方艦隊致命一擊!"
 CHI_making_great_achievements_on_beachhead_desc: "無論是哪個時代，登陸作戰仍是最困難的一種作戰形式，攻防必須承受防守方猛烈的炮火把輕型單位送上海灘，而且他們無處可退，如古寧頭時期被國軍全滅的解放軍，可若是成功建立穩定據點將能佔據巨大的優勢，如霸王行動成功導致德軍主力被分散。\n\n政府放棄反攻大陸之後，國軍乃至太約高層都是以全力防禦的視角去思考，當時不會有人想到總有一天會需要反過來登陸進攻，高層吸收解析解放軍在臺海登錄時遭受的教訓，發現解放軍對於自己的裝甲火力過度自信導致疏忽了特種部隊的滲透破壞，這十分值得我們組建搶灘進攻的特種部隊。"
 CHI_renovate_Tsoying_naval_base_desc: "高雄左營軍港是目前我國唯一一座軍事專用港區，也是中華民國海軍最重要的艦艇泊地與後勤維修重鎮，自1937年日軍南下奪取東南亞勢在必行，作為南下的重要跳板日本海軍擴建清代時期的萬丹港，在49年國共內戰撤退時左營軍港曾一度遷至此處，後來才移防北部。台海戰爭期間我們真正見識到解放軍海軍的威力，僅僅是維持現有艦隊就讓高雄軍港不堪重負，未來的中華民國海軍絕不僅僅只滿足於維持一隻只有幾艘驅逐艦和柴電潛艇的貧弱艦隊，如果想要真正能夠擁有60年代那種對中共的海岸全面封鎖能力，就必須讓左營軍港具備停泊、維修甚至建造大型艦隻。"
 CHI_NCSIST_Project_desc: "長久以來，中科院的試驗項目總是被貼上一層「騙錢」、「不靠普」的標籤，僅有少數如雄三飛彈等武器受到民眾的廣泛稱讚，但這已經是長期缺乏經費的中科院所能做到的極限了。巧婦難為無米之炊，許多曾經偉大的理想最終都得在現實面前低下頭，即便一路磕磕絆絆做出成品，也隨時有可能因立委們的一紙預算案打回原形，很高興中山科學院的院士再也不必面對這種困境了!為了中華民國的未來，他們想要甚麼我們什麼都會給，讓那些深埋檔案櫃的秘密方案重見天日吧!"
 CHI_relaunch_project_zhenhai_desc: "自中華民國成立至今，海軍一直都處在一個相當為難的位置，無論是北伐、抗戰抑或是國共內戰也都沒有海軍發揮的舞台，長期以來的軍費緊缺使得一直無法培養軍官和購置新艦，就連戰後的旗艦丹陽艦也是接收日本海軍的雪風號驅逐艦，至此之後雖然海軍能夠建造一些小型艦艇，但大型水上軍艦和潛艦仍嚴重受制於美國和國際軍火市場的限制，「鎮海計畫」便是在這種嚴苛環境下誕生的應對方案。\n\n那些我們曾經可望而不可及的大型軍艦，驅逐艦、巡洋艦和大型潛艇近在眼前，中國海軍再也不用對著入侵者低聲下氣了!"
