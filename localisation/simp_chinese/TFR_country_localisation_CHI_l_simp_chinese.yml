 CHI_prc_embargo_idea: "大陸貿易禁運"
 CHI_prc_embargo_idea_desc: "事實證明，蔡總統的模糊戰略並沒有奏效，北京當局依舊被激怒，而我方政府也不得不做出回應，最後演變成兩岸再次終止一切交流，回歸蔣介石的時代。\n\n雖然政府積極補救，努力開發替代市場，但依舊緩不濟急，島內絕大多數的人民皆感受到了制裁的苦果。"
