 CHI_tsmc_idea: "台湾积体电路制造股份有限公司"
 CHI_tsmc_idea_desc: "台积电（TSMC），即台湾积体电路制造股份有限公司，是全球最大的半导体制造企业，为无晶圆厂公司提供芯片制造服务。20世纪90年代，台湾地区将发展高科技与服务型经济作为转型重点，台积电应运而生，其成立初衷是专注于半导体制造，从而推动西方企业将制造环节外包以实现利润最大化。\n\n如今，台积电与其他台湾企业共同贡献了全球约三分之二的半导体供应，并主导高端集成电路市场。这种对台湾半导体的高度依赖迫使许多发达国家施压中国大陆避免采取军事行动，他们担忧冲突会彻底破坏供应链，进而重创整体经济。这种由台湾在半导体制造领域的垄断地位所提供的保护，被许多人称为\"硅盾\"。"
