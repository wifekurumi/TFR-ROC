#{重建國策描述
 CHI_Emergency_reconstruction_begins_desc: "台海戰爭的勝利讓我們向全世界展現了中華民國守護家園的決心，但戰後重建的艱鉅挑戰，也真實地擺在所有人面前。導彈的火光與火砲的轟響才剛從信義區的廢墟間散去，許多民眾仍在艱困環境中生活，努力等待家園重新恢復生機。\n\n我們不能再停留在災後的陰影之中。總統府正與以亞泥為首的一眾營建業者展開密切磋商，共同規劃重建台灣的具體藍圖。電網、淨水廠、醫院等攸關民生的重要基礎設施，將列為優先重建項目。同時我們也將協調國軍各單位投入搶修與重建工作，盡最大努力讓民眾儘早恢復乾淨的用水、穩定的供電，盡快回到正常的生活秩序。"
 CHI_Guarantee_basic_food_and_clothing_desc: "在戰爭開始之前，台灣的糧食自給率僅佔30%左右，台海戰火進一步降低了糧食自給率佔比，中共海軍的封鎖讓民間糧食儲量岌岌可危。\n同時，炮火致使沿海部分房屋化為危樓，部分國民流離失所。\n\n我們要讓國內所有的賑災力量運作起來，開放一切可開放的緊急糧食倉庫、借用所有活動中心等大型建築安置難民，我們絕不可以讓任何的國民挨餓受凍，有必要的話，政府將動用大量外匯購買物資！"
 CHI_Post_war_personnel_issues_desc: "台海戰爭雖已結束，但真正的挑戰才正要開始。長達數月甚至一年的全面戰爭，已讓中華民國社會付出難以估計的代價。大量現役官兵、後備軍人、臨時動員人員與地方防衛部隊在戰後同時面臨復員、安置與重新融入社會的問題，而許多人更帶著戰爭留下的創傷與疲憊返回家園。\n\n國軍現行的人事與後備制度已難以負荷如此龐大的戰後人力規模。各地部隊編制混亂、裝備短缺、訓練標準不一，部分動員單位甚至仍維持半戰時狀態。與此同時，社會輿論也開始質疑：國家是否還需要維持如此龐大的後備力量？\n\n國民黨與民進黨勢力對未來國防方向產生激烈分歧。一方主張保留並改革後備制度，以因應未來可能再次爆發的戰爭；另一方則認為國家已無力承擔龐大的動員體系，應將資源投入科技化與職業化部隊建設。\n\n無論選擇哪條道路，有一件事已無法否認——中華民國的軍事體制，將因這場戰爭而徹底改變。"
 CHI_Emergency_repair_infrastructure_desc: "在抵禦共軍的侵略途中，我國部分基礎設施遭受飛彈與火炮的攻擊，道路與橋樑主動或被迫的遭到炸毀。\n\n我們要統整國內所有平安或中小部分毀損的基礎設施（醫院、學校、水電設施等......）、探查連結的交通路網情況並進行緊急搶修，為將來的完全重建爭取時間。"
 CHI_Request_international_assistance_desc: "多年以來，世界各地大大小小的人道組織在那地球上戰火最混亂的地方四處奔走，中東、非洲、南斯拉夫，這套體系在聯合國部隊的保護下得以正常運轉，也讓台灣人民能為因戰火而流離失所的難民貢獻一點小小的心力。\n台灣從來沒想過有一天自己會變成需要幫助的那一方，桅桿上掛著紅十字旗幟的運輸船駛入尚在搶修的高雄港、奧比斯的飛行眼科醫院也以降落在屏東的戰備跑道上、來自世界各地的善意與支持在這一刻湧向台灣，他們不問膚色、不問種族、不問性別，他們只是知道自己的人類同胞有難，不遠千里趕來救助那些素未謀面的難民。\n\n求助並不可恥，只要是那些願意提供協助的組織或個人，我們永遠敞開大門歡迎他們!"
 CHI_Priority_to_residential_electricity_desc: "舊的電力網路、戰爭的炮火、尚未完成轉型的發電系統在戰後重創整個台灣社會，人們的生活規律彷彿回到尚未全島通電的清帝國時期。\n\n人民節省的使用蠟燭與手電筒在漆黑的夜晚中尋求光明，年輕的孩子們被沒有光害的美麗夜空吸走了注意力，在月光下漫步對情侶來說是多麼浪漫的事情，但這一切都只是苦中作樂。設想一下，夏天沒有冷氣冬天沒有暖氣是多麼可怕的事情。\n\n政府目前正與台電協調動員所有能聯絡上的維修技工搶修電網、聯繫廠商調用大小型發電設備、要求各類工廠僅進行最低限度的生產運作，除優先供電對象外，我們要將省下來的所有電力用於取回人們原先的生活方式上！"
 CHI_Temporarily_reserve_military_personnel_desc: "在經歷一年腥風血雨的台海戰爭後，執政黨中國國民黨政府深刻體認到，國家已無法再依賴過時且低效率的後備制度。面對日益嚴峻的國際局勢與未來可能再度爆發的全面戰爭，立法院院會三讀通過《國防部組織法》部分條文修正案與《國防部全民防衛動員署組織法》，正式推動後備制度全面改革。\n\n新制度將原本僅於戰時動員的後備役部隊，改編為類似美國國民兵制度的常態化地方防衛武裝力量，納入各縣市後備指揮部管轄。所有納編官兵每月須返回營區進行一個週末的戰備訓練，並需參與教育召集、年度重大演習，在自然災害、重大危機乃至戰爭爆發時立即響應動員。\n\n此舉旨在建立一支「平時可救災、戰時能作戰」的全民防衛力量，以應對未來不可避免的戰爭威脅。根據多名資深戰略專家的評估，下一場大規模衝突可能將於五至十年內再次爆發，而中華民國必須從現在開始做好準備。"
 CHI_Demobilized_reservists_desc: "在歷經長達一年的血戰後，國軍與政府高層逐漸意識到，大規模後備動員制度雖在戰時提供了龐大的人力來源，卻也暴露出訓練不足、指揮混亂、裝備落差與資源浪費等嚴重問題。大量被動員的後備官兵在長期作戰與頻繁召集下早已身心俱疲，而戰後百廢待興的經濟壓力，也使國家難以繼續維持如此龐大的動員體系。\n\n在國防部與行政院聯合評估後，政府正式宣布縮減並逐步解編戰時擴編的後備役部隊，將有限資源集中投入募兵制常備部隊建設，以及無人載具、網路作戰、電子戰與精準打擊能力等新世代軍事領域。執政當局強調，未來中華民國不再追求「人海式動員」，而是建立一支「小而精、小而強」的現代化武裝力量。\n\n新的國防戰略將以高科技防衛、區域快速反應部隊與民間防災體系為核心，透過高度專業化與資訊化作戰能力應對未來威脅，而非再度依賴傳統的大規模後備動員體制。這也象徵著，中華民國的國防思想，正式從全面動員時代邁向科技化戰爭的新時代。"
 CHI_Repair_Taoyuan_Airport_desc: "桃園機場——是我國的國際航空樞紐，每年遊客吞吐量約在4,780萬至4,860萬人次，貨物吞吐量達250萬公噸，但現在部分跑道已經遭到摧毀，雖然在戰爭時期這點「小擦傷」並不妨礙在軍事方面的運用，但在民用領域這是絕對不可接受的重大毀損，我們要逐步恢復桃園機場的機場容量，取回天上的物流能力。"
 CHI_Reopening_Kaohsiung_Port_desc: "高雄港——我國最大的貿易港口，在亞洲貿易佔據核心樞紐的關鍵地位，最大年吞吐量近一億公噸，同時也是中共登陸作戰進攻最激烈的港口之一，現在我們要讓其恢復到戰前的功能、與世界進行連接，重新站穩作為東亞貿易核心樞紐的地位，為國家重建、經濟復興畫下起跑線。"
 CHI_Ending_wartime_economic_desc: "在台灣人民與來自世界各地援助的共同努力之下，人們的日常生活逐步恢復正軌，雖然離戰爭爆發之前還有點差距，不過已經不再需要有形的大手強制管控。自由市場會讓撕裂的經濟創口逐步癒合，很快的，人們能再次隨意從貨架上購買所需的商品，從輕工業至高科技工業將開始恢復運作，大家終於可以回到以前的生活，只不過茶葉蛋可能會漲到18元！"
 CHI_MilitaryCivilian_cooperation_reconstruction_desc: "在承平時期，人們在各個天災現場總是能看到國軍弟兄辛勞救災的影子，為了協助災民重建家園揮灑自己的汗水，清理土石、搭建緊急避難所。\n\n其中，部分如工兵之類的兵科所掌握的機具技能哪怕放在民間也十分有用處，而這樣的士兵光是現役就有好幾萬人。若是將這些熟練的士兵暫時抽離並分發到各個單位擔任指導教官，我們就能迅速組織起龐大的工程部隊。\n\n現在，對岸的紅色政權在被擊退後的數年內不會有其他動作，我們有餘力動員近乎所有士兵協助戰爭受害地區的居民重建家園。"
 CHI_Mobilizing_civil_society_groups_desc: "在過去，我們時常動員國軍人員參與各種水災或地震的救援工作，可海峽對岸的紅色對我們來說仍是一大威脅，如果方任他們不管，很有可能招致不可挽回的後果。\n\n所幸近年來民間參與公益活動的熱情越發高漲，台灣人幾十年如一日付出的心血最終凝結成一張緻密的社會安全網，運用這張網，社會上的每一種弱勢族群都會接收到最即時的援助，憑藉慈濟龐大的醫療體系、家扶基金會對弱勢兒童的專業扶助與伊甸基金會對障礙者的悉心照料，我們一定讓這些人擺脫戰亂，讓他們重新融入到日常中。"
 CHI_Connecting_lifelines_desc: "維修機場、重啟港口，用全新的柏油馬路將其全部串連。從北到南，由西至東，為國家重建打下堅實的基礎！\n\n我們打通了名為「交通網」的任督二脈，名為「物流」的血液加速流通起來，名為「貨物」的氧氣通遍名為台灣的患者全身，這塊寶島將會重新振作起來！"
 CHI_Surviving_disaster_desc: "驀然回首過往400年的歲月，福爾摩沙乘著時代的風浪載浮載沉，這塊小小的彈丸之地從未有過真正掌握自身命運的機會，荷蘭人、漢人、日本人後又是漢人，無論是誰掌的舵，大部分人只能順著左搖右晃，祈禱自己不會成為下一個被捲入浪潮中的犧牲品。但這一次，赤色風暴散去，台灣人發現自己活下來了，他們盡力修復這艘名為「美麗之島」的小船，航向那個未知的明天......"
