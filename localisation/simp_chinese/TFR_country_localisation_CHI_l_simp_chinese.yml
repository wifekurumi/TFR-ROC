 CHI_island_in_one_fate: "同岛一命"
 CHI_island_in_one_fate_desc: "八十年来，岛上民众首次直面这场撼动我们独立与主权的军事进犯，它来势汹汹，意图将我们彻底征服，不留半分协商余地。纵使党派之争撕裂着我们的政治生态、分化着我们的社会民意，但抗拒北京的掌控始终是这片土地上难得的最大公约数。当苟且偏安的残梦被炮火击得粉碎，主和派再也找不出妥协求饶的借口，我们终能在保家卫国的旗帜下暂搁政争。"
 CHI_solidify_civil_defence: "巩固民防"
 CHI_solidify_civil_defence_desc: "作为一座人口稠密的岛屿，我们的民众正持续暴露在各类炮火轰击之下。军事防御体系已不堪重负，陷入全面混乱的应急服务更无力顾及所有受困平民。所幸我们还能依托历经六十载建设的民防体系，这套为防范大陆进攻而打造的防御系统曾被视为杞人忧天。通过将其与星罗棋布的防空设施协同运作，我们既能缓解应急系统的崩溃压力，又能为平民筑起隔绝战火的安全屏障。"
 CHI_guerilla_strategy: "游击战略"
 CHI_guerilla_strategy_desc: "我们无力与解放军正面抗衡，无论是兵力装备、实战经验、战备水平，还是战略战术，皆处于全面劣势。有鉴于此，参谋本部决意另辟蹊径：开展游击作战。依托本岛错综的都市丛林、蜿蜒的海岸线、险峻的山地与茂密的森林等复杂地形，我们将保存有生力量，避免武装部队在开战首日即遭歼灭。这种非常规作战方式配合不利地形与复杂环境，定能让侵略者每推进一步都付出惨痛代价。"
 CHI_disrupt_transportation: "破坏交通"
 CHI_disrupt_transportation_desc: "解放军已成功登陆，正利用我方码头港口接收装备物资，继而输送给前线部队补充战损。这绝对不可容忍。所幸我方工兵部队在撤退前，已将港口核心设施与交通要道尽数埋设炸药，导弹部队亦蓄势待发，随时可对港口实施精确打击。即便敌军意图修复，也需耗费数周时间才能恢复运转。在此期间，困守营地的解放军将陷入补给断绝的困境，丧失持续进攻能力，而我方更可趁势发动反攻，有望歼灭其分散部署的小股部队。"
 CHI_hold_the_defence_line: "坚守防线"
 CHI_hold_the_defence_line_desc: "在敌方先发制人的导弹与舰炮轰击下，我方的防御体系、指挥系统和通讯网络已全面瘫痪。若要扭转战局，我们必须顶住开战初期最猛烈、最残酷的血腥攻势。这段迟滞期对恢复后勤补给能力、重建濒临崩溃的指挥体系至关重要。为此，我们将集中资源修复通讯与交通枢纽，同时命令各部转入全面防御态势，而非冒险寻求打击解放军的机会。"
 CHI_appeal_to_the_free_world: "呼吁自由世界"
 CHI_appeal_to_the_free_world_desc: "随着美国陷入可怕的内斗泥潭，旧有的国际秩序正在我们眼前土崩瓦解。但这并不意味着民主力量会与这个逝去的超级大国一同沉沦，全球各地仍有诸多堡垒与灯塔高举着民主的火炬。其中不少国家为防止自身国际地位进一步衰落，正积极支持意识形态盟友。主要非北约盟友们、北约残余势力、韩国、加拿大等力量，都愿在国际舞台上为我们发声，甚至采取实际行动对抗中国的压迫性力量。"
 CHI_military_civilian_duty: "军民一体"
 CHI_military_civilian_duty_desc: "我们这座岛屿狭小而拥挤，几乎没有战略纵深可言，后方即前线。中方悍然发动这场危险的入侵，已充分暴露其对我平民安危的漠视。随着伤亡报告不断传来，那些鼓吹\"统一\"将速战速决、兵不血刃的失败主义论调终被彻底粉碎。扫清这些杂音后，我们得以全力推动军民融合，让民众共同维系这个战时社会的运转。"
 CHI_grant_emergency_powers: "赋予紧急权力"
 CHI_grant_emergency_powers_desc: "值此战时状态，冗长的官僚程序只会掣肘行政部门应对危机的能力。面对兵临城下的解放军，总统将宣布进入紧急状态，实施戒严令，并赋予军方更大权限以掌控局势。执法机构将暂时并入军事指挥体系，此举既能镇压通敌破坏活动与骚乱，更能通过武力管制实现资源的高效公平分配。"
 CHI_engineering_maintenance_brigade: "工程维修队"
 CHI_engineering_maintenance_brigade_desc: "在解放军轰炸机与炮火的猛烈轰击下，我们的经济活动陷入停滞，尤以建筑业与基础设施行业遭受的打击最为严重。由于担心遭遇针对性空袭导致重大损失，建筑公司及提供必要服务的国企已全面暂停施工维护，致使数万工人与工程师骤然失业，家庭生计无着。为善用这些专业人才，我们可提供即便在和平时期也堪称优渥的岗位，组建工程维修旅。这支特种部队将承担军事工程任务，既能协助我军快速构筑多层次防御工事，又可在复杂地形中实现比共军更迅捷的机动部署。"
 CHI_withdraw_foreign_exchange: "取出外汇"
 CHI_withdraw_foreign_exchange_desc: "在和平时期，我们庞大的外汇储备确保了经济稳健、货币稳定；而今战时，这笔深藏的财富亦可转化为国防与经济稳定的战略资源。通过调用部分外汇储备，我们既能遏制金融市场恐慌，收购遭抛售的资产与货币以维持战时经济基本运转，更能采购关键军备补充战损，确保我军持续保有反击侵略者的战斗力。"
 CHI_unite_the_island: "团结岛内"
 CHI_unite_the_island_desc: "共军的野蛮入侵已波及台岛各处，从台北到高雄，从都市到乡野，从钢筋丛林到宁静农田，无论深绿或深蓝县市，无人能在毁灭的烈焰中独善其身，更无人敢妄言这场战事\"与己无关\"。我们必须奋起反抗侵略者：当对方将数百万人的生命置于险境时，所谓的\"统一\"真会给我们带来福祉吗？全岛唯有同仇敌忾方有胜算，一旦战败，我们必将永远失去自由、民主，以及与民主盟友的血脉相连。"
 CHI_wolf_pack_tactics: "狼群战术"
 CHI_wolf_pack_tactics_desc: "作为岛国，我们庞大的渔业原本养育着数万渔民与无数渔船。虽然战事迫使所有船只无限期停航，但参谋总部已拟定一项突破解放军海上封锁的特别方案，征调民用小型船只，向贸易伙伴秘密运输紧缺物资。这些船只凭借其小巧灵活的特性，既能规避雷达侦测，又可快速脱离追击。尽管运力不足以重启经济，但获取的关键物资将能维持最基本的民生服务，为岛内民众点燃希望之火。"
 CHI_phantom_legions: "幻影军团"
 CHI_phantom_legions_desc: "面对解放军规模庞大、装备精良的空中力量，我空军已明显处于劣势，导致我军部队与关键设施日夜遭受空袭。虽无力彻底摧毁敌轰炸能力，但我们可设法诱导其火力，指挥官们提出一项别出心裁的方案：在全岛布设由气球、木板等廉价材料制成的假目标，迷惑解放军空军，使其消耗弹药攻击虚假设施。尽管看似非常规，但工兵部队确认方案可行，只待批准即可实施。"
 CHI_taiwan_still_brave: "台湾尚勇！"
 CHI_taiwan_still_brave_desc: "我们已挺过这场冲突中最残酷、最危险的阶段，成功粉碎了解放军速战速决的图谋。这不仅让那些预言我们迅速溃败的国际观察家大跌眼镜，更让全体民众坚信胜利并非遥不可及，如今军民同心，誓死捍卫被强权剥夺的自决权利。当自由的火炬依然在台海之滨熊熊燃烧，每个台湾人都能昂首宣告：这片土地依然英勇不屈，我们永不放弃。"
