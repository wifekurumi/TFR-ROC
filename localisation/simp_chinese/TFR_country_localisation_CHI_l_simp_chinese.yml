 CHI_killCN_TTPP: "台灣復仇主義"
 CHI_killCN_TTPP_desc: "§Y台灣復仇主義§!诞生于臺海期間的全面崩解时期，是一种以對中國實行民族仇殺为核心的极端意识形态。其理论针对中國所有具体民族或现实群体，认为中國人和共產主義正持续侵蚀人類文明根基，必须被系统性清除。\n\n在政治层面强调高度集中化的权力，主张以铁腕统治压制一切中國人和大規模種族屠殺。任何對中國人的妥协都被认为是对人類文明本身的背叛。\n\n该思想的最终目标是在持续净化中拯救一个被认为\"纯净\"的東亞文明。"
 CHI_taiwan_war_category: "臺海戰爭"
