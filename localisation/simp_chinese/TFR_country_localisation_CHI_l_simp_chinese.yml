l_simp_chinese:
 CHI_tsai_ing_wen_char_desc: "在体现台湾包容性的代表人物中，无人比蔡英文更具象征意义。她是中华民国历史上首位具有原住民血统、未婚且女性的总统，凭借坚韧意志与学识，突破层层刻板印象，成为政坛与法学领域的佼佼者。\n\n蔡英文自1986年进入政府体系，2000年陈水扁当选首位非国民党籍总统后，正式踏入政界，担任大陆事务会要职。2005年当选立法委员，2006年升任副院长。2008年在民进党选举失败后接任党主席，并带领政党征战2010年地方选举。尽管她在新北市长与2012总统选战中连遭败绩，并辞去党魁一职。但随着马英九政府在海峡两岸经济合作架构协议问题上的争议以及太阳花学运的兴起，民进党逐渐重获民意支持。借着这股浪潮，她再度回归领导岗位，在2016年总统大选中大胜国民党，以超过25个百分点赢得选举。\n\n她执政后推动台湾主体意识，拓展人权，深化与美国、日本的关系，并在对中政策上维持\"战略模糊\"。在2018年的低谷之后，她的民意逐渐回温。如今，她整装待发，准备再次踏上连任征途。"
 CHI_han_kuo_yu_char_desc: "韩国瑜，又名丹尼尔·韩，常被形容为一位\"非传统\"甚至\"民粹主义\"的政治人物。他是抗日老兵的后代，但由于学业成绩不佳，促使父母将他送入中华民国陆军军官学校。在那里，他晋升为上尉，并因一块魔方启发而决心努力学习以考取大学。\n\n1990年，韩国瑜当选为台北县议员，并在1992年因与同僚发生肢体冲突而引起关注。同年他成功当选立法委员，但在2001年国民党党内初选中落败，随后退出政坛前往北京大学深造。2017年，韩国瑜重返政坛，虽在党魁选举中失利，却成为国民党提名的高雄市长候选人。2018年，他终结了民进党在高雄的长期执政，但因参加2020年总统大选而遭到强烈批评，更受到市民指责他背弃高雄。\n\n尽管外界质疑其执政能力，他仍以压倒性胜利当选总统，誓言对抗\"台独运动\"并振兴经济。然而，许多人对其激进而不切实际的政策深感担忧。"
 CHI_lin_de_wang_char_desc: "林德旺，中华民国政治人物，台湾人民共产党创办人兼主席，以鲜明的政治立场与高度争议性的公共行动而受到关注。他出身台南，早年曾加入中国国民党，并参与地方与党内事务，随后逐渐转向更激进且边缘化的政治路线。\n\n2016年前后，林德旺因选举与党内发展受挫而脱离原有政治体系，并开始筹组新政党。2017年，他正式成立台湾人民共产党，主张以“社会主义”理念推动经济分配改革，同时强调两岸交流与合作。这一政治定位在台湾现行政治环境中较为少见，也使其迅速成为舆论焦点。\n\n在实际行动上，林德旺多次通过具有象征意义的政治表达来强化其主张，例如举办公开集会、悬挂政治标志等。这些行为在支持者眼中被视为理念实践，但在反对者看来则触及法律与社会共识的边界，因而引发多次执法争议与社会讨论。"
 CHI_wu_rong_yuan_char_desc: "吴荣元，中华民国左翼政治人物，劳动党主席，长期活跃于劳工运动与两岸统一相关议题之中。他出生于台南，成长于战后中华民国的政治高压环境，对其思想形成产生深远影响。\n\n1970年代，就读于国立成功大学期间，吴荣元接触马克思主义思想，并与同学秘密组织左翼团体，印制相关理论文献。事件曝光后，他在戒严体制下被捕，一度被判死刑，后改判无期徒刑，并于1975年因特赦减刑。\n\n1986年出狱后，吴荣元投身劳工运动，逐渐成为中华民国左翼阵营的重要人物之一。他参与创立劳动党，并担任主席，主张以社会主义理念推动社会改革，同时强调劳工权益与阶级议题。在此过程中，他也积极参与多个社会运动组织，包括劳工人权团体与政治受难者相关组织。"
 CHI_chen_yi_qi_char_desc: "陈奕齐，中华民国政治人物，台湾基进创党成员之一，并曾任首任党主席，以鲜明的意识形态立场与强烈行动主义风格在中华民国政坛占据一席之地。\n\n他出生于1972年，早年活跃于学术与公共论述领域，曾任台湾南社秘书长，并长期在多个政论平台发表文章，内容多聚焦于国家认同、历史叙事与政治体制等议题。\n\n在政治发展上，陈奕齐由学术与思想领域逐步转向组织化政治行动，参与创建“基进侧翼”，并推动其转型为政党“台湾基进”。该党定位为带有左翼色彩的本土主义政党，主张透过制度改革与社会动员推动台湾主体性发展。\n\n其政治风格强调意识形态动员与基层组织建设，常以激进论述挑战既有政治结构。在选举与政党竞争中，陈奕齐多次参与战略布局，包括曾被推荐为不分区立法委员候选人，试图扩大其政治影响力。"
 CHI_chen_chen_hsiang_desc: "陈镇湘，中华民国陆军二级上将出身的政治人物，长期活跃于军界与中国国民党高层体系之中，其经历横跨军事指挥、战略教育与政党运作多个领域。\n\n他生于安徽，1949年随家人迁居台湾，成长于高雄左营眷村体系，并进入陆军军官学校接受正规军事训练。服役期间由工兵科转入步兵体系，逐步晋升，在国军中历任军团司令、海巡部司令及陆军总司令等要职，属于典型的职业军人路径。\n\n1999年出任陆军总司令期间，适逢台湾“九二一地震”，陈镇湘被指派担任前进指挥官，负责整合军方救灾行动，其指挥经验亦成为其军旅生涯的重要节点。随后转任国防大学校长，并进入总统府担任战略顾问，逐步由纯军事角色过渡至政策与战略层面。\n\n退役后，陈镇湘进入政坛，以不分区方式出任立法委员，成为少数由二级上将直接转任民意代表的案例之一。此后在党内历任副主席等职务，参与政党决策与路线讨论，其影响力主要集中于国防、安全与两岸关系议题。"
 CHI_lai_ching_te_desc: "赖清德，中华民国政治人物，民主进步党成员。其政治生涯由医学专业起步，逐步进入民意代表、地方行政及中央政府核心层，属于典型由技术专业转型的政治人物。\n\n赖清德1959年出生于新北万里矿工家庭，幼年丧父，由母亲独力抚养成长。这一背景对其政治形象产生长期影响，使其在公共论述中常强调基层经验与社会流动。其学术背景涵盖国立台湾大学、成功大学及美国哈佛大学公共卫生领域，具备完整医学训练，并曾任成大医院与新楼医院医师。\n\n1990年代中期，赖清德在担任医师期间参与政治活动，随后弃医从政，1996年当选国民大会代表，正式进入政坛。其后历任多届立法委员，并在立法院内担任重要委员会召集人，逐步建立其在民进党内的政治地位。\n\n2010年，赖清德当选台南市市长，并成功连任，期间以稳健的地方治理风格提升其政治声望。之后进入中央政府，先后担任行政院院长与副总统，进一步参与国家层级决策。2024年正式就任中华民国总统，成为民进党延续执政的重要代表人物。"
 CHI_chen_qi_mai_desc: "陈其迈，中华民国政治人物，民主进步党成员，其政治生涯横跨立法、行政与地方治理多个层级，属于典型的长期执政体系核心干部之一。\n\n陈其迈1964年出生，具医学与公共卫生背景，毕业于中山医学院医学系及台湾大学公共卫生研究所，早年曾任医师与学界职务，后转入政治领域发展。\n\n1990年代中期进入政坛后，他连续当选立法委员，并在民主进步党内担任党团干事长等要职，逐步建立政策与组织能力。随后进入行政体系，历任行政院政务委员兼发言人、总统府副秘书长等职务，并一度出任高雄市代理市长。\n\n其政治生涯曾因家族相关事件与政治风波遭遇挫折，一度淡出核心舞台，随后重新累积政治资本。2020年，在高雄市长补选中当选，并持续连任，成为当前地方治理的重要代表人物。"
 CHI_zheng_wen_can_desc: "郑文灿，中华民国政治人物，民主进步党成员，曾任桃园市市长、行政院副院长及海峡交流基金会董事长，在地方治理与两岸事务领域均具一定影响力。\n\n郑文灿1967年出生，成长于桃园地区，早年即参与学生运动，曾活跃于学运与社会议题讨论，并在政治启蒙阶段形成其本土派立场。其后进入政坛，历任桃园县议员、行政院新闻局局长及行政院发言人等职务，逐步累积政治经验与组织资源。\n\n2014年当选桃园市市长并成功连任，在任内推动都市建设、产业发展与交通规划，使其在地方政治中建立较高支持基础。其治理风格强调务实执行与政策整合，兼顾地方派系与中央资源运用，成为民进党内重要的地方派系代表人物之一。"
 CHI_hou_yu_ih_desc: "侯友宜，中华民国政治人物，中国国民党成员，其职业轨迹由基层警员一路晋升至警政系统高层，后转入地方政治领域，属于典型由治安体系进入行政权力结构的代表人物。\n\n侯友宜1957年出生于嘉义县朴子，成长于基层家庭环境，早年就读中央警官学校（后为中央警察大学），并长期任职刑事警察系统。他在警界历任多项要职，包括刑事警察局局长、内政部警政署署长及中央警察大学校长，期间参与侦办多起重大刑案，并在扫黑与治安行动中建立“强硬执法”形象。\n\n2010年后，侯友宜转入地方行政体系，出任新北市副市长，逐步参与城市治理事务。2018年代表国民党参选新北市市长并当选，2022年成功连任，使其成为当前台湾地方政治中最具影响力的直辖市首长之一。\n\n在政治风格上，侯友宜延续其警政背景所形成的务实与执行导向，强调治安、行政效率与基层治理，其用人倾向偏重专业官僚体系，而非传统政治派系运作。这一特点使其在地方治理中展现相对稳定的执行力，但也在政治动员与意识形态表达方面呈现较为保守的特征。"
 CHI_ko_wen_je_desc: "柯文哲，中华民国政治人物，台湾民众党创党主席，出身医学界的政治人物代表之一，其政治路径由专业领域进入公共事务，并逐步发展为具有全国影响力的政治角色。\n\n柯文哲1959年出生于新竹，早年为外科医师，任职于国立台湾大学医院，并担任台大医学院教授，专长为重症医疗与器官移植技术，是将叶克膜（ECMO）技术引入台湾的重要推动者之一。\n\n2014年，柯文哲以无党籍身份参选台北市市长并当选，随后于2018年成功连任，成为少数以非传统政党背景取得直辖市首长地位的政治人物之一。其执政风格强调数据治理与效率导向，同时也因直率言行频繁引发争议。\n\n2019年，柯文哲创立台湾民众党，提出“跳脱蓝绿”的政治路线，试图在既有两大政党之外建立第三势力。该党在2020年立法委员选举中取得席次，正式进入中央政治结构。\n\n在全国政治层面，柯文哲于2024年代表民众党参选总统，主打务实治理与中间路线，但最终未能胜选，位列第三。其政治论述强调理性决策、技术官僚治理与制度效率，同时也因个人风格与政策立场在社会中引发明显分歧。"
 CHI_zhao_shao_kang_desc: "赵少康，中华民国政治人物、媒体企业家与政治评论人，现为中国国民党成员，其政治生涯横跨民意代表、行政官员与媒体领域，是少数兼具政治与传媒影响力的公众人物之一。\n\n赵少康1950年出生于基隆，毕业于台湾大学并赴美国深造，早年进入政坛后迅速崛起，历任台北市议员、立法委员及行政院环境保护署署长等职务。在1990年代初期，他以高得票纪录当选立委，被媒体称为“政治金童”，成为当时国民党内改革派的重要代表人物之一。\n\n1989年，他参与组建党内派系“新国民党连线”，推动党内改革；1993年脱离国民党，参与创立新党，并担任重要领导角色，试图在当时的两党竞争格局中建立第三势力。1994年代表新党参选台北市市长未果后，其政治发展进入转折阶段，并于1990年代中后期逐步淡出选举政治。\n\n离开第一线政治后，赵少康转向媒体领域，长期经营广播与电视政论节目，包括主持《少康战情室》等节目，在台湾舆论场中持续保持影响力。他亦曾担任中国广播公司董事长，使其在媒体与政治之间形成双重资源与话语优势。\n\n2020年代初期，赵少康重返国民党体系，参与党内事务与选举布局，并于2024年以副总统候选人身份参与大选，再度进入全国政治舞台。在两岸议题上，其立场强调降低对抗与恢复沟通，但同时主张在现阶段不具备推动统一谈判的条件。"
 CHI_hung_chi_chang_desc: "洪奇昌，中华民国政治人物与精神科医师，民主进步党创党元老之一，在党内长期具有高度辈分与人脉影响力，其政治轨迹横跨党外运动、立法体系与两岸事务领域。\n\n洪奇昌1951年出生于彰化，早年从事精神医学工作，曾任马偕医院与台大医院精神科医师，是台湾少数由医学专业直接转入政治领域的早期代表人物之一。1980年代参与党外运动，并成为民进党创党十八人小组成员，在台湾民主化进程中扮演重要角色。\n\n进入体制后，他连续当选多届立法委员，并曾任国民大会代表，逐步累积政治资源与派系影响力。在党内，他长期担任“新潮流系”核心人物，与邱义仁、吴乃仁、林浊水并称为该派系的重要领导人物之一，属于民进党早期权力结构中的关键成员。\n\n其政治影响力不仅体现在公职经历，更来自广泛的人脉网络与资源整合能力。洪奇昌在党内有“造王者”之称，曾提携多名后辈政治人物进入政坛，包括赖清德等人，其角色更接近政治组织者与幕后协调者。"
 CHI_cai_yanming_desc: "蔡衍明，中华民国企业家，旺旺集团创办人兼董事长，同时为旺旺中时媒体集团核心掌控者之一，其事业横跨食品制造与媒体产业，是少数在两岸与传媒领域同时具备影响力的商业人物。\n\n蔡衍明1957年出生于台北，出身商人世家，早年即参与家族企业经营。1980年代创立旺旺品牌，以米果产品迅速打开市场，并在台湾食品业中占据一席之地。其后，他将事业重心转向中国大陆市场，成为较早一批大规模赴陆投资的台商之一，推动企业规模迅速扩张。\n\n在企业发展上，蔡衍明采取跨区域布局策略，使旺旺集团成长为涵盖食品制造、流通与国际市场的综合性企业，并于新加坡、香港等地资本市场运作，逐步建立跨国企业体系。\n\n2008年前后，他以个人及家族资金收购中国时报集团及相关电视媒体，整合为旺旺中时媒体集团，正式进入媒体产业。这一举动使其由单纯企业经营者转变为同时掌握舆论资源的资本力量，也引发社会对媒体集中与言论影响力的讨论。"
 CHI_Chen_xinxing_desc: "陈信行，中华民国学者与社会运动参与者，现任世新大学社会发展研究所教授，长期活跃于左翼理论、劳工议题与科技社会研究领域，其角色兼具学术研究者与公共知识分子双重性质。\n\n他于1980年代在台湾解严前后参与学生运动，是当时学运世代的重要参与者之一。这段经历对其思想路径产生关键影响，使其逐步由社会运动参与者转向理论与实践并重的左翼学者。\n\n除学术工作外，他亦深度介入社会行动，尤其关注劳工权益议题，例如参与台湾RCA职业灾害诉讼，尝试将理论研究与现实社会问题结合，强化学术与实践之间的连结。\n\n陈信行明确认同马克思主义传统，并在部分论述中自称“毛派”，强调应重新评价包括文化大革命在内的历史经验，并主张对资本主义与全球权力结构进行系统性批判。这一立场在台湾学术与公共讨论中具有明显争议性。"
 CHI_Xu_yongming_desc: "徐永明，中华民国政治人物与政治学者，曾任时代力量党主席及不分区立法委员，其政治路径结合学术背景与新兴政党发展，是台湾第三势力政治的重要代表人物之一。\n\n他1966年出生于台中，学术训练完整，毕业于国立台湾大学政治学系，并取得美国密西根大学政治学博士学位，长期任教于东吴大学政治学系，研究领域涵盖选举行为、政党政治与经验政治理论。\n\n在进入政坛之前，徐永明即活跃于公共论述领域，常以学者身份参与媒体评论，被视为具有影响力的“名嘴型学者”。2015年前后参与时代力量筹组，推动其由社会运动转型为政党，并在2016年当选立法委员，进入国会体系。\n\n其在立法院期间，主要关注经济、财政与制度改革议题，并曾担任党团总召集人，在新兴政党中扮演组织与协调角色。随后出任时代力量党主席，成为该党在发展阶段的重要领导者之一。"
 CHI_Qiu_xianzhi_desc: "邱顯智，中华民国政治人物與人權律師，時代力量重要成員之一，曾任黨主席及立法委員，其政治路徑結合社會運動、法律實務與第三勢力政黨發展，屬於典型由公共運動進入體制政治的代表人物。\n\n邱顯智1976年出生於嘉義農村家庭，成長背景強調社會責任與公共參與。他原本志向醫學領域，後轉向法律，並赴德國海德堡大學深造，接受完整法學訓練。其求學與成長經歷，使其逐步形成以法律專業介入社會議題的路徑。\n\n返台後，他長期投入公益法律工作，參與多起具代表性的社會案件，包括冤案救援、勞工抗爭與公共事件辯護，如鄭性澤案、關廠工人案與太陽花學運等，並以義務律師身份介入，強調法律作為社會正義工具的功能。"
 CHI_Gao_yuting_desc: "高鈺婷，中华民国政治人物，時代力量成員，曾任黨主席與秘書長，其政治發展路徑由工程專業轉入公共事務，屬於新興政治世代中以技術背景參與政治的代表之一。\n\n她1985年出生於台灣，具工程學背景，畢業於國立臺灣科技大學電子工程研究所，早年任職於工業技術研究院，參與自主衛星研製等科技計畫，並曾擔任相關專案主持人。其職涯初期集中於高科技產業與國家科研體系。\n\n2014年前後，高鈺婷開始參與社會運動組織「島國前進」，逐步接觸公共議題與政治行動。其後加入時代力量，從基層幕僚與政策工作做起，曾參與邱顯智立委選戰團隊，並歷任決策委員、副秘書長等職，逐步進入政黨核心運作。"
 CHI_Chen_Jiaohua_desc: "陈椒华，中华民国政治人物与环境运动人士，曾任时代力量党主席及不分区立法委员，其政治路径由长期社会运动转入体制政治，是台湾环保运动进入国会的重要代表人物之一。\n\n她1959年出生于台湾，具药学与环境相关学术背景，曾任嘉南药理大学副教授，并从事食品与环境领域研究。在进入政治之前，陈椒华已长期活跃于民间环保团体，历任台湾环境保护联盟会长等职，是台湾早期环境运动的重要参与者之一。\n\n其公共行动以环境议题为核心，长期关注垃圾掩埋场争议、石化污染、电磁辐射危害与水资源保护等问题，并参与多起地方抗争运动。在反对台南东山掩埋场等事件中，她曾遭遇暴力攻击，这些经历强化了其行动主义形象，也使其在环保界被称为“环境铁娘子”。"
