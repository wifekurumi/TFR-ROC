##
 CHI_duty_of_the_helmsman_desc: "若是十年前你在路上隨機街訪一位路人，大家嘴上說著台灣怎麼好、哪裡好，可當你問了些比較尖銳的問題，他們會跟你說讀書要去歐美讀、工廠要移到大陸最划算，出生在這座島上的人們對自己國家的未來沒有半點希望。幾十年來從來沒有一位船長駕著福爾摩沙挺過所有難關，所有人眼睜睜的看著船底漏水，卻沒有一個人嘗試去修復這艘破船，大家就這樣看著船艙進入水中，能跳船的就跳船、跳不了船的就在甲板上等死。\n\n這種情況最終迎來轉機，韓國瑜總統在中華民國最艱難的時候挑起大樑，成功帶著船上的人穿過一個又一個風暴，大家也都被韓國瑜親民的形象感召，一步步跟著韓總指示修復這艘破爛不堪的破船。\n\n這艘船現在正以全新的面貌在大洋之上飛速馳乘，眼前的問題都得到充分解決，然下一場更大的風暴悄然降臨，無論到時台灣人會面對多少風雨，他們都相信在韓國瑜總統的指揮下，一定能在一次挺過難關!"
 CHI_march_into_the_waves_desc: "伴隨著台海戰爭後亞洲兩大軍事集團的對壘之勢愈發明確，另一場冷戰已經開始了；數不清的艦船、飛機、火炮和戰車從產線上走下，數以千百計的戰爭推演被進行，烈焰即將再度升騰。\n\n但我們已經和那場戰爭時截然不同了，我們不是任人宰割的跳板，我們是龍...我們是東亞之龍!"
 CHI_focus_on_polwar_core_desc: "過去由於基層輔導長嚴重缺員，政戰學院或ROTC畢業的少尉初官，經常直接派任連輔導長，缺乏帶兵與戰術經驗。\n\n如今有大幅強化指揮作戰之需要，所有尚未相關指揮經驗的輔導長將重新接受數月兵科訓練，而新進畢業軍官也需有擔任一年排長的歷練經驗。"
 CHI_external_political_warfare_bureau_desc: "我們已經獲得世界承認，沒有誰能夠阻止我們的外交工作，政府要動用一切的外交力量與世界接洽，左起社會主義右至君主主義，只要是個國家都是值得我們接觸的對象。"
 CHI_welcome_home_children_desc: "韓國瑜總統發布的台北演說獲得了巨大的成功，台海戰爭時期離開祖國的台灣人、更早之前移民到其他國家的台灣人與嚮往自由民主的海外華人陸續慕名前來，讓我們去歡迎他們再度踏上這個國家吧。"
 CHI_mainland_peoples_liaison_desc: "中國大陸內部並不是鐵板一塊，有許多不認同專制集權的民主人士暗中活動著，有很長一段時間，對岸的民主人士無法透過穩定的管道與我國接洽，如今我們要成立專職部分與他們進行接洽來蒐集對岸軍、民情資。"
 CHI_central_political_warfare_committee_desc: "過去在政治作戰方面一直是由軍隊與對岸來進行對抗，可時代已經改變，政治作戰不僅限於這小小的範圍，它擴及生活的方方面面，我們需要設立最高等級的政戰機構統合所有部門對抗或反擊中華人民共和國的政治作戰。"
 CHI_expand_the_defense_line_desc: "北約最重要的核心宗旨——集體防禦，指當任意成員國遭受攻擊時將視為對全體成員的攻擊，這點對參照北約成立的太約也是同理，我們不是只是躲在島嶼上防禦就沒事了，我們要延伸防禦線，捍衛盟友的國界跟捍衛我們的一樣重要。"
 CHI_pacific_military_exercise_desc: "即使是團結合作的太約聯合艦隊也沒有把握再打敗一次解放軍新編組的海軍，經過共同商議一致決定得在南海至少施行一次聯合演習確保能夠把解放軍海軍堵死在他們家門口。"
 CHI_the_giant_returns_desc: "據衛星和潛伏在中共的太約間諜回傳的情報指出，解放軍最近有可疑的人令調動和裝備轉移的痕跡，大量的裝甲車與坦克被送到鴨綠江附近的軍事基地，聯合司令部的高層研判中共可能會透過北韓發動第二次韓戰乃至引發整起大亞洲戰爭，我們必須搶在戰爭發生之前盡速將所有裝備與士兵集結完畢。"
 CHI_underground_assenmly_point_desc: "上次的戰爭中，解放軍第一輪的飛彈齊射為為我軍造成了些許損失，聯合軍在太約創始三國將領的建議之下將部隊分散式部署在地下建築中，裝甲類車輛與戰機則藏匿在防空掩體之中。"
 CHI_thus_spoke_thucydides_desc: "修昔底德陷阱——當某個區域有兩大強權崛起時可能會因為對對方的恐懼造成戰略誤判引發一場毀滅性戰爭。\n\n美國陷入內戰之後中國共產黨領導的共產中國被世界認為是無庸置疑的地方霸權，但是太約在台海的勝利與迅速崛起打破了世人的認知，這個東亞霸主不是無法被推倒的高牆。\n\n如今中國走出戰爭的陰霾，太約加深彼此合作形成一體化的軍事集團，雙方在東南亞的外交博弈激化了亞洲的緊張關係，而這顆宣戰的按鈕終於被按下，東亞再次重燃戰火......"
 CHI_eastern_terrain_mapping_desc: "在韓戰時期，蔣介石政府曾經向美國提議從福建登錄中國分散解放軍的兵力遭到美國否決，這份計畫再度被提出時引起了太約高層的興趣。經過表決後同意以中華民國為主帶領部分部隊對福建沿海登錄襲擾。\n\n現在要測繪對岸現在的沿海地形尋找適合登錄的地區。"
 CHI_coverage_priority_tactics_desc: "對岸的防禦火炮著實煩人，如果想盡可能保證有生力量登陸上岸就必須摧毀敵人的岸防火炮，遺憾的是，大約的空軍主力正在朝鮮半島與東協交戰，我們沒有足夠的空中力量完成轟炸任務，目前只能採取讓戰艦火炮轟炸並用無人機蜂群戰術的方式清理敵人。"
 CHI_surpass_overlord_desc: "1961年到1972年期間，蔣介石政府為反攻大陸召集海陸空三軍菁英所規劃的打規模作戰計畫，目的透過登陸福建與位於金三角區域的泰緬孤軍互相配合分散吸引解放軍的戰鬥力，最後該項計畫在美國的拒絕支持與情報外洩之下不了了之。\n\n如今我們有整個太約的支持，南方有印軍為主力的聯軍部隊分散注意，北方有日韓聯軍與北韓、中國鏖戰，我們終於能施行這份被放棄的計畫了。"
 CHI_northern_joint_command_desc: "朝鮮半島北部地形山多複雜，如果要順利推進那取得制空權便是必要事項，國軍必須盡速與日韓將領接洽協調太約聯軍指揮事宜，以快速進行聯合調度避免受到空戰的波及。"
 CHI_the_hunter_desc: "東亞地區最大規模的朝鮮空戰即將爆發，雙方的戰機迅速被集結至此，若是戰敗可能會對空中力量與整場戰局造成不可逆的打擊，除了仰賴飛行員的高竿技術之外，也要與陸、海軍的防空力量聯合作戰。"
 CHI_operation_peak_leaper_desc: "飛越金剛，跨越長白，我們將直搗北京上空。\n\n千機競發，遮天蔽日，我們將稱霸東北蒼穹。\n\n讓東協的飛機如流星雨般墜下，讓陣亡者的訃告如雪花般飛進敵人的家裡。\n\n我們是太約的飛行員，我們最終將凱旋歸來。"
 CHI_asia_pacific_armament_desc: "東協人數眾多，哪怕太約所有成員的兵力加起來才能勉強抗衡，我們要在多個地點部署遲滯用的部隊來讓東協疲於應對，甚至以多條路線同時進攻保證東協軍隊無法順利支援。"
 CHI_rekindle_confidence_desc: "成功了！多方面同時進攻的作戰開始奏效，這對國軍乃至整個太約來說都是重大的鼓舞，中華人民共和國的領土已然不再完整，國軍跨越近80年的光陰再度踏上這個令他們感到陌生的固有領土，他們還不能就此停下，戰線要持續不斷的向前推進，直到這面籠罩在大陸上空的紅色五星旗被拔除為止。"
 CHI_changbai_foothills_desc: "長白山，朝鮮族的聖山，現在，這座聖山是太約進入中國東北地區的最大阻礙，在1952年後被割讓給朝鮮的長白山部分，幾乎毫無任何基建，部隊難以通過，即使是到了西北方向的中共控制部分，也只有在旅遊開發區內有幾條易守難攻的山區大道，因此我們要對山地作戰做好完全準備。"
 CHI_under_yinshan_desc: "「但使龍城飛將在，不教胡馬度陰山。」-唐代的大詩人王昌齡曾經寫下這句詩詞，現在正如歷史上的霍去病，岳飛等民族英雄，我們現在便要驅逐奪取中國的俄寇-“中共”，爲了實現這個目標，我們便要打開從東北地區打開進入蒙古的通路，對中共的心臟和大腦-北京達成包圍勢態，但是在東北的失敗之後，中共已經在陰山山脈這片一千年前就是中原王朝抵禦北方的重要屏障的山脈中，修建了大量的堅固防禦工事。並且執行了堅壁清野的焦土作戰，希望以漫漫草原來逼退我們。而且一馬平川的草原極其適合中共的機械化合成旅進攻。草原上的作戰對我們的士兵和後勤都是極大考驗，我們需要對在草原上的作戰做出萬全的準備。"
 CHI_waves_of_nujiang_desc: "怒江傈僳族自治州，在這個中緬邊境的自治州中，怒江將這片土地一分爲二，中共解放軍已經在邊境線和怒江以東沿岸布防.中緬邊境在和平時期，便以崇山峻嶺和大量的鐵絲網邊境牆組成，以阻攔緬甸黑幫與詐騙犯和偷渡客進入中國.在戰爭有進入雲南的趨勢後，中共以原來的邊境線爲基礎修建了大量半永固防禦公事，在怒江以東還準備了第二道防線，再加上中緬邊境極差的交通條件，少數能通過的地區也被中共解放軍嚴防死守，因此，我們在此處肯定要面對一場慘烈的山地，兩棲加攻堅複合戰役，需要對此做出萬全的準備。"
 CHI_among_the_mountains_desc: "山高地勢僻，碧落接玲瓏。銀世界不夜，玉玲瓏有風。」-喜馬拉雅山脈這座世界第一高峰所在的山脈，隔開了印度與西藏，而且中共方居高臨下可以方便的攻擊印度。而我們想進入西藏，就要翻過這片世界屋簷或者走平坦而又狹小的克什米爾地區，面臨一場艱難的戰爭，考慮到後勤的難度，最終決定以克什米爾為主攻方向，輔以精英山地部隊翻過喜馬拉雅山脈襲擾敵軍的方式進攻西藏地區，為了攀登高山，我們需要做好萬全準備，以面對高原反應，寒風暴雪，低氣壓等高原的難題。"
 CHI_land_of_abundance_desc: "天府之國四川盆地，當初在1937到1945年的抗戰歲月，這裏曾經是中華民國的陪都，抗戰中國民政府的所在地，在1948年，國民政府也曾經試着守住該地，四川盆地自古以來便是易守難攻之地。蜀漢，成漢，大西等諸多政權都借助着天府之國易守難攻的地形抵禦着強敵，在雲南的失敗後，PLA也在此地借助地形建立起了防禦工事。好消息是在21世紀後，中共在四川修建了大量道路，進攻路線的選擇和補給的方便程度要比起雲南好的多。壞消息則是，這些道路上多是由大量隧道打通山脈而成的，只要炸毀隧道我們的進攻就會受到極大阻礙，進攻四川必然是對山地和工兵部隊的極大考驗，我們需要做好萬全準備。"
 CHI_jiangnan_mist_and_rain_desc: "「南朝四百八十寺，多少樓台煙雨中。」，某種意義上，中華民國也是這些南朝中的一個，1949年，先 蔣中正 總統離開江南故居，前往臺灣，他在當時潸然淚下，不知道何時能會到寧波，回到這煙雨江南。我們現在將可以做出回答：正是現在！我們將在浙江省內展開登錄作戰，參考目標爲被杭州，蔣中正總統的故鄉-寧波等城市，以打開對南京和上海的路線。"
 CHI_gather_at_yangtze_desc: "「朱雀橋邊野草花，烏衣巷口夕陽斜。舊時王謝堂前燕，飛入尋常百姓家。」南京作為六朝古都，是自古以來的名城，也是我國的法定首都。但國民政府在民國三十八年，不得不離開這座美麗的六朝古都。這座多災多難的首都，先后被滿族，軍閥，日本人，共產黨不斷傷害。隨著沿海地區的登錄大功告成，打開了通向江浙地區的道路，我們已經距離我們的首都和中國經濟重鎮-上海只有一步之遙，但此地水網密佈又是經濟富裕地區，城市化率極高，我們在此地雖然交通與補給方便，但是必將面臨極大的跨河作戰與城市作戰需求，我們需要對此做好準備，確保回到首都的戰場打得乾淨漂亮。"
 CHI_land_of_milk_and_jujube_desc: "「明月出天山，蒼茫云海間。」這正是李白描寫巍峨的天山與明月交相輝映的壯闊景象。中華民國尚在大陸之時，至民國三十二年民國國軍進入新疆以來，國軍以榮譽與忠誠守護著新疆，三十三年「三區暴亂」爆發，蘇聯直接派出部隊配合叛亂者都沒能將新疆從中國分離出去，直到民國三十八年，大勢已去，甘肅省全境佔領都被占領後才不得已向中共投降，隨後，中共的新疆建設兵團一直以刺刀和攝像頭控制著新疆。現在，我們已經控制了青藏高原，可以從高原上居高臨下，以猛虎下山之勢光復新疆。"
