 CHI_destroyed_country: "破败之国"
 CHI_destroyed_country_desc: "尽管战争已经结束，我们的国家却再也无法回到从前。警报声仍在民众耳畔回响，导弹袭击、空袭与炮火不仅摧毁了我们的公路网，更重创了铁路系统和地铁运营。战后通勤时间已延长至战前的三倍，而更糟糕的是，我们的制造业也遭受毁灭性打击。遍布全岛的科研园区遭到针对性军事打击的蹂躏，外资纷纷撤离我国的投资市场。若想重振我国作为全球科技枢纽的地位，需我国政府与盟友携手合作，共同付出巨大努力。"
