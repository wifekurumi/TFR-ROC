 CHI_american_protection_idea: "美國的保護"
 CHI_american_protection_idea_desc: "僅憑國軍自身的武力，明顯無法單獨抵抗中共，之所以和平得以維持，全依賴於美國的政策，也就是現狀不容更改。\n\n第七艦隊有如定海神針一般，維系著台海的脆弱穩定，然而堅強的盾牌同時也意味著另一件事：一旦失去依靠，敵人便將襲來。"
 CHI_taiwanese_independence_movement_idea: "台灣獨立運動"
 CHI_taiwanese_independence_movement_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\n中華民國，也可稱呼為台灣，近幾年來則是以中華民國台灣作為稱呼，以上描述可見這個地區意識形態的混亂，沒錯，我們甚至在國際上不被認為是一個國家，這正是台獨運動的濫觴。\n\n自從退出聯合國，中華民國的國際地位便一落千丈，這也讓本土意識開始萌芽，並在之後的民主運動中徹底站上舞台，並獲取政權。\n\n盡管如此，認同維持現狀的人依舊占據社會上的絕大多數，距離正名之路依然遙遠。"
 CHI_taiwanese_independence_movement_2_idea: "台灣獨立運動"
 CHI_taiwanese_independence_movement_2_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\n中華民國，也可稱呼為台灣，近幾年來則是以中華民國台灣作為稱呼，以上描述可見這個地區意識形態的混亂，沒錯，我們甚至在國際上不被認為是一個國家，這正是台獨運動的濫觴。\n\n自從退出聯合國，中華民國的國際地位便一落千丈，這也讓本土意識開始萌芽，並在之後的民主運動中徹底站上舞台，並獲取政權。\n\n盡管如此，認同維持現狀的人依舊占據社會上的絕大多數，距離正名之路依然遙遠。"
 CHI_lower_mainland_influence_idea: "極低大陸影響"
 CHI_lower_mainland_influence_idea_desc: "\n\n\n\n£GFX_CHI_terrible_mainland_influence_banner\n\n\n\n\n\n在上個世紀，我們曾經屹立於中華大地之上，直到內戰爆發，來自各方面因素的失利導致我們不得已播遷來台，也因此失去對大陸的掌控。\n\n時過境遷，如今中華民國在大陸人民的印象中，普遍已經成為歷史名詞，而稍有知悉的人則會抱有極度負面的看法，而我們的支持者也被認為是網路上的可笑思想。"
