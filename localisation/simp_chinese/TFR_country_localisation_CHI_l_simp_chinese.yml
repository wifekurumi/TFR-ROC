#{過渡國策
 CHI_Victory_of_the_wounded: "流血者之凱旋"
 CHI_Victory_of_the_wounded_desc: "殘酷的戰爭讓我們失去了不少同胞，從前線歸來士兵們身上攜帶著大大小小的傷口、臉上充斥著這一年來戰鬥的疲憊，儘管之後還有堆積如山的工作，不過現在先歡迎他們的凱旋吧。"
 CHI_Survivor_celebration: "倖存者之歡慶"
 CHI_Survivor_celebration_desc: "人們從避難所裡走了出來，相互擁抱著為戰爭的結束歡呼。\n化作廢墟的家園固然令人心痛，但身邊親朋好友的存在沖散的悲傷的情緒，年邁的老人跪天謝地、做父母的擁抱著孩子們哭泣、年輕的學生回想起學業考試心中泛起一陣酸楚、幼小的孩子們為能自由奔跑而歡笑。\n人還活著就會有希望。"
 CHI_Self_sutureing_trauma: "自我縫合創傷…"
 CHI_Self_sutureing_trauma_desc: "我們贏了......但付出的代價超乎所有人的想像。自打1949年國軍撤退以來，台灣整整3代人從未親眼見識過戰爭的殘酷。當老兵逐漸凋零，台灣人對戰爭的印象也只剩下電視劇和遊戲裡那些所向披靡的主角的故事。\n可現在，現實的在我們心中割下一道難以抹滅的傷痕，導彈和炸彈撕開每一座城市、雪片般的訃告擊碎一對對父母的盼望。世界仍在前進，生者也不能永遠只沉浸在過往的傷痛之中，無論過去發生了什麼，台灣還是會繼續前進的。"
 CHI_Eliminate_communist_traitors: "消滅親共國賊"
 CHI_Eliminate_communist_traitors_desc: "能夠擊退海峽對岸的紅色巨龍，所有英勇的將士和敢於冲在第一線提供民防協助的國民功不可沒。\n但是有這麼一類人，他們嘴上喊著保衛台灣，背地裡卻悄悄將台灣島上的軍事情資洩漏給解放軍，這些人被稱為「第五縱隊」，近30年來中共透過各類渠道開始接觸我國的退役將官，不少軍官至中華民國於不顧，出售不少看似無害的圖資。\n政府過往為顧及兩岸和諧之關係選擇對此睜一隻眼閉一隻眼，現在中共侵略台灣的企圖已被挫敗，是時候整治這些潛藏在國民裡的害群之馬了。"
 CHI_Preserving_diverse_voices: "保留多元聲音"
 CHI_Preserving_diverse_voices_desc: "自1987年蔣經國總統宣告解嚴已過了快40個年頭，經過當年黨外人士的不懈努力台灣才正式步入民主時代，人民終於可以暢所欲言，在公開場合宣揚自己的政治理念，國民黨、民進黨；獨派、統派；主戰派、主和派，大家依據自身的理想行動著，一同共同塑造了台灣政治的面貌。\n如今，中華民國的頑強意志向世界證明自由地區仍屹立於世，正是社會各界在戰時攜手合作，才讓我們撐過這場風暴，昨日如此、明日亦然。"
 CHI_Lifting_martial_law: "解除戒嚴"
 CHI_Lifting_martial_law_desc: "戰爭結束了......部分自由派對於政府戰後持續進行言論、人權控管表達不滿。\n在過去，國民黨一黨專政時期已經經歷過了長達38年的戒嚴時期，社會大眾恐懼著是否再迎來影響一兩個世代的自由壓迫，在一切還沒失控前人們決定開始組織遊行表達訴求，按照法律來說政府應該派出警力將其全部逮捕，但......我們不可以重蹈覆轍。"
 CHI_Restart_Temporary_Provisions: "宣布進入§R動員戡亂時期§!"
 CHI_Restart_Temporary_Provisions_desc: "戰爭結束了......但國家內部還有許多可惡的反叛份子。\n即使我國贏得台海戰爭，被對岸吸納的叛徒們仍不遺余力的嘗試分化我國的團結。過去國民黨啟動動員戡亂臨時條例時成功逮捕不少共產黨相關人士以避免台灣遭到赤化，也許我們應該參考過去的經驗來面對不安定的社會，未來的歷史課本可能會嚴肅的抨擊這段時期，但有句話說的好：「捨不得拖鞋套不著狼。」"
 CHI_Plum_blossoms_bloom_in_the_bitter_winter: "梅花自寒冬吐蕊"
 CHI_Plum_blossoms_bloom_in_the_bitter_winter_desc: "南國寒輕山自碧，庭際梅花，先報春消息。現在，島內局勢已初步穩定、海對岸也沒有更多的動作，我們終於能夠騰出手來處理那些更加重要的事物了。"
