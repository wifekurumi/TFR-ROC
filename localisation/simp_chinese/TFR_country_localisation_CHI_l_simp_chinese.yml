 CHI_thenationisinperil: "國家危難之時"
 CHI_thenationisinperil_desc: ":長久以來籠罩在海峽上空的緊張陰影，終於化為現實。對岸的軍事行動不再只是威嚇與演訓，飛彈、戰機與艦隊正實際威脅著我們的家園。城市進入警戒狀態，後備動員與戰備部署同步展開，社會從日常節奏迅速轉入戰時體制。這不再是外交與政治的問題，而是關乎生存與意志的考驗，在國家危難之時，分歧與猶豫已沒有空間。"
 CHI_Anticommunist_determination: "反共決心"
 CHI_Anticommunist_determination_desc: "長期以來，兩岸在對立與交流之間維持著脆弱的平衡。然而當對岸以武力與威嚇作為手段，這種平衡已不復存在。面對來自對岸的軍事壓力與政治企圖，我們必須向內外清楚表明立場：保衛現有的生活方式與制度，絕不在威脅下動搖。"
 CHI_Recall_conscripts: "召回義務役"
 CHI_Recall_conscripts_desc: "隨著局勢急遽惡化，現有常備部隊的人力難以滿足全面戰備需求，我們將會徵招過去完成服役、回歸社會的義務役官兵，曾接受完整的基礎軍事訓練的義務役是最能在短時間內補充戰力的人員來源。"
 CHI_National_Spiritual_Mobilization: "國民精神總動員"
 CHI_National_Spiritual_Mobilization_desc: "當戰火逼近家園，僅有軍隊的準備遠遠不足。真正支撐國家渡過危機的，是全體國民的意志與行動。政府將透過宣導、組織與社會動員，凝聚全民對防衛家園的共識，使民間力量能在後勤支援、民防協助與資訊傳遞上發揮關鍵作用。在這個時刻，每一位國民都是國家防線的一部分。"
 CHI_Temporary_formation_number: "臨時組建番號"
 CHI_Temporary_formation_number_desc: "全民防衛的理念，在千年前的《管子·君臣上》便有紀載：「與民為一體，則是以國守國，以民守民也。」可見國家的防衛並不是少數人的任務，而是需要全民的共同努力。 為落實全民動員的政策，總統府指示國防部成立「全動署」。其最重要的目的除了要推動後備動員改革，讓國家達成「後備動員合一」、「常後一體」、「跨部會合作」三大目標外，更是要向國人表達， 政府推動全民國防的決心。面對科技進步帶來的新型態戰爭與非傳統軍事威脅，守護國家安全不僅是國軍的任務，更是全民應該要共同承擔的責任。唯有建立並落實全民防衛的觀念，才能打造最堅實的國防，守護我們的家園。我們要向世界展現我們「不畏戰，不求戰」的決心，以及我們守護國家的堅定意志。"
 CHI_Strengthen_coastal_defense: "強化岸防"
 CHI_Strengthen_coastal_defense_desc: ":面對來自海上的威脅，漫長的海岸線既是天然屏障，也是潛在破口。敵方若試圖自海上突破，我們必須在第一時間於灘頭與港灣外圍形成嚴密防線。政府將加強岸際監控、工事構築與兵力部署，整合陸海空與民防資源，確保任何異常動向都能被迅速發現並有效應對。只要海岸線仍牢牢掌握在我們手中，國土防衛就仍握有關鍵主動權。"
 CHI_Not_step_back: "為了自由的國家"
 CHI_Not_step_back_desc: "回望過去，國民革命軍在國共內戰中節節失利，最終退守臺灣，才得以保存中華民國最後的自由土地。如今，歷史的陰影再次籠罩海峽。對岸的軍事壓力不再只是威嚇，而是真正迫近我們的家園。若再有退讓，將不會有第二個可以退守的地方。"
 CHI_Fight_to_the_death: "死戰不退"
 CHI_Fight_to_the_death_desc: "如今獨裁的陰影已完全降臨這座島嶼，為了我們的家人，為了我們的國家，為了那些奮不顧身保家衛國的身影，以及為了讓他們的血不再白流，我們退無可退。"
 CHI_Requesting_material_assistance_from_allies: "請求盟友物資援助"
 CHI_Requesting_material_assistance_from_allies_desc: "當專制獨裁的中共向我們宣戰的那一刻，中華人民共和國政府的侵略者本質已經在國際社會一覽無餘。但是中華民國不同，中華民國是自由和民主的國度，我們的戰爭是保家衛國的反侵略正義戰爭，當世界各國認清中共政權的真面目時，中共政府將承受前所未有的制裁，同時，中華民國的日本，歐洲朋友會對我們伸出援手，因為它們知道，如果讓中國突破了第一島鏈，對於沒有美國的自由世界將意味著什麼，因此我們會向我們的盟友請求援助。"
 CHI_Remove_old_equipment: "取出舊裝備"
 CHI_Remove_old_equipment_desc: "台灣的軍事裝備就算不以國際標準來評價也不算是很好，志願役官兵們對手上的現役武器抱怨不斷，保養工序耗時費力、器材帳目對不上甚至鋼盔內襯長年沒清洗等等皆為常態，更何況是那些堆積在倉庫裡的武器彈藥呢?"
 CHI_Strategic_Traffic_Control_Center: "戰略交通管制中心"
 CHI_Strategic_Traffic_Control_Center_desc: "戰爭烽火的重燃已使烈焰升騰在台灣海峽，正常生活的願景在短期內已經不可能實現。我們的人民不得不告別70年的和平，接受未知的戰爭生活的現實。為了軍事調動和民眾安全，我們將會成立交通管制中心，公民的日常交通將會被限制，這雖然是侵犯個人自由之舉，但面對中共勝利後的統治，短暫的戰時政策是必要的"
 CHI_Wartime_resource_allocation: "協調盟友轟炸行動"
 CHI_Wartime_resource_allocation_desc: "我們的求援得到了回應，中華民國的盟友與我們站在一起，共同為了自由的世界反抗中共赤色魔鬼。澳大利亞和日本的聯合空軍已經針對中共海上單位和陸上單位做出了轟炸部署，中華民國空軍將會協助他們，一同打擊中共軍隊的傲氣。儘管國軍空軍和解放軍爭奪制空權十分困難，但是我們的盟友已經承諾幫助我們進行空中作戰，在盟友強大的空軍聯隊協助下，國軍空軍將會有和解放軍空軍一搏的能力"
 CHI_Defend_Taiwan: "保衛台灣"
 CHI_Defend_Taiwan_desc: ""
 CHI_from_Taiwan: "台灣尚勇"
 CHI_from_Taiwan_desc: "在承平時代，對內治安的重任由台灣警方負責，從基層員警到快打部隊，專精不同領域的層層部門構成了台灣治安的基石。過去總有立委戲稱警察為「第二陸軍」，這種說法是錯誤的，即便在戰時保障社會秩序依然得仰賴警方支援才可做到，逮捕那些不法份子之外也能夠防範共軍對我方社會秩序和軍心的打擊。"
 CHI_Mobilize_police_force_to_maintain_order: "動員警力維持秩序"
 CHI_Mobilize_police_force_to_maintain_order_desc: ""
 CHI_Wartime_normal_system: "戰時常態制度"
 CHI_Wartime_normal_system_desc: ""
 CHI_Martial_law_declared: "宣佈戒嚴"
 CHI_Martial_law_declared_desc: "我們並非要走回頭路，而是在非常時期為了守護這座島嶼所做的非常決定。當危機解除，權力也將回歸常態。"
 CHI_Arresting_traitors: "抓捕通敵者"
 CHI_Arresting_traitors_desc: "當戰爭逼近，威脅不僅來自邊境之外，也可能潛伏於國境之內。情報顯示，部分勢力正暗中配合敵方行動，透過散播謠言、蒐集資訊與動搖民心，試圖從內部削弱我們的抵抗能力。"
 CHI_Inciting_democracyactivists_withinChina: "煽動中國境內民運人士"
 CHI_Inciting_democracyactivists_withinChina_desc: "臺海戰火陰影下，戰場並不只存在於海峽與空域。真正撼動中共體制根基的，往往是長久被壓抑卻從未消失的聲音。"
 CHI_Frogmen_infiltrate_Fujian: "蛙人滲透福建"
 CHI_Frogmen_infiltrate_Fujian_desc: ""
 CHI_Protect_the_homeland: "保家衛國"
 CHI_Protect_the_homeland_desc: "自1996年民主化以來，民主制度無數次在島嶼上完成了權力的和平交替，但海峽對岸的陰影卻隨之加深。當外部壓力升高，這場戰爭已不再只是軍事衝突，而是對臺灣數十年發展歷程的全面考驗。"
 CHI_Onelifeonthesameisland: "§3同§G島§W一§R命§!§!§!§!"
 CHI_Onelifeonthesameisland_desc: ":我們做到了，中華民國撐過了這場戰爭最艱難的時刻，當全世界的軍事專家皆認為我們無法撐過三個月時，國軍將士們在前線的頑強抵抗成功證明了中華民國尚勇無畏。現在中共企圖快速消滅台灣的閃電戰計畫已經宣告破產，解放軍的攻勢將會逐漸放緩，而中共政府所遭受的制裁卻不會隨之減少，當中國大陸四處民怨沸騰之時，就是我們歡慶勝利之刻！"
