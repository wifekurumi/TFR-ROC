 CHI_hold_general_election_as_scheduled_desc: "又到了四年一度的投票日，可這一次，似乎真的和過去有所不同。往日那種候選人的掃街拜票和造勢活動已不復見，人們圍坐在收音機旁聽著今年的選舉須知，拄著拐杖的退伍老兵跟戰友們在榮民之家盯著大堂的收音機、下了班的爸爸拉著剛放學的女兒打開電視、課堂裡大學生全都注視著手機裡的直播串流。\n明天一整天，人們都將放下手邊的工作，在小學教室、在體育館、在臨時搭建起來的帳篷裡接過選票，蓋上印章、投入票匭，所有人心裡都清楚，自己手中的一票將真正決定社會的未來。"
