 CHI_Economy_Industry_desc: "我們成功守住了我們的家園，但代價卻沉重到讓我們難以承受，在經濟方面更是如此，共軍的登陸作戰系統性地摧毀我們的水電基礎設施，臨海工業區更是在交戰中遭受嚴重破壞。我們需要坐下來好好想一想，政府能做什麼、該做什麼以及該怎麼做。"
 CHI_Rebulid_7th_CT_desc: "依據行政院臺灣國際商港未來發展及建設計畫(106～110年)-第2次修正計畫書辦理「高雄港第七貨櫃中心計畫」，並於108年4月24日奉行政院核定。\n但戰爭到來及共軍駭人轟炸重創了整個港區，也使得計畫中應於2024年中完工的第七貨櫃中心進度幾近歸零。\n中央政府已經批准對計畫提供更多資源的提議，以確保第七貨櫃中心能如期完工。\n第七貨櫃中心規劃興建5座深水碼頭及149公頃後線場地，未來可供停靠全球最大之2.4萬TEU貨櫃輪。其中第一期2.5座碼頭及後線新生地填築已於「高雄港洲際貨櫃中心」工程計畫中辦理並於108年5月完工，並於日前修復完成，本計畫接續興建包含第二期2.5座碼頭、51公頃新生地填築工程、後線貨櫃場地及相關設施、營運管理大樓及32棟附屬建物等貨櫃碼頭相關營運基礎設施，打造以儲運能量達450萬TEU/年以上之大型自動化貨櫃基地。"
 CHI_Way_Of_Can_To_Asia_desc: "如今全球都身陷戰爭的焰火或戰後的瓦礫中，糧食供應緊張，在戰後追求快速恢復工業體系的我國應該大力投資軍用口糧與罐頭的生產，帶動新時代農業與輕工業的發展並創造外匯與增加糧食儲備，為發展重工業與應對其他危機做準備。"
 CHI_Expand_FPG_desc: "台塑企業（Formosa Plastics Group）是以石化工業起家的台灣跨國企業，目前事業版圖已橫跨煉油、塑膠、纖維、電子材料、綠能、生醫及鋼鐵等多角化領域。\n如果要重新讓台灣工業體系迅速崛起，政府介入、擴增台塑業務是更快的選擇，利用其已統整完畢的企業體系實現快速發展。"
 CHI_From_Material_To_Product_desc: ""
 CHI_Civil_Military_Supply_Chain_desc: "目前我國對基本軍需品的需求已經超過軍工廠的極限產能，與其花費大量金錢與時間建立全新的軍用工廠，不如投資民間企業將基本的軍需品外包給民間企業，同時也能吸收其先進的技術來改良生產過程。"
 CHI_Local_Heavy_Ind_desc: "上世紀70年代，政府大力投資重工業發展，大煉鋼廠、大造船廠、大煉油廠等大型重工業基地，噴吐的煙霧標誌著中華民國邁進工業化國家的輝煌時代。\n然而，高耗能的重化工業，很快就碰上石油危機而無以為繼。政府官員因而在縮小重化工業投資範圍同時，大力鼓勵內外廠商投資積體電路、電腦等高科技產業，以耗能少、污染低、附加價值高的技術密集型科技產業取代重化工業。\n隨著台海戰爭和區域局勢緊張帶來的大量軍民用鋼材、軍用油品、戰車及船艦需求出現，重工業開始在焰火中緩緩復甦。\n為了讓我國在鋼材及軍工上獲得更大的自主性，應對可預見的危機，中央已經決定加大對重工業的支持。"
 CHI_Software_Tech_Park_desc: ""
 CHI_ROC_First_desc: "高雄軟體園區位於高雄市前鎮區的亞洲新灣區（臨海地帶），占地約 7.9 公頃。它跟傳統科學園區（如竹科、南科）那種滿是大型晶圓廠的廠房不同，高軟是由一棟棟充滿現代感的「科技辦公大樓」所組成。\n2010年代初快速成長為以數位內容、軟體開發為核心的生態圈後，在戰前已包含鴻海（軟體研發大樓）、智崴資訊（全球體感模擬設備龍頭）等知名企業。\n在臺海戰爭期間，因危險的地理處境及研發人員大多接受軍方招攬或出走國外，高軟再轉瞬之間沒落。為了讓高軟重振以往榮光，中央已經批准高軟園區重建計畫，搭配南部產業開發的各式計畫及我國科技業的蓬勃發展，帶動高軟再起。"
 CHI_Pacific_Trade_Zone_desc: ""
 CHI_Investment_From_EU_JP_desc: ""
 CHI_Free_Trade_desc: "政府決定延續過往的貿易政策，自由的市場能夠吸引更多的外資注入，比起緩慢的經濟復甦，這個國家的經濟更需要一劑效果更猛的藥物。"
 CHI_TARIFF_desc: ""
 CHI_Fiscal_Policy_Adjustment_desc: "台灣島上產業百廢待興，政府得重新思考與外國的貿易政策，低廉的關稅有助於降低物價但也可能導致本土搖搖欲墜的產業遭受嚴重打擊，但高昂的關稅也會導致物價上漲讓民眾怨聲載道。"
 CHI_Defence_Economic_Policy_desc: "雖然中華民國一直以來都會持續進行國產裝備的研發，但軍方始終把美械視為最主要的戰鬥武裝。自美國陷入內戰以後，國軍一直有裝備無法補充的問題，後來加入太約直至台海戰爭，軍人常因為武器無法及時抵達數次陷入危機。國防部痛定思痛，決心發展從上到下，最先進裝備的每個零件皆能由國家自行生產的完整軍工體系。"
 CHI_Complete_Military_Idustry_desc: "投注至軍工產業的經費預算順暢的通過了，除了輕型裝備的製造之外，我們應擴展產線，掌握大規模生產裝甲車輛、發動機引擎、船艦等能力，做到盟友無法及時支援也能獨立作戰數月的強大堅持能力。"
 CHI_NOMORE_Oil_Crisis_desc: "第四次石油危機給與我國經濟產生重大打擊，所幸政府即時與其他產油國取得聯繫並將火力為主的發電體系進行轉型才順利度過這場經濟浩劫。過度依賴外部的火力能源被證明不夠可靠，新的政府正打算繼續推行前代所留下的能源政策。"
 CHI_Maintain_Nuclear_Policy_desc: "自冷戰以來，核能科技一直被世人所恐懼，車諾比事故、福島核災一一加劇了人們內心的恐懼，我國的人民應該要明白，核能是最乾淨也是效率最高的能量來源，同時隨著建築技術的進步與科技的完善，新型的核電廠都具備抵抗高強度天災和火力攻擊的能力。如果要快速復興國家，就一定要考慮重新啟用核電。"
 CHI_Break_Solar_Monopoly_desc: "令人出乎意料的是，中華人民共和國擁有世界上最強的太陽能板科技與產能，世界八成的太陽能板皆是他們所生產的，有鑑於幾個月前我們曾跟他們發生過一場戰爭，恐怕他們不太願意跟我們「共享」這個綠色科技，我們只能另謀出路，決不能被對岸卡脖子！"
 CHI_Self_Sufficiency_desc: "世界的秩序已經被打破，地球村的美好願景已經崩毀，與外國共同合作發展太陽能科技或許能避免閉門造車的困境，但這個世界與外國合作已經是一件有風險的事情，最好還是自己能掌握整套生產體系會比較安全。"
 CHI_From_Downstream_To_Upstream_desc: "過去中國總是喊著「自行發展」、「不要被外國卡脖子」總是引來台灣人的訕笑，台灣人沒想過自己的國家也會有迎來獨立發展某樣科技的一天，如今我們已具備完整的生產體系，無論世界局勢如何變動都不會過度影響我們的太陽能產業。"
 CHI_outward_expansion_desc: "儘管有部分學者呼籲台灣應該建立只屬於自已的太陽能體系，但重新發展需要時間，我們正在與中共進行時間賽跑，若是中共突然發動偷襲可能會導致辛苦的成果功虧一簣。只以短期收益來看，與外國太陽能公司合作會更加的穩妥。"
 CHI_support_foreign_research_desc: "我國有著大量的高科技人材，我們可以派遣他們協助外國公司的科技研發來加快太陽能迭代速度，同時也能從中進一步培養我們的人材來協助推動我國的太陽能體系進度"
 CHI_international_division_of_labor_desc: "過去中華民國是美國主導的世界分工體系的一員，如今美國陷入內戰，我國政府為了應對太陽能問題積極為歐盟和太約牽線構築出新的歐亞分工體系，雖然目前僅止於太陽能光電產業，但也許這會成為新世界體系的第一春。"
 CHI_i_am_become_death_desc: "在兩蔣時期，我國曾有過兩場研究核武的新竹計畫與桃園計畫，但由於叛徒的洩密，導致我們的核彈與火箭科技被美國封鎖。\n如今美國陷入內戰自顧不暇，我國又透過重啟核能重新掌握核子科技，現在再也沒有人能阻止我們了。"
