 PRC_PRC_jinmen_calc: "解放軍的控制度"
 Rectify_weakening_military_preparedness: "整治武備廢弛"
 Rectify_weakening_military_preparedness_desc: "當山雨欲來之勢逐漸成形，美國內部的不穩定跡象已難以忽視。疫情、能源與選舉政治交織，使原本被視為穩固的安全架構，開始顯露出遲滯與裂痕。然而，我軍的訓練方式、指揮思維與戰術準備，仍深受冷戰時代遺緒所限。若不及早整肅軍紀、恢復實戰訓練，風暴來臨之時，我們將無法承受其代價。"
 Tighten_exemption_conditions: "收緊免役條件"
 Tighten_exemption_conditions_desc: "長期以來，為兼顧社會需求與個人因素，兵役制度中設有多項免役與替代規定。然而在新的安全環境下，過於寬鬆的標準已逐漸削弱我國可動員的人力基礎。面對日益複雜的區域局勢與國防需求，我們有必要重新檢視相關規範，確保兵役制度能夠反映現實威脅與國家安全的優先順序。適度收緊免役條件，將使更多適齡國民承擔起保衛國家的責任，為國軍注入必要的人力與活力。"
 Prepare_special_budget: "編列特別預算"
 Prepare_special_budget_desc: "在戰爭威脅日益逼近的情況下，常規年度國防預算已難以滿足迫切的建軍需求。裝備更新、彈藥儲備與關鍵系統的取得，皆需要在最短時間內完成。為此，政府將編列一次性的特別國防預算，專門用於向友好國家採購現代化武器與相關配套設備，加速我軍戰力形成。"
 Hire_US_military_instructors: "聘請美軍教官"
 Hire_US_military_instructors_desc: "現代戰爭的型態與過往截然不同，聯合作戰、資訊整合與精準打擊已成為戰場主流。若要在最短時間內提升部隊的整體素質，引進具備實戰經驗與現代化訓練體系的外籍教官，將是一條務實而有效的途徑。美國有大量具備豐富經驗的退役軍官與訓練人員可供聘用。透過他們的協助，我軍能迅速接軌當代作戰觀念與訓練方式。有時，借助外力是加速改革的最佳手段。"
 ROTC: "積極延攬本土人才"
 ROTC_desc: "一支真正強大的軍隊，必須建立在穩定而持續的人才來源之上。與其仰賴外來經驗，不如從教育體系著手，培養屬於我國自己的軍事專業人才。透過擴大預備軍官訓練制度（ROTC），我們將在大專院校中建立制度化的人才培養管道，使優秀青年在學期間即接受完整軍事訓練與領導教育。這將為國軍帶來長遠且紮實的幹部基礎，形成真正屬於本土的軍事傳承。"
 Introduce_scientific_training_standards: "引進科學化訓練標準"
 Introduce_scientific_training_standards_desc: "傳統的訓練方式多仰賴經驗與慣例，雖有其價值，卻難以精準衡量訓練成效與人員能力差異。面對高度技術化與資訊化的現代戰場，我軍訓練體系亟需更為系統化與量化的標準。透過導入數據分析、體能監測、模擬器訓練與標準化評估流程，我們將能更有效率地培養合格士兵，並即時調整訓練內容以符合實際需求。訓練不再只是反覆操演，而是一套可以被測量、優化與持續改進的科學流程。"
 abolition_of_bayonet: "廢除刺刀術"
 abolition_of_bayonet_desc: "刺刀衝鋒曾是步兵訓練中的重要一環，在彈藥匱乏與近距離交戰的年代，這種戰術確實發揮過作用。然而，現代戰場早已由火力、通訊與協同作戰所主導，單純依賴白刃衝鋒的時代已然遠去。長期以來，我軍仍保留大量與實戰需求脫節的傳統訓練內容，佔用了寶貴的訓練時間與資源。若要讓部隊真正適應現代戰爭，我們必須勇於捨棄象徵性質大於實用價值的科目。"
 Extend_compulsory_military_service: "延長義務兵役時間"
 Extend_compulsory_military_service_desc: "現代戰場對士兵的要求，早已不再只是基礎體能與射擊能力。從通訊設備操作、城鎮作戰協同，到無人機與資訊系統的運用，皆需要更長時間的完整訓練與磨合。現行的服役期已難以讓新兵在退伍前真正具備合格戰鬥員所需的技能與默契。若要提升整體部隊素質與戰備水準，勢必需要給予部隊更充足的訓練時間。延長義務兵役時間，將使每一名役男在服役期間獲得更完整的訓練，為國軍建立更為可靠且具備即戰力的基層人力。"
 Improve_combat_readiness_level: "提升戰備等級"
 Improve_combat_readiness_level_desc: "情勢已不容我們以平時標準看待國防準備，對岸的軍事動員與區域壓力日益升高，戰爭不再是抽象的可能，而是隨時可能發生的現實。我軍各單位必須進入更高層級的戰備狀態，確保人員、裝備與後勤體系能在最短時間內完成動員與部署。任何遲滯與鬆懈，都可能在關鍵時刻付出難以承受的代價。"
 Expand_Ruijie_project: "擴大銳捷專案"
 Expand_Ruijie_project_desc: "現代戰場對機動與火力的需求日益提升，延續迅捷專案，持續推動裝甲部隊現代化，引進 M1A2T 主力戰車與改進雲豹甲車，以強化聯合作戰能力，提升地面部隊的整體突破與防衛效能。"
 Continuation_Thunder_Project: "延續轟雷專案"
 Continuation_Thunder_Project_desc: "當年在火力劣勢下，國軍藉由與美國協調，將重型火砲快速送抵前線，以機動運輸突破封鎖，扭轉戰場態勢。如今，面對相似的火力與時效挑戰，國家選擇延續轟雷計畫，透過與美國合作，購買自行火砲以加速戰力成形。"
 Special_American_made_armor_piercing_bullets: "特規美製穿甲彈"
 Special_American_made_armor_piercing_bullets_desc: "隨著「銳捷專案」的擴大推動，大量 M1A2T 與增購型 M1A2 主力戰車陸續編入我軍序列。然而，先進的載具若無相匹配的彈藥，其戰力終究無法完全發揮。美軍現役使用的脫殼尾翼穩定穿甲彈，在材料、裝藥與動能設計上皆遠優於我軍現有庫存。若能取得專為我方砲管與射控系統條件調校的特規型號，將大幅提升戰車部隊在遠距離交戰與對抗重裝甲目標時的穿透能力。"
 Interception_fighter_jet_from_other_countries: "攔截他國戰機訂單"
 Interception_fighter_jet_from_other_countries_desc: "憑藉遊說公司與一些必要的「贈禮」，我們將嘗試攔截現有產線上的所有飛機，我們的外交官與聘請的說客會竭盡所能安撫其他的客戶，讓他們心甘情願為我們讓出一些訂單。"
 Complete_makeover: "全面換裝"
 Complete_makeover_desc: "隨著新一批外購裝備陸續到位，我軍長期存在的裝備混用與規格不一問題已無法再被忽視。若仍以舊有編制與後勤方式運作，這些先進武器將難以發揮應有的戰力。我們必須配合新式裝備，全面調整部隊編制、訓練內容與後勤體系，逐步淘汰不相容的舊式武器，建立統一而現代化的作戰標準。"
 third_oil_crisis: "第四次石油危機"
 third_oil_crisis_desc: "伴隨著沙物地阿拉伯王國的崩潰，石油再次成為危機的導火索，華爾街股市走勢下跌更是雪上加霜，我們必須儘快找出新的石油來源以應對危機"
 Unleashing_strategic_oil_reserves: "釋放戰略儲油"
 Unleashing_strategic_oil_reserves_desc: "根據石油管理法，企業家應當存足夠運轉60天的石油量，加上政府30天的存量，我們還可以撐90天，趁此時機，趕緊行動並找到出路"
 South_China_Sea_oil_exploration: "南海油氣探勘"
 South_China_Sea_oil_exploration_desc: "南海蘊含豐富的石油儲備，我國目前在太平，中州兩島上擁有控制權，雖然很小，但還是可以讓我們對於南海的石油進行開採"
 Find_alternative_sources: "尋找替代來源"
 Find_alternative_sources_desc: "排除阿拉伯半島的石油輸出國，我們還有幾個選擇，委內瑞拉、俄羅斯以及大陸，曾經我們有中東的石油，不必選擇這些不那麼好的方案，但現在已經沒有更好的選擇了，我們必須做出決定，是要向哪個國家貿易"
 Technology_exchange_exchange_for_oil: "以技術交流換取石油"
 Technology_exchange_exchange_for_oil_desc: "我國最好的資源即是技術，利用技術，我們成為世界半導體產業重要的一環，現在缺石油，那就必須好好利用技術合作來拉攏產油國"
 CHI_Operation_Desert: "§Y大漠行動§!"
 CHI_Operation_Desert_desc: ""
 Electricity_prices_freeze_and_rise: "電價凍漲"
 Electricity_prices_freeze_and_rise_desc: "沙特內戰激起國內能源市場的劇烈恐懼，台塑、中鋼、台積電等耗電巨頭紛紛要求會見，除此之外一般民生用戶也在網路論壇頻繁討論各種節電、省電小撇步......。大家都在期盼政府會如何反應，而我們可不能就這樣放任市場波動然後祈禱未來某天世界恢復常態，在關鍵時刻政府必須出手----即便這意味著台電的虧損將陡然攀升，但為了穩住市場反應與撫平民眾恐慌，我們將出手調控電價，避免石油危機的損失最大化。"
 Accelerating_the_energy_transition: "加速能源轉型"
 Accelerating_the_energy_transition_desc: "自2016年起，蔡英文政府追隨世界主流啟動能源轉型計畫，旨在解決困擾台灣已久的空污、環保與能源自給性等議題，其中包含眾多綠能相關指標，要求在2025年前將再生發電比重提升至百分之二十、再生能源裝置容量提升至29GW。沙特內戰導致的第四次石油危機讓台灣民眾再次認識到的能源議題的重要性，我們沒有時間在立法院裡互相扯皮打架，必須專注能源轉型議程，才能帶領台灣在狂風驟雨的大浪中倖存下來。" 
 Life_extension_of_nuclear_power_unit_three: "核三機組延役"
 Life_extension_of_nuclear_power_unit_three_desc: "當逐漸工業化的台灣在70年代面對第一次石油危機的打擊時，蔣經國總統憑藉富具遠見的思維推動十大建設，這其中就包括核能電廠的投資建設。而自1984年開始運作的核能三號廠(簡稱核三)也已經陪伴台灣接近四十個年頭，在311大地震與環保人士的輿論攻勢下蔡英文啟動「非核家園」政策，為保障台灣人免受核輻射的危害，民進黨政府開始逐步停用核能機組，並主張在2025年全面廢除核能發電。但很明顯的是石油危機讓台灣能源遭受嚴重威脅，我們需要每一分電，以保障本島經濟與民生體系還能正常運作。"
 Expand_investment_green_energy_companies: "擴大投資綠能企業"
 Expand_investment_green_energy_companies_desc: "危機就是轉機，當燃煤與石油供應吃緊的時候，就該綠能發電登場了。其近乎無窮無盡且不容易受制於人的電力來源符合台灣未來電力供應的戰略方針。水力發電受限於地理條件較難靈活部署，沿岸風電與太陽能便是我們的首選，透過加大補助與放寬環評條件等迅速發展綠能，即便其沒辦法解燃眉之急，但卻是為未來台灣能源發展奠定一個堅實的基礎。"
 CHI_Restart_core_four: "重啟核四"
 CHI_Restart_core_four_desc: "核四位於臺灣新北市貢寮區的核能發電廠，原本在1980年規劃建設的核四計畫因當地居民強烈反對而陷入停滯，後因2000年當選的陳水扁總統指示「核四再評估」暫緩核四建設工程，即便重新建設其過程也重重受阻。2014年時任行政院院長為平息輿論壓力選擇封存核四，並準備將數千根燃料棒送出台灣。萬幸的是最後一批即將送出的燃料棒仍保存在核四反應爐中，只要經過簡單的工程檢查與風險評估，核四就能以最低效率運轉，後續便能完全重啟所有反應爐----即便這可能造成當地居民的強烈反對。"
 The_power_plant_on_full_fire: "電廠火力全開"
 The_power_plant_on_full_fire_desc: "無論是重啟核能或發展綠電，這些發電方式都不可能在短時間內快速穩住本島的電力供應，這些供電方式相較於火力發電要不是條件嚴苛、就是缺少應對突發狀況的能力。當前的備轉容量已經逼近極限，立刻召回仍在休假的台電人員、尚在維護的機組也全部投入使用、責令各港口優先接收天然氣與燃煤、電廠24小時全年無休的輪班......不管我們在未來需要面對多少損失，度過能源難關才是當前的首要任務!"
 Photovoltaic_panels_everywhere: "無處不在光電板"
 Photovoltaic_panels_everywhere_desc: "最適合台灣發展的綠能設施非太陽能莫屬，其快速鋪張的靈活性與無處不在的太陽光正是當前台灣所需要的。學校屋頂、廢棄農田甚至是一般透天厝的樓頂都是我們的發電廠，只要我們派出官員和他們談談，加上一點補助與徵稅減免，電就真的能從土裡「種」出來!"
 island_of_energy_security: "能源無虞之島"
 island_of_energy_security_desc: "經過快速改革，我們的人民和工業終於不用再擔心能源問題了，儘管經過此次危機，我們的經濟發展潛力大打折，但一切都回到正軌了，接下來，是什麼呢？"
