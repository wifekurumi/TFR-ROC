 CHI_tsmc_idea: "台灣積體電路制造股份有限公司"
 CHI_tsmc_idea_desc: "台積電（TSMC），即台灣積體電路制造股份有限公司，是全球最大的半導體制造企業，為無晶圓廠公司提供芯片制造服務。20世紀90年代，台灣地區將發展高科技與服務型經濟作為轉型重點，台積電應運而生，其成立初衷是專注於半導體制造，從而推動西方企業將制造環節外包以實現利潤最大化。\n\n如今，台積電與其他台灣企業共同貢獻了全球約三分之二的半導體供應，並主導高端集成電路市場。這種對台灣半導體的高度依賴迫使許多發達國家施壓中國大陸避免采取軍事行動，他們擔憂沖突會徹底破壞供應鏈，進而重創整體經濟。這種由台灣在半導體制造領域的壟斷地位所提供的保護，被許多人稱為\"矽盾\"。"
