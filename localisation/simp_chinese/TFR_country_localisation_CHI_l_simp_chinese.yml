 CHI_test_of_will: "意志之试炼"
 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\n70年弹指一挥间，骨肉相残的内战曾告一段落。我们的人民享受了数十载和平繁荣岁月，但这不可能永远持续下去。大千世界风云变幻，山雨欲来，我们不得不首当其冲直面汹涌。\n\n被遗忘的内战余烬正重新燃起，我们必须为自身的存亡而战。\n\n§3                            青天白日永不落§!"
