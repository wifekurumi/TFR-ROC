 Taiwanese_Progressivism: "台灣進步主義"
 Taiwanese_Progressivism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§Y台灣進步主義§!是民進黨（DPP）、其他泛綠政黨和一些獨立人士所堅持的意識形態。民進黨是綠營的領導者，其黨起源於20世紀70年代中期開始的\"黨外運動\"。由於反抗國民黨訓政和白色恐怖的歷史，民進黨將自由民主、政治正義和平等主義視為其核心意識形態。這些價值觀後來被更廣泛的台灣進步運動所繼承。多年來，由於中共日益增長的敵意，民進黨還吸收了反共思想，並主張台灣與中國大陸保持距離。\n\n如今，台灣進步主義主張多種目標，包括社會自由與平等、環境可持續性、LGBTQ+權利和台灣獨立，並仍然是台灣政治中最主要的運動之一。"
 Taiwanese_Progressivism2: "台灣進步主義"
 Taiwanese_Progressivism2_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§Y台灣進步主義§!是民進黨（DPP）、其他泛綠政黨和一些獨立人士所堅持的意識形態。民進黨是綠營的領導者，其黨起源於20世紀70年代中期開始的\"黨外運動\"。由於反抗國民黨訓政和白色恐怖的歷史，民進黨將自由民主、政治正義和平等主義視為其核心意識形態。這些價值觀後來被更廣泛的台灣進步運動所繼承。多年來，由於中共日益增長的敵意，民進黨還吸收了反共思想，並主張台灣與中國大陸保持距離。\n\n如今，台灣進步主義主張多種目標，包括社會自由與平等、環境可持續性、LGBTQ+權利和台灣獨立，並仍然是台灣政治中最主要的運動之一。"
 Taiwanese_constitutionalism: "台灣憲政主義"
 Taiwanese_constitutionalism_desc: "\n\n\n\n£GFX_CHI_ideology_constitutionalism\n\n\n\n\n\n§Y台灣憲政主義§!由國民黨（KMT）、親民黨（PFP）和一些獨立人士所堅持，是一種本土化的憲政主義形式，支持中華民國的延續、自由保守的社會政策以及與中國大陸的溫和關系。台灣的憲政主義最初以三民主義和社會保守主義為基礎，多年來采用了更為自由的方式，以便在台灣解嚴後保持競爭力。\n\n如今，台灣憲政主義的主要特點是保護主義經濟政策、中國民族主義、中間派社會政策以及從蔣家王朝繼承下來的逐漸減弱的反共主義，並仍然是台灣政壇中最大的派別之一。"
 loc_taiwanese_liberal_populism: "自由民粹主義"
 taiwanese_liberal_populism: "自由民粹主義"
 taiwanese_liberal_populism_desc: "台灣自由民粹主義是自由保守主義的一種變體，其核心是通過滿足民眾需求、積極提供公共服務及改善弱勢群體生計來贏得選票。\n\n由於過度聚焦選舉勝負，該思想常被批評\"缺乏原則\"且邊界模糊。與其稱之為意識形態，不如更合本質地稱它為一種選舉策略。"
 loc_taiwanese_reformed_tridemism: "改良三民主義"
 reformed_tridemism: "改良三民主義"
 reformed_tridemism_desc: "三民主義，即民族、民權、民生三大綱領，由三個同等重要的部分組成：民族主義、民主制度與社會福利。\n\n進入21世紀時，傳統三民主義已顯露出治理現代社會的局限性，促使許多人尋求其改良版本。\n\n相較於原版，革新後的三民主義降低了民族主義的比重，轉而強調擴大福利，並將其視為現代化理論的核心支柱。與此同時，民主制度作為人民的基本需求，被納入更廣義的福利範疇，使得福利主義成為改良三民主義的唯一重點。"
 CHI_Jiang_Wanan_char: "蔣萬安"
 Chiang_Kaishek_thought: "蔣介石思想"
 Chiang_Kaishek_thought_desc: "\n\n\n\n£GFX_CHI_ideology_chiang\n\n\n\n\n\n§Y蔣介石思想§!為其後代中華民國總統蔣萬安在第三次國共內戰期間目睹中國軍隊暴行領悟並總結的一套以反共民族主義，國家存續與極權主義為核心的政治思想體系。其理論根源出自三民主義，而在戰爭期間長期對抗共產主義的實踐中被塑造為零容忍的反共路線。其信徒將共產主義視為顛覆國家、瓦解倫理與破壞社會秩序的根本威脅，因此主張以強力國家、紀律化政黨與軍事動員，徹底清剿左翼滲透。\n\n在政治層面，其強調領袖權威與黨國體制的優先性，認為非常時期必須以非常手段維持統一與穩定。而思想，教育與新聞被視為無聲戰爭的一部分，必須防止階級鬥爭與無神論思潮侵蝕社會根基。經濟政策上，該強調國家高度介入，以戰時體制確保資源集中，服務於反共戰爭與國防建設。\n\n於社會層面結合儒家倫理，民族主義與道德信仰，試圖以傳統秩序對抗共產主義的革命動員。其目的在於確保中華民國亦或者蔣家在存亡競逐中不被顛覆，不被取代。"
