 CHI_shining_spear_and_iron_horses_desc: "在下一代主力戰車開發之前，現在要立刻解決國軍戰車無法擊穿敵人裝甲與裝甲薄弱的問題，國防部預計將為CM-12換裝更大口徑的火炮並裝上爆炸反應裝甲來緊急解決當前的問題。"
 CHI_painful_lesson_of_drones_desc: "在台海戰爭期間，解封軍利用無人機對我軍裝甲部隊做出嚴重打擊，其造成了超過半數以上的被摧毀裝甲車輛原因，我們應當加強反無人機措施，並吸取教訓"
 CHI_Camaraderie_Diligence_Sincerity_desc: ""
 CHI_centralized_military_command_desc: ""
 CHI_reform_combined_logistics_command_desc: ""
 CHI_military_railway_underground_desc: "長期以來台灣的鐵路系統嚴重缺乏經費，多年的和平也讓本就不多的資源大幅向民用路線傾斜，軍隊不僅難以維持手上大量的貨運專列，就連升級甚至保障最基礎的軍用專線都困難重重。不過令人慶幸的是，上一場戰爭帶來的教訓重重地那些還抱有幻想的政府官員，台灣狹長的地形與南北走向的山脈群注定了一旦西部交通節點被切斷，北部與南部的軍隊就會立刻陷入孤軍作戰的困境。\n軍隊正在向立法院提出訴求，希望借用部分高雄市近期完成的地下化鐵路，延伸出一條北至嘉義南至屏東枋寮的軍用快線，同時間也會將北部既有的地下鐵路網向南延伸，保障即便在戰時也能確保南北戰備物資與人員撤離時仍能有條安全、通暢的路線可供使用。"
