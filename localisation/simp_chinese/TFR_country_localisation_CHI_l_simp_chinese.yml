##
 CHI_compete_for_central_plains_desc: "隨著大亞洲戰爭的落幕，中國......應該說「共產中國」被太約聯手支解，如果不是中華民國的存在，中國的概念恐怕要從這個世界暫時消失，大陸各地軍閥林立、解放軍殘部蠢蠢欲動、北京政府的殘餘官員帶著少批量部隊負隅頑抗，僅憑台灣的一省之力僅僅只能夠支持對海南、廣東地區的光復復興，最好的方法就是在當地建立自治政府實行訓政由當地人自行重建家園，現在我們已經拿到了爭奪統一偉業的門票，做好整備開啟第二次北伐戰爭吧。"
 CHI_regional_political_tutelage_desc: "依照國父的建國方略，我們中華民國得以實施真正民主自由的制度要分為三階段：軍政、訓政、憲政。自大陸淪陷於赤禍近百年後，我們的青天白日滿地紅旗再一次飄揚在大陸地區，為了重煥大陸地區災胞的民主意識和自由意志，粉碎中共在大陸災胞們精神上的枷鎖，韓國瑜總統決定在大陸已經重光我手的地區，委派台灣中國國民黨黨部各級國民黨員在各地設立「訓政委員會」，旨在幫助大陸災胞認識、瞭解現代民主，以重振大陸災胞愛民主、愛自由、愛國家的政治情懷。"
 CHI_trust_localities_desc: "雖然我們正逐步按照我們曾經夢想過的施政方略對大陸地區進行一場遲到了近一百年的民主革命，但時過境遷，大陸現如今的狀況並非我們所能夠完全掌握。若是霧裏看花，強行按照我們的意志對大陸地區的政治格局進行改造恐怕反倒為禍。由是，我們將對前中共地方政府部門人員開展考核，並遴選那些支持自由，擁護民主，熱愛中華民國的人們在我們所扶持的新地方中留任，並據此更加迅速地完成我們新地方政府的組建以及維持其高效的運轉。"
 CHI_central_supervision_policy_desc: "為了切實保障大陸地區新組建的地方政府不再重演前中共政府的獨裁暴政，在行政中真正踐行我們中華民國一以貫之的民主精神，韓總統與其幕僚決定向大陸各地新政府派出「民主化督導組」，旨在確保大陸新地方政府能夠從「捍衛民主自由」的基本點出發，以合乎普世價值的方式來達成自己的施政目的，從而重建大陸地區同胞的穩定的民主秩序，以更好地支持我們後續在大陸地區的正義行動。"
 CHI_republic_achieved_desc: "「三民主義，吾黨所宗，以建民國，以進大同……」\n\n中華民國何以為民國？有人說這是英語「republic」的轉譯並非中國自產，有人說這是痴人的神話夢囈。可是，尋著這些說法，萬萬中國人只有為專制暴政所魚肉的命運嗎？國父說不，於是一起為民國，推翻四千年帝制暴政，是為中國民主之開端。當赤色橫禍從北而來，我們的民主夢想隨之黯淡失色，可它並沒有死。今天，萬萬的中國人民總算抬起頭來，無論是皇帝宮闕，抑或者赤色橫禍，都阻擋不了我們中國人民主的步伐。\n\n起來，中國人，為著你的民主！起來，中國，為著你的自由！"
 CHI_rapid_political_tutelage_desc: "用過往指導台灣人民主轉型的手段要花費大量的時間、人力、資源，龐大的財務支出在完成訓政之前會先拖垮國家，我們必須動用一切手段讓當地人明白自己在民主社會中的權力與義務，最終將自由選舉的權利交還給他們。"
