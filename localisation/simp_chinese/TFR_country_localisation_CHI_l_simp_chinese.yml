 CHI_destroyed_country: "破敗之國"
 CHI_destroyed_country_desc: "盡管戰爭已經結束，我們的國家卻再也無法回到從前。警報聲仍在民眾耳畔回響，導彈襲擊、空襲與炮火不僅摧毀了我們的公路網，更重創了鐵路系統和地鐵運營。戰後通勤時間已延長至戰前的三倍，而更糟糕的是，我們的制造業也遭受毀滅性打擊。遍布全島的科研園區遭到針對性軍事打擊的蹂躪，外資紛紛撤離我國的投資市場。若想重振我國作為全球科技樞紐的地位，需我國政府與盟友攜手合作，共同付出巨大努力。"
