 financial_crisis_1: "外匯危機"
 financial_crisis_dynamic: "外匯危機" 
 Pacific_War: "太平洋之殤"
 Pacific_War_desc: "曾長期維繫太平洋秩序的強權，如今陷入自身的內戰與分裂。美國的港口封鎖、軍事調動與政治混亂，使原本穩定的海上航道與經貿網絡瞬間失去依靠。這場遠在彼岸的衝突，卻直接動搖了我們賴以生存的國際環境。金融市場劇烈震盪，出口與供應鏈遭到切斷，區域安全出現前所未有的真空。太平洋不再是和平與繁榮的象徵，它成為了動盪與不確定的源頭。\n\n舊有的秩序，已然焚毀，而我們已然成為這個風暴中的孤島。"
 emergency_financial_controls: "緊急金融管制"
 emergency_financial_controls_desc: "美國爆發內戰後，全球金融市場瞬間失序。跨國清算停擺，美元流動性迅速枯竭。為防止資本外逃與銀行體系擠兌，我們必須立即實施臨時金融管制，凍結高額資金流動，確保國內金融秩序不至於崩潰。"
 TJ_hold_emergency_talks: "啟動臺日緊急協商"
 TJ_hold_emergency_talks_desc: "著美國秩序瓦解，東亞的安全與經濟結構出現前所未有的真空。日本與我國同樣面臨出口市場消失與區域安全惡化的壓力。在這場動盪之中，雙方有必要建立前所未有的高層協商機制。"
 Export_market_shifts: "出口市場轉向"
 Export_market_shifts_desc: "美國長期為我國最重要的出口市場。隨著其經濟體系癱瘓，大量訂單瞬間消失。若無法迅速開拓新的貿易方向，產業鏈將面臨全面停擺。"
 Revaluation_foreign_exchange_reserves: "重估外匯存底"
 Revaluation_foreign_exchange_reserves_desc: ":長年以來，我國龐大的外匯存底主要以美元資產形式持有。然而隨著美國政權瓦解，這些資產的實際價值正迅速蒸發。我們必須重新評估國家儲備結構，尋找新的價值錨點。"
 Aus_Resource_Swap_Agreement: "澳洲資源互換協定"
 Aus_Resource_Swap_Agreement_desc: "全球貿易體系的崩解，使能源、礦產與糧食供應變得極不穩定。對高度依賴進口資源的我國而言，確保長期而可靠的來源已成為當務之急。澳洲擁有豐富的礦產、能源與農業產出，同時亦需要我國的高端製造與半導體技術來維持其工業運作。在國際市場失序的情況下，雙方具備建立直接互換機制的條件。透過這項協定，我們將以晶片與工業技術換取穩定的戰略資源供應，建立不依賴舊有貿易體系的新型合作關係。"
 Japan_Science_Technology_Industry_Cooperation: "對日科技與產業合作框架"
 Japan_Science_Technology_Industry_Cooperation_desc: "在全球供應鏈斷裂的情況下，單一國家已難以維持完整的高科技產業體系。透過制度化的科技與產業合作，臺日雙方將共同維持東亞最後仍能正常運作的先進工業鏈。"
 Semiconductor_mobilization: "半導體產業動員"
 Semiconductor_mobilization_desc: "我國原本為全球消費電子與商業市場服務的先進製程，現在必須轉為戰略資產。晶圓廠、封裝廠與材料供應鏈將進入全體動員狀態，優先供應高效能運算與人工智慧訓練需求。現在製作的每一片晶圓，都將成為未來國力的一部分。"
 National_Artificial_Intelligence_Strategy: "國家級人工智慧戰略"
 National_Artificial_Intelligence_Strategy_desc: "人工智慧不應再只是企業的競爭工具，而應成為國家戰略的一環。我們將整合來自各企業與研究機構的模型與人才，建立統一的國家AI體系，用於軍事、經濟與情報領域。我們的算法將成為新世界的武器。"
 Attracting_US_AI_companies: "吸引美國AI企業"
 Attracting_US_AI_companies_desc: "隨著美國本土陷入長期動盪，眾多人工智慧企業與研究機構被迫尋找新的落腳點。對這些高度依賴穩定電力、網路基礎設施與先進晶片供應的組織而言，持續運作已成為首要目標。我國完善的半導體產業鏈、成熟的數位環境與相對穩定的社會秩序，使我們成為少數能夠承接這些高端技術資源的地點。我們將為這些企業在新竹附近開闢一個新工業園區， 並將他們整合進我們的產業鏈裡。"
 chip_complex: "晶片複合體"
 chip_complex_desc: "當半導體產業、人工智慧研究與國家戰略完全整合，我們將不再只是科技製造者，一個由晶圓廠、資料中心、研究機構與軍事單位構成的「晶片複合體」正在成形。世界或許仍在爭奪石油與鋼鐵，但真正決定未來戰爭與經濟秩序的，將是我們所掌握的晶片與算力，中華民國萬歲!臺灣萬歲!"
 Recruiting_US_refugee_talent: "招募美國難民人才"
 Recruiting_US_refugee_talent_desc: "隨著美國西岸陷入戰火，大量技術人才逃離美國，我們將收留矽谷工程師、研究員與其家眷，他們的知識和技術將為我們所用。"
 Intervene_American_Civil_War: "§Y干涉美國內戰§!"
 Intervene_American_Civil_War_desc: ""
 Out_the_storm: "走出風暴"
 Out_the_storm_desc: "美國內戰引發的連鎖衝擊，一度讓全球金融體系、貿易網絡與區域安全秩序陷入混亂。我國亦未能倖免，外匯價值劇烈波動、出口市場瞬間蒸發、民生與工業同時承受壓力。然而，透過緊急經濟措施、產業動員，以及與鄰國建立的互助機制，我們成功穩住了局勢。社會秩序得以維持，工業體系仍在運轉，新的貿易與合作關係正在成形。風暴尚未完全散去，但我們已不再只是被動承受的一方。"
