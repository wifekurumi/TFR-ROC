 CHI_hold_the_defence_line_tooltip: "§Y新部隊將增援台灣防務§!"
 CHI_taiwan_war_victory_demobilization_tooltip: "所有在戰爭期間動員的民兵都將被覆員，所有武器將返還軍械庫。"
 loc_taiwanese_OCTS_democracy: "一國兩制民主"
 CHI_market_socialism_desc: "\n\n\n\n£GFX_CHI_ideology_market_socialism\n\n\n\n\n\n\"在一個國家內實行兩種制度\"，乍一聽像是某種天方夜譚般的政治實驗，又或者是某種削弱國家主權和統治力的獨特計劃，但在東亞一隅岸礁上的城市群之中，這種古怪的政治制度卻已實行了有近四十年。\"一國兩制\"誕生於中國大陸經濟實力與政治影響力尚顯薄弱之時，實乃平衡兩種制度——社會主義和資本主義的激烈沖突的權宜之計。在此制度下所建立的\"特別行政區\"盡管與政權主體尊奉同一主權，但仍享有建立自己的政府機關和議會機構的自由，並在制定和實施政策方面幾無限制。其與傳統的邦聯制最大的不同，或許在於\"特別行政區\"的規模往往僅限於一地一城，因而小小的分離主義思潮對聯合的穩定幾無影響。\n\n如今，隨著實力天平對比和政治環境的變化，\"一國兩制\"所蘊含的內在邏輯逐漸發生轉換。從過去的保護、隔離，到現如今多邊交流的日益深化，\"一國兩制\"已經成為了一個促進不同社會受不同意識形態影響的人民和平共處、不同政治和經濟制度相互交流融合、最終促進價值觀和諧的重要平台。"
