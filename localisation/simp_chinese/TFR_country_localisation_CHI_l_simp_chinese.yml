#{選舉國策描述
 CHI_chart_the_course_desc: "在重建家園的工作告一段落後，人們回想起來自己理應實行的基本權利——投票權，戰爭重新刷新台灣人對政治的觀點，自己確實的一票深刻影響著國家的未來。在台灣政壇中，基本由國民黨與民進黨分庭抗禮，國民黨主張維持與海峽對岸的聯繫以便未來的某時反攻大陸讓青天白日滿地紅再度飄蕩在中國大陸上空，民進黨主張讓政權偏安於這座西太平洋的小島上維持屬於台灣人的國家，許多原本未敢設想的未來在太約取得優勢的現在如雨後春筍般冒了出來，在下一個一月來臨時，人們將得知社會意識的最大公約數並指名將來要去往的方向。國民黨？民進黨？亦或是第三種選項？"
 CHI_future_of_the_roc_desc: "台灣......不，中華民國在台海戰爭中的表現向全世界展現了捍衛自由意志的決心。在國際外交上，原本迫於中共壓力斷絕與我國聯繫的部分國家開始向中華民國伸出友誼的手，隨著中共在國際的影響力減弱，我們終於可以正視自己真正的國名、正式參與各種國際組織、在國際賽事上擁抱這美麗的青天白日滿地紅。\n現在，我們要選出下一位能代表中華民國的總統候選人上台，以台灣本位為主軸的民進黨並不在這考慮範圍之內，中國國民黨現在該煩惱要推出哪位候選人才能團結所有民國派，而他又會將國家帶往何方？會重拾起蔣公的遺願亦或是走出新的未來？"
 CHI_will_of_the_people_han_desc: "正當某些候選人擺出一副菁英面孔、站在電視機前演講的時候，韓國瑜總統下班後早就到他平常買菜的菜市場報到了。路過的三姑六姨見到他都會熱情地喊一聲「韓總」，攤販裝好菜之後總是多遞一把蔥給韓總，買完菜後順道去最喜歡的\n小吃攤帶三碗滷肉飯回家和家人享用。\n與民眾的零距離接觸是韓國瑜堅持的獨特政治哲學，他讓台灣人知道政治不只是電視和網路上的相聲表演，也不是冷漠無情的報表和經濟數據，而是腳踏實地的與大家生活在一起，同時讓民眾知道當台灣人民有難時，韓總絕對不會臨陣脫逃!最艱難的時刻挺身而出!\n\n同甘共苦共患難，就是韓國瑜堅持的理想主義"
 CHI_not_by_chance_inevitable_desc: "自2020年總統大選失利後，韓國瑜從沒想過自己能再度被國民黨推舉出來擔任總統候選人，人們不會忘記他擔任高雄市長時半路出走競選總統，當然也不會忘記在中華民國生死存亡的關鍵時機，他並沒有選擇逃走而是留在這塊土地與人民共進退，他的死忠支持者「韓粉」依然堅定的給予他支持，厭倦政治口水戰的中間選民也願意給予他第二個機會。\n韓國瑜眼含淚水，振聲演講表明與人民肩並肩走向未來的決心，他不會再逃跑，這次他絕對要讓台灣「發大財」！"
