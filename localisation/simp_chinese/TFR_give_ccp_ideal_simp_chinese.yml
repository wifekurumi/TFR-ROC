 PRC_national_communist2: "中华毛泽东主义人民革命共产主义社会天国"
 totalism2: "先锋社会主义"
 totalism2_desc: "\n\n\n\n£GFX_Ideology_totalist\n\n\n\n\n\n§Y先锋社会主义§!是一种视国家极权至高无上的社会主义。其认为应当以倾国之力全方位建成§Y社会主义安保国家§!，监管从社会态度到经济计划等社会的每一个角落。该意识形态的政府通常使用高科技手段来控制、监控它们的民众，例如监控摄像头和网络审查。"
 jucheism2: "主体思想"
 jucheism2_desc: "\n\n\n\n£GFX_Ideology_juche\n\n\n\n\n\n§Y主体思想§!是一种强调民族独立的朝鲜特色马克思列宁主义。在经济方面，主体思想的信仰者认为，要贯彻经济自给自足的原则，就必须建设独立国民经济体系，但在建设的过程中并不排斥对外贸易。此外，主体思想强调，人民群众是历史发展的唯一动力。其中心思想可简单概括为：人民群众是一切的中心，伟大领袖则是人民群众的中心。主体思想将伟大领袖神化为一位无可置疑、至高无上的领导者。至于工人阶级则被剥夺了独立思考的权力，只能通过伟大领袖的头脑思考。伟大领袖即是工人阶级的主脑，是工人阶级唯一合理的代表。"
 maoism2: "民族毛主义"
 maoism2_desc: "\n\n\n\n£GFX_Ideology_maoist\n\n\n\n\n\n§Y毛主义§!是马列主义的一种高级形态，由秘鲁理论家和游击斗士贡萨罗主席于1982年总结而成。它建立在马克思列宁主义和毛泽东思想早期理论的基础上，指出毛泽东的革命理论放之四海而皆准。毛主义的主旨是长期人民战争，既对资本主义国家发动游击战；同时还主张发动文化大革命，摆脱资产阶级文化的影响；强调群众路线，认为革命先锋队必须制定正确的战略，领导群众进行革命，巩固无产阶级专政，加强党的力量，以更好地建设社会主义。"
 social_fascism2: "民族共产主义"
 social_fascism2_desc: "\n\n\n\n£GFX_Ideology_social_fascism\n\n\n\n\n\n§Y民族共产主义§!意图将共产主义原理与强烈的爱国主义、民族身份认同绑定。经济平等与国家主权并重，希望建立工人阶级政权的同时，保存本民族文化，维护民族利益。\n\n民族共产主义有以下几个内核。一是废除生产资料私有制，转而建立工人所享、所有的集体所有制。二是消灭阶级差距，促进社会公平，使财富和资源平等分配给每一位社会成员。乃至以后彻底消灭贫困、剥削、社会不平等。"
 PRC_mao_zedong_thought: "毛泽东思想"
 digital_leninism: "数字列宁主义"
 digital_leninism_desc: "\n\n\n\n£GFX_PRC_ideology_totalism\n\n\n\n\n\n乔治·奥威尔曾在他寓言性质的政治恐怖小说《一九八四》中虚构了一个\"大洋国\"，其国民的一言一行与生活的方方面面均被\"电幕\"所控制着，政府将会扑灭任何可能的不满和反抗。如今，这样的§Y寓言§!似乎已在中国变成现实。中国领导层痴迷于人工智能，不光是因为它代表21世纪的最高科技水平，同时还完美契合共产党利用数字技术实施全面监控、控制、引导、审查的目标。这一完美的工具将协助中共建立强大的数字极权政府，并其能力还将随时间而日渐强大和全面，让人民时时刻刻都处于在\"技术牢笼\"之中。"
 technocracy_totsoc: "技术官僚制"
 technocracy_totsoc_desc: "\n\n\n\n£GFX_PRC_ideology_technocracy_totsoc\n\n\n\n\n\n由工程师、科学家、数据分析师、系统理论家和工业管理者垄断权力的社会代表的正是§Y技官统制§!所追求的理想形态。其核心逻辑在于：社会应作为精密机器运转，而唯有技术精英组成的自我延续的寡头集团具备\"客观治理能力\"。复杂的现代社会是复杂技术的集合，选举、公众辩论、意识形态多元化则被视为混乱、不理性的代表，对系统的优化有害。国家被重新定义为一个巨型机器，其治理被简化为一系列可以通过计算和控制解决的工程问题。\n\n在\"系统最优化\"的绝对目标下，技官统制奉行极端实用主义：一切政策仅以\"技术可行性\"与\"效率增益\"为判准。由于统治者优先考虑抽象的系统目标而非具体的人类苦难，他们不避讳为消除\"非理性阻力\"而采用极端手段，甚至常常将其视为最优解。"
 chinese_national_communism: "民族共产主义"
 PRC_social_fascism: "民族毛主义"
 PRC_social_fascism_desc: "\n\n\n\n£GFX_Ideology_right_wing_maoism\n\n\n\n\n\n以民族救赎为内核、以本土情结为纽带，民族毛主义主张通过激进行动打破现代性对东方文明的侵蚀，重拾被遗忘的文化根基与民族尊严。它将毛泽东塑造为民族解放的象征，其遗产成为唤醒沉睡灵魂的号角，引领人民在历史废墟上重塑华夏荣光。\n\n民族毛主义者强调神圣使命的召唤：革命不仅是清算压迫者的工具，更是重构民族精神的仪式。民族英雄们从个体升华为集体意志的化身，以烈焰般激情点燃民众信仰。它试图融合古人天道正义与现代斗争逻辑，在废墟上铸造新世界，正如同铁锤击碎枷锁，亦如利剑劈开迷雾。\n\n该思想批判西方现代性对市侩之众的洗脑，将西方制度视为文化殖民的毒药。总而言之，毛泽东思想被重新诠释为民族精神的再生之源：毛泽东不再是世界无产阶级的解放者，而是强烈怀旧情绪下民族的\"救世主\"。自此，革命超越经济变革范畴，成为关乎身份认同与血性存续的精神战争。"
