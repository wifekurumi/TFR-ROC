 red_military_junta: "红色军政府"
 red_military_junta_desc: "\n\n\n\n£GFX_Ideology_PRC_left_wing_junta\n\n\n\n\n\n§Y红色军政府§!合了左翼意识形态与军政府的威权政治架构。既宣扬社会主义原则、平等与社会公平，又能让政府有通常军政府应有的纪律性和集中式决策。\n\n红色军政府的主要目标是：解决社会经济的不平等，消除阶级差异以及提升工人阶级福祉。其打算靠强有力的中央集权政府来有效率地完成这些目标，避免被繁琐的行政体系与恼人的政治反对派拖累。军队作为军政府的主导力量，在维护稳定、保卫革命与捍卫人民利益方面发挥着关键作用。"
 PRC_left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_PRC_left_wing_junta\n\n\n\n\n\n§Y红色军政府§!合了左翼意识形态与军政府的威权政治架构。既宣扬社会主义原则、平等与社会公平，又能让政府有通常军政府应有的纪律性和集中式决策。\n\n红色军政府的主要目标是：解决社会经济的不平等，消除阶级差异以及提升工人阶级福祉。其打算靠强有力的中央集权政府来有效率地完成这些目标，避免被繁琐的行政体系与恼人的政治反对派拖累。军队作为军政府的主导力量，在维护稳定、保卫革命与捍卫人民利益方面发挥着关键作用。"
